<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🏐 Volleyball</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(180deg, #87CEEB 0%, #98D8C8 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            color: #333;
        }
        h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .score-board { font-size: 1.3rem; margin-bottom: 15px; }
        .score-board span { background: rgba(255,255,255,0.5); padding: 5px 15px; border-radius: 15px; }
        canvas { max-width: 100%; 
            max-width: 100vw; border: 3px solid #333; border-radius: 10px; }
        .instructions { margin-top: 15px; color: #555; font-size: 1rem; }
        .instructions span { background: #333; color: white; padding: 3px 10px; border-radius: 5px; }
        .back-btn {
            position: absolute; top: 20px; left: 20px;
            background: #333; color: white; border: none; padding: 10px 20px;
            border-radius: 8px; cursor: pointer; text-decoration: none;
        }
        .back-btn:hover { background: #555; }
    
        /* Mobile Touch Controls */
        .touch-controls {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            padding: 10px;
            z-index: 1000;
        }
        @media (pointer: coarse) {
            .touch-controls { display: flex !important; }
            body { padding-bottom: 120px !important; }
        }
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 5px;
            margin: 0 auto;
        }
        .dpad-btn {
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.4);
            border-radius: 10px;
            color: white;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .dpad-btn:active {
            background: rgba(255,255,255,0.4);
        }
        .dpad-center { background: rgba(0,0,0,0.2); }
        @media (max-width: 500px) {
            .dpad { grid-template-columns: repeat(3, 50px); grid-template-rows: repeat(3, 50px); }
            .dpad-btn { font-size: 20px; }
        }
    
    
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }
        .game-header {
            font-size: 20px;
            font-weight: 700;
            color: #00ff88;
            text-shadow: 0 0 15px rgba(0,255,136,0.5);
            margin-bottom: 10px;
        }
        .score-display {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
        }
        .score-box {
            background: rgba(0,0,0,0.5);
            border: 2px solid rgba(0,255,136,0.3);
            border-radius: 10px;
            padding: 6px 14px;
            text-align: center;
        }
        .score-label { font-size: 10px; color: rgba(255,255,255,0.6); text-transform: uppercase; }
        .score-val { font-size: 18px; font-weight: 700; color: #00ff88; }
        .game-wrapper { position: relative; }
        #gameCanvas {
            border-radius: 12px;
            border: 3px solid #00ff88;
            box-shadow: 0 0 30px rgba(0,255,136,0.3);
        }
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
        }
        .overlay.hidden { display: none; }
        .overlay h2 {
            font-size: 28px;
            color: #00ff88;
            text-shadow: 0 0 20px rgba(0,255,136,0.6);
            margin-bottom: 8px;
        }
        .overlay p { color: rgba(255,255,255,0.7); margin-bottom: 15px; }
        .btn-epic {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            color: #0f0f1a;
            border: none;
            padding: 12px 35px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(0,255,136,0.4);
        }
        .btn-epic:hover { transform: scale(1.05); }
        .touch-controls {
            display: none;
            position: fixed;
            bottom: 10px;
            left: 0;
            right: 0;
            z-index: 100;
            justify-content: center;
            gap: 8px;
        }
        @media (pointer: coarse) {
            .touch-controls { display: flex; }
            body { padding-bottom: 100px; }
        }
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 50px);
            grid-template-rows: repeat(2, 50px);
            gap: 4px;
        }
        .dpad-btn {
            background: rgba(0,255,136,0.2);
            border: 2px solid rgba(0,255,136,0.5);
            border-radius: 10px;
            color: #00ff88;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .dpad-btn:active { background: rgba(0,255,136,0.5); }

    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← Back to Games</a>
    <h1>🏐 VOLLEYBALL</h1>
    <div class="score-board">
        <span>You: <strong id="p1">0</strong></span>
        <span>CPU: <strong id="p2">0</strong></span>
    </div>
    <canvas id="gameCanvas" width="400" height="500"></canvas>
    <div class="instructions"><span>CLICK</span> to serve and hit!</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let player = { x: 200, y: 450 };
        let cpu = { x: 200, y: 80 };
        let ball = { x: 200, y: 400, vx: 0, vy: 0, serving: true };
        let p1Score = 0;
        let p2Score = 0;
        let gameLoop;
        
        function init() {
            player = { x: 200, y: 450 };
            cpu = { x: 200, y: 80 };
            ball = { x: 200, y: 400, vx: 0, vy: 0, serving: true };
            p1Score = 0;
            p2Score = 0;
            
            document.getElementById('p1').textContent = '0';
            document.getElementById('p2').textContent = '0';
        }
        
        function draw() {
            // Sky
            ctx.fillStyle = '#87CEEB';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Court
            ctx.fillStyle = '#f5deb3';
            ctx.fillRect(0, 420, canvas.width, 80);
            
            // Net
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 250, canvas.width, 8);
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            for (let i = 0; i < 20; i++) {
                ctx.beginPath();
                ctx.moveTo(i * 20, 250);
                ctx.lineTo(i * 20, 258);
                ctx.stroke();
            }
            
            // Net posts
            ctx.fillStyle = '#333';
            ctx.fillRect(-5, 245, 10, 20);
            ctx.fillRect(395, 245, 10, 20);
            
            // Player paddle
            ctx.fillStyle = '#3498db';
            ctx.beginPath();
            ctx.arc(player.x, player.y, 30, 0, Math.PI * 2);
            ctx.fill();
            
            // CPU paddle
            ctx.fillStyle = '#e74c3c';
            ctx.beginPath();
            ctx.arc(cpu.x, cpu.y, 30, 0, Math.PI * 2);
            ctx.fill();
            
            // Ball
            ctx.fillStyle = '#fff';
            ctx.shadowColor = '#fff';
            ctx.shadowBlur = 8;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, 15, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // Ball lines
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, 15, -0.5, 0.5);
            ctx.stroke();
            
            if (ball.serving) {
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#fff';
                ctx.font = '20px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('Click to serve!', canvas.width/2, canvas.height/2);
            }
        }
        
        function update() {
            if (ball.serving) return;
            
            // Gravity
            ball.vy += 0.15;
            ball.x += ball.vx;
            ball.y += ball.vy;
            
            // Wall bounces
            if (ball.x < 15 || ball.x > 385) {
                ball.vx *= -0.8;
                ball.x = ball.x < 15 ? 15 : 385;
            }
            
            // Player collision
            let dx = ball.x - player.x;
            let dy = ball.y - player.y;
            let dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 45) {
                const angle = Math.atan2(dy, dx);
                const speed = 10 + Math.random() * 3;
                ball.vx = Math.cos(angle) * speed + (Math.random() - 0.5) * 3;
                ball.vy = Math.sin(angle) * speed;
                ball.y = player.y - 45;
            }
            
            // CPU collision
            dx = ball.x - cpu.x;
            dy = ball.y - cpu.y;
            dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 45) {
                const angle = Math.atan2(dy, dx);
                const speed = 8;
                ball.vx = Math.cos(angle) * speed + (Math.random() - 0.5) * 3;
                ball.vy = Math.sin(angle) * speed;
                ball.y = cpu.y + 45;
            }
            
            // CPU AI
            if (ball.vy < 0) {
                if (ball.x < cpu.x - 10) cpu.x -= 3;
                else if (ball.x > cpu.x + 10) cpu.x += 3;
            }
            cpu.x = Math.max(40, Math.min(360, cpu.x));
            
            // Scoring
            if (ball.y > 500) {
                p2Score++;
                document.getElementById('p2').textContent = p2Score;
                resetBall();
            }
            if (ball.y < 0) {
                p1Score++;
                document.getElementById('p1').textContent = p1Score;
                resetBall();
            }
            
            // Out of bounds
            if (ball.y > 520 || ball.y < -20) {
                resetBall();
            }
        }
        
        function resetBall() {
            ball = { x: 200, y: 400, vx: 0, vy: 0, serving: true };
        }
        
        function serve() {
            if (!ball.serving) return;
            ball.serving = false;
            ball.vy = -10;
            ball.vx = (Math.random() - 0.5) * 4;
        }
        
        canvas.addEventListener('click', () => {
            if (ball.serving) {
                serve();
            } else {
                // Hit harder
                if (ball.y > player.y - 50) {
                    ball.vy = -12;
                    ball.vx += (Math.random() - 0.5) * 5;
                }
            }
        });
        
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            player.x = e.clientX - rect.left;
            player.x = Math.max(40, Math.min(360, player.x));
        });
        
        init();
        draw();
        gameLoop = setInterval(() => {
            update();
            draw();
        }, 1000 / 60);
    
        window.tL=false; window.tR=false; window.tU=false; window.tD=false;
        setInterval(() => {
            if(window.tL) keys.left=true; else keys.left=false;
            if(window.tR) keys.right=true; else keys.right=false;
            if(window.tU) keys.up=true; else keys.up=false;
            if(window.tD) keys.down=true; else keys.down=false;
        }, 50);

    
    // EPIC PARTICLES
    let eParticles = [];
    class EParticle {
        constructor(x, y, color, size, vx, vy, life) {
            this.x=x; this.y=y; this.color=color; this.size=size;
            this.vx=vx; this.vy=vy; this.life=life; this.maxLife=life;
        }
        update() {
            this.x+=this.vx; this.y+=this.vy; this.vy+=0.1; this.life--;
        }
        draw() {
            let a = this.life/this.maxLife;
            ctx.globalAlpha=a;
            ctx.fillStyle=this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size*a, 0, Math.PI*2);
            ctx.fill();
            ctx.globalAlpha=1;
        }
    }
    function eSpawn(x, y, color, count) {
        for(let i=0; i<count; i++) {
            eParticles.push(new EParticle(x, y, color, 3+Math.random()*4, (Math.random()-0.5)*8, (Math.random()-0.5)*8-3, 30+Math.random()*20));
        }
    }

    </script>

    <div class="touch-controls" style="display:none;position:fixed;bottom:15px;left:0;right:0;z-index:1000;pointer-events:none;">
      <div style="display:flex;gap:20px;align-items:center;justify-content:center;pointer-events:auto;">
        <button class="dpad-btn" ontouchstart="window.tL=true;window.tR=false;window.tU=false" ontouchend="window.tL=false" onmousedown="window.tL=true" onmouseup="window.tL=false" style="width:70px;height:70px;border-radius:50%;font-size:26px;background:rgba(255,255,255,0.25);border:3px solid rgba(255,255,255,0.5);color:white;">&#9664;</button>
        <button class="dpad-btn" ontouchstart="window.tU=true;window.tL=false;window.tR=false" ontouchend="window.tU=false" onmousedown="window.tU=true" onmouseup="window.tU=false" style="width:70px;height:70px;border-radius:50%;font-size:26px;background:rgba(255,255,255,0.25);border:3px solid rgba(255,255,255,0.5);color:white;">&#9650;</button>
        <button class="dpad-btn" ontouchstart="window.tR=true;window.tL=false;window.tU=false" ontouchend="window.tR=false" onmousedown="window.tR=true" onmouseup="window.tR=false" style="width:70px;height:70px;border-radius:50%;font-size:26px;background:rgba(255,255,255,0.25);border:3px solid rgba(255,255,255,0.5);color:white;">&#9654;</button>
      </div>
    </div>

</body>
</html>
