<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚔️ Tower Defense Epic - Cool Games 64</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            color: white;
        }
        .hud {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
        }
        .hud-box {
            background: rgba(0,0,0,0.5);
            border: 2px solid rgba(102,126,234,0.5);
            border-radius: 10px;
            padding: 8px 15px;
            font-size: 14px;
        }
        .hud-box span { color: #667eea; font-weight: 700; }
        #gameCanvas {
            border-radius: 12px;
            border: 3px solid #667eea;
            box-shadow: 0 0 30px rgba(102,126,234,0.3);
        }
        .tower-shop {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .tower-btn {
            background: rgba(102,126,234,0.2);
            border: 2px solid rgba(102,126,234,0.5);
            border-radius: 10px;
            padding: 8px 12px;
            color: white;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tower-btn:hover { background: rgba(102,126,234,0.4); }
        .tower-btn.selected { border-color: #00ff88; background: rgba(0,255,136,0.2); }
        .overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            border-radius: 15px;
            padding: 25px 40px;
            text-align: center;
            border: 2px solid #667eea;
        }
        .overlay.hidden { display: none; }
        .overlay h1 {
            color: #667eea;
            font-size: 28px;
            margin-bottom: 10px;
        }
        .overlay p { color: rgba(255,255,255,0.7); margin-bottom: 15px; }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 25px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="hud">
        <div class="hud-box">Wave: <span id="wave">1</span></div>
        <div class="hud-box">Lives: <span id="lives">10</span> ❤️</div>
        <div class="hud-box">Gold: <span id="gold">100</span> 💰</div>
        <div class="hud-box">Score: <span id="score">0</span></div>
    </div>
    
    <div style="position: relative;">
        <canvas id="gameCanvas" width="400" height="450"></canvas>
        <div class="overlay" id="startScreen">
            <h1>⚔️ TOWER DEFENSE</h1>
            <p>Defend your base from waves of enemies!</p>
            <button class="btn" onclick="startGame()">START</button>
        </div>
        <div class="overlay hidden" id="gameOverScreen">
            <h1>💀 GAME OVER</h1>
            <p id="finalScore">Score: 0</p>
            <button class="btn" onclick="startGame()">TRY AGAIN</button>
        </div>
    </div>
    
    <div class="tower-shop">
        <button class="tower-btn selected" onclick="selectTower('arrow')">🏹 Arrow (50g)</button>
        <button class="tower-btn" onclick="selectTower('cannon')">💣 Cannon (100g)</button>
        <button class="tower-btn" onclick="selectTower('magic')">🔮 Magic (150g)</button>
        <button class="tower-btn" onclick="selectTower('slow')">❄️ Slow (75g)</button>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let towers, enemies, projectiles, particles;
let lives, gold, score, wave, gameLoop, gameState;
let selectedTower = 'arrow';
let waveTimer = 0;
let enemiesThisWave = 0;
let maxEnemiesThisWave = 5;

const TOWER_TYPES = {
    arrow: { cost: 50, color: '#00ff88', damage: 10, range: 100, fireRate: 30 },
    cannon: { cost: 100, color: '#ff9500', damage: 30, range: 80, fireRate: 60 },
    magic: { cost: 150, color: '#8000ff', damage: 20, range: 120, fireRate: 40, splash: 40 },
    slow: { cost: 75, color: '#00ccff', damage: 5, range: 90, fireRate: 20, slow: 0.5 }
};

class Particle {
    constructor(x, y, color, size, vx, vy, life) {
        this.x=x; this.y=y; this.color=color; this.size=size;
        this.vx=vx; this.vy=vy; this.life=life; this.maxLife=life;
    }
    update() { this.x+=this.vx; this.y+=this.vy; this.life--; }
    draw() {
        ctx.globalAlpha=this.life/this.maxLife;
        ctx.fillStyle=this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size*(this.life/this.maxLife), 0, Math.PI*2);
        ctx.fill();
        ctx.globalAlpha=1;
    }
}
let eParticles = [];
function eSpawn(x, y, color, count) {
    for(let i=0; i<count; i++) {
        eParticles.push(new Particle(x, y, color, 3+Math.random()*3, (Math.random()-0.5)*6, (Math.random()-0.5)*6, 20+Math.random()*15));
    }
}

function init() {
    towers = [];
    enemies = [];
    projectiles = [];
    eParticles = [];
    lives = 10;
    gold = 100;
    score = 0;
    wave = 1;
    enemiesThisWave = 0;
    maxEnemiesThisWave = 5;
    waveTimer = 0;
    gameState = 'playing';
}

function spawnEnemy() {
    let hp = 20 + wave * 10;
    let speed = 1 + wave * 0.1;
    enemies.push({
        x: -20,
        y: 225,
        w: 25,
        h: 25,
        hp: hp,
        maxHp: hp,
        speed: speed,
        slowed: 0,
        path: 0,
        reward: 10 + wave * 2
    });
}

function update() {
    if (gameState !== 'playing') return;
    
    // Wave spawning
    waveTimer++;
    if (enemiesThisWave < maxEnemiesThisWave && waveTimer > 60) {
        spawnEnemy();
        enemiesThisWave++;
        waveTimer = 0;
    }
    
    // Next wave
    if (enemiesThisWave >= maxEnemiesThisWave && enemies.length === 0) {
        wave++;
        maxEnemiesThisWave = 5 + wave * 2;
        enemiesThisWave = 0;
        gold += 50 + wave * 10;
        eSpawn(canvas.width/2, canvas.height/2, '#ffd700', 30);
    }
    
    // Update enemies
    enemies.forEach((e, i) => {
        // Slow effect
        let speedMult = e.slowed > 0 ? 0.5 : 1;
        if (e.slowed > 0) e.slowed--;
        
        e.x += e.speed * speedMult;
        
        // Reached end
        if (e.x > canvas.width + 20) {
            enemies.splice(i, 1);
            lives--;
            if (lives <= 0) {
                gameState = 'over';
                document.getElementById('finalScore').textContent = 'Score: ' + score;
                document.getElementById('gameOverScreen').classList.remove('hidden');
                clearInterval(gameLoop);
            }
        }
    });
    
    // Update towers
    towers.forEach(t => {
        t.cooldown--;
        
        // Find target
        if (t.cooldown <= 0) {
            let target = enemies.find(e => {
                let dx = e.x - t.x;
                let dy = e.y - t.y;
                return Math.sqrt(dx*dx+dy*dy) <= t.range;
            });
            
            if (target) {
                // Fire projectile
                projectiles.push({
                    x: t.x,
                    y: t.y,
                    targetX: target.x,
                    targetY: target.y,
                    speed: 8,
                    damage: t.damage,
                    color: t.color,
                    splash: t.splash || 0,
                    slow: t.slow || 0,
                    type: t.type
                });
                t.cooldown = t.fireRate;
            }
        }
    });
    
    // Update projectiles
    projectiles.forEach((p, i) => {
        let dx = p.targetX - p.x;
        let dy = p.targetY - p.y;
        let dist = Math.sqrt(dx*dx + dy*dy);
        
        if (dist < p.speed) {
            // Hit
            let hit = enemies.find(e => 
                Math.abs(e.x - p.targetX) < 30 && Math.abs(e.y - p.targetY) < 30
            );
            if (hit) {
                hit.hp -= p.damage;
                if (p.slow) hit.slowed = 30;
                if (p.splash) {
                    enemies.forEach(e => {
                        let edx = e.x - p.targetX;
                        let edy = e.y - p.targetY;
                        if (Math.sqrt(edx*edx+edy*edy) <= p.splash) {
                            e.hp -= p.damage * 0.5;
                        }
                    });
                    eSpawn(p.targetX, p.targetY, p.color, 20);
                } else {
                    eSpawn(hit.x, hit.y, p.color, 8);
                }
                
                if (hit.hp <= 0) {
                    gold += hit.reward;
                    score += hit.reward * 2;
                    eSpawn(hit.x, hit.y, '#ff4444', 15);
                    enemies.splice(enemies.indexOf(hit), 1);
                }
            }
            projectiles.splice(i, 1);
        } else {
            p.x += (dx/dist) * p.speed;
            p.y += (dy/dist) * p.speed;
        }
    });
    
    // Remove dead enemies
    enemies = enemies.filter(e => e.hp > 0);
    
    // Particles
    eParticles = eParticles.filter(p => { p.update(); return p.life > 0; });
    
    // UI
    document.getElementById('wave').textContent = wave;
    document.getElementById('lives').textContent = lives;
    document.getElementById('gold').textContent = gold;
    document.getElementById('score').textContent = score;
}

function draw() {
    // Background
    ctx.fillStyle = '#0a0a15';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Path
    ctx.fillStyle = '#2d2d4a';
    ctx.fillRect(0, 200, canvas.width, 50);
    
    // Path markings
    ctx.strokeStyle = '#667eea';
    ctx.lineWidth = 2;
    ctx.setLineDash([10, 10]);
    ctx.beginPath();
    ctx.moveTo(0, 225);
    ctx.lineTo(canvas.width, 225);
    ctx.stroke();
    ctx.setLineDash([]);
    
    // Grid lines (placement guides)
    ctx.strokeStyle = 'rgba(102,126,234,0.1)';
    for (let x = 0; x < canvas.width; x += 40) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
    }
    for (let y = 0; y < canvas.height; y += 40) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
    }
    
    // Towers
    towers.forEach(t => {
        // Range indicator (when selected type)
        if (selectedTower === t.type) {
            ctx.strokeStyle = 'rgba(102,126,234,0.2)';
            ctx.beginPath();
            ctx.arc(t.x, t.y, t.range, 0, Math.PI * 2);
            ctx.stroke();
        }
        
        // Tower base
        ctx.fillStyle = '#333';
        ctx.beginPath();
        ctx.arc(t.x, t.y, 18, 0, Math.PI * 2);
        ctx.fill();
        
        // Tower top
        ctx.fillStyle = t.color;
        ctx.shadowColor = t.color;
        ctx.shadowBlur = 10;
        
        if (t.type === 'arrow') {
            // Arrow tower
            ctx.beginPath();
            ctx.moveTo(t.x, t.y - 15);
            ctx.lineTo(t.x - 10, t.y + 10);
            ctx.lineTo(t.x + 10, t.y + 10);
            ctx.closePath();
            ctx.fill();
        } else if (t.type === 'cannon') {
            ctx.fillRect(t.x - 8, t.y - 12, 16, 20);
        } else if (t.type === 'magic') {
            ctx.beginPath();
            ctx.arc(t.x, t.y, 12, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(t.x, t.y, 6, 0, Math.PI * 2);
            ctx.fill();
        } else {
            ctx.beginPath();
            ctx.arc(t.x, t.y, 10, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.shadowBlur = 0;
    });
    
    // Enemies
    enemies.forEach(e => {
        // Slow effect
        if (e.slowed > 0) {
            ctx.fillStyle = 'rgba(0,204,255,0.3)';
            ctx.beginPath();
            ctx.arc(e.x, e.y, 20, 0, Math.PI * 2);
            ctx.fill();
        }
        
        // Enemy body
        ctx.fillStyle = e.slowed > 0 ? '#0088ff' : '#ff4444';
        ctx.shadowColor = ctx.fillStyle;
        ctx.shadowBlur = 10;
        
        // Different enemy shapes based on wave
        if (wave > 3) {
            // Boss - bigger
            ctx.beginPath();
            ctx.arc(e.x, e.y, 18, 0, Math.PI * 2);
            ctx.fill();
        } else {
            ctx.fillRect(e.x - 12, e.y - 12, 24, 24);
        }
        ctx.shadowBlur = 0;
        
        // HP bar
        ctx.fillStyle = '#333';
        ctx.fillRect(e.x - 15, e.y - 25, 30, 5);
        ctx.fillStyle = '#00ff88';
        ctx.fillRect(e.x - 15, e.y - 25, 30 * (e.hp / e.maxHp), 5);
    });
    
    // Projectiles
    projectiles.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.type === 'cannon' ? 8 : 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
    });
    
    // Particles
    eParticles.forEach(p => p.draw());
    
    // Placement preview
    if (selectedTower && mouseX && mouseY) {
        let t = TOWER_TYPES[selectedTower];
        ctx.strokeStyle = 'rgba(0,255,136,0.5)';
        ctx.beginPath();
        ctx.arc(mouseX, mouseY, t.range, 0, Math.PI * 2);
        ctx.stroke();
        ctx.fillStyle = 'rgba(0,255,136,0.3)';
        ctx.beginPath();
        ctx.arc(mouseX, mouseY, 18, 0, Math.PI * 2);
        ctx.fill();
    }
}

let mouseX, mouseY;

canvas.addEventListener('mousemove', e => {
    let rect = canvas.getBoundingClientRect();
    mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
    mouseY = (e.clientY - rect.top) * (canvas.height / rect.height);
});

canvas.addEventListener('click', e => {
    let rect = canvas.getBoundingClientRect();
    let x = (e.clientX - rect.left) * (canvas.width / rect.width);
    let y = (e.clientY - rect.top) * (canvas.height / rect.height);
    
    // Check if can afford
    let cost = TOWER_TYPES[selectedTower].cost;
    if (gold >= cost) {
        towers.push({
            x: x,
            y: y,
            ...TOWER_TYPES[selectedTower],
            cooldown: 0
        });
        gold -= cost;
        eSpawn(x, y, '#00ff88', 10);
    }
});

canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    let rect = canvas.getBoundingClientRect();
    let touch = e.touches[0];
    let x = (touch.clientX - rect.left) * (canvas.width / rect.width);
    let y = (touch.clientY - rect.top) * (canvas.height / rect.height);
    
    let cost = TOWER_TYPES[selectedTower].cost;
    if (gold >= cost) {
        towers.push({
            x: x,
            y: y,
            ...TOWER_TYPES[selectedTower],
            cooldown: 0
        });
        gold -= cost;
        eSpawn(x, y, '#00ff88', 10);
    }
});

function selectTower(type) {
    selectedTower = type;
    document.querySelectorAll('.tower-btn').forEach(btn => {
        btn.classList.remove('selected');
    });
    event.target.classList.add('selected');
}

function startGame() {
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('gameOverScreen').classList.add('hidden');
    init();
    if (gameLoop) clearInterval(gameLoop);
    gameLoop = setInterval(() => { update(); draw(); }, 1000/60);
}

init();
draw();
</script>
</body>
</html>
