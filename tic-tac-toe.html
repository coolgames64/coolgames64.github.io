<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⭕ Tic Tac Toe</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }
        h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .status { font-size: 1.5rem; margin-bottom: 15px; }
        canvas { max-width: 100%; 
            max-width: 100vw; border: 3px solid #fff; border-radius: 10px; background: rgba(0,0,0,0.3); }
        .back-btn {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255,255,255,0.2); color: white;
            border: 2px solid rgba(255,255,255,0.4); padding: 10px 20px;
            border-radius: 8px; cursor: pointer; text-decoration: none;
        }
        .back-btn:hover { background: rgba(255,255,255,0.3); }
    
        /* Mobile Touch Controls */
        .touch-controls {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            padding: 10px;
            z-index: 1000;
        }
        @media (pointer: coarse) {
            .touch-controls { display: flex !important; }
            body { padding-bottom: 120px !important; }
        }
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 5px;
            margin: 0 auto;
        }
        .dpad-btn {
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.4);
            border-radius: 10px;
            color: white;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .dpad-btn:active {
            background: rgba(255,255,255,0.4);
        }
        .dpad-center { background: rgba(0,0,0,0.2); }
        @media (max-width: 500px) {
            .dpad { grid-template-columns: repeat(3, 50px); grid-template-rows: repeat(3, 50px); }
            .dpad-btn { font-size: 20px; }
        }
    
    
        .tap-area {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 999;
            display: none;
        }
        @media (pointer: coarse) {
            .tap-area { display: block; }
        }
        .tap-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 80px; height: 80px;
            background: rgba(255,255,255,0.3);
            border: 3px solid rgba(255,255,255,0.6);
            border-radius: 50%;
            color: white;
            font-size: 14px;
            z-index: 1001;
            display: none;
            cursor: pointer;
        }
        @media (pointer: coarse) {
            .tap-btn { display: flex; align-items: center; justify-content: center; }
        }

    
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }
        .game-header {
            font-size: 20px;
            font-weight: 700;
            color: #00ff88;
            text-shadow: 0 0 15px rgba(0,255,136,0.5);
            margin-bottom: 10px;
        }
        .score-display {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
        }
        .score-box {
            background: rgba(0,0,0,0.5);
            border: 2px solid rgba(0,255,136,0.3);
            border-radius: 10px;
            padding: 6px 14px;
            text-align: center;
        }
        .score-label { font-size: 10px; color: rgba(255,255,255,0.6); text-transform: uppercase; }
        .score-val { font-size: 18px; font-weight: 700; color: #00ff88; }
        .game-wrapper { position: relative; }
        #gameCanvas {
            border-radius: 12px;
            border: 3px solid #00ff88;
            box-shadow: 0 0 30px rgba(0,255,136,0.3);
        }
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
        }
        .overlay.hidden { display: none; }
        .overlay h2 {
            font-size: 28px;
            color: #00ff88;
            text-shadow: 0 0 20px rgba(0,255,136,0.6);
            margin-bottom: 8px;
        }
        .overlay p { color: rgba(255,255,255,0.7); margin-bottom: 15px; }
        .btn-epic {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            color: #0f0f1a;
            border: none;
            padding: 12px 35px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(0,255,136,0.4);
        }
        .btn-epic:hover { transform: scale(1.05); }
        .touch-controls {
            display: none;
            position: fixed;
            bottom: 10px;
            left: 0;
            right: 0;
            z-index: 100;
            justify-content: center;
            gap: 8px;
        }
        @media (pointer: coarse) {
            .touch-controls { display: flex; }
            body { padding-bottom: 100px; }
        }
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 50px);
            grid-template-rows: repeat(2, 50px);
            gap: 4px;
        }
        .dpad-btn {
            background: rgba(0,255,136,0.2);
            border: 2px solid rgba(0,255,136,0.5);
            border-radius: 10px;
            color: #00ff88;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .dpad-btn:active { background: rgba(0,255,136,0.5); }

    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← Back to Games</a>
    <h1>⭕ TIC TAC TOE</h1>
    <div class="status" id="status">Your turn (X)</div>
    <canvas id="gameCanvas" width="300" height="300"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let board = ['', '', '', '', '', '', '', '', ''];
        let player = 'X';
        let cpu = 'O';
        let currentPlayer = 'X';
        let gameOver = false;
        let vsCPU = true;
        
        function draw() {
            ctx.clearRect(0, 0, 300, 300);
            
            // Grid
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(100, 0);
            ctx.lineTo(100, 300);
            ctx.moveTo(200, 0);
            ctx.lineTo(200, 300);
            ctx.moveTo(0, 100);
            ctx.lineTo(300, 100);
            ctx.moveTo(0, 200);
            ctx.lineTo(300, 200);
            ctx.stroke();
            
            // X and O
            for (let i = 0; i < 9; i++) {
                const x = (i % 3) * 100 + 50;
                const y = Math.floor(i / 3) * 100 + 50;
                
                if (board[i] === 'X') {
                    ctx.strokeStyle = '#3498db';
                    ctx.lineWidth = 6;
                    ctx.beginPath();
                    ctx.moveTo(x - 25, y - 25);
                    ctx.lineTo(x + 25, y + 25);
                    ctx.moveTo(x + 25, y - 25);
                    ctx.lineTo(x - 25, y + 25);
                    ctx.stroke();
                } else if (board[i] === 'O') {
                    ctx.strokeStyle = '#e74c3c';
                    ctx.lineWidth = 6;
                    ctx.beginPath();
                    ctx.arc(x, y, 25, 0, Math.PI * 2);
                    ctx.stroke();
                }
            }
        }
        
        function checkWin(b) {
            const wins = [
                [0,1,2], [3,4,5], [6,7,8],
                [0,3,6], [1,4,7], [2,5,8],
                [0,4,8], [2,4,6]
            ];
            
            for (let w of wins) {
                if (b[w[0]] && b[w[0]] === b[w[1]] && b[w[1]] === b[w[2]]) {
                    return b[w[0]];
                }
            }
            if (b.every(c => c !== '')) return 'tie';
            return null;
        }
        
        function getEmptySpots(b) {
            return b.map((c, i) => c === '' ? i : -1).filter(i => i >= 0);
        }
        
        function minimax(b, depth, isMax) {
            const winner = checkWin(b);
            if (winner === 'O') return 10 - depth;
            if (winner === 'X') return depth - 10;
            if (winner === 'tie') return 0;
            
            const spots = getEmptySpots(b);
            if (isMax) {
                let best = -100;
                for (let spot of spots) {
                    b[spot] = 'O';
                    best = Math.max(best, minimax(b, depth + 1, false));
                    b[spot] = '';
                }
                return best;
            } else {
                let best = 100;
                for (let spot of spots) {
                    b[spot] = 'X';
                    best = Math.min(best, minimax(b, depth + 1, true));
                    b[spot] = '';
                }
                return best;
            }
        }
        
        function cpuMove() {
            const b = [...board];
            const spots = getEmptySpots(b);
            let best = -100;
            let bestSpot = spots[0];
            
            for (let spot of spots) {
                b[spot] = 'O';
                const score = minimax(b, 0, false);
                b[spot] = '';
                if (score > best) {
                    best = score;
                    bestSpot = spot;
                }
            }
            
            board[bestSpot] = 'O';
        }
        
        function handleClick(e) {
            if (gameOver || currentPlayer !== 'X') return;
            
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const col = Math.floor(x / 100);
            const row = Math.floor(y / 100);
            const index = row * 3 + col;
            
            if (board[index] === '') {
                board[index] = 'X';
                
                const winner = checkWin(board);
                if (winner) {
                    gameOver = true;
                    document.getElementById('status').textContent = winner === 'tie' ? "It's a tie!" : `${winner} wins!`;
                } else {
                    currentPlayer = 'O';
                    document.getElementById('status').textContent = "CPU's turn...";
                    draw();
                    
                    setTimeout(() => {
                        cpuMove();
                        const winner = checkWin(board);
                        if (winner) {
                            gameOver = true;
                            document.getElementById('status').textContent = winner === 'tie' ? "It's a tie!" : `${winner} wins!`;
                        } else {
                            currentPlayer = 'X';
                            document.getElementById('status').textContent = "Your turn (X)";
                        }
                        draw();
                    }, 500);
                }
                draw();
            }
        }
        
        canvas.addEventListener('click', handleClick);
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            handleClick({ clientX: touch.clientX, clientY: touch.clientY });
        });
        
        draw();
    
        // Tap anywhere to click
        document.addEventListener('touchstart', (e) => {
            if(e.target.tagName !== 'BUTTON' && e.target.tagName !== 'INPUT') {
                const touch = e.touches[0];
                const clickEvent = new MouseEvent('click', {
                    bubbles: true,
                    clientX: touch.clientX,
                    clientY: touch.clientY
                });
                e.target.dispatchEvent(clickEvent);
            }
        }, true);
        
        // Space/action button for mobile
        window.tapSpace = false;

    
    // EPIC PARTICLES
    let eParticles = [];
    class EParticle {
        constructor(x, y, color, size, vx, vy, life) {
            this.x=x; this.y=y; this.color=color; this.size=size;
            this.vx=vx; this.vy=vy; this.life=life; this.maxLife=life;
        }
        update() {
            this.x+=this.vx; this.y+=this.vy; this.vy+=0.1; this.life--;
        }
        draw() {
            let a = this.life/this.maxLife;
            ctx.globalAlpha=a;
            ctx.fillStyle=this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size*a, 0, Math.PI*2);
            ctx.fill();
            ctx.globalAlpha=1;
        }
    }
    function eSpawn(x, y, color, count) {
        for(let i=0; i<count; i++) {
            eParticles.push(new EParticle(x, y, color, 3+Math.random()*4, (Math.random()-0.5)*8, (Math.random()-0.5)*8-3, 30+Math.random()*20));
        }
    }

    
    window.tL=false; window.tR=false; window.tU=false; window.tD=false;
    ['btnL','btnR','btnU','btnD'].forEach(id => {
        let btn = document.getElementById(id);
        if(!btn) return;
        let key = {btnL:'tL',btnR:'tR',btnU:'tU',btnD:'tD'}[id];
        btn.addEventListener('touchstart', e => { e.preventDefault(); window[key]=true; });
        btn.addEventListener('touchend', e => { e.preventDefault(); window[key]=false; });
        btn.addEventListener('mousedown', () => window[key]=true);
        btn.addEventListener('mouseup', () => window[key]=false);
    });
    setInterval(() => {
        if(window.tL) keys.left=true; else keys.left=false;
        if(window.tR) keys.right=true; else keys.right=false;
        if(window.tU) keys.up=true; else keys.up=false;
        if(window.tD) keys.down=true; else keys.down=false;
    }, 50);

    </script>

    <button class="tap-btn" ontouchstart="window.tapSpace=true" ontouchend="window.tapSpace=false">TAP</button>

</body>
</html>
