<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌀 Helix Jump</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }
        h1 { font-size: 2.5rem; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .score-board { font-size: 1.5rem; margin-bottom: 15px; }
        .score-board span { background: rgba(255,255,255,0.2); padding: 5px 20px; border-radius: 20px; }
        canvas { max-width: 100%; 
            max-width: 100vw; border: 3px solid #fff; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.4); }
        .instructions { margin-top: 15px; color: rgba(255,255,255,0.8); font-size: 1rem; }
        .instructions span { background: rgba(255,255,255,0.3); padding: 3px 10px; border-radius: 5px; }
        .back-btn {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255,255,255,0.2); color: white;
            border: 2px solid rgba(255,255,255,0.4); padding: 10px 20px;
            border-radius: 8px; cursor: pointer; text-decoration: none;
        }
        .back-btn:hover { background: rgba(255,255,255,0.3); }
    
        /* Mobile Touch Controls */
        .touch-controls {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            padding: 10px;
            z-index: 1000;
        }
        @media (pointer: coarse) {
            .touch-controls { display: flex !important; }
            body { padding-bottom: 120px !important; }
        }
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 5px;
            margin: 0 auto;
        }
        .dpad-btn {
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.4);
            border-radius: 10px;
            color: white;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .dpad-btn:active {
            background: rgba(255,255,255,0.4);
        }
        .dpad-center { background: rgba(0,0,0,0.2); }
        @media (max-width: 500px) {
            .dpad { grid-template-columns: repeat(3, 50px); grid-template-rows: repeat(3, 50px); }
            .dpad-btn { font-size: 20px; }
        }
    
    
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }
        .game-header {
            font-size: 20px;
            font-weight: 700;
            color: #00ff88;
            text-shadow: 0 0 15px rgba(0,255,136,0.5);
            margin-bottom: 10px;
        }
        .score-display {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
        }
        .score-box {
            background: rgba(0,0,0,0.5);
            border: 2px solid rgba(0,255,136,0.3);
            border-radius: 10px;
            padding: 6px 14px;
            text-align: center;
        }
        .score-label { font-size: 10px; color: rgba(255,255,255,0.6); text-transform: uppercase; }
        .score-val { font-size: 18px; font-weight: 700; color: #00ff88; }
        .game-wrapper { position: relative; }
        #gameCanvas {
            border-radius: 12px;
            border: 3px solid #00ff88;
            box-shadow: 0 0 30px rgba(0,255,136,0.3);
        }
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
        }
        .overlay.hidden { display: none; }
        .overlay h2 {
            font-size: 28px;
            color: #00ff88;
            text-shadow: 0 0 20px rgba(0,255,136,0.6);
            margin-bottom: 8px;
        }
        .overlay p { color: rgba(255,255,255,0.7); margin-bottom: 15px; }
        .btn-epic {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            color: #0f0f1a;
            border: none;
            padding: 12px 35px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(0,255,136,0.4);
        }
        .btn-epic:hover { transform: scale(1.05); }
        .touch-controls {
            display: none;
            position: fixed;
            bottom: 10px;
            left: 0;
            right: 0;
            z-index: 100;
            justify-content: center;
            gap: 8px;
        }
        @media (pointer: coarse) {
            .touch-controls { display: flex; }
            body { padding-bottom: 100px; }
        }
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 50px);
            grid-template-rows: repeat(2, 50px);
            gap: 4px;
        }
        .dpad-btn {
            background: rgba(0,255,136,0.2);
            border: 2px solid rgba(0,255,136,0.5);
            border-radius: 10px;
            color: #00ff88;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .dpad-btn:active { background: rgba(0,255,136,0.5); }

    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← Back to Games</a>
    <h1>🌀 HELIX JUMP</h1>
    <div class="score-board">Score: <span id="score">0</span> | Best: <span id="best">0</span></div>
    <canvas id="gameCanvas" width="300" height="550"></canvas>
    <div class="instructions">Click/Tap <span>LEFT</span> or <span>RIGHT</span> to move the ball!</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const BALL_RADIUS = 15;
        const PLATFORM_HEIGHT = 18;
        const HELIX_HEIGHT = 5000;
        
        let ball = { x: 150, y: 100, vx: 0, vy: 0, color: '#FF6B6B' };
        let platforms = [];
        let cameraY = 0;
        let score = 0;
        let best = parseInt(localStorage.getItem('helixBest')) || 0;
        let gameOver = false;
        let gameLoop;
        let direction = 0;
        let lastPlatformY = 0;
        let platformIndex = 0;
        
        const COLORS = ['#FF6B6B', '#4ECDC4', '#FFE66D', '#95E1D3', '#DDA0DD', '#A855F7', '#22C55E'];
        
        function init() {
            ball = { x: 150, y: 100, vx: 0, vy: 0, color: COLORS[Math.floor(Math.random() * COLORS.length)] };
            platforms = [];
            cameraY = 0;
            score = 0;
            gameOver = false;
            direction = 0;
            platformIndex = 0;
            
            // Create initial platform (safe starting platform)
            platforms.push({
                y: 200,
                type: 'full',
                color: '#4ECDC4',
                broken: false
            });
            
            // Generate platforms
            lastPlatformY = 200;
            for (let i = 0; i < 40; i++) {
                generateNextPlatform();
            }
            
            document.getElementById('score').textContent = '0';
            document.getElementById('best').textContent = best;
        }
        
        function generateNextPlatform() {
            const gap = 40 + Math.random() * 30;
            lastPlatformY += gap;
            
            const type = Math.random() > 0.7 ? 'split' : 'full';
            const color = COLORS[Math.floor(Math.random() * COLORS.length)];
            
            if (type === 'split') {
                const splitPoint = 0.3 + Math.random() * 0.4;
                const splitSide = Math.random() > 0.5 ? 'left' : 'right';
                
                platforms.push({
                    y: lastPlatformY,
                    type: 'split',
                    splitPoint: splitPoint,
                    splitSide: splitSide,
                    color: color,
                    broken: false
                });
            } else {
                platforms.push({
                    y: lastPlatformY,
                    type: 'full',
                    color: color,
                    broken: false
                });
            }
        }
        
        function drawPlatform(platform) {
            const screenY = platform.y - cameraY;
            const platformWidth = canvas.width - 40;
            const startX = 20;
            
            if (platform.type === 'full') {
                ctx.fillStyle = platform.color;
                ctx.beginPath();
                ctx.roundRect(startX, screenY, platformWidth, PLATFORM_HEIGHT, 5);
                ctx.fill();
                
                // Highlight
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.fillRect(startX + 5, screenY + 2, platformWidth - 10, 4);
            } else if (platform.type === 'split') {
                const splitX = startX + platformWidth * platform.splitPoint;
                
                if (platform.splitSide === 'left') {
                    // Left part
                    ctx.fillStyle = platform.color;
                    ctx.beginPath();
                    ctx.roundRect(startX, screenY, splitX - 15, PLATFORM_HEIGHT, 5);
                    ctx.fill();
                    ctx.fillStyle = 'rgba(255,255,255,0.3)';
                    ctx.fillRect(startX + 5, screenY + 2, 20, 4);
                    
                    // Right part
                    ctx.fillStyle = platform.color;
                    ctx.beginPath();
                    ctx.roundRect(splitX + 15, screenY, platformWidth - splitX - 15, PLATFORM_HEIGHT, 5);
                    ctx.fill();
                    ctx.fillStyle = 'rgba(255,255,255,0.3)';
                    ctx.fillRect(splitX + 20, screenY + 2, 20, 4);
                } else {
                    // Left part
                    ctx.fillStyle = platform.color;
                    ctx.beginPath();
                    ctx.roundRect(startX, screenY, splitX - 15, PLATFORM_HEIGHT, 5);
                    ctx.fill();
                    ctx.fillStyle = 'rgba(255,255,255,0.3)';
                    ctx.fillRect(startX + 5, screenY + 2, 20, 4);
                    
                    // Right part
                    ctx.fillStyle = platform.color;
                    ctx.beginPath();
                    ctx.roundRect(splitX + 15, screenY, platformWidth - splitX - 15, PLATFORM_HEIGHT, 5);
                    ctx.fill();
                    ctx.fillStyle = 'rgba(255,255,255,0.3)';
                    ctx.fillRect(splitX + 20, screenY + 2, 20, 4);
                }
            }
            
            // Platform shine
            ctx.fillStyle = 'rgba(255,255,255,0.2)';
            ctx.fillRect(startX + 5, screenY + 2, 30, 3);
        }
        
        function drawBall() {
            const screenY = ball.y - cameraY;
            
            // Ball shadow
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.beginPath();
            ctx.ellipse(ball.x, canvas.height - 30, BALL_RADIUS * 0.8, 5, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Ball
            ctx.fillStyle = ball.color;
            ctx.shadowColor = ball.color;
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.arc(ball.x, screenY, BALL_RADIUS, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // Ball shine
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            ctx.beginPath();
            ctx.arc(ball.x - 4, screenY - 4, 5, 0, Math.PI * 2);
            ctx.fill();
        }
        
        function drawBackground() {
            // Gradient background
            const hue = (cameraY * 0.02) % 360;
            ctx.fillStyle = `hsl(${hue}, 60%, 50%)`;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Simple helix pole
            ctx.fillStyle = '#333';
            ctx.fillRect(canvas.width / 2 - 5, 0, 10, canvas.height);
        }
        
        function draw() {
            drawBackground();
            
            // Draw platforms
            platforms.forEach(drawPlatform);
            
            // Draw ball
            drawBall();
        }
        
        function update() {
            if (gameOver) return;
            
            // Ball movement
            const speed = 4;
            ball.x += direction * speed;
            
            // Bounce off walls
            if (ball.x < BALL_RADIUS) {
                ball.x = BALL_RADIUS;
                direction = 1;
            } else if (ball.x > canvas.width - BALL_RADIUS) {
                ball.x = canvas.width - BALL_RADIUS;
                direction = -1;
            }
            
            // Gravity
            ball.vy += 0.3;
            ball.y += ball.vy;
            
            // Check platform collisions
            if (ball.vy > 0) {
                platforms.forEach(platform => {
                    const platformTop = platform.y;
                    
                    if (ball.y + BALL_RADIUS > platformTop && 
                        ball.y + BALL_RADIUS < platformTop + PLATFORM_HEIGHT + ball.vy &&
                        ball.vy > 0) {
                        
                        // Check if ball is on a valid part of platform
                        let onPlatform = false;
                        const platformWidth = canvas.width - 40;
                        const startX = 20;
                        const ballPlatformX = ball.x - startX;
                        
                        if (platform.type === 'full') {
                            if (ballPlatformX > 0 && ballPlatformX < platformWidth) {
                                onPlatform = true;
                            }
                        } else if (platform.type === 'split') {
                            const splitX = platformWidth * platform.splitPoint;
                            if (platform.splitSide === 'left') {
                                if (ballPlatformX < splitX - 15 || ballPlatformX > splitX + 15) {
                                    onPlatform = true;
                                }
                            } else {
                                if (ballPlatformX < splitX - 15 || ballPlatformX > splitX + 15) {
                                    onPlatform = true;
                                }
                            }
                        }
                        
                        if (onPlatform) {
                            ball.y = platformTop - BALL_RADIUS;
                            ball.vy = -10;
                            ball.color = platform.color;
                        }
                    }
                });
            }
            
            // Camera follows ball
            const targetCameraY = ball.y - canvas.height * 0.4;
            if (targetCameraY < cameraY) {
                cameraY += (targetCameraY - cameraY) * 0.1;
            }
            
            // Score (based on height)
            const newScore = Math.floor(-cameraY / 10);
            if (newScore > score) {
                score = newScore;
                document.getElementById('score').textContent = score;
            }
            
            // Generate new platforms
            while (lastPlatformY < -cameraY + canvas.height + 200) {
                generateNextPlatform();
            }
            
            // Remove old platforms
            platforms = platforms.filter(p => p.y < -cameraY + canvas.height + 100);
            
            // Game over (fell below camera)
            if (ball.y - cameraY > canvas.height + 100) {
                endGame();
            }
        }
        
        function endGame() {
            gameOver = true;
            clearInterval(gameLoop);
            
            if (score > best) {
                best = score;
                localStorage.setItem('helixBest', best);
            }
            
            setTimeout(() => {
                alert(`Game Over! Score: ${score}\nBest: ${best}\n\nClick OK to play again!`);
                init();
                gameLoop = setInterval(() => {
                    update();
                    draw();
                }, 1000 / 60);
            }, 100);
        }
        
        // Controls
        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            direction = x < canvas.width / 2 ? -1 : 1;
        });
        
        canvas.addEventListener('mouseup', () => {
            direction = 0;
        });
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const x = e.touches[0].clientX - rect.left;
            direction = x < canvas.width / 2 ? -1 : 1;
        });
        
        canvas.addEventListener('touchend', () => {
            direction = 0;
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowLeft') direction = -1;
            if (e.code === 'ArrowRight') direction = 1;
        });
        
        document.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowLeft' || e.code === 'ArrowRight') direction = 0;
        });
        
        // Start
        init();
        draw();
        gameLoop = setInterval(() => {
            update();
            draw();
        }, 1000 / 60);
    
        window.tL=false; window.tR=false; window.tU=false; window.tD=false;
        setInterval(() => {
            if(window.tL) keys.left=true; else keys.left=false;
            if(window.tR) keys.right=true; else keys.right=false;
            if(window.tU) keys.up=true; else keys.up=false;
            if(window.tD) keys.down=true; else keys.down=false;
        }, 50);

    
    // EPIC PARTICLES
    let eParticles = [];
    class EParticle {
        constructor(x, y, color, size, vx, vy, life) {
            this.x=x; this.y=y; this.color=color; this.size=size;
            this.vx=vx; this.vy=vy; this.life=life; this.maxLife=life;
        }
        update() {
            this.x+=this.vx; this.y+=this.vy; this.vy+=0.1; this.life--;
        }
        draw() {
            let a = this.life/this.maxLife;
            ctx.globalAlpha=a;
            ctx.fillStyle=this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size*a, 0, Math.PI*2);
            ctx.fill();
            ctx.globalAlpha=1;
        }
    }
    function eSpawn(x, y, color, count) {
        for(let i=0; i<count; i++) {
            eParticles.push(new EParticle(x, y, color, 3+Math.random()*4, (Math.random()-0.5)*8, (Math.random()-0.5)*8-3, 30+Math.random()*20));
        }
    }

    </script>

    <div class="touch-controls" style="display:none;position:fixed;bottom:15px;left:0;right:0;z-index:1000;pointer-events:none;">
      <div style="display:flex;gap:20px;align-items:center;justify-content:center;pointer-events:auto;">
        <button class="dpad-btn" ontouchstart="window.tL=true;window.tR=false;window.tU=false" ontouchend="window.tL=false" onmousedown="window.tL=true" onmouseup="window.tL=false" style="width:70px;height:70px;border-radius:50%;font-size:26px;background:rgba(255,255,255,0.25);border:3px solid rgba(255,255,255,0.5);color:white;">&#9664;</button>
        <button class="dpad-btn" ontouchstart="window.tU=true;window.tL=false;window.tR=false" ontouchend="window.tU=false" onmousedown="window.tU=true" onmouseup="window.tU=false" style="width:70px;height:70px;border-radius:50%;font-size:26px;background:rgba(255,255,255,0.25);border:3px solid rgba(255,255,255,0.5);color:white;">&#9650;</button>
        <button class="dpad-btn" ontouchstart="window.tR=true;window.tL=false;window.tU=false" ontouchend="window.tR=false" onmousedown="window.tR=true" onmouseup="window.tR=false" style="width:70px;height:70px;border-radius:50%;font-size:26px;background:rgba(255,255,255,0.25);border:3px solid rgba(255,255,255,0.5);color:white;">&#9654;</button>
      </div>
    </div>

</body>
