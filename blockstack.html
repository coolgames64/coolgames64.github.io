<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🧱 Block Stack</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow: hidden;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px #00d4ff;
            color: #00d4ff;
        }
        .score-board {
            display: flex;
            gap: 30px;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }
        .score-board span {
            background: rgba(0, 212, 255, 0.2);
            padding: 8px 20px;
            border-radius: 20px;
            border: 1px solid rgba(0, 212, 255, 0.3);
        }
        canvas { max-width: 100%; 
            max-width: 100vw;
            border: 3px solid #00d4ff;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
        }
        .instructions {
            margin-top: 15px;
            font-size: 1rem;
            color: #888;
            text-align: center;
        }
        .instructions span {
            color: #00d4ff;
        }
        #gameOver {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal-content {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 3px solid #00d4ff;
        }
        .modal-content h2 {
            color: #ff6b6b;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        .modal-content .final-score {
            font-size: 3rem;
            color: #00d4ff;
            margin-bottom: 10px;
        }
        .modal-content .best-score {
            font-size: 1.2rem;
            color: #888;
            margin-bottom: 25px;
        }
        .modal-content button {
            background: #00d4ff;
            color: #1a1a2e;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
        }
        .modal-content button:hover {
            background: #00b4e6;
        }
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.1);
            color: white;
            border: 2px solid rgba(255,255,255,0.3);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-size: 1rem;
        }
        .back-btn:hover {
            background: rgba(255,255,255,0.2);
        }
        .combo {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            color: #FFD700;
            text-shadow: 0 0 20px #FFD700;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .combo.show {
            opacity: 1;
            animation: comboAnim 0.5s ease-out;
        }
        @keyframes comboAnim {
            0% { transform: translate(-50%, -50%) scale(0.5); }
            50% { transform: translate(-50%, -50%) scale(1.5); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
    
        /* Mobile Touch Controls */
        .touch-controls {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            padding: 10px;
            z-index: 1000;
        }
        @media (pointer: coarse) {
            .touch-controls { display: flex !important; }
            body { padding-bottom: 120px !important; }
        }
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 5px;
            margin: 0 auto;
        }
        .dpad-btn {
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.4);
            border-radius: 10px;
            color: white;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .dpad-btn:active {
            background: rgba(255,255,255,0.4);
        }
        .dpad-center { background: rgba(0,0,0,0.2); }
        @media (max-width: 500px) {
            .dpad { grid-template-columns: repeat(3, 50px); grid-template-rows: repeat(3, 50px); }
            .dpad-btn { font-size: 20px; }
        }
    
    
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }
        .game-header {
            font-size: 20px;
            font-weight: 700;
            color: #00ff88;
            text-shadow: 0 0 15px rgba(0,255,136,0.5);
            margin-bottom: 10px;
        }
        .score-display {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
        }
        .score-box {
            background: rgba(0,0,0,0.5);
            border: 2px solid rgba(0,255,136,0.3);
            border-radius: 10px;
            padding: 6px 14px;
            text-align: center;
        }
        .score-label { font-size: 10px; color: rgba(255,255,255,0.6); text-transform: uppercase; }
        .score-val { font-size: 18px; font-weight: 700; color: #00ff88; }
        .game-wrapper { position: relative; }
        #gameCanvas {
            border-radius: 12px;
            border: 3px solid #00ff88;
            box-shadow: 0 0 30px rgba(0,255,136,0.3);
        }
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
        }
        .overlay.hidden { display: none; }
        .overlay h2 {
            font-size: 28px;
            color: #00ff88;
            text-shadow: 0 0 20px rgba(0,255,136,0.6);
            margin-bottom: 8px;
        }
        .overlay p { color: rgba(255,255,255,0.7); margin-bottom: 15px; }
        .btn-epic {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            color: #0f0f1a;
            border: none;
            padding: 12px 35px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(0,255,136,0.4);
        }
        .btn-epic:hover { transform: scale(1.05); }
        .touch-controls {
            display: none;
            position: fixed;
            bottom: 10px;
            left: 0;
            right: 0;
            z-index: 100;
            justify-content: center;
            gap: 8px;
        }
        @media (pointer: coarse) {
            .touch-controls { display: flex; }
            body { padding-bottom: 100px; }
        }
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 50px);
            grid-template-rows: repeat(2, 50px);
            gap: 4px;
        }
        .dpad-btn {
            background: rgba(0,255,136,0.2);
            border: 2px solid rgba(0,255,136,0.5);
            border-radius: 10px;
            color: #00ff88;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .dpad-btn:active { background: rgba(0,255,136,0.5); }

    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← Back to Games</a>
    <h1>🧱 BLOCK STACK</h1>
    <div class="score-board">
        <span>Score: <strong id="score">0</strong></span>
        <span>Best: <strong id="best">0</strong></span>
    </div>
    <canvas id="gameCanvas" width="300" height="500"></canvas>
    <div class="instructions">
        Click or tap to drop blocks! <span>Perfect</span> timing = combo bonus!
    </div>
    <div class="combo" id="combo">PERFECT! +2</div>
    
    <div id="gameOver">
        <div class="modal-content">
            <h2>💥 GAME OVER 💥</h2>
            <div class="final-score" id="finalScore">0</div>
            <div class="best-score">Best: <span id="finalBest">0</span></div>
            <button onclick="restartGame()">TRY AGAIN 🔄</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Game settings
        const BLOCK_HEIGHT = 25;
        const BASE_WIDTH = 150;
        const MIN_BLOCK_SIZE = 10;
        const MOVE_SPEED = 2;
        
        let blocks = [];
        let currentBlock = null;
        let score = 0;
        let bestScore = parseInt(localStorage.getItem('blockstackBest')) || 0;
        let gameOver = false;
        let gameLoop;
        let perfectStreak = 0;
        let cameraY = 0;
        let comboTimeout = null;
        
        // Colors for blocks (rainbow effect)
        const COLORS = [
            '#FF6B6B', '#FF8E53', '#FFDD00', '#4ECDC4', '#45B7D1',
            '#96CEB4', '#FFEAA7', '#DDA0DD', '#98D8C8', '#F7DC6F'
        ];
        
        let colorIndex = 0;
        
        function init() {
            blocks = [];
            score = 0;
            gameOver = false;
            perfectStreak = 0;
            cameraY = 0;
            colorIndex = 0;
            
            document.getElementById('score').textContent = '0';
            document.getElementById('best').textContent = bestScore;
            document.getElementById('gameOver').style.display = 'none';
            
            // Base block (stationary)
            const baseBlock = {
                x: canvas.width / 2 - BASE_WIDTH / 2,
                y: canvas.height - BLOCK_HEIGHT - 50,
                width: BASE_WIDTH,
                height: BLOCK_HEIGHT,
                color: COLORS[colorIndex % COLORS.length],
                direction: 0, // stationary
                isBase: true
            };
            blocks.push(baseBlock);
            colorIndex++;
            
            // Create first moving block
            createMovingBlock();
        }
        
        function createMovingBlock() {
            const lastBlock = blocks[blocks.length - 1];
            const newY = lastBlock.y - BLOCK_HEIGHT;
            
            // Alternate direction based on score
            const direction = (blocks.length % 2 === 0) ? 1 : -1;
            
            currentBlock = {
                x: direction === 1 ? -lastBlock.width : canvas.width,
                y: newY,
                width: lastBlock.width,
                height: BLOCK_HEIGHT,
                color: COLORS[colorIndex % COLORS.length],
                direction: direction,
                speed: MOVE_SPEED + Math.min(score * 0.05, 3) // Speed up with score
            };
            
            colorIndex++;
        }
        
        function draw() {
            // Clear canvas
            ctx.fillStyle = '#0f1829';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw grid lines for depth
            ctx.strokeStyle = 'rgba(0, 212, 255, 0.1)';
            ctx.lineWidth = 1;
            for (let y = 0; y < canvas.height; y += 50) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
            for (let x = 0; x < canvas.width; x += 50) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            
            // Draw blocks
            blocks.forEach(block => {
                const screenY = block.y - cameraY;
                
                // Block body
                ctx.fillStyle = block.color;
                ctx.fillRect(block.x, screenY, block.width, block.height);
                
                // Block highlight
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.fillRect(block.x, screenY, block.width, 5);
                
                // Block shadow
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.fillRect(block.x, screenY + block.height - 3, block.width, 3);
                
                // Perfect indicator
                if (block.perfect) {
                    ctx.fillStyle = '#FFD700';
                    ctx.font = 'bold 12px Arial';
                    ctx.fillText('PERFECT!', block.x + 5, screenY - 5);
                }
            });
            
            // Draw current block
            if (currentBlock && !gameOver) {
                const screenY = currentBlock.y - cameraY;
                
                ctx.fillStyle = currentBlock.color;
                ctx.fillRect(currentBlock.x, screenY, currentBlock.width, currentBlock.height);
                
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.fillRect(currentBlock.x, screenY, currentBlock.width, 5);
                
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.fillRect(currentBlock.x, screenY + currentBlock.height - 3, currentBlock.width, 3);
                
                // Moving indicator
                ctx.fillStyle = 'rgba(255,255,255,0.8)';
                ctx.font = '10px Arial';
                ctx.fillText('▼', currentBlock.x + currentBlock.width / 2 - 3, screenY + currentBlock.height + 12);
            }
        }
        
        function update() {
            if (gameOver) return;
            
            if (currentBlock) {
                // Move block
                currentBlock.x += currentBlock.direction * currentBlock.speed;
                
                // Bounce off walls
                if (currentBlock.x <= 0) {
                    currentBlock.direction = 1;
                    currentBlock.x = 0;
                } else if (currentBlock.x + currentBlock.width >= canvas.width) {
                    currentBlock.direction = -1;
                    currentBlock.x = canvas.width - currentBlock.width;
                }
            }
        }
        
        function placeBlock() {
            if (gameOver || !currentBlock) return;
            
            const lastBlock = blocks[blocks.length - 1];
            
            // Calculate overlap
            const currentLeft = currentBlock.x;
            const currentRight = currentBlock.x + currentBlock.width;
            const lastLeft = lastBlock.x;
            const lastRight = lastBlock.x + lastBlock.width;
            
            let overlapLeft, overlapRight, overlapWidth;
            
            if (currentLeft < lastLeft) {
                overlapLeft = lastLeft;
                overlapRight = Math.min(currentRight, lastRight);
            } else {
                overlapLeft = Math.max(currentLeft, lastLeft);
                overlapRight = currentRight;
            }
            
            overlapWidth = overlapRight - overlapLeft;
            
            if (overlapWidth <= 0) {
                // Complete miss - game over
                endGame();
                return;
            }
            
            // Check if perfect placement
            const isPerfect = Math.abs(currentBlock.x - lastBlock.x) < 3 && 
                             Math.abs(currentBlock.width - lastBlock.width) < 3;
            
            if (isPerfect) {
                // Perfect! Keep same width and position
                currentBlock.x = lastBlock.x;
                perfectStreak++;
                
                // Bonus points for perfect
                const bonus = 2 + perfectStreak;
                score += bonus;
                showCombo(`PERFECT! +${bonus}`);
                
                currentBlock.perfect = true;
            } else {
                // Not perfect - trim block
                perfectStreak = 0;
                
                // If block got smaller below minimum, game over
                if (overlapWidth < MIN_BLOCK_SIZE) {
                    currentBlock.width = 0;
                    endGame();
                    return;
                }
                
                currentBlock.x = overlapLeft;
                currentBlock.width = overlapWidth;
                score += 1;
            }
            
            // Add to blocks array
            blocks.push(currentBlock);
            
            // Adjust camera
            cameraY = currentBlock.y - (canvas.height - 150);
            
            // Speed up slightly
            currentBlock.speed += 0.02;
            
            // Update score display
            document.getElementById('score').textContent = score;
            
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('blockstackBest', bestScore);
                document.getElementById('best').textContent = bestScore;
            }
            
            // Create next block
            createMovingBlock();
        }
        
        function showCombo(text) {
            const combo = document.getElementById('combo');
            combo.textContent = text;
            combo.classList.remove('show');
            void combo.offsetWidth; // Trigger reflow
            combo.classList.add('show');
            
            if (comboTimeout) clearTimeout(comboTimeout);
            comboTimeout = setTimeout(() => {
                combo.classList.remove('show');
            }, 1000);
        }
        
        function endGame() {
            gameOver = true;
            clearInterval(gameLoop);
            
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalBest').textContent = bestScore;
            document.getElementById('gameOver').style.display = 'flex';
        }
        
        function restartGame() {
            clearInterval(gameLoop);
            init();
            gameLoop = setInterval(() => {
                update();
                draw();
            }, 1000 / 60);
        }
        
        // Controls
        canvas.addEventListener('click', placeBlock);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            placeBlock();
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'Enter') {
                e.preventDefault();
                if (gameOver) {
                    restartGame();
                } else {
                    placeBlock();
                }
            }
        });
        
        // Initialize
        init();
        draw();
        gameLoop = setInterval(() => {
            update();
            draw();
        }, 1000 / 60);
    
    // EPIC PARTICLES
    let eParticles = [];
    class EParticle {
        constructor(x, y, color, size, vx, vy, life) {
            this.x=x; this.y=y; this.color=color; this.size=size;
            this.vx=vx; this.vy=vy; this.life=life; this.maxLife=life;
        }
        update() {
            this.x+=this.vx; this.y+=this.vy; this.vy+=0.1; this.life--;
        }
        draw() {
            let a = this.life/this.maxLife;
            ctx.globalAlpha=a;
            ctx.fillStyle=this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size*a, 0, Math.PI*2);
            ctx.fill();
            ctx.globalAlpha=1;
        }
    }
    function eSpawn(x, y, color, count) {
        for(let i=0; i<count; i++) {
            eParticles.push(new EParticle(x, y, color, 3+Math.random()*4, (Math.random()-0.5)*8, (Math.random()-0.5)*8-3, 30+Math.random()*20));
        }
    }

    
    window.tL=false; window.tR=false; window.tU=false; window.tD=false;
    ['btnL','btnR','btnU','btnD'].forEach(id => {
        let btn = document.getElementById(id);
        if(!btn) return;
        let key = {btnL:'tL',btnR:'tR',btnU:'tU',btnD:'tD'}[id];
        btn.addEventListener('touchstart', e => { e.preventDefault(); window[key]=true; });
        btn.addEventListener('touchend', e => { e.preventDefault(); window[key]=false; });
        btn.addEventListener('mousedown', () => window[key]=true);
        btn.addEventListener('mouseup', () => window[key]=false);
    });
    setInterval(() => {
        if(window.tL) keys.left=true; else keys.left=false;
        if(window.tR) keys.right=true; else keys.right=false;
        if(window.tU) keys.up=true; else keys.up=false;
        if(window.tD) keys.down=true; else keys.down=false;
    }, 50);

    </script>
</body>
