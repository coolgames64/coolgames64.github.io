<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎮 Connect Four</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            padding: 20px;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px #f97316;
        }
        .status {
            font-size: 1.5rem;
            margin-bottom: 20px;
            height: 40px;
        }
        .player-indicator {
            display: inline-block;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            vertical-align: middle;
            margin-right: 10px;
        }
        .player1-color { background: #ef4444; box-shadow: 0 0 10px #ef4444; }
        .player2-color { background: #fbbf24; box-shadow: 0 0 10px #fbbf24; }
        canvas { max-width: 100%; 
            max-width: 100vw;
            border: 3px solid #3b82f6;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.4);
            cursor: pointer;
        }
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        button:hover {
            background: #2563eb;
            transform: scale(1.05);
        }
        .mode-select {
            margin-bottom: 15px;
        }
        .mode-select button {
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.3);
            margin: 0 5px;
        }
        .mode-select button.active {
            background: #f97316;
            border-color: #f97316;
        }
        .instructions {
            margin-top: 15px;
            font-size: 1rem;
            color: #aaa;
        }
        .instructions span {
            color: #fbbf24;
        }
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.1);
            color: white;
            border: 2px solid rgba(255,255,255,0.3);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-size: 1rem;
        }
        .back-btn:hover {
            background: rgba(255,255,255,0.2);
        }
        #winnerModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal-content {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 3px solid #f97316;
        }
        .modal-content h2 {
            font-size: 2rem;
            margin-bottom: 20px;
        }
        .modal-content p {
            font-size: 1.2rem;
            margin-bottom: 25px;
        }
        .winner-circle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin: 0 auto 20px;
        }
        .winner-circle.red { background: #ef4444; box-shadow: 0 0 20px #ef4444; }
        .winner-circle.yellow { background: #fbbf24; box-shadow: 0 0 20px #fbbf24; }
        .winner-circle.ai { background: #8b5cf6; box-shadow: 0 0 20px #8b5cf6; }
    
        /* Mobile Touch Controls */
        .touch-controls {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            padding: 10px;
            z-index: 1000;
        }
        @media (pointer: coarse) {
            .touch-controls { display: flex !important; }
            body { padding-bottom: 120px !important; }
        }
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 5px;
            margin: 0 auto;
        }
        .dpad-btn {
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.4);
            border-radius: 10px;
            color: white;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .dpad-btn:active {
            background: rgba(255,255,255,0.4);
        }
        .dpad-center { background: rgba(0,0,0,0.2); }
        @media (max-width: 500px) {
            .dpad { grid-template-columns: repeat(3, 50px); grid-template-rows: repeat(3, 50px); }
            .dpad-btn { font-size: 20px; }
        }
    
    
        .tap-area {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 999;
            display: none;
        }
        @media (pointer: coarse) {
            .tap-area { display: block; }
        }
        .tap-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 80px; height: 80px;
            background: rgba(255,255,255,0.3);
            border: 3px solid rgba(255,255,255,0.6);
            border-radius: 50%;
            color: white;
            font-size: 14px;
            z-index: 1001;
            display: none;
            cursor: pointer;
        }
        @media (pointer: coarse) {
            .tap-btn { display: flex; align-items: center; justify-content: center; }
        }

    
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }
        .game-header {
            font-size: 20px;
            font-weight: 700;
            color: #00ff88;
            text-shadow: 0 0 15px rgba(0,255,136,0.5);
            margin-bottom: 10px;
        }
        .score-display {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
        }
        .score-box {
            background: rgba(0,0,0,0.5);
            border: 2px solid rgba(0,255,136,0.3);
            border-radius: 10px;
            padding: 6px 14px;
            text-align: center;
        }
        .score-label { font-size: 10px; color: rgba(255,255,255,0.6); text-transform: uppercase; }
        .score-val { font-size: 18px; font-weight: 700; color: #00ff88; }
        .game-wrapper { position: relative; }
        #gameCanvas {
            border-radius: 12px;
            border: 3px solid #00ff88;
            box-shadow: 0 0 30px rgba(0,255,136,0.3);
        }
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
        }
        .overlay.hidden { display: none; }
        .overlay h2 {
            font-size: 28px;
            color: #00ff88;
            text-shadow: 0 0 20px rgba(0,255,136,0.6);
            margin-bottom: 8px;
        }
        .overlay p { color: rgba(255,255,255,0.7); margin-bottom: 15px; }
        .btn-epic {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            color: #0f0f1a;
            border: none;
            padding: 12px 35px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(0,255,136,0.4);
        }
        .btn-epic:hover { transform: scale(1.05); }
        .touch-controls {
            display: none;
            position: fixed;
            bottom: 10px;
            left: 0;
            right: 0;
            z-index: 100;
            justify-content: center;
            gap: 8px;
        }
        @media (pointer: coarse) {
            .touch-controls { display: flex; }
            body { padding-bottom: 100px; }
        }
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 50px);
            grid-template-rows: repeat(2, 50px);
            gap: 4px;
        }
        .dpad-btn {
            background: rgba(0,255,136,0.2);
            border: 2px solid rgba(0,255,136,0.5);
            border-radius: 10px;
            color: #00ff88;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .dpad-btn:active { background: rgba(0,255,136,0.5); }

    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← Back to Games</a>
    <h1>🎮 Connect Four</h1>
    
    <div class="mode-select">
        <button id="twoPlayerBtn" class="active" onclick="setMode('twoPlayer')">2 Players 👥</button>
        <button id="vsAIBtn" onclick="setMode('vsAI')">vs Computer 🤖</button>
    </div>
    
    <div class="status">
        <span class="player-indicator player1-color" id="turnIndicator"></span>
        <span id="statusText">Red's Turn</span>
    </div>
    
    <canvas id="gameCanvas" width="420" height="360"></canvas>
    
    <div class="controls">
        <button onclick="resetGame()">🔄 New Game</button>
    </div>
    
    <div class="instructions">
        Click a column to drop your piece | <span>Red</span> goes first | Connect <span>4 in a row</span> to win!
    </div>
    
    <div id="winnerModal">
        <div class="modal-content">
            <div class="winner-circle red" id="winnerCircle"></div>
            <h2 id="winnerTitle">🎉 Red Wins! 🎉</h2>
            <p id="winnerText">Amazing! Red connected 4 in a row!</p>
            <button onclick="resetGame(); closeModal();">Play Again 🔄</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const COLS = 7;
        const ROWS = 6;
        const CELL_SIZE = 60;
        const PADDING = 10;
        
        let board = [];
        let currentPlayer = 1; // 1 = Red, 2 = Yellow
        let gameOver = false;
        let vsAI = false;
        let isAIThinking = false;
        
        const EMPTY = 0;
        const PLAYER1 = 1;
        const PLAYER2 = 2;
        
        const RED = '#ef4444';
        const YELLOW = '#fbbf24';
        const BLUE = '#3b82f6';
        const DARK_BLUE = '#1e3a5f';
        
        function initBoard() {
            board = [];
            for (let row = 0; row < ROWS; row++) {
                board[row] = [];
                for (let col = 0; col < COLS; col++) {
                    board[row][col] = EMPTY;
                }
            }
        }
        
        function drawBoard() {
            // Background
            ctx.fillStyle = BLUE;
            ctx.beginPath();
            ctx.roundRect(0, 0, canvas.width, canvas.height, 15);
            ctx.fill();
            
            // Draw slots
            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS; col++) {
                    const x = col * CELL_SIZE + PADDING;
                    const y = row * CELL_SIZE + PADDING;
                    const radius = CELL_SIZE / 2 - 5;
                    
                    // Empty slot (dark circle)
                    ctx.fillStyle = DARK_BLUE;
                    ctx.beginPath();
                    ctx.arc(x + CELL_SIZE / 2, y + CELL_SIZE / 2, radius, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // Draw piece if occupied
                    if (board[row][col] === PLAYER1) {
                        drawPiece(x + CELL_SIZE / 2, y + CELL_SIZE / 2, RED);
                    } else if (board[row][col] === PLAYER2) {
                        drawPiece(x + CELL_SIZE / 2, y + CELL_SIZE / 2, YELLOW);
                    }
                }
            }
            
            // Draw hover preview for current column
            if (!gameOver && !isAIThinking) {
                const hoverCol = getHoverColumn();
                if (hoverCol !== -1 && canDropInCol(hoverCol)) {
                    const x = hoverCol * CELL_SIZE + PADDING + CELL_SIZE / 2;
                    ctx.globalAlpha = 0.5;
                    drawPiece(x, CELL_SIZE / 2, currentPlayer === 1 ? RED : YELLOW);
                    ctx.globalAlpha = 1;
                }
            }
        }
        
        function drawPiece(x, y, color) {
            // Main piece
            ctx.fillStyle = color;
            ctx.shadowColor = color;
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(x, y, CELL_SIZE / 2 - 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // Shine effect
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            ctx.beginPath();
            ctx.arc(x - 5, y - 5, 8, 0, Math.PI * 2);
            ctx.fill();
        }
        
        function canDropInCol(col) {
            return board[0][col] === EMPTY;
        }
        
        function dropPiece(col) {
            if (gameOver || isAIThinking) return;
            
            if (!canDropInCol(col)) return;
            
            // Find lowest empty row
            let targetRow = -1;
            for (let row = ROWS - 1; row >= 0; row--) {
                if (board[row][col] === EMPTY) {
                    targetRow = row;
                    break;
                }
            }
            
            if (targetRow === -1) return;
            
            board[targetRow][col] = currentPlayer;
            
            // Check for win
            if (checkWin(targetRow, col)) {
                gameOver = true;
                drawBoard();
                showWinner(currentPlayer);
                return;
            }
            
            // Check for draw
            if (checkDraw()) {
                gameOver = true;
                drawBoard();
                showDraw();
                return;
            }
            
            // Switch player
            currentPlayer = currentPlayer === PLAYER1 ? PLAYER2 : PLAYER1;
            updateStatus();
            drawBoard();
            
            // AI move
            if (vsAI && currentPlayer === PLAYER2 && !gameOver) {
                isAIThinking = true;
                setTimeout(makeAIMove, 500);
            }
        }
        
        function makeAIMove() {
            if (gameOver) {
                isAIThinking = false;
                return;
            }
            
            // Simple AI: prioritize winning, then blocking, then center
            let col = findBestMove();
            isAIThinking = false;
            dropPiece(col);
        }
        
        function findBestMove() {
            // Check if AI can win
            for (let col = 0; col < COLS; col++) {
                if (canDropInCol(col)) {
                    const row = getDropRow(col);
                    board[row][col] = PLAYER2;
                    if (checkWin(row, col)) {
                        board[row][col] = EMPTY;
                        return col;
                    }
                    board[row][col] = EMPTY;
                }
            }
            
            // Check if player can win (block)
            for (let col = 0; col < COLS; col++) {
                if (canDropInCol(col)) {
                    const row = getDropRow(col);
                    board[row][col] = PLAYER1;
                    if (checkWin(row, col)) {
                        board[row][col] = EMPTY;
                        return col;
                    }
                    board[row][col] = EMPTY;
                }
            }
            
            // Prefer center
            const centerCol = 3;
            if (canDropInCol(centerCol)) return centerCol;
            
            // Try adjacent to center
            for (let offset of [1, 2, -1, -2]) {
                const col = centerCol + offset;
                if (col >= 0 && col < COLS && canDropInCol(col)) return col;
            }
            
            // Random valid column
            let validCols = [];
            for (let col = 0; col < COLS; col++) {
                if (canDropInCol(col)) validCols.push(col);
            }
            return validCols[Math.floor(Math.random() * validCols.length)];
        }
        
        function getDropRow(col) {
            for (let row = ROWS - 1; row >= 0; row--) {
                if (board[row][col] === EMPTY) return row;
            }
            return -1;
        }
        
        function checkWin(row, col) {
            const player = board[row][col];
            const directions = [
                { dr: 0, dc: 1 },   // Horizontal
                { dr: 1, dc: 0 },   // Vertical
                { dr: 1, dc: 1 },   // Diagonal down-right
                { dr: 1, dc: -1 }    // Diagonal down-left
            ];
            
            for (const { dr, dc } of directions) {
                let count = 1;
                count += countInDirection(row, col, dr, dc, player);
                count += countInDirection(row, col, -dr, -dc, player);
                if (count >= 4) return true;
            }
            return false;
        }
        
        function countInDirection(row, col, dr, dc, player) {
            let count = 0;
            let r = row + dr;
            let c = col + dc;
            while (r >= 0 && r < ROWS && c >= 0 && c < COLS && board[r][c] === player) {
                count++;
                r += dr;
                c += dc;
            }
            return count;
        }
        
        function checkDraw() {
            return board[0].every(cell => cell !== EMPTY);
        }
        
        function updateStatus() {
            const indicator = document.getElementById('turnIndicator');
            const statusText = document.getElementById('statusText');
            
            indicator.className = 'player-indicator ' + (currentPlayer === 1 ? 'player1-color' : 'player2-color');
            
            if (vsAI && currentPlayer === PLAYER2) {
                statusText.textContent = "Computer's Turn 🤖";
            } else {
                statusText.textContent = (currentPlayer === 1 ? 'Red' : 'Yellow') + "'s Turn";
            }
        }
        
        function showWinner(player) {
            const modal = document.getElementById('winnerModal');
            const circle = document.getElementById('winnerCircle');
            const title = document.getElementById('winnerTitle');
            const text = document.getElementById('winnerText');
            
            if (player === PLAYER1) {
                circle.className = 'winner-circle red';
                title.textContent = '🎉 Red Wins! 🎉';
                text.textContent = 'Amazing! Red connected 4 in a row!';
            } else if (player === PLAYER2) {
                if (vsAI) {
                    circle.className = 'winner-circle ai';
                    title.textContent = '🤖 Computer Wins! 🤖';
                    text.textContent = 'The computer beat you! Try again!';
                } else {
                    circle.className = 'winner-circle yellow';
                    title.textContent = '🎉 Yellow Wins! 🎉';
                    text.textContent = 'Amazing! Yellow connected 4 in a row!';
                }
            }
            
            modal.style.display = 'flex';
        }
        
        function showDraw() {
            const modal = document.getElementById('winnerModal');
            const circle = document.getElementById('winnerCircle');
            const title = document.getElementById('winnerTitle');
            const text = document.getElementById('winnerText');
            
            circle.className = 'winner-circle';
            circle.style.background = '#3b82f6';
            circle.style.boxShadow = '0 0 20px #3b82f6';
            title.textContent = "🤝 It's a Draw! 🤝";
            text.textContent = 'Nobody won this time!';
            
            modal.style.display = 'flex';
        }
        
        function closeModal() {
            document.getElementById('winnerModal').style.display = 'none';
        }
        
        function resetGame() {
            gameOver = false;
            currentPlayer = 1;
            isAIThinking = false;
            initBoard();
            updateStatus();
            drawBoard();
        }
        
        function setMode(mode) {
            vsAI = (mode === 'vsAI');
            document.getElementById('twoPlayerBtn').classList.toggle('active', mode === 'twoPlayer');
            document.getElementById('vsAIBtn').classList.toggle('active', mode === 'vsAI');
            resetGame();
        }
        
        function getHoverColumn() {
            return -1; // Simplified - can be enhanced with mouse tracking
        }
        
        // Click handler
        canvas.addEventListener('click', (e) => {
            if (isAIThinking) return;
            
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const col = Math.floor(x / CELL_SIZE);
            
            if (col >= 0 && col < COLS) {
                dropPiece(col);
            }
        });
        
        // Mouse move for hover effect
        let hoverCol = -1;
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const newHoverCol = Math.floor(x / CELL_SIZE);
            if (newHoverCol !== hoverCol) {
                hoverCol = newHoverCol;
                if (!gameOver && !isAIThinking) drawBoard();
            }
        });
        
        // Touch support
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const x = touch.clientX - rect.left;
            const col = Math.floor(x / CELL_SIZE);
            
            if (col >= 0 && col < COLS && !isAIThinking) {
                dropPiece(col);
            }
        });
        
        // Initialize
        initBoard();
        updateStatus();
        drawBoard();
    
        // Tap anywhere to click
        document.addEventListener('touchstart', (e) => {
            if(e.target.tagName !== 'BUTTON' && e.target.tagName !== 'INPUT') {
                const touch = e.touches[0];
                const clickEvent = new MouseEvent('click', {
                    bubbles: true,
                    clientX: touch.clientX,
                    clientY: touch.clientY
                });
                e.target.dispatchEvent(clickEvent);
            }
        }, true);
        
        // Space/action button for mobile
        window.tapSpace = false;

    
    // EPIC PARTICLES
    let eParticles = [];
    class EParticle {
        constructor(x, y, color, size, vx, vy, life) {
            this.x=x; this.y=y; this.color=color; this.size=size;
            this.vx=vx; this.vy=vy; this.life=life; this.maxLife=life;
        }
        update() {
            this.x+=this.vx; this.y+=this.vy; this.vy+=0.1; this.life--;
        }
        draw() {
            let a = this.life/this.maxLife;
            ctx.globalAlpha=a;
            ctx.fillStyle=this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size*a, 0, Math.PI*2);
            ctx.fill();
            ctx.globalAlpha=1;
        }
    }
    function eSpawn(x, y, color, count) {
        for(let i=0; i<count; i++) {
            eParticles.push(new EParticle(x, y, color, 3+Math.random()*4, (Math.random()-0.5)*8, (Math.random()-0.5)*8-3, 30+Math.random()*20));
        }
    }

    
    window.tL=false; window.tR=false; window.tU=false; window.tD=false;
    ['btnL','btnR','btnU','btnD'].forEach(id => {
        let btn = document.getElementById(id);
        if(!btn) return;
        let key = {btnL:'tL',btnR:'tR',btnU:'tU',btnD:'tD'}[id];
        btn.addEventListener('touchstart', e => { e.preventDefault(); window[key]=true; });
        btn.addEventListener('touchend', e => { e.preventDefault(); window[key]=false; });
        btn.addEventListener('mousedown', () => window[key]=true);
        btn.addEventListener('mouseup', () => window[key]=false);
    });
    setInterval(() => {
        if(window.tL) keys.left=true; else keys.left=false;
        if(window.tR) keys.right=true; else keys.right=false;
        if(window.tU) keys.up=true; else keys.up=false;
        if(window.tD) keys.down=true; else keys.down=false;
    }, 50);

    </script>

    <button class="tap-btn" ontouchstart="window.tapSpace=true" ontouchend="window.tapSpace=false">TAP</button>

</body>
