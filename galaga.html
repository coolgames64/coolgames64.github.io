<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🚀 Galaga</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }
        h1 { font-size: 2.5rem; margin-bottom: 10px; color: #e74c3c; }
        .score-board { font-size: 1.3rem; margin-bottom: 15px; }
        .score-board span { background: rgba(231,76,60,0.2); padding: 5px 15px; border-radius: 15px; }
        canvas { max-width: 100%; 
            max-width: 100vw; border: 3px solid #e74c3c; border-radius: 10px; }
        .instructions { margin-top: 15px; color: #888; font-size: 1rem; }
        .instructions span { background: #e74c3c; padding: 3px 10px; border-radius: 5px; }
        .back-btn {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255,255,255,0.1); color: white;
            border: 2px solid rgba(255,255,255,0.3); padding: 10px 20px;
            border-radius: 8px; cursor: pointer; text-decoration: none;
        }
        .back-btn:hover { background: rgba(255,255,255,0.2); }
    
        /* Mobile Touch Controls */
        .touch-controls {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            padding: 10px;
            z-index: 1000;
        }
        @media (pointer: coarse) {
            .touch-controls { display: flex !important; }
            body { padding-bottom: 120px !important; }
        }
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 5px;
            margin: 0 auto;
        }
        .dpad-btn {
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.4);
            border-radius: 10px;
            color: white;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .dpad-btn:active {
            background: rgba(255,255,255,0.4);
        }
        .dpad-center { background: rgba(0,0,0,0.2); }
        @media (max-width: 500px) {
            .dpad { grid-template-columns: repeat(3, 50px); grid-template-rows: repeat(3, 50px); }
            .dpad-btn { font-size: 20px; }
        }
    
    
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }
        .game-header {
            font-size: 20px;
            font-weight: 700;
            color: #00ff88;
            text-shadow: 0 0 15px rgba(0,255,136,0.5);
            margin-bottom: 10px;
        }
        .score-display {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
        }
        .score-box {
            background: rgba(0,0,0,0.5);
            border: 2px solid rgba(0,255,136,0.3);
            border-radius: 10px;
            padding: 6px 14px;
            text-align: center;
        }
        .score-label { font-size: 10px; color: rgba(255,255,255,0.6); text-transform: uppercase; }
        .score-val { font-size: 18px; font-weight: 700; color: #00ff88; }
        .game-wrapper { position: relative; }
        #gameCanvas {
            border-radius: 12px;
            border: 3px solid #00ff88;
            box-shadow: 0 0 30px rgba(0,255,136,0.3);
        }
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
        }
        .overlay.hidden { display: none; }
        .overlay h2 {
            font-size: 28px;
            color: #00ff88;
            text-shadow: 0 0 20px rgba(0,255,136,0.6);
            margin-bottom: 8px;
        }
        .overlay p { color: rgba(255,255,255,0.7); margin-bottom: 15px; }
        .btn-epic {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            color: #0f0f1a;
            border: none;
            padding: 12px 35px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(0,255,136,0.4);
        }
        .btn-epic:hover { transform: scale(1.05); }
        .touch-controls {
            display: none;
            position: fixed;
            bottom: 10px;
            left: 0;
            right: 0;
            z-index: 100;
            justify-content: center;
            gap: 8px;
        }
        @media (pointer: coarse) {
            .touch-controls { display: flex; }
            body { padding-bottom: 100px; }
        }
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 50px);
            grid-template-rows: repeat(2, 50px);
            gap: 4px;
        }
        .dpad-btn {
            background: rgba(0,255,136,0.2);
            border: 2px solid rgba(0,255,136,0.5);
            border-radius: 10px;
            color: #00ff88;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .dpad-btn:active { background: rgba(0,255,136,0.5); }

    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← Back to Games</a>
    <h1>🚀 GALAGA</h1>
    <div class="score-board">
        <span>Score: <strong id="score">0</strong></span>
        <span>Lives: <strong id="lives">3</strong></span>
    </div>
    <canvas id="gameCanvas" width="400" height="500"></canvas>
    <div class="instructions"><span>← →</span> move | <span>SPACE</span> shoot</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let ship = { x: 200, y: 450, lives: 3 };
        let bullets = [];
        let enemies = [];
        let score = 0;
        let gameLoop;
        let enemyTimer = 0;
        let keys = { left: false, right: false, space: false };
        let shootTimer = 0;
        
        function init() {
            ship = { x: 200, y: 450, lives: 3 };
            bullets = [];
            enemies = [];
            score = 0;
            enemyTimer = 0;
            
            // Create enemy formation
            for (let row = 0; row < 3; row++) {
                for (let col = 0; col < 8; col++) {
                    enemies.push({
                        x: 60 + col * 40,
                        y: 50 + row * 40,
                        dir: 1,
                        type: row === 0 ? 'boss' : 'normal',
                        hp: row === 0 ? 3 : 1
                    });
                }
            }
            
            document.getElementById('score').textContent = '0';
            document.getElementById('lives').textContent = '3';
        }
        
        function drawShip() {
            ctx.fillStyle = '#3498db';
            ctx.beginPath();
            ctx.moveTo(ship.x, ship.y - 15);
            ctx.lineTo(ship.x - 15, ship.y + 15);
            ctx.lineTo(ship.x + 15, ship.y + 15);
            ctx.closePath();
            ctx.fill();
            
            // Cockpit
            ctx.fillStyle = '#2980b9';
            ctx.beginPath();
            ctx.arc(ship.x, ship.y, 5, 0, Math.PI * 2);
            ctx.fill();
        }
        
        function drawEnemy(enemy) {
            ctx.fillStyle = enemy.type === 'boss' ? '#e74c3c' : '#9b59b6';
            
            if (enemy.type === 'boss') {
                // Boss enemy
                ctx.beginPath();
                ctx.moveTo(enemy.x, enemy.y - 15);
                ctx.lineTo(enemy.x - 20, enemy.y + 10);
                ctx.lineTo(enemy.x + 20, enemy.y + 10);
                ctx.closePath();
                ctx.fill();
                
                // Wings
                ctx.fillRect(enemy.x - 25, enemy.y, 10, 15);
                ctx.fillRect(enemy.x + 15, enemy.y, 10, 15);
            } else {
                // Normal enemy
                ctx.beginPath();
                ctx.arc(enemy.x, enemy.y, 12, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#8e44ad';
                ctx.beginPath();
                ctx.arc(enemy.x, enemy.y - 5, 6, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Eyes
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(enemy.x - 4, enemy.y - 2, 3, 0, Math.PI * 2);
            ctx.arc(enemy.x + 4, enemy.y - 2, 3, 0, Math.PI * 2);
            ctx.fill();
        }
        
        function drawBullet(bullet) {
            ctx.fillStyle = '#f1c40f';
            ctx.shadowColor = '#f1c40f';
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(bullet.x, bullet.y, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        
        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Stars
            ctx.fillStyle = '#fff';
            for (let i = 0; i < 50; i++) {
                ctx.fillRect((i * 73) % canvas.width, (i * 37) % canvas.height, 2, 2);
            }
            
            bullets.forEach(drawBullet);
            enemies.forEach(drawEnemy);
            drawShip();
        }
        
        function update() {
            // Ship movement
            if (keys.left) ship.x = Math.max(20, ship.x - 5);
            if (keys.right) ship.x = Math.min(380, ship.x + 5);
            
            // Shooting
            shootTimer++;
            if (keys.space && shootTimer > 10) {
                bullets.push({ x: ship.x, y: ship.y - 20, vy: -10 });
                shootTimer = 0;
            }
            
            // Move bullets
            bullets.forEach(b => b.y += b.vy);
            bullets = bullets.filter(b => b.y > 0);
            
            // Move enemies
            let hitEdge = false;
            enemies.forEach(enemy => {
                enemy.x += enemy.dir * (enemy.type === 'boss' ? 1 : 2);
                if (enemy.x < 30 || enemy.x > 370) hitEdge = true;
                
                // Shoot back
                if (Math.random() < 0.01) {
                    bullets.push({ x: enemy.x, y: enemy.y + 15, vy: 5 });
                }
            });
            
            if (hitEdge) {
                enemies.forEach(e => {
                    e.dir *= -1;
                    e.y += 10;
                });
            }
            
            // Bullet-enemy collision
            bullets.forEach(bullet => {
                enemies.forEach(enemy => {
                    const dist = Math.sqrt((bullet.x - enemy.x) ** 2 + (bullet.y - enemy.y) ** 2);
                    if (dist < 20) {
                        bullet.hit = true;
                        enemy.hp--;
                        if (enemy.hp <= 0) {
                            enemy.dead = true;
                            score += enemy.type === 'boss' ? 200 : 50;
                            document.getElementById('score').textContent = score;
                        }
                    }
                });
            });
            
            bullets = bullets.filter(b => !b.hit);
            enemies = enemies.filter(e => !e.dead);
            
            // Bullet-ship collision
            bullets.forEach(bullet => {
                const dist = Math.sqrt((bullet.x - ship.x) ** 2 + (bullet.y - ship.y) ** 2);
                if (dist < 15) {
                    bullet.hit = true;
                    ship.lives--;
                    document.getElementById('lives').textContent = ship.lives;
                    
                    if (ship.lives <= 0) {
                        endGame();
                    }
                }
            });
            
            // Enemy reached bottom
            enemies.forEach(enemy => {
                if (enemy.y > 430) {
                    endGame();
                }
            });
            
            // Win condition
            if (enemies.length === 0) {
                score += 500;
                document.getElementById('score').textContent = score;
                // Spawn new wave
                for (let row = 0; row < 3; row++) {
                    for (let col = 0; col < 8; col++) {
                        enemies.push({
                            x: 60 + col * 40,
                            y: 50 + row * 40,
                            dir: 1,
                            type: row === 0 ? 'boss' : 'normal',
                            hp: row === 0 ? 3 : 1
                        });
                    }
                }
            }
        }
        
        function endGame() {
            clearInterval(gameLoop);
            setTimeout(() => {
                alert(`Game Over! 💥\nFinal Score: ${score}\n\nClick OK to play again!`);
                init();
                gameLoop = setInterval(() => {
                    update();
                    draw();
                }, 1000 / 60);
            }, 100);
        }
        
        document.addEventListener('keydown', e => {
            if (e.code === 'ArrowLeft') keys.left = true;
            if (e.code === 'ArrowRight') keys.right = true;
            if (e.code === 'Space') keys.space = true;
        });
        
        document.addEventListener('keyup', e => {
            if (e.code === 'ArrowLeft') keys.left = false;
            if (e.code === 'ArrowRight') keys.right = false;
            if (e.code === 'Space') keys.space = false;
        });
        
        init();
        draw();
        gameLoop = setInterval(() => {
            update();
            draw();
        }, 1000 / 60);
    
        window.tL=false; window.tR=false; window.tU=false; window.tD=false;
        setInterval(() => {
            if(window.tL) keys.left=true; else keys.left=false;
            if(window.tR) keys.right=true; else keys.right=false;
            if(window.tU) keys.up=true; else keys.up=false;
            if(window.tD) keys.down=true; else keys.down=false;
        }, 50);

    
    // EPIC PARTICLES
    let eParticles = [];
    class EParticle {
        constructor(x, y, color, size, vx, vy, life) {
            this.x=x; this.y=y; this.color=color; this.size=size;
            this.vx=vx; this.vy=vy; this.life=life; this.maxLife=life;
        }
        update() {
            this.x+=this.vx; this.y+=this.vy; this.vy+=0.1; this.life--;
        }
        draw() {
            let a = this.life/this.maxLife;
            ctx.globalAlpha=a;
            ctx.fillStyle=this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size*a, 0, Math.PI*2);
            ctx.fill();
            ctx.globalAlpha=1;
        }
    }
    function eSpawn(x, y, color, count) {
        for(let i=0; i<count; i++) {
            eParticles.push(new EParticle(x, y, color, 3+Math.random()*4, (Math.random()-0.5)*8, (Math.random()-0.5)*8-3, 30+Math.random()*20));
        }
    }

    </script>

    <div class="touch-controls" style="display:none;position:fixed;bottom:15px;left:0;right:0;z-index:1000;pointer-events:none;">
      <div style="display:flex;gap:20px;align-items:center;justify-content:center;pointer-events:auto;">
        <button class="dpad-btn" ontouchstart="window.tL=true;window.tR=false;window.tU=false" ontouchend="window.tL=false" onmousedown="window.tL=true" onmouseup="window.tL=false" style="width:70px;height:70px;border-radius:50%;font-size:26px;background:rgba(255,255,255,0.25);border:3px solid rgba(255,255,255,0.5);color:white;">&#9664;</button>
        <button class="dpad-btn" ontouchstart="window.tU=true;window.tL=false;window.tR=false" ontouchend="window.tU=false" onmousedown="window.tU=true" onmouseup="window.tU=false" style="width:70px;height:70px;border-radius:50%;font-size:26px;background:rgba(255,255,255,0.25);border:3px solid rgba(255,255,255,0.5);color:white;">&#9650;</button>
        <button class="dpad-btn" ontouchstart="window.tR=true;window.tL=false;window.tU=false" ontouchend="window.tR=false" onmousedown="window.tR=true" onmouseup="window.tR=false" style="width:70px;height:70px;border-radius:50%;font-size:26px;background:rgba(255,255,255,0.25);border:3px solid rgba(255,255,255,0.5);color:white;">&#9654;</button>
      </div>
    </div>

</body>
