<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🏃 Stickman Runner Pro - Cool Games 64</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }
        .hud {
            position: fixed;
            top: 0; left: 0; right: 0;
            display: flex;
            justify-content: space-around;
            padding: 10px;
            background: rgba(0,0,0,0.5);
            z-index: 100;
        }
        .hud-item { color: white; font-size: 16px; font-weight: 700; }
        .hud-item span { color: #00ff88; }
        #gameCanvas {
            border-radius: 12px;
            border: 3px solid #00ff88;
            box-shadow: 0 0 30px rgba(0,255,136,0.3);
        }
        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        .overlay.hidden { display: none; }
        .overlay h1 {
            font-size: 32px;
            color: #00ff88;
            text-shadow: 0 0 25px rgba(0,255,136,0.6);
            margin-bottom: 10px;
        }
        .overlay p { color: white; margin-bottom: 20px; }
        .btn {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            color: #0f0f1a;
            border: none;
            padding: 15px 45px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,255,136,0.4);
        }
        .btn:hover { transform: scale(1.05); }
        .touch-controls {
            display: none;
            position: fixed;
            bottom: 15px;
            left: 0;
            right: 0;
            z-index: 100;
            justify-content: center;
            gap: 10px;
        }
        @media (pointer: coarse) {
            .touch-controls { display: flex; }
            body { padding-bottom: 120px; }
        }
        .action-btn {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-jump {
            background: rgba(0,255,136,0.3);
            border: 3px solid rgba(0,255,136,0.7);
            color: #00ff88;
        }
        .btn-slide {
            background: rgba(255,200,0,0.3);
            border: 3px solid rgba(255,200,0,0.7);
            color: #ffc800;
        }
        .btn-attack {
            background: rgba(255,50,50,0.3);
            border: 3px solid rgba(255,50,50,0.7);
            color: #ff3232;
        }
        .action-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="hud" id="hud" style="display: none;">
        <div class="hud-item">Score: <span id="score">0</span></div>
        <div class="hud-item">Distance: <span id="dist">0</span>m</div>
        <div class="hud-item">Best: <span id="best">0</span></div>
    </div>
    
    <canvas id="gameCanvas" width="400" height="500"></canvas>
    
    <div class="overlay" id="startScreen">
        <h1>🏃 STICKMAN RUNNER</h1>
        <p>Run, Jump, Slide, Fight!</p>
        <button class="btn" onclick="startGame()">START</button>
    </div>
    <div class="overlay hidden" id="gameOverScreen">
        <h1>💀 GAME OVER</h1>
        <p id="finalScore">Score: 0</p>
        <button class="btn" onclick="startGame()">TRY AGAIN</button>
    </div>
    
    <div class="touch-controls">
        <button class="action-btn btn-attack" id="attackBtn">⚔️</button>
        <button class="action-btn btn-jump" id="jumpBtn">⬆️</button>
        <button class="action-btn btn-slide" id="slideBtn">⬇️</button>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resize() {
    const w = Math.min(window.innerWidth - 10, 400);
    const h = Math.min(window.innerHeight - 200, 500);
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
}
resize();
window.addEventListener('resize', resize);

let player, obstacles, enemies, particles;
let score, distance, best, gameLoop, gameState;
let groundY, scrollSpeed;
let keys = {};

class Particle {
    constructor(x, y, color, size, vx, vy, life) {
        this.x=x; this.y=y; this.color=color; this.size=size;
        this.vx=vx; this.vy=vy; this.life=life; this.maxLife=life;
    }
    update() { this.x+=this.vx; this.y+=this.vy; this.vy+=0.2; this.life--; }
    draw() {
        ctx.globalAlpha=this.life/this.maxLife;
        ctx.fillStyle=this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size*(this.life/this.maxLife), 0, Math.PI*2);
        ctx.fill();
        ctx.globalAlpha=1;
    }
}
let eParticles = [];
function eSpawn(x, y, color, count) {
    for(let i=0; i<count; i++) {
        eParticles.push(new Particle(x, y, color, 3+Math.random()*4, (Math.random()-0.5)*8, (Math.random()-0.5)*8-3, 30+Math.random()*20));
    }
}

function init() {
    groundY = canvas.height - 60;
    scrollSpeed = 6;
    player = {
        x: 80,
        y: groundY,
        vy: 0,
        w: 20,
        h: 50,
        jumping: false,
        sliding: false,
        attacking: false,
        attackTimer: 0,
        runFrame: 0
    };
    obstacles = [];
    enemies = [];
    eParticles = [];
    score = 0;
    distance = 0;
    gameState = 'playing';
    
    // Initial obstacles
    for (let i = 0; i < 3; i++) {
        spawnObstacle(300 + i * 250);
    }
}

function spawnObstacle(x) {
    let type = Math.floor(Math.random() * 3);
    if (type === 0) {
        // Spike
        obstacles.push({ x, y: groundY, w: 30, h: 30, type: 'spike' });
    } else if (type === 1) {
        // Barrier
        obstacles.push({ x, y: groundY - 50, w: 20, h: 50, type: 'barrier' });
    } else {
        // Low barrier (slide under)
        obstacles.push({ x, y: groundY - 25, w: 40, h: 25, type: 'low' });
    }
}

function spawnEnemy() {
    enemies.push({
        x: canvas.width + 50,
        y: groundY,
        w: 25,
        h: 50,
        hp: 1,
        defeated: false
    });
}

function update() {
    if (gameState !== 'playing') return;
    
    distance += scrollSpeed;
    score = Math.floor(distance / 10);
    scrollSpeed = 6 + score / 200;
    
    // Player physics
    player.vy += 0.8;
    player.y += player.vy;
    
    if (player.y >= groundY) {
        player.y = groundY;
        player.vy = 0;
        player.jumping = false;
    }
    
    // Jump
    if ((keys.up || window.tJump) && !player.jumping) {
        player.vy = -15;
        player.jumping = true;
        eSpawn(player.x, player.y, '#00ff88', 8);
    }
    
    // Slide
    player.sliding = window.tSlide;
    
    // Attack
    if (window.tAttack && player.attackTimer <= 0) {
        player.attacking = true;
        player.attackTimer = 20;
        // Hit enemies
        enemies.forEach(e => {
            if (!e.defeated && Math.abs(e.x - player.x) < 60) {
                e.defeated = true;
                eSpawn(e.x, e.y - 25, '#ff4444', 15);
                score += 50;
            }
        });
    }
    if (player.attackTimer > 0) player.attackTimer--;
    else player.attacking = false;
    
    // Animation frame
    player.runFrame += 0.3;
    
    // Move obstacles
    obstacles.forEach(o => { o.x -= scrollSpeed; });
    enemies.forEach(e => { e.x -= scrollSpeed; });
    
    // Spawn
    if (obstacles.length < 4 && obstacles[obstacles.length-1].x < canvas.width - 100) {
        spawnObstacle(canvas.width + 50);
    }
    if (Math.random() < 0.01 && enemies.length < 2) {
        spawnEnemy();
    }
    
    // Remove old
    obstacles = obstacles.filter(o => o.x > -50);
    enemies = enemies.filter(e => e.x > -50 && !e.defeated);
    
    // Collision
    obstacles.forEach(o => {
        let hitbox = player.sliding ? 
            { x: player.x - 10, y: player.y - 20, w: 20, h: 20 } :
            { x: player.x - 10, y: player.y - player.h, w: 20, h: player.h };
        
        if (o.type === 'low' && player.sliding) return; // Slide under
        
        if (hitbox.x + hitbox.w > o.x && hitbox.x < o.x + o.w &&
            hitbox.y + hitbox.h > o.y - o.h && hitbox.y < o.y) {
            gameOver();
        }
    });
    
    // Enemy collision
    enemies.forEach(e => {
        if (!e.defeated && player.attackTimer <= 0) {
            let hitbox = player.sliding ? 
                { x: player.x - 10, y: player.y - 20, w: 20, h: 20 } :
                { x: player.x - 10, y: player.y - player.h, w: 20, h: player.h };
            
            if (hitbox.x + hitbox.w > e.x && hitbox.x < e.x + e.w &&
                hitbox.y + hitbox.h > e.y - e.h && hitbox.y < e.y) {
                gameOver();
            }
        }
    });
    
    // Particles
    eParticles = eParticles.filter(p => { p.update(); return p.life > 0; });
    
    // UI
    document.getElementById('score').textContent = score;
    document.getElementById('dist').textContent = Math.floor(distance / 50);
    document.getElementById('best').textContent = best;
}

function draw() {
    // Background
    let sky = ctx.createLinearGradient(0, 0, 0, canvas.height);
    sky.addColorStop(0, '#1a1a2e');
    sky.addColorStop(1, '#16213e');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Parallax buildings
    ctx.fillStyle = 'rgba(255,255,255,0.05)';
    for (let i = 0; i < 8; i++) {
        let bx = ((i * 100 - distance * 0.2) % (canvas.width + 100)) - 50;
        ctx.fillRect(bx, groundY - 100 - (i % 3) * 50, 40, 100 + (i % 3) * 50);
    }
    
    // Ground
    ctx.fillStyle = '#333';
    ctx.fillRect(0, groundY, canvas.width, 60);
    
    // Ground line
    ctx.strokeStyle = '#00ff88';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(0, groundY);
    ctx.lineTo(canvas.width, groundY);
    ctx.stroke();
    
    // Obstacles
    obstacles.forEach(o => {
        if (o.type === 'spike') {
            ctx.fillStyle = '#ff4444';
            ctx.shadowColor = '#ff4444';
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.moveTo(o.x, o.y);
            ctx.lineTo(o.x + o.w/2, o.y - o.h);
            ctx.lineTo(o.x + o.w, o.y);
            ctx.fill();
            ctx.shadowBlur = 0;
        } else if (o.type === 'barrier') {
            ctx.fillStyle = '#666';
            ctx.fillRect(o.x, o.y - o.h, o.w, o.h);
            ctx.fillStyle = '#ff4444';
            ctx.fillRect(o.x + 2, o.y - o.h + 2, o.w - 4, 5);
        } else {
            ctx.fillStyle = '#666';
            ctx.fillRect(o.x, o.y - o.h, o.w, o.h);
        }
    });
    
    // Enemies
    enemies.forEach(e => {
        if (!e.defeated) {
            ctx.fillStyle = '#ff4444';
            ctx.shadowColor = '#ff4444';
            ctx.shadowBlur = 10;
            
            // Body
            ctx.fillRect(e.x - 10, e.y - 50, 20, 35);
            // Head
            ctx.beginPath();
            ctx.arc(e.x, e.y - 55, 10, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // Arms
            ctx.strokeStyle = '#ff4444';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(e.x - 10, e.y - 40);
            ctx.lineTo(e.x - 25, e.y - 30);
            ctx.moveTo(e.x + 10, e.y - 40);
            ctx.lineTo(e.x + 25, e.y - 30);
            ctx.stroke();
        }
    });
    
    // Player (stickman)
    ctx.save();
    ctx.translate(player.x, player.y);
    
    if (player.sliding) {
        // Sliding pose
        ctx.fillStyle = '#00ff88';
        ctx.fillRect(-15, -15, 35, 15); // Body
        ctx.beginPath();
        ctx.arc(20, -10, 8, 0, Math.PI * 2);
        ctx.fill(); // Head
    } else {
        // Running animation
        let legAngle = Math.sin(player.runFrame) * 0.5;
        
        ctx.strokeStyle = '#00ff88';
        ctx.shadowColor = '#00ff88';
        ctx.shadowBlur = 10;
        ctx.lineWidth = 4;
        
        // Head
        ctx.beginPath();
        ctx.arc(0, -45, 10, 0, Math.PI * 2);
        ctx.stroke();
        
        // Body
        ctx.beginPath();
        ctx.moveTo(0, -35);
        ctx.lineTo(0, -10);
        ctx.stroke();
        
        // Arms
        let armAngle = Math.sin(player.runFrame + Math.PI) * 0.5;
        ctx.beginPath();
        ctx.moveTo(0, -30);
        ctx.lineTo(-15 + Math.sin(armAngle) * 5, -20);
        ctx.moveTo(0, -30);
        ctx.lineTo(15 + Math.sin(-armAngle) * 5, -20);
        ctx.stroke();
        
        // Legs
        ctx.beginPath();
        ctx.moveTo(0, -10);
        ctx.lineTo(-8 + Math.sin(legAngle) * 8, 0);
        ctx.moveTo(0, -10);
        ctx.lineTo(8 + Math.sin(-legAngle) * 8, 0);
        ctx.stroke();
        
        ctx.shadowBlur = 0;
    }
    
    // Attack sword
    if (player.attacking) {
        ctx.strokeStyle = '#ffd700';
        ctx.shadowColor = '#ffd700';
        ctx.shadowBlur = 15;
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(10, -30);
        ctx.lineTo(50, -40);
        ctx.stroke();
        ctx.shadowBlur = 0;
    }
    
    ctx.restore();
    
    // Particles
    eParticles.forEach(p => p.draw());
}

function gameOver() {
    gameState = 'over';
    eSpawn(player.x, player.y - 25, '#ff4444', 30);
    
    if (score > best) {
        best = score;
        localStorage.setItem('stickmanBest', best);
    }
    
    clearInterval(gameLoop);
    document.getElementById('finalScore').textContent = 'Score: ' + score;
    setTimeout(() => {
        document.getElementById('gameOverScreen').classList.remove('hidden');
    }, 500);
}

function startGame() {
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('gameOverScreen').classList.add('hidden');
    document.getElementById('hud').style.display = 'flex';
    
    init();
    if (gameLoop) clearInterval(gameLoop);
    gameLoop = setInterval(() => { update(); draw(); }, 1000/60);
}

// Touch controls
window.tJump = window.tSlide = window.tAttack = false;
document.getElementById('jumpBtn').addEventListener('touchstart', e => { e.preventDefault(); window.tJump = true; });
document.getElementById('jumpBtn').addEventListener('touchend', e => { e.preventDefault(); window.tJump = false; });
document.getElementById('jumpBtn').addEventListener('mousedown', () => window.tJump = true);
document.getElementById('jumpBtn').addEventListener('mouseup', () => window.tJump = false);

document.getElementById('slideBtn').addEventListener('touchstart', e => { e.preventDefault(); window.tSlide = true; });
document.getElementById('slideBtn').addEventListener('touchend', e => { e.preventDefault(); window.tSlide = false; });
document.getElementById('slideBtn').addEventListener('mousedown', () => window.tSlide = true);
document.getElementById('slideBtn').addEventListener('mouseup', () => window.tSlide = false);

document.getElementById('attackBtn').addEventListener('touchstart', e => { e.preventDefault(); window.tAttack = true; });
document.getElementById('attackBtn').addEventListener('touchend', e => { e.preventDefault(); window.tAttack = false; });
document.getElementById('attackBtn').addEventListener('mousedown', () => window.tAttack = true);
document.getElementById('attackBtn').addEventListener('mouseup', () => window.tAttack = false);

// Keyboard
document.addEventListener('keydown', e => {
    if (e.key === 'ArrowUp' || e.key === 'w' || e.key === ' ') keys.up = true;
    if (e.key === 'ArrowDown' || e.key === 's') keys.down = true;
    if (e.key === 'x' || e.key === 'X') window.tAttack = true;
    if (e.key === 'Enter') startGame();
});
document.addEventListener('keyup', e => {
    if (e.key === 'ArrowUp' || e.key === 'w' || e.key === ' ') keys.up = false;
    if (e.key === 'ArrowDown' || e.key === 's') keys.down = false;
    if (e.key === 'x' || e.key === 'X') window.tAttack = false;
});

best = parseInt(localStorage.getItem('stickmanBest') || '0');
init();
draw();
</script>
</body>
</html>
