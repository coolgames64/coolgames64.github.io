<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚾ Baseball</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }
        h1 { font-size: 2.5rem; margin-bottom: 10px; color: #e74c3c; }
        .score-board { font-size: 1.3rem; margin-bottom: 15px; }
        .score-board span { background: rgba(231,76,60,0.2); padding: 5px 15px; border-radius: 15px; }
        canvas { max-width: 100%; 
            max-width: 100vw; border: 3px solid #e74c3c; border-radius: 10px; }
        .instructions { margin-top: 15px; color: #888; font-size: 1rem; }
        .instructions span { background: #e74c3c; padding: 3px 10px; border-radius: 5px; }
        .back-btn {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255,255,255,0.1); color: white;
            border: 2px solid rgba(255,255,255,0.3); padding: 10px 20px;
            border-radius: 8px; cursor: pointer; text-decoration: none;
        }
        .back-btn:hover { background: rgba(255,255,255,0.2); }
    
        /* Mobile Touch Controls */
        .touch-controls {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            padding: 10px;
            z-index: 1000;
        }
        @media (pointer: coarse) {
            .touch-controls { display: flex !important; }
            body { padding-bottom: 120px !important; }
        }
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 5px;
            margin: 0 auto;
        }
        .dpad-btn {
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.4);
            border-radius: 10px;
            color: white;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .dpad-btn:active {
            background: rgba(255,255,255,0.4);
        }
        .dpad-center { background: rgba(0,0,0,0.2); }
        @media (max-width: 500px) {
            .dpad { grid-template-columns: repeat(3, 50px); grid-template-rows: repeat(3, 50px); }
            .dpad-btn { font-size: 20px; }
        }
    
    
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }
        .game-header {
            font-size: 20px;
            font-weight: 700;
            color: #00ff88;
            text-shadow: 0 0 15px rgba(0,255,136,0.5);
            margin-bottom: 10px;
        }
        .score-display {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
        }
        .score-box {
            background: rgba(0,0,0,0.5);
            border: 2px solid rgba(0,255,136,0.3);
            border-radius: 10px;
            padding: 6px 14px;
            text-align: center;
        }
        .score-label { font-size: 10px; color: rgba(255,255,255,0.6); text-transform: uppercase; }
        .score-val { font-size: 18px; font-weight: 700; color: #00ff88; }
        .game-wrapper { position: relative; }
        #gameCanvas {
            border-radius: 12px;
            border: 3px solid #00ff88;
            box-shadow: 0 0 30px rgba(0,255,136,0.3);
        }
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
        }
        .overlay.hidden { display: none; }
        .overlay h2 {
            font-size: 28px;
            color: #00ff88;
            text-shadow: 0 0 20px rgba(0,255,136,0.6);
            margin-bottom: 8px;
        }
        .overlay p { color: rgba(255,255,255,0.7); margin-bottom: 15px; }
        .btn-epic {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            color: #0f0f1a;
            border: none;
            padding: 12px 35px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(0,255,136,0.4);
        }
        .btn-epic:hover { transform: scale(1.05); }
        .touch-controls {
            display: none;
            position: fixed;
            bottom: 10px;
            left: 0;
            right: 0;
            z-index: 100;
            justify-content: center;
            gap: 8px;
        }
        @media (pointer: coarse) {
            .touch-controls { display: flex; }
            body { padding-bottom: 100px; }
        }
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 50px);
            grid-template-rows: repeat(2, 50px);
            gap: 4px;
        }
        .dpad-btn {
            background: rgba(0,255,136,0.2);
            border: 2px solid rgba(0,255,136,0.5);
            border-radius: 10px;
            color: #00ff88;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .dpad-btn:active { background: rgba(0,255,136,0.5); }

    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← Back to Games</a>
    <h1>⚾ BASEBALL</h1>
    <div class="score-board">
        <span>Runs: <strong id="runs">0</strong></span>
        <span>Outs: <strong id="outs">0</strong>/2</span>
        <span>Innings: <strong id="innings">1</strong></span>
    </div>
    <canvas id="gameCanvas" width="500" height">400"></canvas>
    <div class="instructions"><span>CLICK</span> to swing! Time it right!</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let ball = { x: 250, y: -30, speed: 6, pitching: false };
        let batAngle = 0;
        let runs = 0;
        let outs = 0;
        let innings = 1;
        let swinging = false;
        let swingTimer = 0;
        let gameLoop;
        
        function init() {
            ball = { x: 250, y: -30, speed: 6, pitching: false };
            runs = 0;
            outs = 0;
            swinging = false;
            swingTimer = 0;
            batAngle = 0;
            
            document.getElementById('runs').textContent = '0';
            document.getElementById('outs').textContent = '0';
            document.getElementById('innings').textContent = '1';
        }
        
        function draw() {
            // Sky
            ctx.fillStyle = '#87CEEB';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Field
            ctx.fillStyle = '#27ae60';
            ctx.fillRect(0, 150, canvas.width, 250);
            
            // Dirt
            ctx.fillStyle = '#c4a676';
            ctx.beginPath();
            ctx.arc(250, 350, 80, 0, Math.PI * 2);
            ctx.fill();
            
            // Bases
            ctx.fillStyle = '#fff';
            ctx.fillRect(200, 280, 20, 20);  // First base
            ctx.fillRect(300, 280, 20, 20);  // Third base
            ctx.fillRect(245, 220, 10, 60);  // Home plate
            
            // Pitcher's mound
            ctx.fillStyle = '#8B4513';
            ctx.beginPath();
            ctx.arc(250, 150, 20, 0, Math.PI * 2);
            ctx.fill();
            
            // Ball
            if (ball.pitching) {
                ctx.fillStyle = '#fff';
                ctx.shadowColor = '#fff';
                ctx.shadowBlur = 5;
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, 8, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                
                // Ball seams
                ctx.strokeStyle = '#e74c3c';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, 8, 0, Math.PI);
                ctx.stroke();
            }
            
            // Batter
            ctx.save();
            ctx.translate(250, 320);
            ctx.rotate(batAngle);
            
            // Bat
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(-4, -70, 8, 60);
            ctx.fillStyle = '#654321';
            ctx.fillRect(-6, -70, 12, 8);
            
            ctx.restore();
            
            // Batter body
            ctx.fillStyle = '#3498db';
            ctx.beginPath();
            ctx.arc(250, 330, 15, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#2c3e50';
            ctx.fillRect(240, 345, 20, 35);
            
            // Helmet
            ctx.fillStyle = '#e74c3c';
            ctx.beginPath();
            ctx.arc(250, 325, 18, Math.PI, 0);
            ctx.fill();
            
            if (!ball.pitching && outs < 2) {
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#fff';
                ctx.font = '24px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('Click to pitch!', canvas.width/2, 50);
            }
        }
        
        function update() {
            if (!ball.pitching) return;
            
            ball.y += ball.speed;
            
            // Swing animation
            if (swinging) {
                swingTimer++;
                batAngle = Math.sin(swingTimer * 0.4) * 1.2;
                if (swingTimer > 15) {
                    swinging = false;
                    swingTimer = 0;
                    batAngle = 0;
                }
            }
            
            // Hit detection
            if (ball.y > 280 && ball.y < 370 && swinging) {
                const timing = Math.abs(ball.y - 330);
                if (timing < 40) {
                    // Hit!
                    const hitPower = 5 + Math.random() * 5;
                    ball.pitching = false;
                    ball.y = -30;
                    
                    // Score based on timing
                    let scored = 0;
                    if (timing < 15) scored = 4;  // Home run!
                    else if (timing < 25) scored = 3;
                    else if (timing < 35) scored = 2;
                    else scored = 1;
                    
                    runs += scored;
                    document.getElementById('runs').textContent = runs;
                }
            }
            
            // Strike
            if (ball.y > 380) {
                outs++;
                document.getElementById('outs').textContent = outs;
                ball.pitching = false;
                ball.y = -30;
                
                if (outs >= 2) {
                    innings++;
                    outs = 0;
                    document.getElementById('outs').textContent = '0';
                    document.getElementById('innings').textContent = Math.min(innings, 9);
                    
                    if (innings > 9) {
                        endGame();
                    }
                }
            }
        }
        
        function pitch() {
            if (ball.pitching || outs >= 2) return;
            ball.pitching = true;
            ball.y = -30;
            ball.x = 250 + (Math.random() - 0.5) * 40;
            ball.speed = 5 + Math.random() * 3;
        }
        
        function swing() {
            if (swinging || !ball.pitching) return;
            swinging = true;
            swingTimer = 0;
        }
        
        function endGame() {
            clearInterval(gameLoop);
            setTimeout(() => {
                alert(`Game Over!\nFinal Score: ${runs} runs\nInnings: ${innings}\n\nClick OK to play again!`);
                init();
                gameLoop = setInterval(() => {
                    update();
                    draw();
                }, 1000 / 60);
            }, 100);
        }
        
        canvas.addEventListener('click', () => {
            if (!ball.pitching) {
                pitch();
            } else {
                swing();
            }
        });
        
        init();
        draw();
        gameLoop = setInterval(() => {
            update();
            draw();
        }, 1000 / 60);
    
    // EPIC PARTICLES
    let eParticles = [];
    class EParticle {
        constructor(x, y, color, size, vx, vy, life) {
            this.x=x; this.y=y; this.color=color; this.size=size;
            this.vx=vx; this.vy=vy; this.life=life; this.maxLife=life;
        }
        update() {
            this.x+=this.vx; this.y+=this.vy; this.vy+=0.1; this.life--;
        }
        draw() {
            let a = this.life/this.maxLife;
            ctx.globalAlpha=a;
            ctx.fillStyle=this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size*a, 0, Math.PI*2);
            ctx.fill();
            ctx.globalAlpha=1;
        }
    }
    function eSpawn(x, y, color, count) {
        for(let i=0; i<count; i++) {
            eParticles.push(new EParticle(x, y, color, 3+Math.random()*4, (Math.random()-0.5)*8, (Math.random()-0.5)*8-3, 30+Math.random()*20));
        }
    }

    
    window.tL=false; window.tR=false; window.tU=false; window.tD=false;
    ['btnL','btnR','btnU','btnD'].forEach(id => {
        let btn = document.getElementById(id);
        if(!btn) return;
        let key = {btnL:'tL',btnR:'tR',btnU:'tU',btnD:'tD'}[id];
        btn.addEventListener('touchstart', e => { e.preventDefault(); window[key]=true; });
        btn.addEventListener('touchend', e => { e.preventDefault(); window[key]=false; });
        btn.addEventListener('mousedown', () => window[key]=true);
        btn.addEventListener('mouseup', () => window[key]=false);
    });
    setInterval(() => {
        if(window.tL) keys.left=true; else keys.left=false;
        if(window.tR) keys.right=true; else keys.right=false;
        if(window.tU) keys.up=true; else keys.up=false;
        if(window.tD) keys.down=true; else keys.down=false;
    }, 50);

    </script>
</body>
</html>
