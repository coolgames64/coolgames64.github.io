<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🏏 Cricket</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #27ae60;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }
        h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .score-board { font-size: 1.3rem; margin-bottom: 15px; }
        .score-board span { background: rgba(255,255,255,0.2); padding: 5px 15px; border-radius: 15px; }
        canvas { max-width: 100%; 
            max-width: 100vw; border: 3px solid #fff; border-radius: 10px; }
        .instructions { margin-top: 15px; color: #ddd; font-size: 1rem; }
        .instructions span { background: #fff; color: #27ae60; padding: 3px 10px; border-radius: 5px; }
        .back-btn {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255,255,255,0.2); color: white;
            border: 2px solid rgba(255,255,255,0.3); padding: 10px 20px;
            border-radius: 8px; cursor: pointer; text-decoration: none;
        }
        .back-btn:hover { background: rgba(255,255,255,0.3); }
    
        /* Mobile Touch Controls */
        .touch-controls {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            padding: 10px;
            z-index: 1000;
        }
        @media (pointer: coarse) {
            .touch-controls { display: flex !important; }
            body { padding-bottom: 120px !important; }
        }
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 5px;
            margin: 0 auto;
        }
        .dpad-btn {
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.4);
            border-radius: 10px;
            color: white;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .dpad-btn:active {
            background: rgba(255,255,255,0.4);
        }
        .dpad-center { background: rgba(0,0,0,0.2); }
        @media (max-width: 500px) {
            .dpad { grid-template-columns: repeat(3, 50px); grid-template-rows: repeat(3, 50px); }
            .dpad-btn { font-size: 20px; }
        }
    
    
        .tap-area {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 999;
            display: none;
        }
        @media (pointer: coarse) {
            .tap-area { display: block; }
        }
        .tap-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 80px; height: 80px;
            background: rgba(255,255,255,0.3);
            border: 3px solid rgba(255,255,255,0.6);
            border-radius: 50%;
            color: white;
            font-size: 14px;
            z-index: 1001;
            display: none;
            cursor: pointer;
        }
        @media (pointer: coarse) {
            .tap-btn { display: flex; align-items: center; justify-content: center; }
        }

    
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }
        .game-header {
            font-size: 20px;
            font-weight: 700;
            color: #00ff88;
            text-shadow: 0 0 15px rgba(0,255,136,0.5);
            margin-bottom: 10px;
        }
        .score-display {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
        }
        .score-box {
            background: rgba(0,0,0,0.5);
            border: 2px solid rgba(0,255,136,0.3);
            border-radius: 10px;
            padding: 6px 14px;
            text-align: center;
        }
        .score-label { font-size: 10px; color: rgba(255,255,255,0.6); text-transform: uppercase; }
        .score-val { font-size: 18px; font-weight: 700; color: #00ff88; }
        .game-wrapper { position: relative; }
        #gameCanvas {
            border-radius: 12px;
            border: 3px solid #00ff88;
            box-shadow: 0 0 30px rgba(0,255,136,0.3);
        }
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
        }
        .overlay.hidden { display: none; }
        .overlay h2 {
            font-size: 28px;
            color: #00ff88;
            text-shadow: 0 0 20px rgba(0,255,136,0.6);
            margin-bottom: 8px;
        }
        .overlay p { color: rgba(255,255,255,0.7); margin-bottom: 15px; }
        .btn-epic {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            color: #0f0f1a;
            border: none;
            padding: 12px 35px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(0,255,136,0.4);
        }
        .btn-epic:hover { transform: scale(1.05); }
        .touch-controls {
            display: none;
            position: fixed;
            bottom: 10px;
            left: 0;
            right: 0;
            z-index: 100;
            justify-content: center;
            gap: 8px;
        }
        @media (pointer: coarse) {
            .touch-controls { display: flex; }
            body { padding-bottom: 100px; }
        }
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 50px);
            grid-template-rows: repeat(2, 50px);
            gap: 4px;
        }
        .dpad-btn {
            background: rgba(0,255,136,0.2);
            border: 2px solid rgba(0,255,136,0.5);
            border-radius: 10px;
            color: #00ff88;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .dpad-btn:active { background: rgba(0,255,136,0.5); }

    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← Back to Games</a>
    <h1>🏏 CRICKET</h1>
    <div class="score-board">
        <span>Runs: <strong id="runs">0</strong></span>
        <span>Balls: <strong id="balls">0</strong>/30</span>
        <span>Wickets: <strong id="wickets">0</strong>/3</span>
    </div>
    <canvas id="gameCanvas" width="500" height="400"></canvas>
    <div class="instructions"><span>CLICK</span> when the ball is near the wicket! Time it right to score runs!</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let ball = { y: -50, speed: 5, bowling: false };
        let runs = 0;
        let balls = 0;
        let wickets = 0;
        let gameLoop;
        let swinging = false;
        let swingTimer = 0;
        let batAngle = 0;
        
        function init() {
            ball = { y: -50, speed: 5, bowling: false };
            runs = 0;
            balls = 0;
            wickets = 0;
            swinging = false;
            swingTimer = 0;
            
            document.getElementById('runs').textContent = '0';
            document.getElementById('balls').textContent = '0';
            document.getElementById('wickets').textContent = '0';
        }
        
        function drawPitch() {
            // Pitch
            ctx.fillStyle = '#c4a676';
            ctx.fillRect(200, 50, 100, 300);
            
            // Crease lines
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(200, 100);
            ctx.lineTo(300, 100);
            ctx.moveTo(200, 300);
            ctx.lineTo(300, 300);
            ctx.stroke();
            
            // Wickets
            ctx.fillStyle = '#fff';
            for (let i = 0; i < 3; i++) {
                ctx.fillRect(245 + i * 5, 280, 5, 40);
            }
            // Bails
            ctx.fillRect(240, 275, 20, 5);
            
            // Bowler
            ctx.fillStyle = '#3498db';
            ctx.beginPath();
            ctx.arc(250, 30, 15, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillRect(240, 45, 20, 35);
        }
        
        function drawBatsman() {
            ctx.save();
            ctx.translate(250, 300);
            ctx.rotate(batAngle);
            
            // Bat
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(-5, -60, 10, 60);
            ctx.fillStyle = '#c4a676';
            ctx.fillRect(-8, -60, 16, 10);
            
            ctx.restore();
            
            // Batsman body
            ctx.fillStyle = '#3498db';
            ctx.beginPath();
            ctx.arc(250, 320, 15, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillRect(240, 335, 20, 40);
        }
        
        function drawBall() {
            if (!ball.bowling) return;
            
            ctx.fillStyle = '#e74c3c';
            ctx.shadowColor = '#e74c3c';
            ctx.shadowBlur = 5;
            ctx.beginPath();
            ctx.arc(250, ball.y, 8, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        
        function draw() {
            // Ground
            ctx.fillStyle = '#27ae60';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            drawPitch();
            drawBall();
            drawBatsman();
            
            if (!ball.bowling && balls < 30 && wickets < 3) {
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#fff';
                ctx.font = '24px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('Click to bowl!', canvas.width/2, canvas.height/2);
            }
        }
        
        function update() {
            if (!ball.bowling) return;
            
            ball.y += ball.speed;
            
            // Swing animation
            if (swinging) {
                swingTimer++;
                batAngle = Math.sin(swingTimer * 0.3) * 0.5;
                if (swingTimer > 20) {
                    swinging = false;
                    swingTimer = 0;
                    batAngle = 0;
                }
            }
            
            // Hit detection
            if (ball.y > 260 && ball.y < 340 && swinging) {
                // Hit! Score runs based on timing
                const timing = Math.abs(ball.y - 300);
                let scored = 0;
                
                if (timing < 15) {
                    scored = 6;  // Six!
                } else if (timing < 30) {
                    scored = 4;  // Four!
                } else if (timing < 50) {
                    scored = Math.floor(Math.random() * 3) + 1;  // 1-3 runs
                }
                
                runs += scored;
                document.getElementById('runs').textContent = runs;
                ball.bowling = false;
                ball.y = -50;
            }
            
            // Miss - wicket
            if (ball.y > 340) {
                wickets++;
                document.getElementById('wickets').textContent = wickets;
                ball.bowling = false;
                ball.y = -50;
                
                if (wickets >= 3 || balls >= 30) {
                    endGame();
                }
            }
        }
        
        function bowl() {
            if (ball.bowling || balls >= 30 || wickets >= 3) return;
            
            ball.bowling = true;
            ball.y = -50;
            ball.speed = 4 + Math.random() * 3;
            balls++;
            document.getElementById('balls').textContent = balls;
            
            if (balls >= 30 || wickets >= 3) {
                setTimeout(endGame, 1000);
            }
        }
        
        function swing() {
            if (swinging || !ball.bowling) return;
            swinging = true;
            swingTimer = 0;
        }
        
        function endGame() {
            clearInterval(gameLoop);
            setTimeout(() => {
                alert(`Game Over!\nRuns: ${runs}\nBalls: ${balls}\nWickets: ${wickets}\n\nClick OK to play again!`);
                init();
                gameLoop = setInterval(() => {
                    update();
                    draw();
                }, 1000 / 60);
            }, 100);
        }
        
        canvas.addEventListener('click', () => {
            if (!ball.bowling) {
                bowl();
            } else {
                swing();
            }
        });
        
        init();
        draw();
        gameLoop = setInterval(() => {
            update();
            draw();
        }, 1000 / 60);
    
        // Tap anywhere to click
        document.addEventListener('touchstart', (e) => {
            if(e.target.tagName !== 'BUTTON' && e.target.tagName !== 'INPUT') {
                const touch = e.touches[0];
                const clickEvent = new MouseEvent('click', {
                    bubbles: true,
                    clientX: touch.clientX,
                    clientY: touch.clientY
                });
                e.target.dispatchEvent(clickEvent);
            }
        }, true);
        
        // Space/action button for mobile
        window.tapSpace = false;

    
    // EPIC PARTICLES
    let eParticles = [];
    class EParticle {
        constructor(x, y, color, size, vx, vy, life) {
            this.x=x; this.y=y; this.color=color; this.size=size;
            this.vx=vx; this.vy=vy; this.life=life; this.maxLife=life;
        }
        update() {
            this.x+=this.vx; this.y+=this.vy; this.vy+=0.1; this.life--;
        }
        draw() {
            let a = this.life/this.maxLife;
            ctx.globalAlpha=a;
            ctx.fillStyle=this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size*a, 0, Math.PI*2);
            ctx.fill();
            ctx.globalAlpha=1;
        }
    }
    function eSpawn(x, y, color, count) {
        for(let i=0; i<count; i++) {
            eParticles.push(new EParticle(x, y, color, 3+Math.random()*4, (Math.random()-0.5)*8, (Math.random()-0.5)*8-3, 30+Math.random()*20));
        }
    }

    
    window.tL=false; window.tR=false; window.tU=false; window.tD=false;
    ['btnL','btnR','btnU','btnD'].forEach(id => {
        let btn = document.getElementById(id);
        if(!btn) return;
        let key = {btnL:'tL',btnR:'tR',btnU:'tU',btnD:'tD'}[id];
        btn.addEventListener('touchstart', e => { e.preventDefault(); window[key]=true; });
        btn.addEventListener('touchend', e => { e.preventDefault(); window[key]=false; });
        btn.addEventListener('mousedown', () => window[key]=true);
        btn.addEventListener('mouseup', () => window[key]=false);
    });
    setInterval(() => {
        if(window.tL) keys.left=true; else keys.left=false;
        if(window.tR) keys.right=true; else keys.right=false;
        if(window.tU) keys.up=true; else keys.up=false;
        if(window.tD) keys.down=true; else keys.down=false;
    }, 50);

    </script>

    <button class="tap-btn" ontouchstart="window.tapSpace=true" ontouchend="window.tapSpace=false">TAP</button>

</body>
</html>
