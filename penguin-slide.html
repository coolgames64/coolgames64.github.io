    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(180deg, #a8e6cf, #88d8b0); min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow: hidden; }
        .header { display: flex; gap: 20px; padding: 15px; }
        .score-box { background: white; padding: 10px 20px; border-radius: 15px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #gameCanvas { border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .back-btn { position: fixed; top: 20px; left: 20px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 10px 20px; border-radius: 25px; text-decoration: none; font-weight: 600; }
    
        /* Mobile Touch Controls */
        .touch-controls {
            display: none;

            z-index: 1000;

            .touch-controls { display: flex !important; }

        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 60px);

            border: 2px solid rgba(255,255,255,0.4);

            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .dpad-btn:active {
            background: rgba(255,255,255,0.4);
        }
        .dpad-center { background: rgba(0,0,0,0.2); }
        @media (max-width: 500px) {
            .dpad { grid-template-columns: repeat(3, 50px); grid-template-rows: repeat(3, 50px); }
            .dpad-btn { font-size: 20px; }
        }
    
    
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }
        .game-header {

            color: #00ff88;

            margin-bottom: 10px;
        }
        .score-display {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
        }
        .score-box {
            background: rgba(0,0,0,0.5);
            border: 2px solid rgba(0,255,136,0.3);

        }
        .score-label { font-size: 10px; color: rgba(255,255,255,0.6); text-transform: uppercase; }
        .score-val { font-size: 18px; font-weight: 700; color: #00ff88; }
        .game-wrapper { position: relative; }
        #gameCanvas {
            border-radius: 12px;

        }

        .overlay.hidden { display: none; }
        .overlay h2 {

            border: 2px solid rgba(0,255,136,0.5);

            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;

        }
        .dpad-btn:active { background: rgba(0,255,136,0.5); }

<body>
    <a href="index.html" class="back-btn">← Back</a>
    <div class="header">
        <div class="score-box">Score: <span id="score">0</span></div>
        <div class="score-box">Best: <span id="best">0</span></div>
    </div>
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const bestEl = document.getElementById('best');
        
        let penguin = { x: 200, y: 100, vx: 0, vy: 0, rotation: 0 };
        let iceBlocks = [];
        let fish = [];
        let score = 0;
        let best = localStorage.getItem('penguinBest') || 0;
        let gameOver = false;
        let gameStarted = false;
        
        bestEl.textContent = best;
        
        function createIceBlock() {
            iceBlocks.push({
                x: Math.random() * 300,
                y: -50,
                width: 80 + Math.random() * 60,
                height: 25,
                rotation: (Math.random() - 0.5) * 0.3
            });
        }
        
        function createFish() {
            fish.push({
                x: Math.random() * 350 + 25,
                y: -50,
                size: 20,
                collected: false
            });
        }
        
        for (let i = 0; i < 8; i++) {
            let b = { x: Math.random() * 300, y: 100 + i * 80, width: 80 + Math.random() * 60, height: 25, rotation: (Math.random() - 0.5) * 0.3 };
            iceBlocks.push(b);
        }
        
        document.addEventListener('keydown', e => {
            if (!gameStarted) { gameStarted = true; return; }
            if (gameOver) return;
            if (e.key === 'ArrowLeft') penguin.vx -= 1.5;
            if (e.key === 'ArrowRight') penguin.vx += 1.5;
        });
        
        canvas.addEventListener('click', () => {
            if (!gameStarted) { gameStarted = true; return; }
            if (gameOver) {
                gameOver = false;
                penguin = { x: 200, y: 100, vx: 0, vy: 0, rotation: 0 };
                iceBlocks = [];
                fish = [];
                score = 0;
                for (let i = 0; i < 8; i++) {
                    iceBlocks.push({ x: Math.random() * 300, y: 100 + i * 80, width: 80 + Math.random() * 60, height: 25, rotation: (Math.random() - 0.5) * 0.3 });
                }
                return;
            }
            penguin.vx += (Math.random() - 0.5) * 3;
        });
        
        function draw() {
            // Sky gradient
            let gradient = ctx.createLinearGradient(0, 0, 0, 600);
            gradient.addColorStop(0, '#87CEEB');
            gradient.addColorStop(1, '#a8e6cf');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 400, 600);
            
            // Clouds
            ctx.fillStyle = 'rgba(255,255,255,0.8)';
            for (let i = 0; i < 5; i++) {
                let x = (i * 100 + Date.now() / 50) % 500 - 50;
                ctx.beginPath();
                ctx.arc(x, 50 + i * 20, 30, 0, Math.PI * 2);
                ctx.arc(x + 25, 50 + i * 20, 25, 0, Math.PI * 2);
                ctx.arc(x + 50, 50 + i * 20, 30, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Ice blocks
            iceBlocks.forEach(b => {
                ctx.save();
                ctx.translate(b.x + b.width/2, b.y + b.height/2);
                ctx.rotate(b.rotation);
                ctx.fillStyle = 'rgba(255,255,255,0.9)';
                ctx.shadowColor = 'rgba(136,216,176,0.5)';
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.roundRect(-b.width/2, -b.height/2, b.width, b.height, 5);
                ctx.fill();
                ctx.restore();
            });
            
            // Fish
            fish.forEach(f => {
                if (!f.collected) {
                    ctx.fillStyle = '#ffa500';
                    ctx.beginPath();
                    ctx.arc(f.x, f.y, f.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#ff6b00';
                    ctx.beginPath();
                    ctx.moveTo(f.x + f.size, f.y);
                    ctx.lineTo(f.x + f.size + 15, f.y - 10);
                    ctx.lineTo(f.x + f.size + 15, f.y + 10);
                    ctx.fill();
                    ctx.fillStyle = 'white';
                    ctx.beginPath();
                    ctx.arc(f.x - 5, f.y - 5, 4, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
            
            // Penguin
            ctx.save();
            ctx.translate(penguin.x, penguin.y);
            ctx.rotate(penguin.rotation);
            
            // Body
            ctx.fillStyle = '#2c3e50';
            ctx.beginPath();
            ctx.ellipse(0, 0, 20, 25, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Belly
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.ellipse(0, 5, 12, 15, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Eyes
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(-6, -10, 6, 0, Math.PI * 2);
            ctx.arc(6, -10, 6, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = 'black';
            ctx.beginPath();
            ctx.arc(-6, -10, 3, 0, Math.PI * 2);
            ctx.arc(6, -10, 3, 0, Math.PI * 2);
            ctx.fill();
            
            // Beak
            ctx.fillStyle = '#e67e22';
            ctx.beginPath();
            ctx.moveTo(0, -5);
            ctx.lineTo(-8, 0);
            ctx.lineTo(8, 0);
            ctx.fill();
            
            ctx.restore();
            
            // Start message
            if (!gameStarted) {
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(0, 0, 400, 600);
                ctx.fillStyle = 'white';
                ctx.font = 'bold 28px Poppins';
                ctx.textAlign = 'center';
                ctx.fillText('🐧 PENGUIN SLIDE 🐧', 200, 250);
                ctx.font = '20px Poppins';
                ctx.fillText('Click or Arrow Keys', 200, 300);
                ctx.fillText('to slide!', 200, 340);
            }
            
            // Game Over
            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, 400, 600);
                ctx.fillStyle = '#ff6b6b';
                ctx.font = 'bold 36px Poppins';
                ctx.textAlign = 'center';
                ctx.fillText('💥 OUCH!', 200, 260);
                ctx.fillStyle = 'white';
                ctx.font = '24px Poppins';
                ctx.fillText('Score: ' + score, 200, 320);
                ctx.font = '18px Poppins';
                ctx.fillText('Click to Restart', 200, 370);
            }
        }
        
        function update() {
            if (!gameStarted || gameOver) return;
            
            penguin.vy += 0.3;
            penguin.y += penguin.vy;
            penguin.x += penguin.vx;
            penguin.vx *= 0.98;
            penguin.rotation += penguin.vx * 0.05;
            
            // Boundaries
            if (penguin.x < 20) { penguin.x = 20; penguin.vx *= -0.5; }
            if (penguin.x > 380) { penguin.x = 380; penguin.vx *= -0.5; }
            
            // Ice blocks
            let onIce = false;
            iceBlocks.forEach(b => {
                if (penguin.y + 20 > b.y && penguin.y + 20 < b.y + b.height + 10 &&
                    penguin.x > b.x - 10 && penguin.x < b.x + b.width + 10) {
                    penguin.y = b.y - 20;
                    penguin.vy = 0;
                    onIce = true;
                }
            });
            
            // Fish collection
            fish.forEach(f => {
                if (!f.collected) {
                    let dx = penguin.x - f.x;
                    let dy = penguin.y - f.y;
                    if (Math.sqrt(dx*dx + dy*dy) < 35) {
                        f.collected = true;
                        score += 5;
                        scoreEl.textContent = score;
                    }
                }
            });
            
            // Fall off
            if (penguin.y > 650) gameOver = true;
            
            // Generate more
            if (iceBlocks[iceBlocks.length - 1].y > 100) {
                createIceBlock();
                if (Math.random() < 0.3) createFish();
            }
            
            // Remove old
            iceBlocks = iceBlocks.filter(b => b.y < 650);
            fish = fish.filter(f => f.y < 650);
            
            // Score for surviving
            if (onIce && Math.random() < 0.05) {
                score++;
                scoreEl.textContent = score;
            }
            
            if (gameOver && score > best) {
                best = score;
                localStorage.setItem('penguinBest', best);
                bestEl.textContent = best;
            }
        }
        
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        gameLoop();
    
        window.tL=false; window.tR=false; window.tU=false; window.tD=false;
        setInterval(() => {
            if(window.tL) keys.left=true; else keys.left=false;
            if(window.tR) keys.right=true; else keys.right=false;
            if(window.tU) keys.up=true; else keys.up=false;
            if(window.tD) keys.down=true; else keys.down=false;
        }, 50);

    
    // EPIC PARTICLES
    let eParticles = [];
    class EParticle {
        constructor(x, y, color, size, vx, vy, life) {
            this.x=x; this.y=y; this.color=color; this.size=size;
            this.vx=vx; this.vy=vy; this.life=life; this.maxLife=life;
        }
        update() {
            this.x+=this.vx; this.y+=this.vy; this.vy+=0.1; this.life--;
        }
        draw() {
            let a = this.life/this.maxLife;
            ctx.globalAlpha=a;
            ctx.fillStyle=this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size*a, 0, Math.PI*2);
            ctx.fill();
            ctx.globalAlpha=1;
        }
    }
    function eSpawn(x, y, color, count) {
        for(let i=0; i<count; i++) {
            eParticles.push(new EParticle(x, y, color, 3+Math.random()*4, (Math.random()-0.5)*8, (Math.random()-0.5)*8-3, 30+Math.random()*20));
        }
    }

    </script>

    <div class="touch-controls" style="display:none;position:fixed;bottom:15px;left:0;right:0;z-index:1000;pointer-events:none;">
      <div style="display:flex;gap:20px;align-items:center;justify-content:center;pointer-events:auto;">
        <button class="dpad-btn" ontouchstart="window.tL=true;window.tR=false;window.tU=false" ontouchend="window.tL=false" onmousedown="window.tL=true" onmouseup="window.tL=false" style="width:70px;height:70px;border-radius:50%;font-size:26px;background:rgba(255,255,255,0.25);border:3px solid rgba(255,255,255,0.5);color:white;">&#9664;</button>
        <button class="dpad-btn" ontouchstart="window.tU=true;window.tL=false;window.tR=false" ontouchend="window.tU=false" onmousedown="window.tU=true" onmouseup="window.tU=false" style="width:70px;height:70px;border-radius:50%;font-size:26px;background:rgba(255,255,255,0.25);border:3px solid rgba(255,255,255,0.5);color:white;">&#9650;</button>
        <button class="dpad-btn" ontouchstart="window.tR=true;window.tL=false;window.tU=false" ontouchend="window.tR=false" onmousedown="window.tR=true" onmouseup="window.tR=false" style="width:70px;height:70px;border-radius:50%;font-size:26px;background:rgba(255,255,255,0.25);border:3px solid rgba(255,255,255,0.5);color:white;">&#9654;</button>
      </div>
    </div>
