<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google-site-verification" content="LFolYFY1ySO4aIcMbyo8EdJKYLqHW9MS6_B1y7e5MPQ" />
    <title>Tomb Runner | Cool Games</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #1a1a2e; min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow: hidden; }
        .header { display: flex; gap: 20px; padding: 15px; }
        .score-box { background: rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 15px; color: white; font-weight: bold; }
        #gameCanvas { border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .back-btn { position: fixed; top: 20px; left: 20px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 10px 20px; border-radius: 25px; text-decoration: none; font-weight: 600; }
    
        /* Mobile Touch Controls */
        .touch-controls {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            padding: 10px;
            z-index: 1000;
        }
        @media (pointer: coarse) {
            .touch-controls { display: flex !important; }
            body { padding-bottom: 120px !important; }
        }
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 5px;
            margin: 0 auto;
        }
        .dpad-btn {
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.4);
            border-radius: 10px;
            color: white;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .dpad-btn:active {
            background: rgba(255,255,255,0.4);
        }
        .dpad-center { background: rgba(0,0,0,0.2); }
        @media (max-width: 500px) {
            .dpad { grid-template-columns: repeat(3, 50px); grid-template-rows: repeat(3, 50px); }
            .dpad-btn { font-size: 20px; }
        }
    
    
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }
        .game-header {
            font-size: 20px;
            font-weight: 700;
            color: #00ff88;
            text-shadow: 0 0 15px rgba(0,255,136,0.5);
            margin-bottom: 10px;
        }
        .score-display {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
        }
        .score-box {
            background: rgba(0,0,0,0.5);
            border: 2px solid rgba(0,255,136,0.3);
            border-radius: 10px;
            padding: 6px 14px;
            text-align: center;
        }
        .score-label { font-size: 10px; color: rgba(255,255,255,0.6); text-transform: uppercase; }
        .score-val { font-size: 18px; font-weight: 700; color: #00ff88; }
        .game-wrapper { position: relative; }
        #gameCanvas {
            border-radius: 12px;
            border: 3px solid #00ff88;
            box-shadow: 0 0 30px rgba(0,255,136,0.3);
        }
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
        }
        .overlay.hidden { display: none; }
        .overlay h2 {
            font-size: 28px;
            color: #00ff88;
            text-shadow: 0 0 20px rgba(0,255,136,0.6);
            margin-bottom: 8px;
        }
        .overlay p { color: rgba(255,255,255,0.7); margin-bottom: 15px; }
        .btn-epic {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            color: #0f0f1a;
            border: none;
            padding: 12px 35px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(0,255,136,0.4);
        }
        .btn-epic:hover { transform: scale(1.05); }
        .touch-controls {
            display: none;
            position: fixed;
            bottom: 10px;
            left: 0;
            right: 0;
            z-index: 100;
            justify-content: center;
            gap: 8px;
        }
        @media (pointer: coarse) {
            .touch-controls { display: flex; }
            body { padding-bottom: 100px; }
        }
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 50px);
            grid-template-rows: repeat(2, 50px);
            gap: 4px;
        }
        .dpad-btn {
            background: rgba(0,255,136,0.2);
            border: 2px solid rgba(0,255,136,0.5);
            border-radius: 10px;
            color: #00ff88;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .dpad-btn:active { background: rgba(0,255,136,0.5); }

    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← Back</a>
    <div class="header">
        <div class="score-box">🏃 Score: <span id="score">0</span></div>
        <div class="score-box">💰 Coins: <span id="coins">0</span></div>
    </div>
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const coinsEl = document.getElementById('coins');
        
        let player = { x: 80, y: 450, vy: 0, size: 35, onGround: true, lane: 1 };
        let lanes = [130, 200, 270];
        let obstacles = [];
        let coinItems = [];
        let score = 0;
        let coins = 0;
        let gameOver = false;
        let gameStarted = false;
        let speed = 5;
        let groundY = 500;
        
        function createObstacle() {
            let type = Math.random();
            let lane = Math.floor(Math.random() * 3);
            
            if (type < 0.4) {
                // Low obstacle (jump over)
                obstacles.push({ type: 'low', lane: lane, y: groundY, width: 40, height: 40 });
            } else if (type < 0.7) {
                // High obstacle (duck under)
                obstacles.push({ type: 'high', lane: lane, y: groundY - 80, width: 60, height: 40 });
            } else {
                // Coin
                coinItems.push({ lane: lane, y: -50, collected: false });
            }
        }
        
        document.addEventListener('keydown', e => {
            if (!gameStarted) { gameStarted = true; return; }
            if (gameOver) return;
            
            if (e.key === 'ArrowLeft' || e.key === 'a') {
                player.lane = Math.max(0, player.lane - 1);
            }
            if (e.key === 'ArrowRight' || e.key === 'd') {
                player.lane = Math.min(2, player.lane + 1);
            }
            if ((e.key === 'ArrowUp' || e.key === 'w' || e.key === ' ') && player.onGround) {
                player.vy = -15;
                player.onGround = false;
            }
            if (e.key === 'ArrowDown' || e.key === 's') {
                // Duck - move down
                if (player.onGround) {
                    player.size = 20;
                }
            }
        });
        
        document.addEventListener('keyup', e => {
            if (e.key === 'ArrowDown' || e.key === 's') {
                player.size = 35;
            }
        });
        
        canvas.addEventListener('click', () => {
            if (!gameStarted) { gameStarted = true; return; }
            if (gameOver) {
                gameOver = false;
                player = { x: 80, y: 450, vy: 0, size: 35, onGround: true, lane: 1 };
                obstacles = [];
                coinItems = [];
                score = 0;
                coins = 0;
                speed = 5;
                return;
            }
            if (player.onGround) {
                player.vy = -15;
                player.onGround = false;
            }
        });
        
        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            if (!gameStarted) { gameStarted = true; return; }
            if (gameOver) {
                gameOver = false;
                player = { x: 80, y: 450, vy: 0, size: 35, onGround: true, lane: 1 };
                obstacles = [];
                coinItems = [];
                score = 0;
                coins = 0;
                speed = 5;
                return;
            }
            let touch = e.touches[0];
            if (touch.clientX < 200) {
                player.lane = Math.max(0, player.lane - 1);
            } else {
                player.lane = Math.min(2, player.lane + 1);
            }
            if (player.onGround) {
                player.vy = -15;
                player.onGround = false;
            }
        });
        
        function draw() {
            // Background - temple theme
            let gradient = ctx.createLinearGradient(0, 0, 0, 600);
            gradient.addColorStop(0, '#2c1810');
            gradient.addColorStop(1, '#4a2c20');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 400, 600);
            
            // Columns
            ctx.fillStyle = '#654321';
            for (let i = 0; i < 5; i++) {
                ctx.fillRect(20 + i * 90, 100, 30, 400);
                ctx.fillStyle = '#8B4513';
                ctx.fillRect(15 + i * 90, 90, 40, 20);
                ctx.fillStyle = '#654321';
            }
            
            // Ground
            ctx.fillStyle = '#3d2817';
            ctx.fillRect(0, groundY + 30, 400, 70);
            ctx.strokeStyle = '#ffd700';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(0, groundY + 30);
            ctx.lineTo(400, groundY + 30);
            ctx.stroke();
            
            // Lanes
            ctx.strokeStyle = 'rgba(255,215,0,0.2)';
            ctx.lineWidth = 2;
            for (let i = 0; i < 3; i++) {
                ctx.beginPath();
                ctx.moveTo(lanes[i] - 30, groundY + 30);
                ctx.lineTo(lanes[i] - 30, 0);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(lanes[i] + 30, groundY + 30);
                ctx.lineTo(lanes[i] + 30, 0);
                ctx.stroke();
            }
            
            // Obstacles
            obstacles.forEach(o => {
                let x = lanes[o.lane];
                ctx.fillStyle = '#8B0000';
                if (o.type === 'low') {
                    // Spike
                    ctx.beginPath();
                    ctx.moveTo(x - 15, o.y + 40);
                    ctx.lineTo(x, o.y);
                    ctx.lineTo(x + 15, o.y + 40);
                    ctx.fill();
                    ctx.shadowColor = '#8B0000';
                    ctx.shadowBlur = 10;
                    ctx.fill();
                } else {
                    // Overhead barrier
                    ctx.fillRect(x - 30, o.y, 60, 15);
                    ctx.fillRect(x - 30, o.y + 15, 10, 25);
                    ctx.fillRect(x + 20, o.y + 15, 10, 25);
                    ctx.shadowColor = '#8B0000';
                    ctx.shadowBlur = 10;
                    ctx.fill();
                }
                ctx.shadowBlur = 0;
            });
            
            // Coins
            coinItems.forEach(c => {
                if (!c.collected) {
                    let x = lanes[c.lane];
                    ctx.fillStyle = '#ffd700';
                    ctx.beginPath();
                    ctx.arc(x, c.y + 20, 15, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowColor = '#ffd700';
                    ctx.shadowBlur = 15;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#b8860b';
                    ctx.font = 'bold 16px Poppins';
                    ctx.textAlign = 'center';
                    ctx.fillText('$', x, c.y + 25);
                }
            });
            
            // Player
            let playerX = lanes[player.lane];
            ctx.save();
            ctx.translate(playerX, player.y);
            
            // Body
            ctx.fillStyle = '#daa520';
            ctx.beginPath();
            ctx.ellipse(0, 0, player.size * 0.6, player.size * 0.8, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Hat
            ctx.fillStyle = '#8B4513';
            ctx.beginPath();
            ctx.ellipse(0, -player.size * 0.5, player.size * 0.5, player.size * 0.25, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Torch (if high speed)
            if (speed > 7) {
                ctx.fillStyle = '#ff6600';
                ctx.beginPath();
                ctx.arc(player.size * 0.5, -10, 8, 0, Math.PI * 2);
                ctx.fill();
            }
            
            ctx.restore();
            
            // Speed lines
            if (speed > 6) {
                ctx.strokeStyle = `rgba(255,255,255,${(speed - 6) / 10})`;
                ctx.lineWidth = 2;
                for (let i = 0; i < 5; i++) {
                    ctx.beginPath();
                    ctx.moveTo(50 + i * 80, Math.random() * 400 + 50);
                    ctx.lineTo(50 + i * 80 - speed * 3, Math.random() * 400 + 50);
                    ctx.stroke();
                }
            }
            
            // Start/Game Over
            if (!gameStarted) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, 400, 600);
                ctx.fillStyle = '#ffd700';
                ctx.font = 'bold 28px Poppins';
                ctx.textAlign = 'center';
                ctx.fillText('🏛️ TOMB RUNNER 🏛️', 200, 230);
                ctx.fillStyle = 'white';
                ctx.font = '16px Poppins';
                ctx.fillText('← → Arrow Keys or TAP to change lanes', 200, 280);
                ctx.fillText('SPACE / TAP to jump', 200, 310);
            }
            
            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.8)';
                ctx.fillRect(0, 0, 400, 600);
                ctx.fillStyle = '#e74c3c';
                ctx.font = 'bold 36px Poppins';
                ctx.textAlign = 'center';
                ctx.fillText('💀 CAUGHT!', 200, 250);
                ctx.fillStyle = 'white';
                ctx.font = '24px Poppins';
                ctx.fillText('Score: ' + score, 200, 320);
                ctx.fillText('Coins: ' + coins + ' 💰', 200, 360);
                ctx.fillStyle = '#ffd700';
                ctx.font = '18px Poppins';
                ctx.fillText('Click to Restart', 200, 420);
            }
        }
        
        function update() {
            if (!gameStarted || gameOver) return;
            
            // Player physics
            player.vy += 0.8;
            player.y += player.vy;
            
            if (player.y > groundY - player.size) {
                player.y = groundY - player.size;
                player.vy = 0;
                player.onGround = true;
            }
            
            // Move obstacles
            obstacles.forEach(o => {
                o.y += speed;
            });
            
            // Move coins
            coinItems.forEach(c => {
                c.y += speed;
                
                // Collect
                if (!c.collected && c.lane === player.lane && c.y > player.y - 30 && c.y < player.y + 30) {
                    c.collected = true;
                    coins++;
                    coinsEl.textContent = coins;
                }
            });
            
            // Collision
            obstacles.forEach(o => {
                if (o.lane === player.lane && o.y + 40 > player.y - player.size && o.y < player.y + player.size) {
                    if (o.type === 'low' && player.y < groundY - 30) {
                        // Jumped over
                    } else if (o.type === 'high' && player.y < groundY - 60) {
                        // Ducked under
                    } else {
                        gameOver = true;
                    }
                }
            });
            
            // Remove off-screen
            obstacles = obstacles.filter(o => o.y < 650);
            coinItems = coinItems.filter(c => c.y < 650 && !c.collected);
            
            // Score
            score += 0.1;
            scoreEl.textContent = Math.floor(score);
            
            // Speed up
            speed = 5 + Math.floor(score / 10) * 0.5;
            
            // Spawn
            if (Math.random() < 0.03 + score * 0.001) createObstacle();
        }
        
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        gameLoop();
    
        window.tL=false; window.tR=false; window.tU=false; window.tD=false;
        setInterval(() => {
            if(window.tL) keys.left=true; else keys.left=false;
            if(window.tR) keys.right=true; else keys.right=false;
            if(window.tU) keys.up=true; else keys.up=false;
            if(window.tD) keys.down=true; else keys.down=false;
        }, 50);

    
    // EPIC PARTICLES
    let eParticles = [];
    class EParticle {
        constructor(x, y, color, size, vx, vy, life) {
            this.x=x; this.y=y; this.color=color; this.size=size;
            this.vx=vx; this.vy=vy; this.life=life; this.maxLife=life;
        }
        update() {
            this.x+=this.vx; this.y+=this.vy; this.vy+=0.1; this.life--;
        }
        draw() {
            let a = this.life/this.maxLife;
            ctx.globalAlpha=a;
            ctx.fillStyle=this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size*a, 0, Math.PI*2);
            ctx.fill();
            ctx.globalAlpha=1;
        }
    }
    function eSpawn(x, y, color, count) {
        for(let i=0; i<count; i++) {
            eParticles.push(new EParticle(x, y, color, 3+Math.random()*4, (Math.random()-0.5)*8, (Math.random()-0.5)*8-3, 30+Math.random()*20));
        }
    }

    </script>

    <div class="touch-controls" style="display:none;position:fixed;bottom:15px;left:0;right:0;z-index:1000;pointer-events:none;">
      <div style="display:flex;gap:20px;align-items:center;justify-content:center;pointer-events:auto;">
        <button class="dpad-btn" ontouchstart="window.tL=true;window.tR=false;window.tU=false" ontouchend="window.tL=false" onmousedown="window.tL=true" onmouseup="window.tL=false" style="width:70px;height:70px;border-radius:50%;font-size:26px;background:rgba(255,255,255,0.25);border:3px solid rgba(255,255,255,0.5);color:white;">&#9664;</button>
        <button class="dpad-btn" ontouchstart="window.tU=true;window.tL=false;window.tR=false" ontouchend="window.tU=false" onmousedown="window.tU=true" onmouseup="window.tU=false" style="width:70px;height:70px;border-radius:50%;font-size:26px;background:rgba(255,255,255,0.25);border:3px solid rgba(255,255,255,0.5);color:white;">&#9650;</button>
        <button class="dpad-btn" ontouchstart="window.tR=true;window.tL=false;window.tU=false" ontouchend="window.tR=false" onmousedown="window.tR=true" onmouseup="window.tR=false" style="width:70px;height:70px;border-radius:50%;font-size:26px;background:rgba(255,255,255,0.25);border:3px solid rgba(255,255,255,0.5);color:white;">&#9654;</button>
      </div>
    </div>

</body>
