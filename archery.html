<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🏹 Archery</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(180deg, #87CEEB 0%, #98D8C8 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            color: #333;
        }
        h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .score-board { font-size: 1.3rem; margin-bottom: 15px; }
        .score-board span { background: rgba(255,255,255,0.5); padding: 5px 15px; border-radius: 15px; }
        canvas { max-width: 100%; 
            max-width: 100vw; border: 3px solid #8B4513; border-radius: 10px; }
        .instructions { margin-top: 15px; color: #555; font-size: 1rem; }
        .instructions span { background: #8B4513; color: white; padding: 3px 10px; border-radius: 5px; }
        .back-btn {
            position: absolute; top: 20px; left: 20px;
            background: #8B4513; color: white; border: none; padding: 10px 20px;
            border-radius: 8px; cursor: pointer; text-decoration: none;
        }
        .back-btn:hover { background: #6B3E0A; }
    
        /* Mobile Touch Controls */
        .touch-controls {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            padding: 10px;
            z-index: 1000;
        }
        @media (pointer: coarse) {
            .touch-controls { display: flex !important; }
            body { padding-bottom: 120px !important; }
        }
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 5px;
            margin: 0 auto;
        }
        .dpad-btn {
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.4);
            border-radius: 10px;
            color: white;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .dpad-btn:active {
            background: rgba(255,255,255,0.4);
        }
        .dpad-center { background: rgba(0,0,0,0.2); }
        @media (max-width: 500px) {
            .dpad { grid-template-columns: repeat(3, 50px); grid-template-rows: repeat(3, 50px); }
            .dpad-btn { font-size: 20px; }
        }
    
    
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }
        .game-header {
            font-size: 20px;
            font-weight: 700;
            color: #00ff88;
            text-shadow: 0 0 15px rgba(0,255,136,0.5);
            margin-bottom: 10px;
        }
        .score-display {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
        }
        .score-box {
            background: rgba(0,0,0,0.5);
            border: 2px solid rgba(0,255,136,0.3);
            border-radius: 10px;
            padding: 6px 14px;
            text-align: center;
        }
        .score-label { font-size: 10px; color: rgba(255,255,255,0.6); text-transform: uppercase; }
        .score-val { font-size: 18px; font-weight: 700; color: #00ff88; }
        .game-wrapper { position: relative; }
        #gameCanvas {
            border-radius: 12px;
            border: 3px solid #00ff88;
            box-shadow: 0 0 30px rgba(0,255,136,0.3);
        }
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
        }
        .overlay.hidden { display: none; }
        .overlay h2 {
            font-size: 28px;
            color: #00ff88;
            text-shadow: 0 0 20px rgba(0,255,136,0.6);
            margin-bottom: 8px;
        }
        .overlay p { color: rgba(255,255,255,0.7); margin-bottom: 15px; }
        .btn-epic {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            color: #0f0f1a;
            border: none;
            padding: 12px 35px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(0,255,136,0.4);
        }
        .btn-epic:hover { transform: scale(1.05); }
        .touch-controls {
            display: none;
            position: fixed;
            bottom: 10px;
            left: 0;
            right: 0;
            z-index: 100;
            justify-content: center;
            gap: 8px;
        }
        @media (pointer: coarse) {
            .touch-controls { display: flex; }
            body { padding-bottom: 100px; }
        }
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 50px);
            grid-template-rows: repeat(2, 50px);
            gap: 4px;
        }
        .dpad-btn {
            background: rgba(0,255,136,0.2);
            border: 2px solid rgba(0,255,136,0.5);
            border-radius: 10px;
            color: #00ff88;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .dpad-btn:active { background: rgba(0,255,136,0.5); }

    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← Back to Games</a>
    <h1>🏹 ARCHERY</h1>
    <div class="score-board">
        <span>Score: <strong id="score">0</strong></span>
        <span>Arrows: <strong id="arrows">10</strong></span>
    </div>
    <canvas id="gameCanvas" width="500" height="400"></canvas>
    <div class="instructions"><span>DRAG & RELEASE</span> to shoot! Aim for the center!</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let arrow = { x: 80, y: 200, vx: 0, vy: 0, shot: false, landed: false };
        let arrowsLeft = 10;
        let score = 0;
        let gameLoop;
        let dragging = false;
        let dragStart = { x: 0, y: 0 };
        const targetX = 420;
        const targetY = 200;
        
        function init() {
            arrow = { x: 80, y: 200, vx: 0, vy: 0, shot: false, landed: false };
            arrowsLeft = 10;
            score = 0;
            
            document.getElementById('score').textContent = '0';
            document.getElementById('arrows').textContent = '10';
        }
        
        function drawTarget() {
            // Target stand
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(targetX - 10, targetY + 50, 20, 150);
            
            // Target
            const colors = ['#fff', '#e74c3c', '#e74c3c', '#f1c40f', '#f1c40f', '#27ae60', '#27ae60', '#333'];
            const sizes = [50, 44, 38, 32, 26, 20, 14, 8];
            
            colors.forEach((color, i) => {
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.arc(targetX, targetY, sizes[i], 0, Math.PI * 2);
                ctx.fill();
            });
        }
        
        function drawBow() {
            ctx.strokeStyle = '#8B4513';
            ctx.lineWidth = 6;
            ctx.beginPath();
            ctx.arc(arrow.x, arrow.y, 30, -Math.PI * 0.4, Math.PI * 0.4);
            ctx.stroke();
            
            // String
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(arrow.x + Math.cos(-Math.PI * 0.4) * 30, arrow.y + Math.sin(-Math.PI * 0.4) * 30);
            ctx.lineTo(arrow.x, arrow.y);
            ctx.lineTo(arrow.x + Math.cos(Math.PI * 0.4) * 30, arrow.y + Math.sin(Math.PI * 0.4) * 30);
            ctx.stroke();
        }
        
        function drawArrow() {
            if (arrow.landed) {
                // Draw embedded arrow
                ctx.save();
                ctx.translate(arrow.x, arrow.y);
                ctx.rotate(arrow.angle);
                
                ctx.fillStyle = '#8B4513';
                ctx.fillRect(-30, -2, 30, 4);
                
                ctx.fillStyle = '#888';
                ctx.beginPath();
                ctx.moveTo(5, -5);
                ctx.lineTo(15, 0);
                ctx.lineTo(5, 5);
                ctx.closePath();
                ctx.fill();
                
                ctx.restore();
            } else {
                // Draw bow and ready arrow
                drawBow();
                
                ctx.fillStyle = '#8B4513';
                ctx.save();
                ctx.translate(arrow.x, arrow.y);
                if (dragging) {
                    const angle = Math.atan2(dragStart.y - arrow.y, dragStart.x - arrow.x);
                    ctx.rotate(angle);
                }
                ctx.fillRect(-5, -2, 40, 4);
                ctx.fillStyle = '#888';
                ctx.beginPath();
                ctx.moveTo(30, -5);
                ctx.lineTo(40, 0);
                ctx.lineTo(30, 5);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
                
                // Trajectory
                if (dragging) {
                    ctx.strokeStyle = 'rgba(0,0,0,0.2)';
                    ctx.setLineDash([5, 5]);
                    ctx.beginPath();
                    let tx = arrow.x;
                    let ty = arrow.y;
                    let tvx = (dragStart.x - arrow.x) * 0.2;
                    let tvy = (dragStart.y - arrow.y) * 0.2;
                    ctx.moveTo(tx, ty);
                    for (let i = 0; i < 20; i++) {
                        tx += tvx;
                        ty += tvy;
                        tvy += 0.1;
                        ctx.lineTo(tx, ty);
                    }
                    ctx.stroke();
                    ctx.setLineDash([]);
                }
            }
        }
        
        function draw() {
            // Sky
            ctx.fillStyle = '#87CEEB';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Ground
            ctx.fillStyle = '#27ae60';
            ctx.fillRect(0, 350, canvas.width, 50);
            
            // Grass
            ctx.fillStyle = '#229954';
            for (let i = 0; i < 50; i++) {
                ctx.fillRect(i * 12, 345, 8, 10);
            }
            
            drawTarget();
            drawArrow();
            
            if (arrow.landed) {
                // Show score
                const dist = Math.sqrt((arrow.x - targetX) ** 2 + (arrow.y - targetY) ** 2);
                let points = 0;
                if (dist < 8) points = 10;
                else if (dist < 14) points = 9;
                else if (dist < 20) points = 8;
                else if (dist < 26) points = 7;
                else if (dist < 32) points = 6;
                else if (dist < 38) points = 5;
                else if (dist < 44) points = 4;
                else if (dist < 50) points = 3;
                else points = 1;
                
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 48px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(`+${points}`, targetX, targetY - 70);
            }
        }
        
        function update() {
            if (!arrow.shot || arrow.landed) return;
            
            arrow.x += arrow.vx;
            arrow.y += arrow.vy;
            arrow.vy += 0.15;  // Gravity
            
            // Hit target
            const dist = Math.sqrt((arrow.x - targetX) ** 2 + (arrow.y - targetY) ** 2);
            if (dist < 50 && arrow.x > targetX) {
                arrow.landed = true;
                arrow.angle = Math.atan2(arrow.vy, arrow.vx);
                
                // Score
                let points = 0;
                if (dist < 8) points = 10;
                else if (dist < 14) points = 9;
                else if (dist < 20) points = 8;
                else if (dist < 26) points = 7;
                else if (dist < 32) points = 6;
                else if (dist < 38) points = 5;
                else if (dist < 44) points = 4;
                else if (dist < 50) points = 3;
                else points = 1;
                
                score += points;
                document.getElementById('score').textContent = score;
                
                // Reset after delay
                setTimeout(resetArrow, 1000);
            }
            
            // Off screen or hit ground
            if (arrow.y > 350 || arrow.x > 500) {
                setTimeout(resetArrow, 500);
            }
        }
        
        function resetArrow() {
            if (arrowsLeft <= 0) {
                endGame();
                return;
            }
            arrow = { x: 80, y: 200 + (Math.random() - 0.5) * 100, vx: 0, vy: 0, shot: false, landed: false };
        }
        
        function endGame() {
            clearInterval(gameLoop);
            setTimeout(() => {
                alert(`Game Over!\nFinal Score: ${score}\nArrows Left: ${arrowsLeft}\n\nClick OK to play again!`);
                init();
                gameLoop = setInterval(() => {
                    update();
                    draw();
                }, 1000 / 60);
            }, 100);
        }
        
        canvas.addEventListener('mousedown', (e) => {
            if (arrow.shot || arrowsLeft <= 0) return;
            const rect = canvas.getBoundingClientRect();
            dragStart = { x: e.clientX - rect.left, y: e.clientY - rect.top };
            dragging = true;
        });
        
        canvas.addEventListener('mousemove', (e) => {
            if (!dragging) return;
            const rect = canvas.getBoundingClientRect();
            arrow.x = e.clientX - rect.left;
            arrow.y = e.clientY - rect.top;
        });
        
        canvas.addEventListener('mouseup', () => {
            if (!dragging) return;
            dragging = false;
            
            arrow.vx = (dragStart.x - arrow.x) * 0.2;
            arrow.vy = (dragStart.y - arrow.y) * 0.2;
            
            if (Math.abs(arrow.vx) > 1 || Math.abs(arrow.vy) > 1) {
                arrow.shot = true;
                arrowsLeft--;
                document.getElementById('arrows').textContent = arrowsLeft;
            }
        });
        
        init();
        draw();
        gameLoop = setInterval(() => {
            update();
            draw();
        }, 1000 / 60);
    
    // EPIC PARTICLES
    let eParticles = [];
    class EParticle {
        constructor(x, y, color, size, vx, vy, life) {
            this.x=x; this.y=y; this.color=color; this.size=size;
            this.vx=vx; this.vy=vy; this.life=life; this.maxLife=life;
        }
        update() {
            this.x+=this.vx; this.y+=this.vy; this.vy+=0.1; this.life--;
        }
        draw() {
            let a = this.life/this.maxLife;
            ctx.globalAlpha=a;
            ctx.fillStyle=this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size*a, 0, Math.PI*2);
            ctx.fill();
            ctx.globalAlpha=1;
        }
    }
    function eSpawn(x, y, color, count) {
        for(let i=0; i<count; i++) {
            eParticles.push(new EParticle(x, y, color, 3+Math.random()*4, (Math.random()-0.5)*8, (Math.random()-0.5)*8-3, 30+Math.random()*20));
        }
    }

    
    window.tL=false; window.tR=false; window.tU=false; window.tD=false;
    ['btnL','btnR','btnU','btnD'].forEach(id => {
        let btn = document.getElementById(id);
        if(!btn) return;
        let key = {btnL:'tL',btnR:'tR',btnU:'tU',btnD:'tD'}[id];
        btn.addEventListener('touchstart', e => { e.preventDefault(); window[key]=true; });
        btn.addEventListener('touchend', e => { e.preventDefault(); window[key]=false; });
        btn.addEventListener('mousedown', () => window[key]=true);
        btn.addEventListener('mouseup', () => window[key]=false);
    });
    setInterval(() => {
        if(window.tL) keys.left=true; else keys.left=false;
        if(window.tR) keys.right=true; else keys.right=false;
        if(window.tU) keys.up=true; else keys.up=false;
        if(window.tD) keys.down=true; else keys.down=false;
    }, 50);

    </script>
</body>
</html>
