<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>👻 Pac-Man</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }
        h1 { font-size: 2.5rem; margin-bottom: 10px; color: #f1c40f; }
        .score-board { font-size: 1.3rem; margin-bottom: 15px; }
        .score-board span { background: rgba(241,196,15,0.2); padding: 5px 15px; border-radius: 15px; }
        canvas { max-width: 100%; 
            max-width: 100vw; border: 3px solid #f1c40f; border-radius: 10px; }
        .instructions { margin-top: 15px; color: #888; font-size: 1rem; }
        .instructions span { background: #f1c40f; padding: 3px 10px; border-radius: 5px; }
        .back-btn {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255,255,255,0.1); color: white;
            border: 2px solid rgba(255,255,255,0.3); padding: 10px 20px;
            border-radius: 8px; cursor: pointer; text-decoration: none;
        }
        .back-btn:hover { background: rgba(255,255,255,0.2); }
    
        /* Mobile Touch Controls */
        .touch-controls {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            padding: 10px;
            z-index: 1000;
        }
        @media (pointer: coarse) {
            .touch-controls { display: flex !important; }
            body { padding-bottom: 120px !important; }
        }
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 5px;
            margin: 0 auto;
        }
        .dpad-btn {
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.4);
            border-radius: 10px;
            color: white;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .dpad-btn:active {
            background: rgba(255,255,255,0.4);
        }
        .dpad-center { background: rgba(0,0,0,0.2); }
        @media (max-width: 500px) {
            .dpad { grid-template-columns: repeat(3, 50px); grid-template-rows: repeat(3, 50px); }
            .dpad-btn { font-size: 20px; }
        }
    
    
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }
        .game-header {
            font-size: 20px;
            font-weight: 700;
            color: #00ff88;
            text-shadow: 0 0 15px rgba(0,255,136,0.5);
            margin-bottom: 10px;
        }
        .score-display {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
        }
        .score-box {
            background: rgba(0,0,0,0.5);
            border: 2px solid rgba(0,255,136,0.3);
            border-radius: 10px;
            padding: 6px 14px;
            text-align: center;
        }
        .score-label { font-size: 10px; color: rgba(255,255,255,0.6); text-transform: uppercase; }
        .score-val { font-size: 18px; font-weight: 700; color: #00ff88; }
        .game-wrapper { position: relative; }
        #gameCanvas {
            border-radius: 12px;
            border: 3px solid #00ff88;
            box-shadow: 0 0 30px rgba(0,255,136,0.3);
        }
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
        }
        .overlay.hidden { display: none; }
        .overlay h2 {
            font-size: 28px;
            color: #00ff88;
            text-shadow: 0 0 20px rgba(0,255,136,0.6);
            margin-bottom: 8px;
        }
        .overlay p { color: rgba(255,255,255,0.7); margin-bottom: 15px; }
        .btn-epic {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            color: #0f0f1a;
            border: none;
            padding: 12px 35px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(0,255,136,0.4);
        }
        .btn-epic:hover { transform: scale(1.05); }
        .touch-controls {
            display: none;
            position: fixed;
            bottom: 10px;
            left: 0;
            right: 0;
            z-index: 100;
            justify-content: center;
            gap: 8px;
        }
        @media (pointer: coarse) {
            .touch-controls { display: flex; }
            body { padding-bottom: 100px; }
        }
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 50px);
            grid-template-rows: repeat(2, 50px);
            gap: 4px;
        }
        .dpad-btn {
            background: rgba(0,255,136,0.2);
            border: 2px solid rgba(0,255,136,0.5);
            border-radius: 10px;
            color: #00ff88;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .dpad-btn:active { background: rgba(0,255,136,0.5); }

    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← Back to Games</a>
    <h1>👻 PAC-MAN</h1>
    <div class="score-board">
        <span>Score: <strong id="score">0</strong></span>
        <span>Dots: <strong id="dots">0</strong></span>
    </div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="instructions"><span>↑ ↓ ← →</span> to move!</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let pacman = { x: 200, y: 300, dir: 0, nextDir: 0 };
        let dots = [];
        let ghosts = [];
        let score = 0;
        let gameLoop;
        let moveTimer = 0;
        
        const SIZE = 20;
        const SPEED = 1;
        
        const MAP = [
            '####################',
            '#........#........#',
            '#.####..#..#..####.#',
            '#.#............#..#',
            '#.#..#.####.#.#....#',
            '#....#......#..#.##',
            '#.####.####.#.....#',
            '#......#....#.....#',
            '#.####.#....#.####.#',
            '#..................',
            '####################'
        ];
        
        function init() {
            pacman = { x: 200, y: 300, dir: 0, nextDir: 0 };
            dots = [];
            ghosts = [];
            score = 0;
            
            // Parse map for dots
            for (let r = 0; r < MAP.length; r++) {
                for (let c = 0; c < MAP[r].length; c++) {
                    if (MAP[r][c] === '.') {
                        dots.push({ x: c * SIZE + SIZE/2, y: r * SIZE + SIZE/2 });
                    }
                }
            }
            
            // Create ghosts
            ghosts = [
                { x: 200, y: 180, color: '#e74c3c', dir: 0, moveTimer: 0 },
                { x: 180, y: 180, color: '#9b59b6', dir: 0, moveTimer: 0 },
                { x: 220, y: 180, color: '#3498db', dir: 0, moveTimer: 0 }
            ];
            
            document.getElementById('score').textContent = '0';
            document.getElementById('dots').textContent = dots.length;
        }
        
        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw map
            ctx.fillStyle = '#3498db';
            for (let r = 0; r < MAP.length; r++) {
                for (let c = 0; c < MAP[r].length; c++) {
                    if (MAP[r][c] === '#') {
                        ctx.fillRect(c * SIZE, r * SIZE, SIZE, SIZE);
                    }
                }
            }
            
            // Draw dots
            dots.forEach(dot => {
                ctx.fillStyle = '#f1c40f';
                ctx.beginPath();
                ctx.arc(dot.x, dot.y, 3, 0, Math.PI * 2);
                ctx.fill();
            });
            
            // Draw Pac-Man
            ctx.fillStyle = '#f1c40f';
            ctx.beginPath();
            const mouthAngle = 0.3;
            ctx.arc(pacman.x, pacman.y, 10, pacman.dir + mouthAngle, pacman.dir + Math.PI * 2 - mouthAngle);
            ctx.lineTo(pacman.x, pacman.y);
            ctx.closePath();
            ctx.fill();
            
            // Draw ghosts
            ghosts.forEach(ghost => {
                ctx.fillStyle = ghost.color;
                ctx.beginPath();
                ctx.arc(ghost.x, ghost.y, 10, Math.PI, 0);
                ctx.lineTo(ghost.x + 10, ghost.y + 10);
                for (let i = 0; i < 3; i++) {
                    ctx.lineTo(ghost.x + 7 - i * 7, ghost.y + 10 + (i % 2 === 0 ? 5 : 0));
                }
                ctx.lineTo(ghost.x - 10, ghost.y + 10);
                ctx.closePath();
                ctx.fill();
                
                // Eyes
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(ghost.x - 4, ghost.y - 2, 3, 0, Math.PI * 2);
                ctx.arc(ghost.x + 4, ghost.y - 2, 3, 0, Math.PI * 2);
                ctx.fill();
            });
        }
        
        function canMove(x, y) {
            const col = Math.floor(x / SIZE);
            const row = Math.floor(y / SIZE);
            if (row < 0 || row >= MAP.length || col < 0 || col >= MAP[0].length) return false;
            return MAP[row][col] !== '#';
        }
        
        function update() {
            moveTimer++;
            if (moveTimer < 5) return;
            moveTimer = 0;
            
            // Move Pac-Man
            const dirs = [
                { dx: 0, dy: -1 },  // up
                { dx: 0, dy: 1 },   // down
                { dx: -1, dy: 0 },  // left
                { dx: 1, dy: 0 }    // right
            ];
            
            // Try next direction first
            if (pacman.nextDir !== pacman.dir) {
                const next = dirs[pacman.nextDir];
                if (canMove(pacman.x + next.dx * SIZE, pacman.y + next.dy * SIZE)) {
                    pacman.dir = pacman.nextDir;
                }
            }
            
            const dir = dirs[pacman.dir];
            if (canMove(pacman.x + dir.dx * SIZE, pacman.y + dir.dy * SIZE)) {
                pacman.x += dir.dx * SPEED;
                pacman.y += dir.dy * SPEED;
            }
            
            // Eat dots
            dots = dots.filter(dot => {
                const dist = Math.sqrt((pacman.x - dot.x) ** 2 + (pacman.y - dot.y) ** 2);
                if (dist < 12) {
                    score += 10;
                    document.getElementById('score').textContent = score;
                    document.getElementById('dots').textContent = dots.length;
                    return false;
                }
                return true;
            });
            
            if (dots.length === 0) {
                endGame(true);
            }
            
            // Move ghosts
            ghosts.forEach(ghost => {
                ghost.moveTimer++;
                if (ghost.moveTimer < 8) return;
                ghost.moveTimer = 0;
                
                // Simple AI - move toward Pac-Man
                let bestDir = 0;
                let bestDist = Infinity;
                
                for (let i = 0; i < 4; i++) {
                    const d = dirs[i];
                    const nx = ghost.x + d.dx * SIZE;
                    const ny = ghost.y + d.dy * SIZE;
                    
                    if (canMove(nx, ny)) {
                        const dist = Math.sqrt((nx - pacman.x) ** 2 + (ny - pacman.y) ** 2);
                        if (dist < bestDist) {
                            bestDist = dist;
                            bestDir = i;
                        }
                    }
                }
                
                ghost.dir = bestDir;
                const gd = dirs[ghost.dir];
                ghost.x += gd.dx * SPEED;
                ghost.y += gd.dy * SPEED;
                
                // Collision with Pac-Man
                const ghostDist = Math.sqrt((ghost.x - pacman.x) ** 2 + (ghost.y - pacman.y) ** 2);
                if (ghostDist < 15) {
                    endGame(false);
                }
            });
        }
        
        function endGame(won) {
            clearInterval(gameLoop);
            setTimeout(() => {
                if (won) {
                    alert(`🏆 YOU WIN! 🏆\nFinal Score: ${score}\n\nClick OK to play again!`);
                } else {
                    alert(`Game Over! 💀\nScore: ${score}\n\nClick OK to play again!`);
                }
                init();
                gameLoop = setInterval(() => {
                    update();
                    draw();
                }, 1000 / 60);
            }, 100);
        }
        
        document.addEventListener('keydown', e => {
            if (e.code === 'ArrowUp') pacman.nextDir = 0;
            if (e.code === 'ArrowDown') pacman.nextDir = 1;
            if (e.code === 'ArrowLeft') pacman.nextDir = 2;
            if (e.code === 'ArrowRight') pacman.nextDir = 3;
        });
        
        init();
        draw();
        gameLoop = setInterval(() => {
            update();
            draw();
        }, 1000 / 60);
    
        window.tL=false; window.tR=false; window.tU=false; window.tD=false;
        setInterval(() => {
            if(window.tL) keys.left=true; else keys.left=false;
            if(window.tR) keys.right=true; else keys.right=false;
            if(window.tU) keys.up=true; else keys.up=false;
            if(window.tD) keys.down=true; else keys.down=false;
        }, 50);

    
    // EPIC PARTICLES
    let eParticles = [];
    class EParticle {
        constructor(x, y, color, size, vx, vy, life) {
            this.x=x; this.y=y; this.color=color; this.size=size;
            this.vx=vx; this.vy=vy; this.life=life; this.maxLife=life;
        }
        update() {
            this.x+=this.vx; this.y+=this.vy; this.vy+=0.1; this.life--;
        }
        draw() {
            let a = this.life/this.maxLife;
            ctx.globalAlpha=a;
            ctx.fillStyle=this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size*a, 0, Math.PI*2);
            ctx.fill();
            ctx.globalAlpha=1;
        }
    }
    function eSpawn(x, y, color, count) {
        for(let i=0; i<count; i++) {
            eParticles.push(new EParticle(x, y, color, 3+Math.random()*4, (Math.random()-0.5)*8, (Math.random()-0.5)*8-3, 30+Math.random()*20));
        }
    }

    </script>

    <div class="touch-controls" style="display:none;position:fixed;bottom:15px;left:0;right:0;z-index:1000;pointer-events:none;">
      <div style="display:flex;gap:20px;align-items:center;justify-content:center;pointer-events:auto;">
        <button class="dpad-btn" ontouchstart="window.tL=true;window.tR=false;window.tU=false" ontouchend="window.tL=false" onmousedown="window.tL=true" onmouseup="window.tL=false" style="width:70px;height:70px;border-radius:50%;font-size:26px;background:rgba(255,255,255,0.25);border:3px solid rgba(255,255,255,0.5);color:white;">&#9664;</button>
        <button class="dpad-btn" ontouchstart="window.tU=true;window.tL=false;window.tR=false" ontouchend="window.tU=false" onmousedown="window.tU=true" onmouseup="window.tU=false" style="width:70px;height:70px;border-radius:50%;font-size:26px;background:rgba(255,255,255,0.25);border:3px solid rgba(255,255,255,0.5);color:white;">&#9650;</button>
        <button class="dpad-btn" ontouchstart="window.tR=true;window.tL=false;window.tU=false" ontouchend="window.tR=false" onmousedown="window.tR=true" onmouseup="window.tR=false" style="width:70px;height:70px;border-radius:50%;font-size:26px;background:rgba(255,255,255,0.25);border:3px solid rgba(255,255,255,0.5);color:white;">&#9654;</button>
      </div>
    </div>

</body>
