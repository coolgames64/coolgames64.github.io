<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💣 Minesweeper Epic - Cool Games 64</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: white;
        }
        .header {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
        }
        .hud-box {
            background: rgba(0,0,0,0.5);
            border: 2px solid rgba(102,126,234,0.5);
            border-radius: 10px;
            padding: 8px 16px;
            text-align: center;
        }
        .hud-box span { color: #667eea; font-weight: 700; font-size: 18px; }
        #gameCanvas {
            border-radius: 10px;
            border: 3px solid #667eea;
            box-shadow: 0 0 30px rgba(102,126,234,0.3);
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 25px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 20px;
            cursor: pointer;
        }
        .overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            border-radius: 15px;
            padding: 25px 40px;
            text-align: center;
        }
        .overlay.hidden { display: none; }
        .overlay h1 { color: #667eea; font-size: 24px; margin-bottom: 10px; }
        .overlay p { color: rgba(255,255,255,0.7); }
    </style>
</head>
<body>
    <div class="header">
        <div class="hud-box">Flags: <span id="flags">0</span>/10 🚩</div>
        <div class="hud-box">Time: <span id="time">0</span>s</div>
    </div>
    <div style="position: relative;">
        <canvas id="gameCanvas"></canvas>
        <div class="overlay" id="startScreen">
            <h1>💣 MINESWEEPER EPIC</h1>
            <p>Tap to reveal • Long press to flag</p>
            <button class="btn" onclick="startGame()">NEW GAME</button>
        </div>
        <div class="overlay hidden" id="winScreen">
            <h1>🎉 YOU WIN!</h1>
            <p id="winTime">Time: 0s</p>
            <button class="btn" onclick="startGame()">PLAY AGAIN</button>
        </div>
        <div class="overlay hidden" id="loseScreen">
            <h1>💥 BOOM!</h1>
            <p>You hit a mine!</p>
            <button class="btn" onclick="startGame()">TRY AGAIN</button>
        </div>
    </div>
    <div class="controls">
        <button class="btn" onclick="startGame()">Reset</button>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const COLS = 10;
const ROWS = 10;
const MINES = 15;
const CELL_SIZE = 36;

canvas.width = COLS * CELL_SIZE;
canvas.height = ROWS * CELL_SIZE;

function resize() {
    const w = Math.min(window.innerWidth - 20, canvas.width);
    const scale = w / canvas.width;
    canvas.style.width = w + 'px';
    canvas.style.height = (canvas.height * scale) + 'px';
}
resize();
window.addEventListener('resize', resize);

let board, revealed, flagged, gameState, timer, startTime;
let touchTimer, touchStartX, touchStartY;

const COLORS = ['', '#667eea', '#00cc6a', '#ff4444', '#8000ff', '#ff9500', '#00ffff', '#333', '#667'];

function init() {
    board = [];
    revealed = [];
    flagged = [];
    
    for (let r = 0; r < ROWS; r++) {
        board[r] = [];
        revealed[r] = [];
        flagged[r] = [];
        for (let c = 0; c < COLS; c++) {
            board[r][c] = 0;
            revealed[r][c] = false;
            flagged[r][c] = false;
        }
    }
    
    // Place mines
    let minesPlaced = 0;
    while (minesPlaced < MINES) {
        let r = Math.floor(Math.random() * ROWS);
        let c = Math.floor(Math.random() * COLS);
        if (board[r][c] !== -1) {
            board[r][c] = -1;
            minesPlaced++;
        }
    }
    
    // Calculate numbers
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            if (board[r][c] === -1) continue;
            let count = 0;
            for (let dr = -1; dr <= 1; dr++) {
                for (let dc = -1; dc <= 1; dc++) {
                    let nr = r + dr, nc = c + dc;
                    if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && board[nr][nc] === -1) {
                        count++;
                    }
                }
            }
            board[r][c] = count;
        }
    }
    
    gameState = 'playing';
    startTime = Date.now();
    timer = 0;
    
    if (window.gameTimer) clearInterval(window.gameTimer);
    window.gameTimer = setInterval(() => {
        if (gameState === 'playing') {
            timer = Math.floor((Date.now() - startTime) / 1000);
            document.getElementById('time').textContent = timer;
        }
    }, 1000);
}

function reveal(r, c) {
    if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return;
    if (revealed[r][c] || flagged[r][c]) return;
    
    revealed[r][c] = true;
    
    if (board[r][c] === -1) {
        gameState = 'over';
        document.getElementById('loseScreen').classList.remove('hidden');
        clearInterval(window.gameTimer);
        return;
    }
    
    if (board[r][c] === 0) {
        for (let dr = -1; dr <= 1; dr++) {
            for (let dc = -1; dc <= 1; dc++) {
                reveal(r + dr, c + dc);
            }
        }
    }
    
    checkWin();
}

function toggleFlag(r, c) {
    if (revealed[r][c]) return;
    flagged[r][c] = !flagged[r][c];
    
    let flagCount = flagged.flat().filter(f => f).length;
    document.getElementById('flags').textContent = flagCount;
}

function checkWin() {
    let unrevealed = 0;
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            if (!revealed[r][c]) unrevealed++;
        }
    }
    if (unrevealed === MINES) {
        gameState = 'win';
        document.getElementById('winTime').textContent = 'Time: ' + timer + 's';
        document.getElementById('winScreen').classList.remove('hidden');
        clearInterval(window.gameTimer);
    }
}

function draw() {
    // Background
    ctx.fillStyle = '#0a0a15';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            let x = c * CELL_SIZE;
            let y = r * CELL_SIZE;
            
            if (revealed[r][c]) {
                // Revealed cell
                ctx.fillStyle = '#1a1a2e';
                ctx.fillRect(x + 1, y + 1, CELL_SIZE - 2, CELL_SIZE - 2);
                
                if (board[r][c] === -1) {
                    // Mine
                    ctx.fillStyle = '#ff4444';
                    ctx.shadowColor = '#ff4444';
                    ctx.shadowBlur = 10;
                    ctx.beginPath();
                    ctx.arc(x + CELL_SIZE/2, y + CELL_SIZE/2, 10, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                } else if (board[r][c] > 0) {
                    ctx.fillStyle = COLORS[board[r][c]];
                    ctx.font = 'bold 18px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(board[r][c], x + CELL_SIZE/2, y + CELL_SIZE/2 + 1);
                }
            } else {
                // Hidden cell
                ctx.fillStyle = '#2d2d4a';
                ctx.fillRect(x + 1, y + 1, CELL_SIZE - 2, CELL_SIZE - 2);
                ctx.fillStyle = '#3d3d5a';
                ctx.fillRect(x + 2, y + 2, CELL_SIZE - 5, 3);
                ctx.fillRect(x + 2, y + 2, 3, CELL_SIZE - 5);
                
                if (flagged[r][c]) {
                    ctx.font = '20px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('🚩', x + CELL_SIZE/2, y + CELL_SIZE/2 + 1);
                }
            }
        }
    }
}

function getCell(clientX, clientY) {
    let rect = canvas.getBoundingClientRect();
    let scaleX = canvas.width / rect.width;
    let scaleY = canvas.height / rect.height;
    let x = (clientX - rect.left) * scaleX;
    let y = (clientY - rect.top) * scaleY;
    return {
        r: Math.floor(y / CELL_SIZE),
        c: Math.floor(x / CELL_SIZE)
    };
}

canvas.addEventListener('click', e => {
    if (gameState !== 'playing') return;
    let { r, c } = getCell(e.clientX, e.clientY);
    if (r >= 0 && r < ROWS && c >= 0 && c < COLS) {
        reveal(r, c);
    }
});

canvas.addEventListener('contextmenu', e => {
    e.preventDefault();
    if (gameState !== 'playing') return;
    let { r, c } = getCell(e.clientX, e.clientY);
    if (r >= 0 && r < ROWS && c >= 0 && c < COLS) {
        toggleFlag(r, c);
    }
});

// Touch support
let touchStartTime, touchStartCell;

canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    if (gameState !== 'playing') return;
    let touch = e.touches[0];
    touchStartTime = Date.now();
    touchStartCell = getCell(touch.clientX, touch.clientY);
});

canvas.addEventListener('touchend', e => {
    e.preventDefault();
    if (gameState !== 'playing') return;
    let touch = e.changedTouches[0];
    let { r, c } = getCell(touch.clientX, touch.clientY);
    let duration = Date.now() - touchStartTime;
    
    if (duration > 500 && touchStartCell.r === r && touchStartCell.c === c) {
        // Long press = flag
        toggleFlag(r, c);
    } else if (touchStartCell.r === r && touchStartCell.c === c) {
        // Short tap = reveal
        reveal(r, c);
    }
});

function startGame() {
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('winScreen').classList.add('hidden');
    document.getElementById('loseScreen').classList.add('hidden');
    init();
    setInterval(() => { draw(); }, 100);
}

init();
draw();
</script>
</body>
</html>
