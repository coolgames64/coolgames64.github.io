<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚔️ Sword Fight</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }
        .back-btn {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255,255,255,0.1); color: white;
            border: 2px solid rgba(255,255,255,0.3); padding: 10px 20px;
            border-radius: 8px; cursor: pointer; text-decoration: none;
        }
        .back-btn:hover { background: rgba(255,255,255,0.2); }
        h1 { font-size: 2.5rem; margin-bottom: 10px; color: #e74c3c; }
        .score-board { font-size: 1.3rem; margin-bottom: 15px; }
        .score-board span { background: rgba(231,76,60,0.2); padding: 5px 15px; border-radius: 15px; margin: 0 10px; }
        canvas { max-width: 100%; 
            max-width: 100vw; border: 3px solid #e74c3c; border-radius: 10px; background: #87CEEB; }
        .instructions { margin-top: 15px; color: #888; font-size: 1rem; }
        .instructions span { background: #e74c3c; padding: 3px 10px; border-radius: 5px; }
    
        /* Mobile Touch Controls */
        .touch-controls {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            padding: 10px;
            z-index: 1000;
        }
        @media (pointer: coarse) {
            .touch-controls { display: flex !important; }
            body { padding-bottom: 120px !important; }
        }
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 5px;
            margin: 0 auto;
        }
        .dpad-btn {
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.4);
            border-radius: 10px;
            color: white;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .dpad-btn:active {
            background: rgba(255,255,255,0.4);
        }
        .dpad-center { background: rgba(0,0,0,0.2); }
        @media (max-width: 500px) {
            .dpad { grid-template-columns: repeat(3, 50px); grid-template-rows: repeat(3, 50px); }
            .dpad-btn { font-size: 20px; }
        }
    
    
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }
        .game-header {
            font-size: 20px;
            font-weight: 700;
            color: #00ff88;
            text-shadow: 0 0 15px rgba(0,255,136,0.5);
            margin-bottom: 10px;
        }
        .score-display {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
        }
        .score-box {
            background: rgba(0,0,0,0.5);
            border: 2px solid rgba(0,255,136,0.3);
            border-radius: 10px;
            padding: 6px 14px;
            text-align: center;
        }
        .score-label { font-size: 10px; color: rgba(255,255,255,0.6); text-transform: uppercase; }
        .score-val { font-size: 18px; font-weight: 700; color: #00ff88; }
        .game-wrapper { position: relative; }
        #gameCanvas {
            border-radius: 12px;
            border: 3px solid #00ff88;
            box-shadow: 0 0 30px rgba(0,255,136,0.3);
        }
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
        }
        .overlay.hidden { display: none; }
        .overlay h2 {
            font-size: 28px;
            color: #00ff88;
            text-shadow: 0 0 20px rgba(0,255,136,0.6);
            margin-bottom: 8px;
        }
        .overlay p { color: rgba(255,255,255,0.7); margin-bottom: 15px; }
        .btn-epic {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            color: #0f0f1a;
            border: none;
            padding: 12px 35px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(0,255,136,0.4);
        }
        .btn-epic:hover { transform: scale(1.05); }
        .touch-controls {
            display: none;
            position: fixed;
            bottom: 10px;
            left: 0;
            right: 0;
            z-index: 100;
            justify-content: center;
            gap: 8px;
        }
        @media (pointer: coarse) {
            .touch-controls { display: flex; }
            body { padding-bottom: 100px; }
        }
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 50px);
            grid-template-rows: repeat(2, 50px);
            gap: 4px;
        }
        .dpad-btn {
            background: rgba(0,255,136,0.2);
            border: 2px solid rgba(0,255,136,0.5);
            border-radius: 10px;
            color: #00ff88;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .dpad-btn:active { background: rgba(0,255,136,0.5); }

    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← Back to Games</a>
    <h1>⚔️ SWORD FIGHT</h1>
    <div class="score-board">
        <span>Round: <strong id="round">1</strong></span>
        <span>Wins: <strong id="wins">0</strong></span>
    </div>
    <canvas id="gameCanvas" width="500" height="350"></canvas>
    <div class="instructions"><span>A</span> or <span>←</span> Left | <span>D</span> or <span>→</span> Right | <span>SPACE</span> Attack</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let player = { x: 100, y: 250, dir: 1, attacking: false, attackFrame: 0, health: 100 };
        let enemy = { x: 350, y: 250, dir: -1, attacking: false, attackFrame: 0, health: 100, attackTimer: 0 };
        let score = 0;
        let gameOver = false;
        let gameLoop;
        let particles = [];
        let swordSwing = 0;
        
        function init() {
            player = { x: 100, y: 250, dir: 1, attacking: false, attackFrame: 0, health: 100 };
            enemy = { x: 350, y: 250, dir: -1, attacking: false, attackFrame: 0, health: 100, attackTimer: 0 };
            particles = [];
            gameOver = false;
        }
        
        function drawCharacter(char, color, isPlayer) {
            ctx.save();
            ctx.translate(char.x, char.y);
            if (char.dir < 0) ctx.scale(-1, 1);
            
            // Body
            ctx.fillStyle = color;
            ctx.fillRect(-15, -40, 30, 50);
            
            // Head
            ctx.beginPath();
            ctx.arc(0, -55, 20, 0, Math.PI * 2);
            ctx.fill();
            
            // Eyes
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(5, -58, 5, 0, Math.PI * 2);
            ctx.fill();
            
            // Legs
            ctx.fillStyle = '#2c3e50';
            ctx.fillRect(-12, 10, 10, 30);
            ctx.fillRect(2, 10, 10, 30);
            
            // Arm with sword
            ctx.save();
            if (char.attacking) {
                const swing = Math.sin(char.attackFrame * 0.3) * 1.5;
                ctx.rotate(swing);
            }
            
            // Arm
            ctx.fillStyle = color;
            ctx.fillRect(10, -35, 25, 10);
            
            // Sword
            ctx.fillStyle = '#7f8c8d';
            ctx.fillRect(30, -38, 50, 6);
            ctx.fillStyle = '#f1c40f';
            ctx.fillRect(25, -42, 10, 14);
            
            ctx.restore();
            
            ctx.restore();
            
            // Health bar
            const healthWidth = 60;
            const healthHeight = 8;
            ctx.fillStyle = '#c0392b';
            ctx.fillRect(char.x - healthWidth/2, char.y - 90, healthWidth, healthHeight);
            ctx.fillStyle = '#27ae60';
            ctx.fillRect(char.x - healthWidth/2, char.y - 90, healthWidth * (char.health / 100), healthHeight);
        }
        
        function drawParticles() {
            particles.forEach((p, i) => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
                
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
            });
            particles = particles.filter(p => p.life > 0);
        }
        
        function createHitParticles(x, y) {
            for (let i = 0; i < 15; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    size: Math.random() * 5 + 2,
                    life: 1,
                    color: Math.random() > 0.5 ? '#e74c3c' : '#f1c40f'
                });
            }
        }
        
        function draw() {
            // Sky gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#87CEEB');
            gradient.addColorStop(1, '#98D8C8');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Ground
            ctx.fillStyle = '#27ae60';
            ctx.fillRect(0, 280, canvas.width, 70);
            
            // Arena markers
            ctx.fillStyle = '#f1c40f';
            ctx.fillRect(230, 275, 40, 5);
            
            drawCharacter(player, '#3498db', true);
            drawCharacter(enemy, '#e74c3c', false);
            drawParticles();
            
            // VS text
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 30px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('VS', canvas.width/2, 50);
        }
        
        function update() {
            if (gameOver) return;
            
            // Player attack
            if (player.attacking) {
                player.attackFrame++;
                if (player.attackFrame > 15) {
                    player.attacking = false;
                    player.attackFrame = 0;
                }
                
                // Check hit on enemy
                if (player.attackFrame === 8) {
                    const dist = Math.abs(player.x + 60 - enemy.x);
                    if (dist < 80) {
                        enemy.health -= 15;
                        createHitParticles(enemy.x, enemy.y - 40);
                        if (enemy.health <= 0) {
                            score++;
                            document.getElementById('wins').textContent = score;
                            nextRound();
                        }
                    }
                }
            }
            
            // Enemy AI
            enemy.attackTimer++;
            if (enemy.attackTimer > 90) {
                enemy.attacking = true;
                enemy.attackFrame = 0;
                enemy.attackTimer = 0;
            }
            
            if (enemy.attacking) {
                enemy.attackFrame++;
                if (enemy.attackFrame > 15) {
                    enemy.attacking = false;
                    enemy.attackFrame = 0;
                }
                
                // Check hit on player
                if (enemy.attackFrame === 8) {
                    const dist = Math.abs(enemy.x - 60 - player.x);
                    if (dist < 80) {
                        player.health -= 12;
                        createHitParticles(player.x, player.y - 40);
                        if (player.health <= 0) {
                            gameOver = true;
                            setTimeout(() => {
                                alert(`💀 DEFEATED! 💀\n\nYou won ${score} rounds!\nClick OK to play again!`);
                                score = 0;
                                document.getElementById('wins').textContent = score;
                                init();
                            }, 100);
                        }
                    }
                }
            }
            
            // Move enemy toward player slightly
            if (!enemy.attacking) {
                const dir = player.x < enemy.x ? -1 : 1;
                enemy.x += dir * 0.5;
                enemy.dir = dir;
            }
        }
        
        function nextRound() {
            player.health = 100;
            enemy.health = 100;
            player.x = 100;
            enemy.x = 350;
            document.getElementById('round').textContent = score + 1;
        }
        
        function playerAttack() {
            if (gameOver || player.attacking) return;
            player.attacking = true;
            player.attackFrame = 0;
        }
        
        function moveLeft() {
            if (gameOver) return;
            player.x = Math.max(50, player.x - 15);
            player.dir = -1;
        }
        
        function moveRight() {
            if (gameOver) return;
            player.x = Math.min(450, player.x + 15);
            player.dir = 1;
        }
        
        document.addEventListener('keydown', e => {
            if (e.code === 'Space') {
                e.preventDefault();
                playerAttack();
            } else if (e.code === 'ArrowLeft' || e.code === 'KeyA') {
                moveLeft();
            } else if (e.code === 'ArrowRight' || e.code === 'KeyD') {
                moveRight();
            }
        });
        
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        init();
        gameLoop();
    
        window.tL=false; window.tR=false; window.tU=false; window.tD=false;
        setInterval(() => {
            if(window.tL) keys.left=true; else keys.left=false;
            if(window.tR) keys.right=true; else keys.right=false;
            if(window.tU) keys.up=true; else keys.up=false;
            if(window.tD) keys.down=true; else keys.down=false;
        }, 50);

    
    // EPIC PARTICLES
    let eParticles = [];
    class EParticle {
        constructor(x, y, color, size, vx, vy, life) {
            this.x=x; this.y=y; this.color=color; this.size=size;
            this.vx=vx; this.vy=vy; this.life=life; this.maxLife=life;
        }
        update() {
            this.x+=this.vx; this.y+=this.vy; this.vy+=0.1; this.life--;
        }
        draw() {
            let a = this.life/this.maxLife;
            ctx.globalAlpha=a;
            ctx.fillStyle=this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size*a, 0, Math.PI*2);
            ctx.fill();
            ctx.globalAlpha=1;
        }
    }
    function eSpawn(x, y, color, count) {
        for(let i=0; i<count; i++) {
            eParticles.push(new EParticle(x, y, color, 3+Math.random()*4, (Math.random()-0.5)*8, (Math.random()-0.5)*8-3, 30+Math.random()*20));
        }
    }

    </script>

    <div class="touch-controls" style="display:none;position:fixed;bottom:15px;left:0;right:0;z-index:1000;pointer-events:none;">
      <div style="display:flex;gap:20px;align-items:center;justify-content:center;pointer-events:auto;">
        <button class="dpad-btn" ontouchstart="window.tL=true;window.tR=false;window.tU=false" ontouchend="window.tL=false" onmousedown="window.tL=true" onmouseup="window.tL=false" style="width:70px;height:70px;border-radius:50%;font-size:26px;background:rgba(255,255,255,0.25);border:3px solid rgba(255,255,255,0.5);color:white;">&#9664;</button>
        <button class="dpad-btn" ontouchstart="window.tU=true;window.tL=false;window.tR=false" ontouchend="window.tU=false" onmousedown="window.tU=true" onmouseup="window.tU=false" style="width:70px;height:70px;border-radius:50%;font-size:26px;background:rgba(255,255,255,0.25);border:3px solid rgba(255,255,255,0.5);color:white;">&#9650;</button>
        <button class="dpad-btn" ontouchstart="window.tR=true;window.tL=false;window.tU=false" ontouchend="window.tR=false" onmousedown="window.tR=true" onmouseup="window.tR=false" style="width:70px;height:70px;border-radius:50%;font-size:26px;background:rgba(255,255,255,0.25);border:3px solid rgba(255,255,255,0.5);color:white;">&#9654;</button>
      </div>
    </div>

</body>
