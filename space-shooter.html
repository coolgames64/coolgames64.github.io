<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⭐ Starfield Defender - Cool Games 64</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(180deg, #0a0a20 0%, #0f0f2a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }
        .hud {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 15px 20px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            z-index: 100;
        }
        .hud-item { color: #fff; font-size: 16px; font-weight: 600; }
        .hud-item span { color: #00ffff; }
        #gameCanvas {
            border-radius: 8px;
            border: 2px solid #00ffff;
            box-shadow: 0 0 30px rgba(0,255,255,0.3);
        }
        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        .overlay.hidden { display: none; }
        .overlay h1 {
            font-size: 36px;
            color: #00ffff;
            text-shadow: 0 0 30px rgba(0,255,255,0.8);
            margin-bottom: 10px;
        }
        .overlay p { color: rgba(255,255,255,0.7); margin-bottom: 20px; }
        .btn {
            background: linear-gradient(135deg, #00ffff 0%, #0088aa 100%);
            color: #0a0a20;
            border: none;
            padding: 15px 50px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,255,255,0.4);
        }
        .touch-controls {
            display: none;
            position: fixed;
            bottom: 15px;
            left: 0;
            right: 0;
            z-index: 100;
            justify-content: center;
            gap: 10px;
        }
        @media (pointer: coarse) {
            .touch-controls { display: flex; }
            body { padding-bottom: 100px; }
        }
        .fire-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(255,50,50,0.3);
            border: 3px solid rgba(255,50,50,0.7);
            color: #ff3232;
            font-size: 28px;
        }
        .move-btns {
            display: grid;
            grid-template-columns: repeat(3, 55px);
            grid-template-rows: repeat(2, 50px);
            gap: 5px;
        }
        .move-btn {
            background: rgba(0,255,255,0.2);
            border: 2px solid rgba(0,255,255,0.5);
            border-radius: 10px;
            color: #00ffff;
            font-size: 20px;
        }
        .move-btn:active { background: rgba(0,255,255,0.5); }
        .fire-btn:active { background: rgba(255,50,50,0.6); }
    </style>
</head>
<body>
    <div class="hud">
        <div class="hud-item">Score: <span id="score">0</span></div>
        <div class="hud-item">Wave: <span id="wave">1</span></div>
        <div class="hud-item">Lives: <span id="lives">3</span> 🚀</div>
    </div>
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    
    <div class="overlay" id="startScreen">
        <h1>🚀 STARFIELD DEFENDER</h1>
        <p>Defend Earth from alien invasion!</p>
        <button class="btn" onclick="startGame()">START MISSION</button>
    </div>
    <div class="overlay hidden" id="gameOverScreen">
        <h1>💥 GAME OVER</h1>
        <p id="finalScore">Score: 0</p>
        <button class="btn" onclick="startGame()">TRY AGAIN</button>
    </div>
    
    <div class="touch-controls">
        <div class="move-btns">
            <div></div>
            <button class="move-btn" id="upBtn">▲</button>
            <div></div>
            <button class="move-btn" id="leftBtn">◀</button>
            <button class="move-btn" id="downBtn">▼</button>
            <button class="move-btn" id="rightBtn">▶</button>
        </div>
        <button class="fire-btn" id="fireBtn">🔥</button>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resize() {
    const w = Math.min(window.innerWidth - 10, 400);
    const h = Math.min(window.innerHeight - 180, 600);
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
}
resize();
window.addEventListener('resize', resize);

let player, bullets, enemies, particles, powerUps;
let score, lives, wave, gameLoop, gameState;
let keys = {};

class Particle {
    constructor(x, y, color, size, vx, vy, life) {
        this.x=x; this.y=y; this.color=color; this.size=size;
        this.vx=vx; this.vy=vy; this.life=life; this.maxLife=life;
    }
    update() {
        this.x+=this.vx; this.y+=this.vy; this.life--;
    }
    draw() {
        ctx.globalAlpha=this.life/this.maxLife;
        ctx.fillStyle=this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size*(this.life/this.maxLife), 0, Math.PI*2);
        ctx.fill();
        ctx.globalAlpha=1;
    }
}

function spawnParticles(x, y, color, count) {
    for (let i=0; i<count; i++) {
        particles.push(new Particle(x, y, color, 3+Math.random()*4, (Math.random()-0.5)*8, (Math.random()-0.5)*8, 30+Math.random()*20));
    }
}

function init() {
    player = { x: 200, y: 550, w: 40, h: 40, speed: 6, canFire: true };
    bullets = [];
    enemies = [];
    particles = [];
    powerUps = [];
    score = 0;
    lives = 3;
    wave = 1;
    gameState = 'playing';
    spawnWave();
}

function spawnWave() {
    const count = 3 + wave * 2;
    for (let i=0; i<count; i++) {
        enemies.push({
            x: 50 + Math.random() * 300,
            y: -50 - i * 60,
            w: 35,
            h: 35,
            vx: (Math.random() - 0.5) * 2,
            vy: 1 + wave * 0.3,
            hp: 1 + Math.floor(wave / 3),
            type: Math.random() < 0.3 ? 'big' : 'normal'
        });
    }
}

function spawnParticles(x, y, color, count) {
    for (let i=0; i<count; i++) {
        particles.push(new Particle(x, y, color, 3+Math.random()*4, (Math.random()-0.5)*8, (Math.random()-0.5)*8, 30+Math.random()*20));
    }
}

function update() {
    if (gameState !== 'playing') return;
    
    // Player movement
    if (keys.left || window.tL) player.x -= player.speed;
    if (keys.right || window.tR) player.x += player.speed;
    if (keys.up || window.tU) player.y -= player.speed * 0.7;
    if (keys.down || window.tD) player.y += player.speed * 0.7;
    
    player.x = Math.max(player.w/2, Math.min(canvas.width - player.w/2, player.x));
    player.y = Math.max(player.h/2, Math.min(canvas.height - player.h/2, player.y));
    
    // Auto-fire on mobile
    if (window.tFire && player.canFire) {
        bullets.push({ x: player.x, y: player.y - 20, vx: 0, vy: -10, r: 5 });
        player.canFire = false;
        setTimeout(() => player.canFire = true, 150);
    }
    
    // Bullets
    bullets.forEach((b, i) => {
        b.x += b.vx;
        b.y += b.vy;
        if (b.y < -10) bullets.splice(i, 1);
    });
    
    // Enemies
    enemies.forEach((e, ei) => {
        e.x += e.vx;
        e.y += e.vy;
        
        // Bounce off walls
        if (e.x <= e.w/2 || e.x >= canvas.width - e.w/2) e.vx *= -1;
        
        // Enemy reached bottom
        if (e.y > canvas.height + 20) {
            enemies.splice(ei, 1);
            lives--;
            if (lives <= 0) {
                gameState = 'over';
                document.getElementById('finalScore').textContent = 'Score: ' + score;
                document.getElementById('gameOverScreen').classList.remove('hidden');
                clearInterval(gameLoop);
            }
        }
        
        // Collision with player
        const dx = e.x - player.x;
        const dy = e.y - player.y;
        if (dx*dx + dy*dy < (e.w/2 + player.w/2) * (e.w/2 + player.w/2)) {
            spawnParticles(e.x, e.y, '#ff4444', 20);
            enemies.splice(ei, 1);
            lives--;
        }
    });
    
    // Bullet-enemy collision
    bullets.forEach((b, bi) => {
        enemies.forEach((e, ei) => {
            const dx = b.x - e.x;
            const dy = b.y - e.y;
            if (dx*dx + dy*dy < (b.r + e.w/2) * (b.r + e.w/2)) {
                spawnParticles(e.x, e.y, e.type === 'big' ? '#ff00ff' : '#ff4444', 15);
                bullets.splice(bi, 1);
                e.hp--;
                if (e.hp <= 0) {
                    score += e.type === 'big' ? 20 : 10;
                    enemies.splice(ei, 1);
                }
            }
        });
    });
    
    // Wave complete
    if (enemies.length === 0 && gameState === 'playing') {
        wave++;
        setTimeout(spawnWave, 1500);
    }
    
    // Particles
    particles.forEach(p => p.update());
    particles = particles.filter(p => p.life > 0);
    
    // UI
    document.getElementById('score').textContent = score;
    document.getElementById('wave').textContent = wave;
    document.getElementById('lives').textContent = lives;
}

function draw() {
    // Background gradient
    const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    grad.addColorStop(0, '#0a0a20');
    grad.addColorStop(1, '#0f0f2a');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Stars
    for (let i=0; i<50; i++) {
        ctx.fillStyle = 'rgba(255,255,255,' + (0.3 + Math.random() * 0.7) + ')';
        ctx.beginPath();
        ctx.arc(Math.random() * canvas.width, Math.random() * canvas.height, 1 + Math.random(), 0, Math.PI * 2);
        ctx.fill();
    }
    
    // Bullets
    bullets.forEach(b => {
        ctx.fillStyle = '#00ffff';
        ctx.shadowColor = '#00ffff';
        ctx.shadowBlur = 15;
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
    });
    
    // Enemies
    enemies.forEach(e => {
        ctx.fillStyle = e.type === 'big' ? '#ff00ff' : '#ff4444';
        ctx.shadowColor = ctx.fillStyle;
        ctx.shadowBlur = 20;
        
        if (e.type === 'big') {
            // Big enemy - hexagon
            ctx.beginPath();
            for (let i=0; i<6; i++) {
                const angle = i * Math.PI / 3;
                ctx.lineTo(e.x + Math.cos(angle) * 20, e.y + Math.sin(angle) * 20);
            }
            ctx.closePath();
            ctx.fill();
        } else {
            // Normal enemy - triangle
            ctx.beginPath();
            ctx.moveTo(e.x, e.y - 18);
            ctx.lineTo(e.x - 15, e.y + 15);
            ctx.lineTo(e.x + 15, e.y + 15);
            ctx.closePath();
            ctx.fill();
        }
        ctx.shadowBlur = 0;
        
        // HP bar for big enemies
        if (e.type === 'big' && e.hp > 1) {
            ctx.fillStyle = '#333';
            ctx.fillRect(e.x - 15, e.y + 20, 30, 4);
            ctx.fillStyle = '#ff00ff';
            ctx.fillRect(e.x - 15, e.y + 20, 30 * (e.hp / 2), 4);
        }
    });
    
    // Player ship
    ctx.fillStyle = '#00ffff';
    ctx.shadowColor = '#00ffff';
    ctx.shadowBlur = 25;
    ctx.beginPath();
    ctx.moveTo(player.x, player.y - 20);
    ctx.lineTo(player.x - 18, player.y + 18);
    ctx.lineTo(player.x, player.y + 8);
    ctx.lineTo(player.x + 18, player.y + 18);
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;
    
    // Engine flame
    const flameSize = 10 + Math.random() * 8;
    ctx.fillStyle = '#ff9500';
    ctx.beginPath();
    ctx.moveTo(player.x - 8, player.y + 15);
    ctx.lineTo(player.x, player.y + 15 + flameSize);
    ctx.lineTo(player.x + 8, player.y + 15);
    ctx.closePath();
    ctx.fill();
    
    // Particles
    particles.forEach(p => p.draw());
}

function startGame() {
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('gameOverScreen').classList.add('hidden');
    init();
    if (gameLoop) clearInterval(gameLoop);
    gameLoop = setInterval(() => { update(); draw(); }, 1000/60);
}

// Touch controls
window.tL = window.tR = window.tU = window.tD = window.tFire = false;
['upBtn', 'downBtn', 'leftBtn', 'rightBtn'].forEach(id => {
    const keyMap = { upBtn: 'tU', downBtn: 'tD', leftBtn: 'tL', rightBtn: 'tR' };
    const btn = document.getElementById(id);
    btn.addEventListener('touchstart', e => { e.preventDefault(); window[keyMap[id]] = true; });
    btn.addEventListener('touchend', e => { e.preventDefault(); window[keyMap[id]] = false; });
    btn.addEventListener('mousedown', () => window[keyMap[id]] = true);
    btn.addEventListener('mouseup', () => window[keyMap[id]] = false);
});

const fireBtn = document.getElementById('fireBtn');
fireBtn.addEventListener('touchstart', e => { e.preventDefault(); window.tFire = true; });
fireBtn.addEventListener('touchend', e => { e.preventDefault(); window.tFire = false; });
fireBtn.addEventListener('mousedown', () => window.tFire = true);
fireBtn.addEventListener('mouseup', () => window.tFire = false);

// Keyboard
document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = true;
    if (e.key === 'ArrowRight' || e.key === 'd') keys.right = true;
    if (e.key === 'ArrowUp' || e.key === 'w') keys.up = true;
    if (e.key === 'ArrowDown' || e.key === 's') keys.down = true;
    if (e.key === ' ') window.tFire = true;
    if (e.key === 'Enter') startGame();
});
document.addEventListener('keyup', e => {
    if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = false;
    if (e.key === 'ArrowRight' || e.key === 'd') keys.right = false;
    if (e.key === 'ArrowUp' || e.key === 'w') keys.up = false;
    if (e.key === 'ArrowDown' || e.key === 's') keys.down = false;
    if (e.key === ' ') window.tFire = false;
});

init();
draw();
</script>
</body>
</html>
