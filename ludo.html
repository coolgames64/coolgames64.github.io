<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎲 Ludo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }
        h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .score-board { font-size: 1.3rem; margin-bottom: 15px; }
        canvas { max-width: 100%; 
            max-width: 100vw; border: 3px solid #f1c40f; border-radius: 10px; }
        .instructions { margin-top: 15px; color: #888; font-size: 1rem; }
        .instructions span { background: #f1c40f; color: #333; padding: 3px 10px; border-radius: 5px; }
        .back-btn {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255,255,255,0.1); color: white;
            border: 2px solid rgba(255,255,255,0.3); padding: 10px 20px;
            border-radius: 8px; cursor: pointer; text-decoration: none;
        }
        .back-btn:hover { background: rgba(255,255,255,0.2); }
    
        /* Mobile Touch Controls */
        .touch-controls {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            padding: 10px;
            z-index: 1000;
        }
        @media (pointer: coarse) {
            .touch-controls { display: flex !important; }
            body { padding-bottom: 120px !important; }
        }
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 5px;
            margin: 0 auto;
        }
        .dpad-btn {
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.4);
            border-radius: 10px;
            color: white;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .dpad-btn:active {
            background: rgba(255,255,255,0.4);
        }
        .dpad-center { background: rgba(0,0,0,0.2); }
        @media (max-width: 500px) {
            .dpad { grid-template-columns: repeat(3, 50px); grid-template-rows: repeat(3, 50px); }
            .dpad-btn { font-size: 20px; }
        }
    
    
        .tap-area {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 999;
            display: none;
        }
        @media (pointer: coarse) {
            .tap-area { display: block; }
        }
        .tap-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 80px; height: 80px;
            background: rgba(255,255,255,0.3);
            border: 3px solid rgba(255,255,255,0.6);
            border-radius: 50%;
            color: white;
            font-size: 14px;
            z-index: 1001;
            display: none;
            cursor: pointer;
        }
        @media (pointer: coarse) {
            .tap-btn { display: flex; align-items: center; justify-content: center; }
        }

    
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }
        .game-header {
            font-size: 20px;
            font-weight: 700;
            color: #00ff88;
            text-shadow: 0 0 15px rgba(0,255,136,0.5);
            margin-bottom: 10px;
        }
        .score-display {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
        }
        .score-box {
            background: rgba(0,0,0,0.5);
            border: 2px solid rgba(0,255,136,0.3);
            border-radius: 10px;
            padding: 6px 14px;
            text-align: center;
        }
        .score-label { font-size: 10px; color: rgba(255,255,255,0.6); text-transform: uppercase; }
        .score-val { font-size: 18px; font-weight: 700; color: #00ff88; }
        .game-wrapper { position: relative; }
        #gameCanvas {
            border-radius: 12px;
            border: 3px solid #00ff88;
            box-shadow: 0 0 30px rgba(0,255,136,0.3);
        }
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
        }
        .overlay.hidden { display: none; }
        .overlay h2 {
            font-size: 28px;
            color: #00ff88;
            text-shadow: 0 0 20px rgba(0,255,136,0.6);
            margin-bottom: 8px;
        }
        .overlay p { color: rgba(255,255,255,0.7); margin-bottom: 15px; }
        .btn-epic {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            color: #0f0f1a;
            border: none;
            padding: 12px 35px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(0,255,136,0.4);
        }
        .btn-epic:hover { transform: scale(1.05); }
        .touch-controls {
            display: none;
            position: fixed;
            bottom: 10px;
            left: 0;
            right: 0;
            z-index: 100;
            justify-content: center;
            gap: 8px;
        }
        @media (pointer: coarse) {
            .touch-controls { display: flex; }
            body { padding-bottom: 100px; }
        }
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 50px);
            grid-template-rows: repeat(2, 50px);
            gap: 4px;
        }
        .dpad-btn {
            background: rgba(0,255,136,0.2);
            border: 2px solid rgba(0,255,136,0.5);
            border-radius: 10px;
            color: #00ff88;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .dpad-btn:active { background: rgba(0,255,136,0.5); }

    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← Back to Games</a>
    <h1>🎲 LUDO</h1>
    <div class="score-board">
        <span>You: <strong id="you">0</strong></span>
        <span>CPU: <strong id="cpu">0</strong></span>
        <span>Dice: <strong id="dice">?</strong></span>
    </div>
    <canvas id="gameCanvas" width="450" height">450"></canvas>
    <div class="instructions"><span>CLICK ROLL</span> to roll dice! Race to the finish!</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let youPos = 0;
        let cpuPos = 0;
        let youScore = 0;
        let cpuScore = 0;
        let rolling = false;
        let gameLoop;
        
        const TRACK_LENGTH = 50;
        
        function draw() {
            // Board
            ctx.fillStyle = '#2c3e50';
            ctx.fillRect(0, 0, 450, 450);
            
            // Track squares
            const colors = ['#3498db', '#e74c3c', '#f1c40f', '#27ae60'];
            for (let i = 0; i < TRACK_LENGTH; i++) {
                const row = Math.floor(i / 10);
                const col = i % 10;
                let x, y;
                
                if (row % 2 === 0) {
                    x = col * 45;
                } else {
                    x = 405 - col * 45;
                }
                y = row * 45;
                
                ctx.fillStyle = colors[(i * 4) % 4] + '60';
                ctx.fillRect(x + 2, y + 2, 40, 40);
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1;
                ctx.strokeRect(x + 2, y + 2, 40, 40);
                
                // Number
                ctx.fillStyle = '#fff';
                ctx.font = '10px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(i + 1, x + 22, y + 25);
                
                // Markers
                if (youPos === i) {
                    ctx.fillStyle = '#3498db';
                    ctx.beginPath();
                    ctx.arc(x + 22, y + 22, 12, 0, Math.PI * 2);
                    ctx.fill();
                }
                if (cpuPos === i) {
                    ctx.fillStyle = '#e74c3c';
                    ctx.beginPath();
                    ctx.arc(x + 22, y + 22, 12, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            
            // Finish line
            ctx.fillStyle = '#f1c40f';
            ctx.fillRect(0, 405, 450, 45);
            ctx.fillStyle = '#333';
            ctx.font = 'bold 30px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('🏁 FINISH 🏁', 225, 438);
        }
        
        function rollDice() {
            if (rolling || youPos >= TRACK_LENGTH - 1) return;
            
            rolling = true;
            let rolls = 0;
            let interval = setInterval(() => {
                document.getElementById('dice').textContent = Math.floor(Math.random() * 6) + 1;
                rolls++;
                if (rolls > 15) {
                    clearInterval(interval);
                    
                    const result = Math.floor(Math.random() * 6) + 1;
                    document.getElementById('dice').textContent = result;
                    
                    youPos += result;
                    if (youPos >= TRACK_LENGTH - 1) {
                        youPos = TRACK_LENGTH - 1;
                        youScore++;
                        document.getElementById('you').textContent = youScore;
                        alert('🎉 YOU WIN THIS ROUND! 🎉');
                        youPos = 0;
                    }
                    
                    // CPU turn
                    setTimeout(cpuTurn, 500);
                    rolling = false;
                }
            }, 80);
        }
        
        function cpuTurn() {
            const result = Math.floor(Math.random() * 6) + 1;
            cpuPos += result;
            if (cpuPos >= TRACK_LENGTH - 1) {
                cpuPos = TRACK_LENGTH - 1;
                cpuScore++;
                document.getElementById('cpu').textContent = cpuScore;
                alert('CPU wins this round!');
                cpuPos = 0;
            }
            draw();
        }
        
        canvas.addEventListener('click', rollDice);
        
        draw();
    
        // Tap anywhere to click
        document.addEventListener('touchstart', (e) => {
            if(e.target.tagName !== 'BUTTON' && e.target.tagName !== 'INPUT') {
                const touch = e.touches[0];
                const clickEvent = new MouseEvent('click', {
                    bubbles: true,
                    clientX: touch.clientX,
                    clientY: touch.clientY
                });
                e.target.dispatchEvent(clickEvent);
            }
        }, true);
        
        // Space/action button for mobile
        window.tapSpace = false;

    
    // EPIC PARTICLES
    let eParticles = [];
    class EParticle {
        constructor(x, y, color, size, vx, vy, life) {
            this.x=x; this.y=y; this.color=color; this.size=size;
            this.vx=vx; this.vy=vy; this.life=life; this.maxLife=life;
        }
        update() {
            this.x+=this.vx; this.y+=this.vy; this.vy+=0.1; this.life--;
        }
        draw() {
            let a = this.life/this.maxLife;
            ctx.globalAlpha=a;
            ctx.fillStyle=this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size*a, 0, Math.PI*2);
            ctx.fill();
            ctx.globalAlpha=1;
        }
    }
    function eSpawn(x, y, color, count) {
        for(let i=0; i<count; i++) {
            eParticles.push(new EParticle(x, y, color, 3+Math.random()*4, (Math.random()-0.5)*8, (Math.random()-0.5)*8-3, 30+Math.random()*20));
        }
    }

    
    window.tL=false; window.tR=false; window.tU=false; window.tD=false;
    ['btnL','btnR','btnU','btnD'].forEach(id => {
        let btn = document.getElementById(id);
        if(!btn) return;
        let key = {btnL:'tL',btnR:'tR',btnU:'tU',btnD:'tD'}[id];
        btn.addEventListener('touchstart', e => { e.preventDefault(); window[key]=true; });
        btn.addEventListener('touchend', e => { e.preventDefault(); window[key]=false; });
        btn.addEventListener('mousedown', () => window[key]=true);
        btn.addEventListener('mouseup', () => window[key]=false);
    });
    setInterval(() => {
        if(window.tL) keys.left=true; else keys.left=false;
        if(window.tR) keys.right=true; else keys.right=false;
        if(window.tU) keys.up=true; else keys.up=false;
        if(window.tD) keys.down=true; else keys.down=false;
    }, 50);

    </script>

    <button class="tap-btn" ontouchstart="window.tapSpace=true" ontouchend="window.tapSpace=false">TAP</button>

</body>
</html>
