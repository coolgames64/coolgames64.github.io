<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🧟 Zombie Hunter</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(180deg, #1a1a2e 0%, #2d1f3d 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }
        h1 { font-size: 2.5rem; margin-bottom: 10px; color: #e74c3c; text-shadow: 0 0 20px #e74c3c; }
        .score-board { font-size: 1.5rem; margin-bottom: 15px; }
        .score-board span { background: rgba(231,76,60,0.2); padding: 5px 20px; border-radius: 20px; }
        canvas { max-width: 100%; 
            max-width: 100vw; border: 3px solid #e74c3c; border-radius: 10px; box-shadow: 0 0 30px rgba(231,76,60,0.4); }
        .instructions { margin-top: 15px; color: #888; font-size: 1rem; }
        .instructions span { background: #e74c3c; padding: 3px 10px; border-radius: 5px; }
        .back-btn {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255,255,255,0.1); color: white;
            border: 2px solid rgba(255,255,255,0.3); padding: 10px 20px;
            border-radius: 8px; cursor: pointer; text-decoration: none;
        }
        .back-btn:hover { background: rgba(255,255,255,0.2); }
    
        /* Mobile Touch Controls */
        .touch-controls {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            padding: 10px;
            z-index: 1000;
        }
        @media (pointer: coarse) {
            .touch-controls { display: flex !important; }
            body { padding-bottom: 120px !important; }
        }
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 5px;
            margin: 0 auto;
        }
        .dpad-btn {
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.4);
            border-radius: 10px;
            color: white;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .dpad-btn:active {
            background: rgba(255,255,255,0.4);
        }
        .dpad-center { background: rgba(0,0,0,0.2); }
        @media (max-width: 500px) {
            .dpad { grid-template-columns: repeat(3, 50px); grid-template-rows: repeat(3, 50px); }
            .dpad-btn { font-size: 20px; }
        }
    
    
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }
        .game-header {
            font-size: 20px;
            font-weight: 700;
            color: #00ff88;
            text-shadow: 0 0 15px rgba(0,255,136,0.5);
            margin-bottom: 10px;
        }
        .score-display {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
        }
        .score-box {
            background: rgba(0,0,0,0.5);
            border: 2px solid rgba(0,255,136,0.3);
            border-radius: 10px;
            padding: 6px 14px;
            text-align: center;
        }
        .score-label { font-size: 10px; color: rgba(255,255,255,0.6); text-transform: uppercase; }
        .score-val { font-size: 18px; font-weight: 700; color: #00ff88; }
        .game-wrapper { position: relative; }
        #gameCanvas {
            border-radius: 12px;
            border: 3px solid #00ff88;
            box-shadow: 0 0 30px rgba(0,255,136,0.3);
        }
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
        }
        .overlay.hidden { display: none; }
        .overlay h2 {
            font-size: 28px;
            color: #00ff88;
            text-shadow: 0 0 20px rgba(0,255,136,0.6);
            margin-bottom: 8px;
        }
        .overlay p { color: rgba(255,255,255,0.7); margin-bottom: 15px; }
        .btn-epic {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            color: #0f0f1a;
            border: none;
            padding: 12px 35px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(0,255,136,0.4);
        }
        .btn-epic:hover { transform: scale(1.05); }
        .touch-controls {
            display: none;
            position: fixed;
            bottom: 10px;
            left: 0;
            right: 0;
            z-index: 100;
            justify-content: center;
            gap: 8px;
        }
        @media (pointer: coarse) {
            .touch-controls { display: flex; }
            body { padding-bottom: 100px; }
        }
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 50px);
            grid-template-rows: repeat(2, 50px);
            gap: 4px;
        }
        .dpad-btn {
            background: rgba(0,255,136,0.2);
            border: 2px solid rgba(0,255,136,0.5);
            border-radius: 10px;
            color: #00ff88;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .dpad-btn:active { background: rgba(0,255,136,0.5); }

    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← Back to Games</a>
    <h1>🧟 ZOMBIE HUNTER</h1>
    <div class="score-board">
        <span>Score: <strong id="score">0</strong></span>
        <span>Wave: <strong id="wave">1</strong></span>
        <span>HP: <strong id="hp">100</strong></span>
    </div>
    <canvas id="gameCanvas" width="500" height="500"></canvas>
    <div class="instructions"><span>CLICK</span> to shoot! Survive the zombie waves!</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let player = { x: 250, y: 400, hp: 100, angle: 0, shootCooldown: 0 };
        let zombies = [];
        let bullets = [];
        let particles = [];
        let score = 0;
        let wave = 1;
        let gameOver = false;
        let gameLoop;
        let zombiesInWave = 5;
        let zombiesSpawned = 0;
        let waveTimer = 0;
        
        const ZOMBIE_TYPES = [
            { color: '#27ae60', hp: 30, speed: 1.5, damage: 10, points: 10, size: 20 },
            { color: '#8e44ad', hp: 60, speed: 1, damage: 20, points: 25, size: 25 },
            { color: '#c0392b', hp: 100, speed: 0.7, damage: 30, points: 50, size: 35 }
        ];
        
        function init() {
            player = { x: 250, y: 400, hp: 100, angle: 0, shootCooldown: 0 };
            zombies = [];
            bullets = [];
            particles = [];
            score = 0;
            wave = 1;
            gameOver = false;
            zombiesInWave = 5;
            zombiesSpawned = 0;
            waveTimer = 0;
            
            document.getElementById('score').textContent = '0';
            document.getElementById('wave').textContent = '1';
            document.getElementById('hp').textContent = '100';
        }
        
        function spawnZombie() {
            const type = ZOMBIE_TYPES[Math.min(wave - 1, ZOMBIE_TYPES.length - 1)];
            const side = Math.floor(Math.random() * 4);
            let x, y;
            
            if (side === 0) { x = Math.random() * canvas.width; y = -30; }
            else if (side === 1) { x = canvas.width + 30; y = Math.random() * canvas.height; }
            else if (side === 2) { x = Math.random() * canvas.width; y = canvas.height + 30; }
            else { x = -30; y = Math.random() * canvas.height; }
            
            zombies.push({
                x: x,
                y: y,
                ...type,
                currentHp: type.hp
            });
            zombiesSpawned++;
        }
        
        function drawPlayer() {
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(player.angle);
            
            // Body
            ctx.fillStyle = '#3498db';
            ctx.beginPath();
            ctx.arc(0, 0, 18, 0, Math.PI * 2);
            ctx.fill();
            
            // Gun
            ctx.fillStyle = '#333';
            ctx.fillRect(10, -4, 20, 8);
            
            // Face toward mouse
            ctx.restore();
            
            // HP bar
            ctx.fillStyle = '#333';
            ctx.fillRect(player.x - 25, player.y - 35, 50, 6);
            ctx.fillStyle = '#27ae60';
            ctx.fillRect(player.x - 25, player.y - 35, 50 * (player.hp / 100), 6);
        }
        
        function drawZombie(zombie) {
            ctx.fillStyle = zombie.color;
            ctx.shadowColor = zombie.color;
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(zombie.x, zombie.y, zombie.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // Eyes
            ctx.fillStyle = '#ff0000';
            ctx.beginPath();
            ctx.arc(zombie.x - 5, zombie.y - 3, 3, 0, Math.PI * 2);
            ctx.arc(zombie.x + 5, zombie.y - 3, 3, 0, Math.PI * 2);
            ctx.fill();
            
            // HP bar
            ctx.fillStyle = '#333';
            ctx.fillRect(zombie.x - 20, zombie.y - zombie.size - 10, 40, 5);
            ctx.fillStyle = '#e74c3c';
            ctx.fillRect(zombie.x - 20, zombie.y - zombie.size - 10, 40 * (zombie.currentHp / zombie.hp), 5);
        }
        
        function drawBullet(bullet) {
            ctx.fillStyle = '#f1c40f';
            ctx.shadowColor = '#f1c40f';
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(bullet.x, bullet.y, 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        
        function drawParticle(p) {
            ctx.fillStyle = p.color;
            ctx.globalAlpha = p.life;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
        }
        
        function draw() {
            // Background
            const gradient = ctx.createRadialGradient(
                canvas.width / 2, canvas.height / 2, 0,
                canvas.width / 2, canvas.height / 2, canvas.width
            );
            gradient.addColorStop(0, '#2d1f3d');
            gradient.addColorStop(1, '#1a1a2e');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Grid pattern
            ctx.strokeStyle = 'rgba(255,255,255,0.03)';
            ctx.lineWidth = 1;
            for (let i = 0; i < canvas.width; i += 40) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i < canvas.height; i += 40) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(canvas.width, i);
                ctx.stroke();
            }
            
            // Particles
            particles.forEach(drawParticle);
            
            // Bullets
            bullets.forEach(drawBullet);
            
            // Zombies
            zombies.forEach(drawZombie);
            
            // Player
            drawPlayer();
            
            // Wave message
            if (zombies.length === 0 && zombiesSpawned >= zombiesInWave) {
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(0, canvas.height / 2 - 40, canvas.width, 80);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 32px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(`WAVE ${wave} COMPLETE!`, canvas.width / 2, canvas.height / 2);
                ctx.font = '18px Arial';
                ctx.fillText('Next wave starting...', canvas.width / 2, canvas.height / 2 + 30);
            }
        }
        
        function update() {
            if (gameOver) return;
            
            // Spawn zombies
            if (zombiesSpawned < zombiesInWave) {
                waveTimer++;
                if (waveTimer > 60) {
                    spawnZombie();
                    waveTimer = 0;
                }
            } else if (zombies.length === 0) {
                // Wave complete
                wave++;
                zombiesInWave = 5 + wave * 2;
                zombiesSpawned = 0;
                player.hp = Math.min(100, player.hp + 20);
                document.getElementById('wave').textContent = wave;
                document.getElementById('hp').textContent = player.hp;
            }
            
            // Player shooting cooldown
            if (player.shootCooldown > 0) player.shootCooldown--;
            
            // Move zombies toward player
            zombies.forEach(zombie => {
                const dx = player.x - zombie.x;
                const dy = player.y - zombie.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                zombie.x += (dx / dist) * zombie.speed;
                zombie.y += (dy / dist) * zombie.speed;
                
                // Attack player
                if (dist < zombie.size + 18) {
                    player.hp -= zombie.damage;
                    document.getElementById('hp').textContent = player.hp;
                    
                    // Push zombie back
                    zombie.x -= (dx / dist) * 30;
                    zombie.y -= (dy / dist) * 30;
                    
                    if (player.hp <= 0) {
                        endGame();
                    }
                }
            });
            
            // Update bullets
            bullets.forEach(bullet => {
                bullet.x += bullet.vx;
                bullet.y += bullet.vy;
                
                // Check zombie collision
                zombies.forEach(zombie => {
                    const dist = Math.sqrt((bullet.x - zombie.x) ** 2 + (bullet.y - zombie.y) ** 2);
                    if (dist < zombie.size + 5) {
                        zombie.currentHp -= bullet.damage;
                        bullet.remove = true;
                        
                        // Blood particles
                        for (let i = 0; i < 5; i++) {
                            particles.push({
                                x: zombie.x,
                                y: zombie.y,
                                vx: (Math.random() - 0.5) * 5,
                                vy: (Math.random() - 0.5) * 5,
                                size: 3 + Math.random() * 3,
                                color: '#c0392b',
                                life: 1
                            });
                        }
                    }
                });
                
                // Off screen
                if (bullet.x < 0 || bullet.x > canvas.width || bullet.y < 0 || bullet.y > canvas.height) {
                    bullet.remove = true;
                }
            });
            
            bullets = bullets.filter(b => !b.remove);
            
            // Remove dead zombies
            zombies = zombies.filter(z => {
                if (z.currentHp <= 0) {
                    score += z.points;
                    document.getElementById('score').textContent = score;
                    
                    // Death particles
                    for (let i = 0; i < 10; i++) {
                        particles.push({
                            x: z.x,
                            y: z.y,
                            vx: (Math.random() - 0.5) * 8,
                            vy: (Math.random() - 0.5) * 8,
                            size: 4 + Math.random() * 4,
                            color: z.color,
                            life: 1
                        });
                    }
                    return false;
                }
                return true;
            });
            
            // Update particles
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
                p.vx *= 0.98;
                p.vy *= 0.98;
            });
            particles = particles.filter(p => p.life > 0);
        }
        
        function shoot(x, y) {
            if (player.shootCooldown > 0 || gameOver) return;
            
            const dx = x - player.x;
            const dy = y - player.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            
            bullets.push({
                x: player.x + (dx / dist) * 25,
                y: player.y + (dy / dist) * 25,
                vx: (dx / dist) * 12,
                vy: (dy / dist) * 12,
                damage: 25
            });
            
            player.shootCooldown = 10;
        }
        
        function endGame() {
            gameOver = true;
            clearInterval(gameLoop);
            
            setTimeout(() => {
                alert(`💀 GAME OVER! 💀\nWave: ${wave}\nScore: ${score}\n\nClick OK to play again!`);
                init();
                gameLoop = setInterval(() => {
                    update();
                    draw();
                }, 1000 / 60);
            }, 100);
        }
        
        // Controls
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;
            
            player.angle = Math.atan2(my - player.y, mx - player.x);
        });
        
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;
            shoot(mx, my);
        });
        
        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;
            
            // Auto-fire while holding
            const fireInterval = setInterval(() => {
                if (e.buttons === 1) {
                    shoot(mx, my);
                } else {
                    clearInterval(fireInterval);
                }
            }, 100);
        });
        
        // Touch controls
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const mx = touch.clientX - rect.left;
            const my = touch.clientY - rect.top;
            player.angle = Math.atan2(my - player.y, mx - player.x);
        });
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const mx = touch.clientX - rect.left;
            const my = touch.clientY - rect.top;
            player.angle = Math.atan2(my - player.y, mx - player.x);
            shoot(mx, my);
        });
        
        // Start
        init();
        draw();
        gameLoop = setInterval(() => {
            update();
            draw();
        }, 1000 / 60);
    
        window.tL=false; window.tR=false; window.tU=false; window.tD=false;
        setInterval(() => {
            if(window.tL) keys.left=true; else keys.left=false;
            if(window.tR) keys.right=true; else keys.right=false;
            if(window.tU) keys.up=true; else keys.up=false;
            if(window.tD) keys.down=true; else keys.down=false;
        }, 50);

    
    // EPIC PARTICLES
    let eParticles = [];
    class EParticle {
        constructor(x, y, color, size, vx, vy, life) {
            this.x=x; this.y=y; this.color=color; this.size=size;
            this.vx=vx; this.vy=vy; this.life=life; this.maxLife=life;
        }
        update() {
            this.x+=this.vx; this.y+=this.vy; this.vy+=0.1; this.life--;
        }
        draw() {
            let a = this.life/this.maxLife;
            ctx.globalAlpha=a;
            ctx.fillStyle=this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size*a, 0, Math.PI*2);
            ctx.fill();
            ctx.globalAlpha=1;
        }
    }
    function eSpawn(x, y, color, count) {
        for(let i=0; i<count; i++) {
            eParticles.push(new EParticle(x, y, color, 3+Math.random()*4, (Math.random()-0.5)*8, (Math.random()-0.5)*8-3, 30+Math.random()*20));
        }
    }

    </script>

    <div class="touch-controls" style="display:none;position:fixed;bottom:15px;left:0;right:0;z-index:1000;pointer-events:none;">
      <div style="display:flex;gap:20px;align-items:center;justify-content:center;pointer-events:auto;">
        <button class="dpad-btn" ontouchstart="window.tL=true;window.tR=false;window.tU=false" ontouchend="window.tL=false" onmousedown="window.tL=true" onmouseup="window.tL=false" style="width:70px;height:70px;border-radius:50%;font-size:26px;background:rgba(255,255,255,0.25);border:3px solid rgba(255,255,255,0.5);color:white;">&#9664;</button>
        <button class="dpad-btn" ontouchstart="window.tU=true;window.tL=false;window.tR=false" ontouchend="window.tU=false" onmousedown="window.tU=true" onmouseup="window.tU=false" style="width:70px;height:70px;border-radius:50%;font-size:26px;background:rgba(255,255,255,0.25);border:3px solid rgba(255,255,255,0.5);color:white;">&#9650;</button>
        <button class="dpad-btn" ontouchstart="window.tR=true;window.tL=false;window.tU=false" ontouchend="window.tR=false" onmousedown="window.tR=true" onmouseup="window.tR=false" style="width:70px;height:70px;border-radius:50%;font-size:26px;background:rgba(255,255,255,0.25);border:3px solid rgba(255,255,255,0.5);color:white;">&#9654;</button>
      </div>
    </div>

</body>
