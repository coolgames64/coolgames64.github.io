<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🚀 Jetpack Joyride Pro - Cool Games 64</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(180deg, #87CEEB 0%, #98D8C8 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }
        .hud {
            position: fixed;
            top: 0; left: 0; right: 0;
            display: flex;
            justify-content: space-around;
            padding: 10px;
            background: rgba(0,0,0,0.4);
            z-index: 100;
        }
        .hud-item {
            color: white;
            font-size: 16px;
            font-weight: 700;
        }
        .hud-item span { color: #ffd700; }
        #gameCanvas {
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        .overlay.hidden { display: none; }
        .overlay h1 {
            font-size: 36px;
            color: #ff6b6b;
            text-shadow: 0 0 30px rgba(255,107,107,0.8);
            margin-bottom: 10px;
        }
        .overlay p { color: white; margin-bottom: 25px; }
        .btn {
            background: linear-gradient(135deg, #ff6b6b 0%, #ff4757 100%);
            color: white;
            border: none;
            padding: 15px 50px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255,107,107,0.4);
        }
        .btn:hover { transform: scale(1.05); }
        .touch-area {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 50;
        }
        @media (pointer: coarse) {
            .touch-area { display: block; }
        }
        @media (pointer: fine) {
            .touch-area { display: none; }
        }
    </style>
</head>
<body>
    <div class="hud" id="hud" style="display: none;">
        <div class="hud-item">Distance: <span id="dist">0</span>m</div>
        <div class="hud-item">Coins: <span id="coins">0</span> 💰</div>
        <div class="hud-item">Best: <span id="best">0</span>m</div>
    </div>
    
    <canvas id="gameCanvas" width="400" height="550"></canvas>
    <div class="touch-area" id="touchArea"></div>
    
    <div class="overlay" id="startScreen">
        <h1>🚀 JETPACK JOYRIDE</h1>
        <p>Tap & hold to fly! Avoid obstacles!</p>
        <button class="btn" onclick="startGame()">START</button>
    </div>
    <div class="overlay hidden" id="gameOverScreen">
        <h1>💥 CRASH!</h1>
        <p id="finalDist">Distance: 0m</p>
        <button class="btn" onclick="startGame()">TRY AGAIN</button>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resize() {
    const w = Math.min(window.innerWidth - 10, 400);
    const h = Math.min(window.innerHeight - 100, 550);
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
}
resize();
window.addEventListener('resize', resize);

let player, obstacles, coins, particles;
let distance, coinCount, best, gameState, gameLoop;
let jetting = false;
let bgOffset = 0;
let shake = 0;

class Particle {
    constructor(x, y, color, size, vx, vy, life) {
        this.x=x; this.y=y; this.color=color; this.size=size;
        this.vx=vx; this.vy=vy; this.life=life; this.maxLife=life;
    }
    update() { this.x+=this.vx; this.y+=this.vy; this.life--; }
    draw() {
        ctx.globalAlpha=this.life/this.maxLife;
        ctx.fillStyle=this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size*(this.life/this.maxLife), 0, Math.PI*2);
        ctx.fill();
        ctx.globalAlpha=1;
    }
}
let eParticles = [];

function eSpawn(x, y, color, count) {
    for(let i=0; i<count; i++) {
        eParticles.push(new Particle(x, y, color, 3+Math.random()*4, (Math.random()-0.5)*8, (Math.random()-0.5)*8-2, 30+Math.random()*20));
    }
}

function init() {
    player = { x: 80, y: 275, vy: 0 };
    obstacles = [];
    coins = [];
    eParticles = [];
    distance = 0;
    coinCount = 0;
    shake = 0;
    jetting = false;
    gameState = 'playing';
    
    // Spawn initial obstacles
    for (let i = 0; i < 5; i++) {
        spawnObstacle(300 + i * 200);
    }
    // Spawn initial coins
    for (let i = 0; i < 8; i++) {
        spawnCoin();
    }
}

function spawnObstacle(x) {
    let type = Math.random();
    if (type < 0.4) {
        // Top stalactite
        obstacles.push({ x, y: 0, w: 30 + Math.random() * 20, h: 80 + Math.random() * 100, type: 'top' });
    } else if (type < 0.8) {
        // Bottom stalagmite
        obstacles.push({ x, y: canvas.height - (80 + Math.random() * 100), w: 30 + Math.random() * 20, h: 80 + Math.random() * 100, type: 'bottom' });
    } else {
        // Floating obstacle
        obstacles.push({ x, y: 100 + Math.random() * (canvas.height - 200), w: 40, h: 40, type: 'float' });
    }
}

function spawnCoin() {
    coins.push({
        x: 300 + coins.length * 100 + Math.random() * 50,
        y: 50 + Math.random() * (canvas.height - 100),
        collected: false,
        pulse: Math.random() * Math.PI * 2
    });
}

function update() {
    if (gameState !== 'playing') return;
    
    // Player jetpack
    if (jetting || keys.up || window.tU) {
        player.vy -= 0.6;
        // Jetpack flame
        if (Math.random() < 0.5) {
            eSpawn(player.x - 15, player.y + 15, '#ff9500', 2);
            eSpawn(player.x - 15, player.y + 15, '#ff6600', 1);
        }
    } else {
        player.vy += 0.25; // Gravity
    }
    
    player.vy = Math.max(-8, Math.min(8, player.vy));
    player.y += player.vy;
    
    // Boundaries
    if (player.y < 0) { player.y = 0; player.vy = 0; }
    if (player.y > canvas.height - 30) { player.y = canvas.height - 30; player.vy = 0; }
    
    // Move world
    obstacles.forEach(o => { o.x -= 4; });
    coins.forEach(c => { c.x -= 4; });
    
    // Distance
    distance += 4;
    document.getElementById('dist').textContent = Math.floor(distance / 10);
    
    // Spawn new
    if (obstacles.length < 6 && obstacles[obstacles.length-1].x < canvas.width) {
        spawnObstacle(obstacles[obstacles.length-1].x + 180 + Math.random() * 80);
    }
    if (coins.length < 8 && coins[coins.length-1] && coins[coins.length-1].x < canvas.width) {
        spawnCoin();
    }
    
    // Remove old
    obstacles = obstacles.filter(o => o.x > -100);
    coins = coins.filter(c => c.x > -50 && !c.collected);
    
    // Coin collection
    coins.forEach(c => {
        c.pulse += 0.1;
        if (!c.collected) {
            let dx = c.x - player.x;
            let dy = c.y - player.y;
            if (dx*dx + dy*dy < 1200) {
                c.collected = true;
                coinCount++;
                eSpawn(c.x, c.y, '#ffd700', 12);
            }
        }
    });
    document.getElementById('coins').textContent = coinCount;
    
    // Collision
    obstacles.forEach(o => {
        if (player.x + 20 > o.x && player.x - 20 < o.x + o.w &&
            player.y + 15 > o.y && player.y - 15 < o.y + o.h) {
            gameOver();
        }
    });
    
    // Particles
    eParticles = eParticles.filter(p => { p.update(); return p.life > 0; });
    
    if (shake > 0) shake *= 0.9;
}

function draw() {
    ctx.save();
    if (shake > 0.5) {
        ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
    }
    
    // Sky gradient
    let sky = ctx.createLinearGradient(0, 0, 0, canvas.height);
    sky.addColorStop(0, '#87CEEB');
    sky.addColorStop(1, '#98D8C8');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Clouds (parallax)
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    for (let i = 0; i < 6; i++) {
        let cx = ((i * 120 - distance * 0.1) % (canvas.width + 100)) - 50;
        let cy = 50 + (i % 3) * 80;
        ctx.beginPath();
        ctx.arc(cx, cy, 30, 0, Math.PI * 2);
        ctx.arc(cx + 35, cy - 10, 35, 0, Math.PI * 2);
        ctx.arc(cx + 70, cy, 30, 0, Math.PI * 2);
        ctx.arc(cx + 35, cy + 10, 25, 0, Math.PI * 2);
        ctx.fill();
    }
    
    // Ground
    ctx.fillStyle = '#5c4033';
    ctx.fillRect(0, canvas.height - 40, canvas.width, 40);
    ctx.fillStyle = '#8B4513';
    ctx.fillRect(0, canvas.height - 40, canvas.width, 10);
    
    // Ceiling
    ctx.fillStyle = '#5c4033';
    ctx.fillRect(0, 0, canvas.width, 30);
    
    // Obstacles
    obstacles.forEach(o => {
        let grad = ctx.createLinearGradient(o.x, 0, o.x + o.w, 0);
        grad.addColorStop(0, '#666');
        grad.addColorStop(0.5, '#888');
        grad.addColorStop(1, '#555');
        ctx.fillStyle = grad;
        
        if (o.type === 'top') {
            ctx.beginPath();
            ctx.moveTo(o.x, 0);
            ctx.lineTo(o.x + o.w/2, o.h);
            ctx.lineTo(o.x + o.w, 0);
            ctx.fill();
        } else if (o.type === 'bottom') {
            ctx.beginPath();
            ctx.moveTo(o.x, canvas.height);
            ctx.lineTo(o.x + o.w/2, o.y);
            ctx.lineTo(o.x + o.w, canvas.height);
            ctx.fill();
        } else {
            ctx.fillRect(o.x, o.y, o.w, o.h);
            // Danger stripes
            ctx.fillStyle = '#ff4444';
            ctx.fillRect(o.x + 5, o.y + 5, o.w - 10, 5);
            ctx.fillRect(o.x + 5, o.y + o.h - 10, o.w - 10, 5);
        }
    });
    
    // Coins
    coins.forEach(c => {
        if (!c.collected) {
            let scale = 1 + Math.sin(c.pulse) * 0.2;
            ctx.fillStyle = '#ffd700';
            ctx.shadowColor = '#ffd700';
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.arc(c.x, c.y, 15 * scale, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            
            ctx.font = '16px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('💰', c.x, c.y);
        }
    });
    
    // Player (character with jetpack)
    ctx.save();
    ctx.translate(player.x, player.y);
    
    // Jetpack
    ctx.fillStyle = '#444';
    ctx.fillRect(-18, -5, 10, 25);
    
    // Jetpack flame
    if (jetting || keys.up || window.tU) {
        ctx.fillStyle = '#ff9500';
        ctx.shadowColor = '#ff6600';
        ctx.shadowBlur = 20;
        ctx.beginPath();
        ctx.moveTo(-18, 20);
        ctx.lineTo(-13, 35 + Math.random() * 10);
        ctx.lineTo(-8, 20);
        ctx.fill();
        ctx.shadowBlur = 0;
    }
    
    // Body
    ctx.fillStyle = '#3498db';
    ctx.beginPath();
    ctx.ellipse(0, 0, 15, 20, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Head
    ctx.fillStyle = '#f4c59a';
    ctx.beginPath();
    ctx.arc(0, -18, 12, 0, Math.PI * 2);
    ctx.fill();
    
    // Goggles
    ctx.fillStyle = '#333';
    ctx.fillRect(-10, -20, 20, 6);
    ctx.fillStyle = '#00ccff';
    ctx.fillRect(-8, -19, 6, 4);
    ctx.fillRect(2, -19, 6, 4);
    
    ctx.restore();
    
    // Particles
    eParticles.forEach(p => p.draw());
    
    ctx.restore();
}

function gameOver() {
    gameState = 'over';
    shake = 20;
    eSpawn(player.x, player.y, '#ff4444', 40);
    
    if (distance > best) {
        best = distance;
        localStorage.setItem('jetpackBest', best);
    }
    
    document.getElementById('finalDist').textContent = 'Distance: ' + Math.floor(distance / 10) + 'm';
    clearInterval(gameLoop);
    setTimeout(() => {
        document.getElementById('gameOverScreen').classList.remove('hidden');
    }, 500);
}

function startGame() {
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('gameOverScreen').classList.add('hidden');
    document.getElementById('hud').style.display = 'flex';
    
    init();
    if (gameLoop) clearInterval(gameLoop);
    gameLoop = setInterval(() => { update(); draw(); }, 1000/60);
}

// Touch controls - tap anywhere to jet
const touchArea = document.getElementById('touchArea');
touchArea.addEventListener('touchstart', e => { e.preventDefault(); jetting = true; });
touchArea.addEventListener('touchend', e => { e.preventDefault(); jetting = false; });

// Keyboard
document.addEventListener('keydown', e => {
    if (e.key === 'ArrowUp' || e.key === 'w' || e.key === ' ') keys.up = true;
    if (e.key === 'Enter') startGame();
});
document.addEventListener('keyup', e => {
    if (e.key === 'ArrowUp' || e.key === 'w' || e.key === ' ') keys.up = false;
});

// Canvas click for jet
canvas.addEventListener('mousedown', () => jetting = true);
canvas.addEventListener('mouseup', () => jetting = false);
canvas.addEventListener('touchstart', e => { e.preventDefault(); jetting = true; });
canvas.addEventListener('touchend', e => { e.preventDefault(); jetting = false; });

best = parseInt(localStorage.getItem('jetpackBest') || '0');
document.getElementById('best').textContent = Math.floor(best / 10);
init();
draw();
</script>
</body>
</html>
