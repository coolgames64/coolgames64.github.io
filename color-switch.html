<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google-site-verification" content="LFolYFY1ySO4aIcMbyo8EdJKYLqHW9MS6_B1y7e5MPQ" />
    <title>Color Switch | Cool Games</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #1a1a2e; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        .score-board { position: fixed; top: 20px; color: white; font-size: 2rem; font-weight: bold; }
        #gameCanvas { border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .back-btn { position: fixed; top: 20px; left: 20px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 10px 20px; border-radius: 25px; text-decoration: none; font-weight: 600; }
    
        /* Mobile Touch Controls */
        .touch-controls {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            padding: 10px;
            z-index: 1000;
        }
        @media (pointer: coarse) {
            .touch-controls { display: flex !important; }
            body { padding-bottom: 120px !important; }
        }
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 5px;
            margin: 0 auto;
        }
        .dpad-btn {
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.4);
            border-radius: 10px;
            color: white;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .dpad-btn:active {
            background: rgba(255,255,255,0.4);
        }
        .dpad-center { background: rgba(0,0,0,0.2); }
        @media (max-width: 500px) {
            .dpad { grid-template-columns: repeat(3, 50px); grid-template-rows: repeat(3, 50px); }
            .dpad-btn { font-size: 20px; }
        }
    
    
        .tap-area {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 999;
            display: none;
        }
        @media (pointer: coarse) {
            .tap-area { display: block; }
        }
        .tap-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 80px; height: 80px;
            background: rgba(255,255,255,0.3);
            border: 3px solid rgba(255,255,255,0.6);
            border-radius: 50%;
            color: white;
            font-size: 14px;
            z-index: 1001;
            display: none;
            cursor: pointer;
        }
        @media (pointer: coarse) {
            .tap-btn { display: flex; align-items: center; justify-content: center; }
        }

    
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }
        .game-header {
            font-size: 20px;
            font-weight: 700;
            color: #00ff88;
            text-shadow: 0 0 15px rgba(0,255,136,0.5);
            margin-bottom: 10px;
        }
        .score-display {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
        }
        .score-box {
            background: rgba(0,0,0,0.5);
            border: 2px solid rgba(0,255,136,0.3);
            border-radius: 10px;
            padding: 6px 14px;
            text-align: center;
        }
        .score-label { font-size: 10px; color: rgba(255,255,255,0.6); text-transform: uppercase; }
        .score-val { font-size: 18px; font-weight: 700; color: #00ff88; }
        .game-wrapper { position: relative; }
        #gameCanvas {
            border-radius: 12px;
            border: 3px solid #00ff88;
            box-shadow: 0 0 30px rgba(0,255,136,0.3);
        }
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
        }
        .overlay.hidden { display: none; }
        .overlay h2 {
            font-size: 28px;
            color: #00ff88;
            text-shadow: 0 0 20px rgba(0,255,136,0.6);
            margin-bottom: 8px;
        }
        .overlay p { color: rgba(255,255,255,0.7); margin-bottom: 15px; }
        .btn-epic {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            color: #0f0f1a;
            border: none;
            padding: 12px 35px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(0,255,136,0.4);
        }
        .btn-epic:hover { transform: scale(1.05); }
        .touch-controls {
            display: none;
            position: fixed;
            bottom: 10px;
            left: 0;
            right: 0;
            z-index: 100;
            justify-content: center;
            gap: 8px;
        }
        @media (pointer: coarse) {
            .touch-controls { display: flex; }
            body { padding-bottom: 100px; }
        }
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 50px);
            grid-template-rows: repeat(2, 50px);
            gap: 4px;
        }
        .dpad-btn {
            background: rgba(0,255,136,0.2);
            border: 2px solid rgba(0,255,136,0.5);
            border-radius: 10px;
            color: #00ff88;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .dpad-btn:active { background: rgba(0,255,136,0.5); }

    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← Back</a>
    <div class="score-board">Score: <span id="score">0</span></div>
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        
        const colors = ['#ff6b6b', '#4ecdc4', '#ffe66d', '#95e1d3'];
        let colorIndex = 0;
        let ball = { x: 200, y: 500, radius: 12, vy: -12 };
        let obstacles = [];
        let score = 0;
        let gameOver = false;
        let rotation = 0;
        
        function createObstacle() {
            obstacles.push({
                y: -100,
                type: Math.floor(Math.random() * 3),
                rotation: 0,
                speed: 3 + score * 0.2
            });
        }
        
        createObstacle();
        
        document.addEventListener('click', () => {
            if (gameOver) {
                gameOver = false;
                ball.y = 500;
                ball.vy = -12;
                obstacles = [];
                score = 0;
                colorIndex = 0;
                createObstacle();
                return;
            }
            ball.vy = -12;
            colorIndex = (colorIndex + 1) % 4;
        });
        
        function draw() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, 400, 600);
            
            // Draw star background
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            for (let i = 0; i < 30; i++) {
                let x = (i * 137 + Date.now() / 50) % 400;
                let y = (i * 97 + Date.now() / 100) % 600;
                ctx.beginPath();
                ctx.arc(x, y, 1.5, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Draw obstacles
            obstacles.forEach(o => {
                ctx.save();
                ctx.translate(200, o.y);
                ctx.rotate(o.rotation);
                
                let c = colors[colorIndex];
                let c2 = colors[(colorIndex + 1) % 4];
                let c3 = colors[(colorIndex + 2) % 4];
                let c4 = colors[(colorIndex + 3) % 4];
                
                if (o.type === 0) {
                    // Four bars
                    ctx.fillStyle = c;
                    ctx.fillRect(-100, -15, 200, 30);
                    ctx.fillStyle = c2;
                    ctx.fillRect(-100, -15, 200, 30);
                    ctx.shadowColor = c;
                    ctx.shadowBlur = 20;
                    
                    ctx.fillStyle = c3;
                    ctx.fillRect(-15, -100, 30, 200);
                    ctx.fillStyle = c4;
                    ctx.fillRect(-15, -100, 30, 200);
                } else if (o.type === 1) {
                    // Rotating circle
                    ctx.beginPath();
                    ctx.arc(0, 0, 80, 0, Math.PI * 2);
                    ctx.fillStyle = c;
                    ctx.fill();
                    ctx.shadowColor = c;
                    ctx.shadowBlur = 30;
                    
                    ctx.beginPath();
                    ctx.arc(0, 0, 50, 0, Math.PI * 2);
                    ctx.fillStyle = '#1a1a2e';
                    ctx.fill();
                } else {
                    // Double bars
                    ctx.fillStyle = c;
                    ctx.fillRect(-100, -20, 200, 20);
                    ctx.fillStyle = c2;
                    ctx.fillRect(-100, 0, 200, 20);
                    ctx.shadowColor = c;
                    ctx.shadowBlur = 20;
                    ctx.fillStyle = c3;
                    ctx.fillRect(-100, -80, 200, 20);
                    ctx.fillStyle = c4;
                    ctx.fillRect(-100, -60, 200, 20);
                }
                
                ctx.restore();
            });
            
            // Draw ball
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = colors[colorIndex];
            ctx.shadowColor = colors[colorIndex];
            ctx.shadowBlur = 25;
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // Score
            ctx.fillStyle = 'white';
            ctx.font = 'bold 48px Poppins';
            ctx.textAlign = 'center';
            ctx.fillText(score, 200, 550);
            
            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, 400, 600);
                ctx.fillStyle = '#ff6b6b';
                ctx.font = 'bold 36px Poppins';
                ctx.fillText('GAME OVER!', 200, 270);
                ctx.fillStyle = 'white';
                ctx.font = '24px Poppins';
                ctx.fillText('Score: ' + score, 200, 330);
                ctx.font = '18px Poppins';
                ctx.fillStyle = '#ffd700';
                ctx.fillText('Click to Restart', 200, 380);
            }
        }
        
        function update() {
            if (gameOver) return;
            
            ball.vy += 0.4;
            ball.y += ball.vy;
            
            if (ball.y > 650) gameOver = true;
            
            obstacles.forEach(o => {
                o.y += 3;
                o.rotation += o.speed * 0.02;
                
                // Collision
                let dx = ball.x - 200;
                let dy = ball.y - o.y;
                let dist = Math.sqrt(dx * dx + dy * dy);
                
                if (o.type === 0 || o.type === 2) {
                    if (ball.y > o.y - 15 && ball.y < o.y + 15 && ball.x > 100 && ball.x < 300) {
                        let hitColor = colors[(colorIndex + 2) % 4];
                        if (o.type === 0) {
                            if ((ball.x > 185 || ball.x < 215) && Math.abs(dy) < 85) hitColor = colors[(colorIndex + 3) % 4];
                        }
                        if (o.y < 520 && o.y > 480) {
                            gameOver = true;
                        }
                    }
                }
                
                if (dist < 80 && dist > 50) {
                    if (o.y < 520 && o.y > 480) {
                        gameOver = true;
                    }
                }
            });
            
            // Score when passing obstacle
            obstacles.forEach((o, i) => {
                if (o.y > ball.y && !o.passed) {
                    o.passed = true;
                    score++;
                    scoreEl.textContent = score;
                }
                if (o.y > 700) {
                    obstacles.splice(i, 1);
                    createObstacle();
                }
            });
        }
        
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        gameLoop();
    
        // Tap anywhere to click
        document.addEventListener('touchstart', (e) => {
            if(e.target.tagName !== 'BUTTON' && e.target.tagName !== 'INPUT') {
                const touch = e.touches[0];
                const clickEvent = new MouseEvent('click', {
                    bubbles: true,
                    clientX: touch.clientX,
                    clientY: touch.clientY
                });
                e.target.dispatchEvent(clickEvent);
            }
        }, true);
        
        // Space/action button for mobile
        window.tapSpace = false;

    
    // EPIC PARTICLES
    let eParticles = [];
    class EParticle {
        constructor(x, y, color, size, vx, vy, life) {
            this.x=x; this.y=y; this.color=color; this.size=size;
            this.vx=vx; this.vy=vy; this.life=life; this.maxLife=life;
        }
        update() {
            this.x+=this.vx; this.y+=this.vy; this.vy+=0.1; this.life--;
        }
        draw() {
            let a = this.life/this.maxLife;
            ctx.globalAlpha=a;
            ctx.fillStyle=this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size*a, 0, Math.PI*2);
            ctx.fill();
            ctx.globalAlpha=1;
        }
    }
    function eSpawn(x, y, color, count) {
        for(let i=0; i<count; i++) {
            eParticles.push(new EParticle(x, y, color, 3+Math.random()*4, (Math.random()-0.5)*8, (Math.random()-0.5)*8-3, 30+Math.random()*20));
        }
    }

    
    window.tL=false; window.tR=false; window.tU=false; window.tD=false;
    ['btnL','btnR','btnU','btnD'].forEach(id => {
        let btn = document.getElementById(id);
        if(!btn) return;
        let key = {btnL:'tL',btnR:'tR',btnU:'tU',btnD:'tD'}[id];
        btn.addEventListener('touchstart', e => { e.preventDefault(); window[key]=true; });
        btn.addEventListener('touchend', e => { e.preventDefault(); window[key]=false; });
        btn.addEventListener('mousedown', () => window[key]=true);
        btn.addEventListener('mouseup', () => window[key]=false);
    });
    setInterval(() => {
        if(window.tL) keys.left=true; else keys.left=false;
        if(window.tR) keys.right=true; else keys.right=false;
        if(window.tU) keys.up=true; else keys.up=false;
        if(window.tD) keys.down=true; else keys.down=false;
    }, 50);

    </script>

    <button class="tap-btn" ontouchstart="window.tapSpace=true" ontouchend="window.tapSpace=false">TAP</button>

</body>
</html>
