<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🧩 2048 Epic - Cool Games 64</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            color: white;
        }
        .header {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }
        .score-box {
            background: rgba(0,0,0,0.5);
            border: 2px solid rgba(102,126,234,0.5);
            border-radius: 15px;
            padding: 10px 20px;
            text-align: center;
        }
        .score-label { font-size: 11px; color: rgba(255,255,255,0.6); text-transform: uppercase; }
        .score-value { font-size: 24px; font-weight: 800; color: #667eea; text-shadow: 0 0 20px rgba(102,126,234,0.5); }
        .game-container {
            position: relative;
        }
        #gameCanvas {
            border-radius: 16px;
            border: 4px solid #667eea;
            box-shadow: 0 0 50px rgba(102,126,234,0.4), 0 20px 60px rgba(0,0,0,0.5);
        }
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .overlay.hidden { display: none; }
        .overlay h1 {
            font-size: 42px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .overlay p { color: rgba(255,255,255,0.7); margin-bottom: 25px; }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 50px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(102,126,234,0.5);
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.05); }
        .combo-text {
            position: absolute;
            font-size: 28px;
            font-weight: 800;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255,215,0,0.8);
            pointer-events: none;
            animation: comboAnim 1s ease-out forwards;
        }
        @keyframes comboAnim {
            0% { transform: scale(0.5); opacity: 1; }
            50% { transform: scale(1.5); opacity: 1; }
            100% { transform: scale(2) translateY(-30px); opacity: 0; }
        }
        .instructions {
            margin-top: 15px;
            color: rgba(255,255,255,0.5);
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="score-box">
            <div class="score-label">Score</div>
            <div class="score-value" id="score">0</div>
        </div>
        <div class="score-box">
            <div class="score-label">Best</div>
            <div class="score-value" id="best">0</div>
        </div>
        <div class="score-box">
            <div class="score-label">Level</div>
            <div class="score-value" id="level">1</div>
        </div>
    </div>
    <div class="game-container">
        <canvas id="gameCanvas" width="340" height="340"></canvas>
        <div class="overlay" id="startOverlay">
            <h1>🧩 2048 EPIC</h1>
            <p>Swipe to merge tiles, reach 2048!</p>
            <button class="btn" onclick="startGame()">START</button>
        </div>
        <div class="overlay hidden" id="gameOverOverlay">
            <h1>🎉 YOU WIN!</h1>
            <p id="winText">You reached 2048!</p>
            <button class="btn" onclick="continueGame()">CONTINUE</button>
            <button class="btn" onclick="startGame()" style="margin-top:10px; background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">NEW GAME</button>
        </div>
        <div class="overlay hidden" id="loseOverlay">
            <h1>💀 GAME OVER</h1>
            <p id="loseText">Final Score: 0</p>
            <button class="btn" onclick="startGame()">TRY AGAIN</button>
        </div>
    </div>
    <p class="instructions">Use arrow keys or swipe to move tiles</p>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const gridSize = 4;
const tileSize = 80;
const gap = 6;

let grid, score, best, level, gameState, won;
let animations = [];
let particles = [];

class Tile {
    constructor(value, row, col) {
        this.value = value;
        this.row = row;
        this.col = col;
        this.targetRow = row;
        this.targetCol = col;
        this.x = col * (tileSize + gap);
        this.y = row * (tileSize + gap);
        this.scale = 1;
        this.merged = false;
        this.new = true;
    }
}

class Particle {
    constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.color = color;
        this.vx = (Math.random() - 0.5) * 10;
        this.vy = (Math.random() - 0.5) * 10;
        this.life = 40;
        this.size = 5 + Math.random() * 5;
    }
    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += 0.2;
        this.life--;
    }
    draw() {
        ctx.globalAlpha = this.life / 40;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * (this.life / 40), 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
    }
}

function getColor(v) {
    const colors = {
        2: '#667eea', 4: '#764ba2', 8: '#f093fb', 16: '#f5576c',
        32: '#ff6b6b', 64: '#ffa502', 128: '#ffdd59', 256: '#00ff88',
        512: '#00cc6a', 1024: '#00b894', 2048: '#ffd700'
    };
    return colors[v] || '#333';
}

function init() {
    grid = [];
    for (let r = 0; r < gridSize; r++) {
        grid[r] = [];
        for (let c = 0; c < gridSize; c++) {
            grid[r][c] = null;
        }
    }
    score = 0;
    level = 1;
    won = false;
    gameState = 'playing';
    particles = [];
    addRandomTile();
    addRandomTile();
    updateUI();
}

function addRandomTile() {
    let empty = [];
    for (let r = 0; r < gridSize; r++) {
        for (let c = 0; c < gridSize; c++) {
            if (!grid[r][c]) empty.push({ r, c });
        }
    }
    if (empty.length > 0) {
        let { r, c } = empty[Math.floor(Math.random() * empty.length)];
        grid[r][c] = new Tile(Math.random() < 0.9 ? 2 : 4, r, c);
    }
}

function updateUI() {
    document.getElementById('score').textContent = score;
    document.getElementById('best').textContent = Math.max(score, parseInt(localStorage.getItem('epic2048best') || '0'));
    document.getElementById('level').textContent = level;
}

function spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
        particles.push(new Particle(x, y, color));
    }
}

function showCombo(text, x, y) {
    let div = document.createElement('div');
    div.className = 'combo-text';
    div.textContent = text;
    div.style.left = x + 'px';
    div.style.top = y + 'px';
    document.querySelector('.game-container').appendChild(div);
    setTimeout(() => div.remove(), 1000);
}

function move(dir) {
    if (gameState !== 'playing') return;
    
    let moved = false;
    let mergedThisTurn = [];
    let comboCount = 0;
    
    // Reset merged flags
    for (let r = 0; r < gridSize; r++) {
        for (let c = 0; c < gridSize; c++) {
            if (grid[r][c]) grid[r][c].merged = false;
        }
    }
    
    // Determine traversal order based on direction
    let rowOrder = [0, 1, 2, 3];
    let colOrder = [0, 1, 2, 3];
    if (dir === 'down') rowOrder = [3, 2, 1, 0];
    if (dir === 'right') colOrder = [3, 2, 1, 0];
    
    for (let ri of rowOrder) {
        for (let ci of colOrder) {
            let tile = grid[ri][ci];
            if (!tile) continue;
            
            let newR = ri, newC = ci;
            
            // Find farthest position
            while (true) {
                let nextR = newR + (dir === 'up' ? -1 : dir === 'down' ? 1 : 0);
                let nextC = newC + (dir === 'left' ? -1 : dir === 'right' ? 1 : 0);
                
                if (nextR < 0 || nextR >= gridSize || nextC < 0 || nextC >= gridSize) break;
                
                if (!grid[nextR][nextC]) {
                    newR = nextR;
                    newC = nextC;
                } else if (grid[nextR][nextC].value === tile.value && !grid[nextR][nextC].merged) {
                    // Merge
                    newR = nextR;
                    newC = nextC;
                    break;
                } else {
                    break;
                }
            }
            
            if (newR !== ri || newC !== ci) {
                moved = true;
                
                if (grid[newR][newC]) {
                    // Merge tiles
                    let target = grid[newR][newC];
                    target.value *= 2;
                    target.merged = true;
                    target.scale = 1.3;
                    
                    // Particles!
                    let color = getColor(target.value);
                    let px = newC * (tileSize + gap) + tileSize / 2;
                    let py = newR * (tileSize + gap) + tileSize / 2;
                    spawnParticles(px, py, color, 20);
                    
                    // Combo text
                    comboCount++;
                    showCombo('+' + target.value, px, py - 20);
                    
                    // Score
                    score += target.value;
                    if (score > parseInt(localStorage.getItem('epic2048best') || '0')) {
                        localStorage.setItem('epic2048best', score);
                    }
                    
                    // Check for 2048
                    if (target.value >= 2048 && !won) {
                        won = true;
                        gameState = 'won';
                        document.getElementById('winText').textContent = 'You reached ' + target.value + '!';
                        document.getElementById('gameOverOverlay').classList.remove('hidden');
                    }
                    
                    grid[ri][ci] = null;
                } else {
                    grid[newR][newC] = tile;
                    grid[ri][ci] = null;
                    tile.targetRow = newR;
                    tile.targetCol = newC;
                }
            }
        }
    }
    
    if (moved) {
        // Level up every 500 points
        let newLevel = Math.floor(score / 500) + 1;
        if (newLevel > level) {
            level = newLevel;
            showCombo('LEVEL ' + level, 150, 150);
        }
        
        addRandomTile();
        updateUI();
    }
}

function update() {
    // Animate tiles
    for (let r = 0; r < gridSize; r++) {
        for (let c = 0; c < gridSize; c++) {
            let tile = grid[r][c];
            if (tile) {
                // Move towards target
                let dx = tile.targetCol * (tileSize + gap) - tile.x;
                let dy = tile.targetRow * (tileSize + gap) - tile.y;
                tile.x += dx * 0.3;
                tile.y += dy * 0.3;
                
                // Scale animation
                if (tile.scale > 1) tile.scale -= 0.05;
                if (tile.scale < 1) tile.scale = 1;
                if (tile.new && tile.scale === 1) tile.new = false;
            }
        }
    }
    
    // Update particles
    particles = particles.filter(p => { p.update(); return p.life > 0; });
}

function draw() {
    // Background
    ctx.fillStyle = '#0a0a15';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Draw grid background
    ctx.fillStyle = 'rgba(255,255,255,0.05)';
    for (let r = 0; r < gridSize; r++) {
        for (let c = 0; c < gridSize; c++) {
            ctx.beginPath();
            ctx.roundRect(c * (tileSize + gap), r * (tileSize + gap), tileSize, tileSize, 8);
            ctx.fill();
        }
    }
    
    // Draw tiles
    for (let r = 0; r < gridSize; r++) {
        for (let c = 0; c < gridSize; c++) {
            let tile = grid[r][c];
            if (!tile) continue;
            
            let color = getColor(tile.value);
            
            ctx.save();
            ctx.translate(tile.x + tileSize / 2, tile.y + tileSize / 2);
            ctx.scale(tile.scale, tile.scale);
            
            // Glow effect
            ctx.shadowColor = color;
            ctx.shadowBlur = 15;
            
            // Tile
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.roundRect(-tileSize / 2, -tileSize / 2, tileSize, tileSize, 8);
            ctx.fill();
            
            ctx.shadowBlur = 0;
            
            // Number
            ctx.fillStyle = 'white';
            ctx.font = 'bold ' + (tile.value >= 1000 ? '22' : tile.value >= 100 ? '26' : '32') + 'px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(tile.value, 0, 2);
            
            ctx.restore();
        }
    }
    
    // Draw particles
    particles.forEach(p => p.draw());
}

function gameLoop() {
    update();
    draw();
}

function startGame() {
    document.getElementById('startOverlay').classList.add('hidden');
    document.getElementById('gameOverOverlay').classList.add('hidden');
    document.getElementById('loseOverlay').classList.add('hidden');
    init();
    if (!window.gLoop) {
        window.gLoop = setInterval(gameLoop, 1000 / 60);
    }
}

function continueGame() {
    gameState = 'playing';
    document.getElementById('gameOverOverlay').classList.add('hidden');
}

// Touch/swipe support
let touchStartX, touchStartY;
canvas.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
});
canvas.addEventListener('touchend', e => {
    if (!touchStartX || !touchStartY) return;
    let dx = e.changedTouches[0].clientX - touchStartX;
    let dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) > Math.abs(dy)) {
        move(dx > 0 ? 'right' : 'left');
    } else {
        move(dy > 0 ? 'down' : 'up');
    }
    touchStartX = touchStartY = null;
});

// Keyboard
document.addEventListener('keydown', e => {
    if (e.key === 'ArrowUp' || e.key === 'w') move('up');
    if (e.key === 'ArrowDown' || e.key === 's') move('down');
    if (e.key === 'ArrowLeft' || e.key === 'a') move('left');
    if (e.key === 'ArrowRight' || e.key === 'd') move('right');
    if (e.key === ' ') startGame();
});

if (!ctx.roundRect) {
    ctx.roundRect = function(x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
    };
}

init();
gameLoop();
</script>
</body>
</html>
