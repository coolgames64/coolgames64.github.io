<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🐸 Frogger</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }
        h1 { font-size: 2.5rem; margin-bottom: 10px; color: #27ae60; }
        .score-board { font-size: 1.3rem; margin-bottom: 15px; }
        .score-board span { background: rgba(39,174,96,0.2); padding: 5px 15px; border-radius: 15px; }
        canvas { max-width: 100%; 
            max-width: 100vw; border: 3px solid #27ae60; border-radius: 10px; }
        .instructions { margin-top: 15px; color: #888; font-size: 1rem; }
        .instructions span { background: #27ae60; padding: 3px 10px; border-radius: 5px; }
        .back-btn {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255,255,255,0.1); color: white;
            border: 2px solid rgba(255,255,255,0.3); padding: 10px 20px;
            border-radius: 8px; cursor: pointer; text-decoration: none;
        }
        .back-btn:hover { background: rgba(255,255,255,0.2); }
    
        /* Mobile Touch Controls */
        .touch-controls {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            padding: 10px;
            z-index: 1000;
        }
        @media (pointer: coarse) {
            .touch-controls { display: flex !important; }
            body { padding-bottom: 120px !important; }
        }
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 5px;
            margin: 0 auto;
        }
        .dpad-btn {
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.4);
            border-radius: 10px;
            color: white;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .dpad-btn:active {
            background: rgba(255,255,255,0.4);
        }
        .dpad-center { background: rgba(0,0,0,0.2); }
        @media (max-width: 500px) {
            .dpad { grid-template-columns: repeat(3, 50px); grid-template-rows: repeat(3, 50px); }
            .dpad-btn { font-size: 20px; }
        }
    
    
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }
        .game-header {
            font-size: 20px;
            font-weight: 700;
            color: #00ff88;
            text-shadow: 0 0 15px rgba(0,255,136,0.5);
            margin-bottom: 10px;
        }
        .score-display {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
        }
        .score-box {
            background: rgba(0,0,0,0.5);
            border: 2px solid rgba(0,255,136,0.3);
            border-radius: 10px;
            padding: 6px 14px;
            text-align: center;
        }
        .score-label { font-size: 10px; color: rgba(255,255,255,0.6); text-transform: uppercase; }
        .score-val { font-size: 18px; font-weight: 700; color: #00ff88; }
        .game-wrapper { position: relative; }
        #gameCanvas {
            border-radius: 12px;
            border: 3px solid #00ff88;
            box-shadow: 0 0 30px rgba(0,255,136,0.3);
        }
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
        }
        .overlay.hidden { display: none; }
        .overlay h2 {
            font-size: 28px;
            color: #00ff88;
            text-shadow: 0 0 20px rgba(0,255,136,0.6);
            margin-bottom: 8px;
        }
        .overlay p { color: rgba(255,255,255,0.7); margin-bottom: 15px; }
        .btn-epic {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            color: #0f0f1a;
            border: none;
            padding: 12px 35px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(0,255,136,0.4);
        }
        .btn-epic:hover { transform: scale(1.05); }
        .touch-controls {
            display: none;
            position: fixed;
            bottom: 10px;
            left: 0;
            right: 0;
            z-index: 100;
            justify-content: center;
            gap: 8px;
        }
        @media (pointer: coarse) {
            .touch-controls { display: flex; }
            body { padding-bottom: 100px; }
        }
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 50px);
            grid-template-rows: repeat(2, 50px);
            gap: 4px;
        }
        .dpad-btn {
            background: rgba(0,255,136,0.2);
            border: 2px solid rgba(0,255,136,0.5);
            border-radius: 10px;
            color: #00ff88;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .dpad-btn:active { background: rgba(0,255,136,0.5); }

    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← Back to Games</a>
    <h1>🐸 FROGGER</h1>
    <div class="score-board">
        <span>Score: <strong id="score">0</strong></span>
        <span>Lives: <strong id="lives">3</strong></span>
    </div>
    <canvas id="gameCanvas" width="400" height="450"></canvas>
    <div class="instructions"><span>↑ ↓ ← →</span> to move!</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let frog = { x: 200, y: 400, lives: 3, score: 0 };
        let cars = [];
        let logs = [];
        let gameLoop;
        let won = false;
        
        function init() {
            frog = { x: 200, y: 400, lives: 3, score: 0 };
            cars = [];
            logs = [];
            won = false;
            
            // Create cars
            for (let i = 0; i < 4; i++) {
                cars.push({ x: i * 120, y: 300, speed: 2 + Math.random() * 2, dir: 1, color: '#e74c3c' });
                cars.push({ x: 50 + i * 100, y: 200, speed: 3 + Math.random() * 2, dir: -1, color: '#3498db' });
            }
            
            // Create logs
            for (let i = 0; i < 3; i++) {
                logs.push({ x: i * 150, y: 100, speed: 2, size: 80 });
                logs.push({ x: 100 + i * 120, y: 50, speed: -2.5, size: 100 });
            }
            
            document.getElementById('score').textContent = '0';
            document.getElementById('lives').textContent = '3';
        }
        
        function draw() {
            // Water (top half)
            ctx.fillStyle = '#3498db';
            ctx.fillRect(0, 0, canvas.width, 200);
            
            // Road (bottom half)
            ctx.fillStyle = '#333';
            ctx.fillRect(0, 200, canvas.width, 250);
            
            // Safe zones
            ctx.fillStyle = '#27ae60';
            ctx.fillRect(0, 0, canvas.width, 30);
            ctx.fillRect(0, 420, canvas.width, 30);
            
            // Road markings
            ctx.strokeStyle = '#fff';
            ctx.setLineDash([20, 20]);
            ctx.beginPath();
            ctx.moveTo(0, 250);
            ctx.lineTo(canvas.width, 250);
            ctx.moveTo(0, 350);
            ctx.lineTo(canvas.width, 350);
            ctx.stroke();
            ctx.setLineDash([]);
            
            // Cars
            cars.forEach(car => {
                ctx.fillStyle = car.color;
                ctx.fillRect(car.x - 20, car.y - 15, 40, 30);
                ctx.fillStyle = '#333';
                ctx.beginPath();
                ctx.arc(car.x - 12, car.y + 12, 6, 0, Math.PI * 2);
                ctx.arc(car.x + 12, car.y + 12, 6, 0, Math.PI * 2);
                ctx.fill();
            });
            
            // Logs
            logs.forEach(log => {
                ctx.fillStyle = '#8B4513';
                ctx.fillRect(log.x, log.y - 15, log.size, 30);
                ctx.fillStyle = '#654321';
                for (let i = 0; i < log.size; i += 20) {
                    ctx.fillRect(log.x + i, log.y - 15, 2, 30);
                }
            });
            
            // Frog
            ctx.fillStyle = '#27ae60';
            ctx.beginPath();
            ctx.arc(frog.x, frog.y, 15, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#229954';
            ctx.beginPath();
            ctx.arc(frog.x - 5, frog.y - 5, 4, 0, Math.PI * 2);
            ctx.arc(frog.x + 5, frog.y - 5, 4, 0, Math.PI * 2);
            ctx.fill();
        }
        
        function update() {
            // Move cars
            cars.forEach(car => {
                car.x += car.speed * car.dir;
                if (car.x > canvas.width + 30) car.x = -30;
                if (car.x < -30) car.x = canvas.width + 30;
            });
            
            // Move logs
            logs.forEach(log => {
                log.x += log.speed;
                if (log.x > canvas.width + 120) log.x = -120;
                if (log.x < -120) log.x = canvas.width + 120;
            });
            
            // Check car collision
            cars.forEach(car => {
                if (Math.abs(frog.x - car.x) < 25 && Math.abs(frog.y - car.y) < 20) {
                    frog.lives--;
                    document.getElementById('lives').textContent = frog.lives;
                    frog.x = 200;
                    frog.y = 400;
                    
                    if (frog.lives <= 0) {
                        endGame();
                    }
                }
            });
            
            // Check water (on log)
            if (frog.y < 200) {
                let onLog = false;
                logs.forEach(log => {
                    if (frog.x > log.x && frog.x < log.x + log.size && Math.abs(frog.y - log.y) < 20) {
                        onLog = true;
                        frog.x += log.speed;
                    }
                });
                
                if (!onLog) {
                    frog.lives--;
                    document.getElementById('lives').textContent = frog.lives;
                    frog.x = 200;
                    frog.y = 400;
                    
                    if (frog.lives <= 0) {
                        endGame();
                    }
                }
            }
            
            // Won!
            if (frog.y < 30 && !won) {
                won = true;
                frog.score += 100;
                document.getElementById('score').textContent = frog.score;
                
                setTimeout(() => {
                    frog.x = 200;
                    frog.y = 400;
                    won = false;
                }, 500);
            }
            
            // Bounds
            frog.x = Math.max(15, Math.min(385, frog.x));
        }
        
        function endGame() {
            clearInterval(gameLoop);
            setTimeout(() => {
                alert(`Game Over!\nFinal Score: ${frog.score}\n\nClick OK to play again!`);
                init();
                gameLoop = setInterval(() => {
                    update();
                    draw();
                }, 1000 / 60);
            }, 100);
        }
        
        document.addEventListener('keydown', e => {
            if (won) return;
            
            if (e.code === 'ArrowUp' && frog.y > 15) frog.y -= 30;
            if (e.code === 'ArrowDown' && frog.y < 415) frog.y += 30;
            if (e.code === 'ArrowLeft' && frog.x > 15) frog.x -= 30;
            if (e.code === 'ArrowRight' && frog.x < 385) frog.x += 30;
        });
        
        init();
        draw();
        gameLoop = setInterval(() => {
            update();
            draw();
        }, 1000 / 60);
    
        window.tL=false; window.tR=false; window.tU=false; window.tD=false;
        setInterval(() => {
            if(window.tL) keys.left=true; else keys.left=false;
            if(window.tR) keys.right=true; else keys.right=false;
            if(window.tU) keys.up=true; else keys.up=false;
            if(window.tD) keys.down=true; else keys.down=false;
        }, 50);

    
    // EPIC PARTICLES
    let eParticles = [];
    class EParticle {
        constructor(x, y, color, size, vx, vy, life) {
            this.x=x; this.y=y; this.color=color; this.size=size;
            this.vx=vx; this.vy=vy; this.life=life; this.maxLife=life;
        }
        update() {
            this.x+=this.vx; this.y+=this.vy; this.vy+=0.1; this.life--;
        }
        draw() {
            let a = this.life/this.maxLife;
            ctx.globalAlpha=a;
            ctx.fillStyle=this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size*a, 0, Math.PI*2);
            ctx.fill();
            ctx.globalAlpha=1;
        }
    }
    function eSpawn(x, y, color, count) {
        for(let i=0; i<count; i++) {
            eParticles.push(new EParticle(x, y, color, 3+Math.random()*4, (Math.random()-0.5)*8, (Math.random()-0.5)*8-3, 30+Math.random()*20));
        }
    }

    </script>

    <div class="touch-controls" style="display:none;position:fixed;bottom:15px;left:0;right:0;z-index:1000;pointer-events:none;">
      <div style="display:flex;gap:20px;align-items:center;justify-content:center;pointer-events:auto;">
        <button class="dpad-btn" ontouchstart="window.tL=true;window.tR=false;window.tU=false" ontouchend="window.tL=false" onmousedown="window.tL=true" onmouseup="window.tL=false" style="width:70px;height:70px;border-radius:50%;font-size:26px;background:rgba(255,255,255,0.25);border:3px solid rgba(255,255,255,0.5);color:white;">&#9664;</button>
        <button class="dpad-btn" ontouchstart="window.tU=true;window.tL=false;window.tR=false" ontouchend="window.tU=false" onmousedown="window.tU=true" onmouseup="window.tU=false" style="width:70px;height:70px;border-radius:50%;font-size:26px;background:rgba(255,255,255,0.25);border:3px solid rgba(255,255,255,0.5);color:white;">&#9650;</button>
        <button class="dpad-btn" ontouchstart="window.tR=true;window.tL=false;window.tU=false" ontouchend="window.tR=false" onmousedown="window.tR=true" onmouseup="window.tR=false" style="width:70px;height:70px;border-radius:50%;font-size:26px;background:rgba(255,255,255,0.25);border:3px solid rgba(255,255,255,0.5);color:white;">&#9654;</button>
      </div>
    </div>

</body>
</html>
