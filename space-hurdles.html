<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google-site-verification" content="LFolYFY1ySO4aIcMbyo8EdJKYLqHW9MS6_B1y7e5MPQ" />
    <title>Space Hurdles | Cool Games</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #0a0a1a; min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow: hidden; }
        .header { display: flex; gap: 20px; padding: 15px; }
        .score-box { background: rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 15px; color: white; font-weight: bold; }
        #gameCanvas { border-radius: 15px; box-shadow: 0 10px 40px rgba(100,100,255,0.2); }
        .back-btn { position: fixed; top: 20px; left: 20px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 10px 20px; border-radius: 25px; text-decoration: none; font-weight: 600; }
    
        /* Mobile Touch Controls */
        .touch-controls {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            padding: 10px;
            z-index: 1000;
        }
        @media (pointer: coarse) {
            .touch-controls { display: flex !important; }
            body { padding-bottom: 120px !important; }
        }
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 5px;
            margin: 0 auto;
        }
        .dpad-btn {
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.4);
            border-radius: 10px;
            color: white;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .dpad-btn:active {
            background: rgba(255,255,255,0.4);
        }
        .dpad-center { background: rgba(0,0,0,0.2); }
        @media (max-width: 500px) {
            .dpad { grid-template-columns: repeat(3, 50px); grid-template-rows: repeat(3, 50px); }
            .dpad-btn { font-size: 20px; }
        }
    
    
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }
        .game-header {
            font-size: 20px;
            font-weight: 700;
            color: #00ff88;
            text-shadow: 0 0 15px rgba(0,255,136,0.5);
            margin-bottom: 10px;
        }
        .score-display {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
        }
        .score-box {
            background: rgba(0,0,0,0.5);
            border: 2px solid rgba(0,255,136,0.3);
            border-radius: 10px;
            padding: 6px 14px;
            text-align: center;
        }
        .score-label { font-size: 10px; color: rgba(255,255,255,0.6); text-transform: uppercase; }
        .score-val { font-size: 18px; font-weight: 700; color: #00ff88; }
        .game-wrapper { position: relative; }
        #gameCanvas {
            border-radius: 12px;
            border: 3px solid #00ff88;
            box-shadow: 0 0 30px rgba(0,255,136,0.3);
        }
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
        }
        .overlay.hidden { display: none; }
        .overlay h2 {
            font-size: 28px;
            color: #00ff88;
            text-shadow: 0 0 20px rgba(0,255,136,0.6);
            margin-bottom: 8px;
        }
        .overlay p { color: rgba(255,255,255,0.7); margin-bottom: 15px; }
        .btn-epic {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            color: #0f0f1a;
            border: none;
            padding: 12px 35px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(0,255,136,0.4);
        }
        .btn-epic:hover { transform: scale(1.05); }
        .touch-controls {
            display: none;
            position: fixed;
            bottom: 10px;
            left: 0;
            right: 0;
            z-index: 100;
            justify-content: center;
            gap: 8px;
        }
        @media (pointer: coarse) {
            .touch-controls { display: flex; }
            body { padding-bottom: 100px; }
        }
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 50px);
            grid-template-rows: repeat(2, 50px);
            gap: 4px;
        }
        .dpad-btn {
            background: rgba(0,255,136,0.2);
            border: 2px solid rgba(0,255,136,0.5);
            border-radius: 10px;
            color: #00ff88;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .dpad-btn:active { background: rgba(0,255,136,0.5); }

    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← Back</a>
    <div class="header">
        <div class="score-box">Score: <span id="score">0</span></div>
        <div class="score-box">Best: <span id="best">0</span></div>
    </div>
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const bestEl = document.getElementById('best');
        
        let player = { x: 80, y: 450, vy: 0, size: 30, jumping: false };
        let hurdles = [];
        let stars = [];
        let score = 0;
        let best = localStorage.getItem('spaceHurdlesBest') || 0;
        let gameOver = false;
        let gameStarted = false;
        let groundY = 500;
        
        bestEl.textContent = best;
        
        // Create stars
        for (let i = 0; i < 100; i++) {
            stars.push({
                x: Math.random() * 400,
                y: Math.random() * 600,
                size: Math.random() * 2,
                twinkle: Math.random() * Math.PI * 2
            });
        }
        
        function createHurdle() {
            hurdles.push({
                x: 450,
                width: 30,
                height: 60 + Math.random() * 40,
                speed: 5 + score * 0.1
            });
        }
        
        document.addEventListener('keydown', e => {
            if (e.code === 'Space' || e.code === 'ArrowUp') {
                e.preventDefault();
                if (!gameStarted) gameStarted = true;
                if (gameOver) return;
                if (!player.jumping) {
                    player.vy = -15;
                    player.jumping = true;
                }
            }
        });
        
        canvas.addEventListener('click', () => {
            if (!gameStarted) gameStarted = true;
            if (gameOver) {
                gameOver = false;
                player.y = 450;
                player.vy = 0;
                hurdles = [];
                score = 0;
                return;
            }
            if (!player.jumping) {
                player.vy = -15;
                player.jumping = true;
            }
        });
        
        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            if (!gameStarted) gameStarted = true;
            if (gameOver) {
                gameOver = false;
                player.y = 450;
                player.vy = 0;
                hurdles = [];
                score = 0;
                return;
            }
            if (!player.jumping) {
                player.vy = -15;
                player.jumping = true;
            }
        });
        
        function draw() {
            // Space background
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, 400, 600);
            
            // Stars
            stars.forEach(s => {
                ctx.fillStyle = `rgba(255,255,255,${0.5 + Math.sin(s.twinkle) * 0.5})`;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                ctx.fill();
                s.twinkle += 0.05;
            });
            
            // Planets
            ctx.fillStyle = '#e74c3c';
            ctx.beginPath();
            ctx.arc(350, 100, 40, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#c0392b';
            ctx.beginPath();
            ctx.arc(345, 95, 40, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#3498db';
            ctx.beginPath();
            ctx.arc(50, 150, 25, 0, Math.PI * 2);
            ctx.fill();
            
            // Ground
            let groundGradient = ctx.createLinearGradient(0, groundY, 0, 600);
            groundGradient.addColorStop(0, '#2c3e50');
            groundGradient.addColorStop(1, '#1a252f');
            ctx.fillStyle = groundGradient;
            ctx.fillRect(0, groundY, 400, 100);
            
            // Ground line
            ctx.strokeStyle = '#3498db';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(0, groundY);
            ctx.lineTo(400, groundY);
            ctx.stroke();
            
            // Moon base
            ctx.fillStyle = '#bdc3c7';
            ctx.beginPath();
            ctx.ellipse(300, groundY - 20, 50, 20, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Hurdles
            hurdles.forEach(h => {
                // Pillar
                ctx.fillStyle = '#7f8c8d';
                ctx.fillRect(h.x, groundY - h.height, h.width, h.height);
                
                // Top
                ctx.fillStyle = '#e74c3c';
                ctx.beginPath();
                ctx.arc(h.x + h.width/2, groundY - h.height, h.width/2 + 5, 0, Math.PI * 2);
                ctx.fill();
                
                // Glow
                ctx.shadowColor = '#e74c3c';
                ctx.shadowBlur = 15;
                ctx.fill();
                ctx.shadowBlur = 0;
            });
            
            // Player (astronaut)
            ctx.save();
            ctx.translate(player.x, player.y);
            
            // Jetpack
            ctx.fillStyle = '#95a5a6';
            ctx.fillRect(-15, -5, 10, 25);
            ctx.fillStyle = '#e74c3c';
            if (player.jumping && player.vy < 0) {
                ctx.beginPath();
                ctx.moveTo(-12, 20);
                ctx.lineTo(-10, 30 + Math.random() * 10);
                ctx.lineTo(-8, 20);
                ctx.fill();
            }
            
            // Suit
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.ellipse(0, 0, player.size * 0.8, player.size, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Helmet
            ctx.fillStyle = '#3498db';
            ctx.beginPath();
            ctx.arc(0, -5, 15, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            ctx.beginPath();
            ctx.arc(-3, -8, 8, 0, Math.PI * 2);
            ctx.fill();
            
            // Legs
            ctx.fillStyle = 'white';
            ctx.fillRect(-8, player.size - 5, 6, 15);
            ctx.fillRect(2, player.size - 5, 6, 15);
            
            ctx.restore();
            
            // Start/Game Over
            if (!gameStarted) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, 400, 600);
                ctx.fillStyle = 'white';
                ctx.font = 'bold 28px Poppins';
                ctx.textAlign = 'center';
                ctx.fillText('🚀 SPACE HURDLES 🚀', 200, 250);
                ctx.font = '18px Poppins';
                ctx.fillText('Jump over the hurdles!', 200, 300);
                ctx.fillText('SPACE / TAP / CLICK to jump', 200, 340);
            }
            
            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.8)';
                ctx.fillRect(0, 0, 400, 600);
                ctx.fillStyle = '#e74c3c';
                ctx.font = 'bold 36px Poppins';
                ctx.textAlign = 'center';
                ctx.fillText('💥 CRASH!', 200, 250);
                ctx.fillStyle = 'white';
                ctx.font = '24px Poppins';
                ctx.fillText('Score: ' + score, 200, 320);
                ctx.font = '18px Poppins';
                ctx.fillStyle = '#ffd700';
                ctx.fillText('Click to Restart', 200, 380);
            }
        }
        
        function update() {
            if (!gameStarted || gameOver) return;
            
            // Physics
            player.vy += 0.6;
            player.y += player.vy;
            
            if (player.y > groundY - player.size) {
                player.y = groundY - player.size;
                player.vy = 0;
                player.jumping = false;
            }
            
            // Hurdles
            hurdles.forEach(h => {
                h.x -= h.speed;
            });
            
            // Collision
            hurdles.forEach(h => {
                if (player.x + player.size * 0.5 > h.x && 
                    player.x - player.size * 0.5 < h.x + h.width &&
                    player.y + player.size > groundY - h.height) {
                    gameOver = true;
                    if (score > best) {
                        best = score;
                        localStorage.setItem('spaceHurdlesBest', best);
                        bestEl.textContent = best;
                    }
                }
            });
            
            // Remove and score
            hurdles = hurdles.filter(h => {
                if (h.x + h.width < 0) {
                    score++;
                    scoreEl.textContent = score;
                    return false;
                }
                return true;
            });
            
            // Spawn
            if (hurdles.length === 0 || hurdles[hurdles.length - 1].x < 250) {
                if (Math.random() < 0.03) createHurdle();
            }
        }
        
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        gameLoop();
    
        window.tL=false; window.tR=false; window.tU=false; window.tD=false;
        setInterval(() => {
            if(window.tL) keys.left=true; else keys.left=false;
            if(window.tR) keys.right=true; else keys.right=false;
            if(window.tU) keys.up=true; else keys.up=false;
            if(window.tD) keys.down=true; else keys.down=false;
        }, 50);

    
    // EPIC PARTICLES
    let eParticles = [];
    class EParticle {
        constructor(x, y, color, size, vx, vy, life) {
            this.x=x; this.y=y; this.color=color; this.size=size;
            this.vx=vx; this.vy=vy; this.life=life; this.maxLife=life;
        }
        update() {
            this.x+=this.vx; this.y+=this.vy; this.vy+=0.1; this.life--;
        }
        draw() {
            let a = this.life/this.maxLife;
            ctx.globalAlpha=a;
            ctx.fillStyle=this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size*a, 0, Math.PI*2);
            ctx.fill();
            ctx.globalAlpha=1;
        }
    }
    function eSpawn(x, y, color, count) {
        for(let i=0; i<count; i++) {
            eParticles.push(new EParticle(x, y, color, 3+Math.random()*4, (Math.random()-0.5)*8, (Math.random()-0.5)*8-3, 30+Math.random()*20));
        }
    }

    </script>

    <div class="touch-controls" style="display:none;position:fixed;bottom:15px;left:0;right:0;z-index:1000;pointer-events:none;">
      <div style="display:flex;gap:20px;align-items:center;justify-content:center;pointer-events:auto;">
        <button class="dpad-btn" ontouchstart="window.tL=true;window.tR=false;window.tU=false" ontouchend="window.tL=false" onmousedown="window.tL=true" onmouseup="window.tL=false" style="width:70px;height:70px;border-radius:50%;font-size:26px;background:rgba(255,255,255,0.25);border:3px solid rgba(255,255,255,0.5);color:white;">&#9664;</button>
        <button class="dpad-btn" ontouchstart="window.tU=true;window.tL=false;window.tR=false" ontouchend="window.tU=false" onmousedown="window.tU=true" onmouseup="window.tU=false" style="width:70px;height:70px;border-radius:50%;font-size:26px;background:rgba(255,255,255,0.25);border:3px solid rgba(255,255,255,0.5);color:white;">&#9650;</button>
        <button class="dpad-btn" ontouchstart="window.tR=true;window.tL=false;window.tU=false" ontouchend="window.tR=false" onmousedown="window.tR=true" onmouseup="window.tR=false" style="width:70px;height:70px;border-radius:50%;font-size:26px;background:rgba(255,255,255,0.25);border:3px solid rgba(255,255,255,0.5);color:white;">&#9654;</button>
      </div>
    </div>

</body>
