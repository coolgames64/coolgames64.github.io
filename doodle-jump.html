<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⬆️ Doodle Jump Epic - Cool Games 64</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(180deg, #87CEEB 0%, #E0E0E0 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }
        .hud {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            z-index: 100;
        }
        .hud-item {
            background: rgba(255,255,255,0.95);
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 16px;
            color: #333;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .hud-item span { color: #e91e63; }
        #gameCanvas {
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        .overlay.hidden { display: none; }
        .overlay h1 {
            font-size: 42px;
            color: #e91e63;
            text-shadow: 0 4px 20px rgba(233,30,99,0.5);
            margin-bottom: 10px;
        }
        .overlay p { color: rgba(255,255,255,0.8); margin-bottom: 25px; font-size: 18px; }
        .btn {
            background: linear-gradient(135deg, #e91e63 0%, #9c27b0 100%);
            color: white;
            border: none;
            padding: 15px 50px;
            font-size: 20px;
            font-weight: 700;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(233,30,99,0.4);
        }
        .btn:hover { transform: scale(1.05); }
        .touch-zone {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40%;
            z-index: 50;
        }
        @media (pointer: coarse) {
            .touch-zone { display: block; }
            body { padding-bottom: 0; }
        }
        .touch-left, .touch-right {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 50%;
        }
        .touch-left { left: 0; }
        .touch-right { right: 0; }
    </style>
</head>
<body>
    <div class="hud" id="hud" style="display: none;">
        <div class="hud-item">Score: <span id="score">0</span></div>
        <div class="hud-item">Best: <span id="best">0</span></div>
    </div>
    
    <canvas id="gameCanvas" width="320" height="500"></canvas>
    
    <div class="touch-zone">
        <div class="touch-left" id="touchLeft"></div>
        <div class="touch-right" id="touchRight"></div>
    </div>
    
    <div class="overlay" id="startScreen">
        <h1>⬆️ DOODLE JUMP EPIC</h1>
        <p>Jump higher and higher!</p>
        <button class="btn" onclick="startGame()">START</button>
        <p style="margin-top: 15px; font-size: 14px;">← → or Arrow Keys to move</p>
    </div>
    
    <div class="overlay hidden" id="gameOverScreen">
        <h1 id="gameOverTitle">💀 GAME OVER</h1>
        <h2 id="finalScore">Score: 0</h2>
        <p id="highScoreText">Best: 0</p>
        <button class="btn" onclick="startGame()">TRY AGAIN</button>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let player, platforms, cameraY, score, best, gameLoop, gameState;
let particles = [];
let lastPlatformType = 'normal';

const PLATFORMS_COUNT = 8;
const PLATFORM_HEIGHT = 15;
const JUMP_FORCE = -12;
const GRAVITY = 0.3;

class Particle {
    constructor(x, y, color) {
        this.x = x; this.y = y; this.color = color;
        this.vx = (Math.random() - 0.5) * 6;
        this.vy = (Math.random() - 0.5) * 6;
        this.life = 30;
        this.size = 3 + Math.random() * 3;
    }
    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += 0.1;
        this.life--;
    }
    draw() {
        ctx.globalAlpha = this.life / 30;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
    }
}

class Platform {
    constructor(x, y, type) {
        this.x = x;
        this.y = y;
        this.width = 70;
        this.type = type || 'normal';
        
        if (type === 'moving') {
            this.vx = (Math.random() > 0.5 ? 1 : -1) * 2;
        }
    }
    
    draw() {
        let colors = {
            normal: { fill: '#4CAF50', shadow: '#2E7D32' },
            moving: { fill: '#2196F3', shadow: '#1565C0' },
            bouncy: { fill: '#FF9800', shadow: '#E65100' },
            fragile: { fill: '#9E9E9E', shadow: '#616161' }
        };
        
        let c = colors[this.type] || colors.normal;
        
        ctx.fillStyle = c.fill;
        ctx.shadowColor = c.shadow;
        ctx.shadowBlur = 8;
        
        if (this.type === 'bouncy') {
            // Bouncy platform
            ctx.beginPath();
            ctx.ellipse(this.x + this.width/2, this.y + PLATFORM_HEIGHT/2, this.width/2, PLATFORM_HEIGHT/2, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Spring effect
            ctx.fillStyle = '#FFC107';
            ctx.fillRect(this.x + this.width/2 - 5, this.y - 5, 10, 8);
        } else {
            ctx.beginPath();
            ctx.roundRect(this.x, this.y, this.width, PLATFORM_HEIGHT, 5);
            ctx.fill();
        }
        
        ctx.shadowBlur = 0;
        
        // Shine
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.fillRect(this.x + 5, this.y + 2, this.width - 10, 4);
    }
}

function init() {
    player = {
        x: 160,
        y: 400,
        vx: 0,
        vy: 0,
        width: 40,
        height: 40
    };
    
    platforms = [];
    cameraY = 0;
    score = 0;
    particles = [];
    
    // Create initial platforms
    for (let i = 0; i < PLATFORMS_COUNT; i++) {
        let y = i * 70;
        let type = 'normal';
        
        if (i > 3 && Math.random() < 0.2) {
            type = ['moving', 'bouncy', 'fragile'][Math.floor(Math.random() * 3)];
        }
        
        let x = Math.random() * (canvas.width - 70);
        platforms.push(new Platform(x, y, type));
    }
}

function spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
        particles.push(new Particle(x, y, color));
    }
}

function update() {
    if (gameState !== 'playing') return;
    
    // Gravity
    player.vy += GRAVITY;
    
    // Horizontal movement
    if (keys.left || window.tLeft) player.vx -= 0.5;
    if (keys.right || window.tRight) player.vx += 0.5;
    
    // Friction
    player.vx *= 0.95;
    
    // Clamp velocity
    player.vx = Math.max(-8, Math.min(8, player.vx));
    
    // Apply velocity
    player.x += player.vx;
    player.y += player.vy;
    
    // Screen boundaries
    if (player.x < 0) player.x = 0;
    if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;
    
    // Fall off bottom
    if (player.y > cameraY + canvas.height + 100) {
        gameOver();
        return;
    }
    
    // Platform collision (only when falling)
    if (player.vy > 0) {
        platforms.forEach(p => {
            if (player.x + player.width > p.x && 
                player.x < p.x + p.width &&
                player.y + player.height > p.y &&
                player.y + player.height < p.y + PLATFORM_HEIGHT + player.vy) {
                
                if (p.type === 'fragile') {
                    spawnParticles(p.x + p.width/2, p.y, '#9E9E9E', 10);
                    p.type = 'broken';
                } else if (p.type === 'bouncy') {
                    player.vy = JUMP_FORCE * 1.5;
                    spawnParticles(player.x + player.width/2, player.y + player.height, '#FF9800', 8);
                } else {
                    player.vy = JUMP_FORCE;
                    spawnParticles(player.x + player.width/2, player.y + player.height, '#4CAF50', 5);
                }
                
                if (p.type === 'moving') {
                    player.vx += p.vx * 0.5;
                }
            }
        });
    }
    
    // Update moving platforms
    platforms.forEach(p => {
        if (p.type === 'moving') {
            p.x += p.vx;
            if (p.x <= 0 || p.x + p.width >= canvas.width) {
                p.vx *= -1;
            }
        }
    });
    
    // Camera follow
    let targetCameraY = player.y - canvas.height / 3;
    if (targetCameraY < cameraY) {
        cameraY = targetCameraY;
        
        // Score based on height
        let newScore = Math.floor(Math.abs(cameraY) / 10);
        if (newScore > score) {
            score = newScore;
            if (score > best) {
                best = score;
                localStorage.setItem('doodleBest', best);
            }
        }
    }
    
    // Generate new platforms
    let topPlatform = platforms.reduce((a, b) => a.y < b.y ? a : b);
    while (topPlatform.y < cameraY + canvas.height + 200) {
        let y = topPlatform.y - 70;
        let type = 'normal';
        let rand = Math.random();
        
        if (rand < 0.15) type = 'moving';
        else if (rand < 0.25) type = 'bouncy';
        else if (rand < 0.35) type = 'fragile';
        
        let x = Math.random() * (canvas.width - 70);
        platforms.push(new Platform(x, y, type));
        topPlatform = platforms[platforms.length - 1];
    }
    
    // Remove off-screen platforms
    platforms = platforms.filter(p => p.y < cameraY + canvas.height + 100);
    
    // Update particles
    particles = particles.filter(p => { p.update(); return p.life > 0; });
    
    // Update HUD
    document.getElementById('score').textContent = score;
    document.getElementById('best').textContent = best;
}

function draw() {
    // Sky gradient
    let skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    skyGrad.addColorStop(0, '#87CEEB');
    skyGrad.addColorStop(1, '#B0E0E6');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Clouds (parallax)
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    for (let i = 0; i < 6; i++) {
        let cx = ((i * 120 - cameraY * 0.2) % (canvas.width + 100)) - 50;
        let cy = 50 + (i % 3) * 40 + cameraY * 0.1;
        drawCloud(cx, cy);
    }
    
    ctx.save();
    ctx.translate(0, -cameraY);
    
    // Draw platforms
    platforms.forEach(p => {
        if (p.y > cameraY - 50 && p.y < cameraY + canvas.height + 50) {
            p.draw();
        }
    });
    
    // Draw player (doodle character)
    ctx.save();
    ctx.translate(player.x + player.width/2, player.y + player.height/2);
    
    // Squash and stretch based on velocity
    let scaleY = 1 + player.vy * 0.02;
    scaleY = Math.max(0.7, Math.min(1.3, scaleY));
    ctx.scale(1 / scaleY, scaleY);
    
    // Body
    ctx.fillStyle = '#8BC34A';
    ctx.shadowColor = '#689F38';
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.ellipse(0, 0, player.width/2 - 5, player.height/2 - 5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(-8, -5, 8, 0, Math.PI * 2);
    ctx.arc(8, -5, 8, 0, Math.PI * 2);
    ctx.fill();
    
    // Pupils
    ctx.fillStyle = '#333';
    let pupilOffset = player.vx * 0.3;
    ctx.beginPath();
    ctx.arc(-8 + pupilOffset, -5, 4, 0, Math.PI * 2);
    ctx.arc(8 + pupilOffset, -5, 4, 0, Math.PI * 2);
    ctx.fill();
    
    // Mouth (changes with velocity)
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 2;
    ctx.beginPath();
    if (player.vy < -5) {
        // Excited - open smile
        ctx.arc(0, 3, 6, 0, Math.PI);
    } else if (player.vy > 5) {
        // Worried - frown
        ctx.arc(0, 8, 6, Math.PI, 0);
    } else {
        // Normal smile
        ctx.arc(0, 5, 4, 0.2, Math.PI - 0.2);
    }
    ctx.stroke();
    
    ctx.restore();
    
    // Particles
    particles.forEach(p => p.draw());
    
    ctx.restore();
}

function drawCloud(x, y) {
    ctx.beginPath();
    ctx.arc(x, y, 25, 0, Math.PI * 2);
    ctx.arc(x + 30, y - 10, 30, 0, Math.PI * 2);
    ctx.arc(x + 60, y, 25, 0, Math.PI * 2);
    ctx.arc(x + 30, y + 5, 20, 0, Math.PI * 2);
    ctx.fill();
}

function gameOver() {
    gameState = 'over';
    
    if (score > best) {
        best = score;
        localStorage.setItem('doodleBest', best);
    }
    
    document.getElementById('gameOverTitle').textContent = score > 50 ? '🎉 AMAZING!' : '💀 GAME OVER';
    document.getElementById('finalScore').textContent = 'Score: ' + score;
    document.getElementById('highScoreText').textContent = 'Best: ' + best;
    
    clearInterval(gameLoop);
    setTimeout(() => {
        document.getElementById('gameOverScreen').classList.remove('hidden');
    }, 300);
}

function startGame() {
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('gameOverScreen').classList.add('hidden');
    document.getElementById('hud').style.display = 'flex';
    
    init();
    gameState = 'playing';
    
    if (gameLoop) clearInterval(gameLoop);
    gameLoop = setInterval(() => { update(); draw(); }, 1000 / 60);
}

// Touch controls
window.tLeft = window.tRight = false;

document.getElementById('touchLeft').addEventListener('touchstart', e => { e.preventDefault(); window.tLeft = true; });
document.getElementById('touchLeft').addEventListener('touchend', e => { e.preventDefault(); window.tLeft = false; });
document.getElementById('touchRight').addEventListener('touchstart', e => { e.preventDefault(); window.tRight = true; });
document.getElementById('touchRight').addEventListener('touchend', e => { e.preventDefault(); window.tRight = false; });

// Keyboard
document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = true;
    if (e.key === 'ArrowRight' || e.key === 'd') keys.right = true;
    if (e.key === ' ') startGame();
});
document.addEventListener('keyup', e => {
    if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = false;
    if (e.key === 'ArrowRight' || e.key === 'd') keys.right = false;
});

// Click to start
canvas.addEventListener('click', () => {
    if (gameState !== 'playing') startGame();
});
canvas.addEventListener('touchstart', e => {
    if (gameState !== 'playing') {
        e.preventDefault();
        startGame();
    }
});

// Load best
best = parseInt(localStorage.getItem('doodleBest') || '0');

init();
draw();
</script>
</body>
</html>
