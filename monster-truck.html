<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🚗 Monster Truck</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }
        h1 { font-size: 2.5rem; margin-bottom: 10px; color: #e74c3c; }
        .score-board { font-size: 1.3rem; margin-bottom: 15px; }
        .score-board span { background: rgba(231,76,60,0.2); padding: 5px 15px; border-radius: 15px; }
        canvas { max-width: 100%; 
            max-width: 100vw; border: 3px solid #e74c3c; border-radius: 10px; }
        .instructions { margin-top: 15px; color: #888; font-size: 1rem; }
        .instructions span { background: #e74c3c; padding: 3px 10px; border-radius: 5px; }
        .back-btn {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255,255,255,0.1); color: white;
            border: 2px solid rgba(255,255,255,0.3); padding: 10px 20px;
            border-radius: 8px; cursor: pointer; text-decoration: none;
        }
        .back-btn:hover { background: rgba(255,255,255,0.2); }
    
        /* Mobile Touch Controls */
        .touch-controls {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            padding: 10px;
            z-index: 1000;
        }
        @media (pointer: coarse) {
            .touch-controls { display: flex !important; }
            body { padding-bottom: 120px !important; }
        }
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 5px;
            margin: 0 auto;
        }
        .dpad-btn {
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.4);
            border-radius: 10px;
            color: white;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .dpad-btn:active {
            background: rgba(255,255,255,0.4);
        }
        .dpad-center { background: rgba(0,0,0,0.2); }
        @media (max-width: 500px) {
            .dpad { grid-template-columns: repeat(3, 50px); grid-template-rows: repeat(3, 50px); }
            .dpad-btn { font-size: 20px; }
        }
    
    
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }
        .game-header {
            font-size: 20px;
            font-weight: 700;
            color: #00ff88;
            text-shadow: 0 0 15px rgba(0,255,136,0.5);
            margin-bottom: 10px;
        }
        .score-display {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
        }
        .score-box {
            background: rgba(0,0,0,0.5);
            border: 2px solid rgba(0,255,136,0.3);
            border-radius: 10px;
            padding: 6px 14px;
            text-align: center;
        }
        .score-label { font-size: 10px; color: rgba(255,255,255,0.6); text-transform: uppercase; }
        .score-val { font-size: 18px; font-weight: 700; color: #00ff88; }
        .game-wrapper { position: relative; }
        #gameCanvas {
            border-radius: 12px;
            border: 3px solid #00ff88;
            box-shadow: 0 0 30px rgba(0,255,136,0.3);
        }
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
        }
        .overlay.hidden { display: none; }
        .overlay h2 {
            font-size: 28px;
            color: #00ff88;
            text-shadow: 0 0 20px rgba(0,255,136,0.6);
            margin-bottom: 8px;
        }
        .overlay p { color: rgba(255,255,255,0.7); margin-bottom: 15px; }
        .btn-epic {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            color: #0f0f1a;
            border: none;
            padding: 12px 35px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(0,255,136,0.4);
        }
        .btn-epic:hover { transform: scale(1.05); }
        .touch-controls {
            display: none;
            position: fixed;
            bottom: 10px;
            left: 0;
            right: 0;
            z-index: 100;
            justify-content: center;
            gap: 8px;
        }
        @media (pointer: coarse) {
            .touch-controls { display: flex; }
            body { padding-bottom: 100px; }
        }
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 50px);
            grid-template-rows: repeat(2, 50px);
            gap: 4px;
        }
        .dpad-btn {
            background: rgba(0,255,136,0.2);
            border: 2px solid rgba(0,255,136,0.5);
            border-radius: 10px;
            color: #00ff88;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .dpad-btn:active { background: rgba(0,255,136,0.5); }

    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← Back to Games</a>
    <h1>🚗 MONSTER TRUCK</h1>
    <div class="score-board">
        <span>Distance: <strong id="dist">0</strong>m</span>
        <span>Fuel: <strong id="fuel">100</strong>%</span>
    </div>
    <canvas id="gameCanvas" width="500" height="400"></canvas>
    <div class="instructions"><span>← →</span> to steer | <span>↑</span> boost</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let truck = { x: 250, y: 300, vx: 0, angle: 0 };
        let obstacles = [];
        let distance = 0;
        let fuel = 100;
        let gameLoop;
        let keys = { left: false, right: false, up: false };
        let speed = 5;
        
        function init() {
            truck = { x: 250, y: 300, vx: 0, angle: 0 };
            obstacles = [];
            distance = 0;
            fuel = 100;
            speed = 5;
            
            document.getElementById('dist').textContent = '0';
            document.getElementById('fuel').textContent = '100';
            
            // Create initial obstacles
            for (let i = 0; i < 5; i++) {
                spawnObstacle(300 + i * 150);
            }
        }
        
        function spawnObstacle(y) {
            const types = ['rock', 'car', 'truck'];
            obstacles.push({
                x: 50 + Math.random() * 400,
                y: y,
                type: types[Math.floor(Math.random() * types.length)],
                size: 20 + Math.random() * 20
            });
        }
        
        function drawTruck() {
            ctx.save();
            ctx.translate(truck.x, truck.y);
            ctx.rotate(truck.angle);
            
            // Wheels
            ctx.fillStyle = '#333';
            ctx.beginPath();
            ctx.arc(-20, 15, 15, 0, Math.PI * 2);
            ctx.arc(20, 15, 15, 0, Math.PI * 2);
            ctx.arc(-20, -15, 15, 0, Math.PI * 2);
            ctx.arc(20, -15, 15, 0, Math.PI * 2);
            ctx.fill();
            
            // Body
            ctx.fillStyle = '#e74c3c';
            ctx.fillRect(-25, -20, 50, 40);
            
            // Window
            ctx.fillStyle = '#3498db';
            ctx.fillRect(-15, -15, 30, 15);
            
            ctx.restore();
        }
        
        function drawObstacle(obs) {
            ctx.fillStyle = '#666';
            if (obs.type === 'rock') {
                ctx.beginPath();
                ctx.moveTo(obs.x - obs.size, obs.y);
                ctx.lineTo(obs.x, obs.y - obs.size);
                ctx.lineTo(obs.x + obs.size, obs.y);
                ctx.lineTo(obs.x, obs.y + obs.size);
                ctx.closePath();
                ctx.fill();
            } else if (obs.type === 'car') {
                ctx.fillStyle = '#3498db';
                ctx.fillRect(obs.x - obs.size, obs.y - obs.size/2, obs.size * 2, obs.size);
                ctx.fillStyle = '#2980b9';
                ctx.fillRect(obs.x - obs.size/2, obs.y - obs.size/2 - 10, obs.size, obs.size/2);
            } else {
                ctx.fillStyle = '#f39c12';
                ctx.fillRect(obs.x - obs.size, obs.y - obs.size/2, obs.size * 2, obs.size);
                ctx.fillStyle = '#d68910';
                ctx.fillRect(obs.x - obs.size/2, obs.y - obs.size/2 - 15, obs.size, obs.size/2);
            }
        }
        
        function draw() {
            // Sky
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Road
            ctx.fillStyle = '#333';
            ctx.fillRect(0, 100, canvas.width, 200);
            
            // Lane lines
            ctx.strokeStyle = '#fff';
            ctx.setLineDash([20, 20]);
            ctx.beginPath();
            ctx.moveTo(125, 100);
            ctx.lineTo(125, 300);
            ctx.moveTo(250, 100);
            ctx.lineTo(250, 300);
            ctx.moveTo(375, 100);
            ctx.lineTo(375, 300);
            ctx.stroke();
            ctx.setLineDash([]);
            
            // Grass
            ctx.fillStyle = '#27ae60';
            ctx.fillRect(0, 0, 50, 400);
            ctx.fillRect(450, 0, 50, 400);
            
            obstacles.forEach(drawObstacle);
            drawTruck();
        }
        
        function update() {
            // Steering
            if (keys.left) truck.x -= 5;
            if (keys.right) truck.x += 5;
            
            // Boost
            if (keys.up) {
                speed = Math.min(15, speed + 0.5);
                fuel -= 0.3;
            } else {
                speed = Math.max(5, speed - 0.1);
            }
            
            // Auto move
            truck.angle = Math.sin(distance * 0.05) * 0.1;
            
            // Move obstacles
            obstacles.forEach(obs => obs.y -= speed);
            obstacles = obstacles.filter(obs => obs.y > -50);
            
            // Spawn new
            if (obstacles.length < 5 || obstacles[obstacles.length - 1].y > 200) {
                spawnObstacle(450);
            }
            
            distance += speed * 0.1;
            document.getElementById('dist').textContent = Math.floor(distance);
            document.getElementById('fuel').textContent = Math.max(0, Math.floor(fuel));
            
            // Bounds
            truck.x = Math.max(60, Math.min(440, truck.x));
            
            // Collision
            obstacles.forEach(obs => {
                const dist = Math.sqrt((truck.x - obs.x) ** 2 + (truck.y - obs.y) ** 2);
                if (dist < obs.size + 20) {
                    endGame();
                }
            });
            
            // Fuel empty
            if (fuel <= 0) {
                endGame();
            }
        }
        
        function endGame() {
            clearInterval(gameLoop);
            setTimeout(() => {
                alert(`Crash! 💥\nDistance: ${Math.floor(distance)}m\n\nClick OK to play again!`);
                init();
                gameLoop = setInterval(() => {
                    update();
                    draw();
                }, 1000 / 60);
            }, 100);
        }
        
        document.addEventListener('keydown', e => {
            if (e.code === 'ArrowLeft') keys.left = true;
            if (e.code === 'ArrowRight') keys.right = true;
            if (e.code === 'ArrowUp') keys.up = true;
        });
        
        document.addEventListener('keyup', e => {
            if (e.code === 'ArrowLeft') keys.left = false;
            if (e.code === 'ArrowRight') keys.right = false;
            if (e.code === 'ArrowUp') keys.up = false;
        });
        
        init();
        draw();
        gameLoop = setInterval(() => {
            update();
            draw();
        }, 1000 / 60);
    
        window.tL=false; window.tR=false; window.tU=false; window.tD=false;
        setInterval(() => {
            if(window.tL) keys.left=true; else keys.left=false;
            if(window.tR) keys.right=true; else keys.right=false;
            if(window.tU) keys.up=true; else keys.up=false;
            if(window.tD) keys.down=true; else keys.down=false;
        }, 50);

    
    // EPIC PARTICLES
    let eParticles = [];
    class EParticle {
        constructor(x, y, color, size, vx, vy, life) {
            this.x=x; this.y=y; this.color=color; this.size=size;
            this.vx=vx; this.vy=vy; this.life=life; this.maxLife=life;
        }
        update() {
            this.x+=this.vx; this.y+=this.vy; this.vy+=0.1; this.life--;
        }
        draw() {
            let a = this.life/this.maxLife;
            ctx.globalAlpha=a;
            ctx.fillStyle=this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size*a, 0, Math.PI*2);
            ctx.fill();
            ctx.globalAlpha=1;
        }
    }
    function eSpawn(x, y, color, count) {
        for(let i=0; i<count; i++) {
            eParticles.push(new EParticle(x, y, color, 3+Math.random()*4, (Math.random()-0.5)*8, (Math.random()-0.5)*8-3, 30+Math.random()*20));
        }
    }

    </script>

    <div class="touch-controls" style="display:none;position:fixed;bottom:15px;left:0;right:0;z-index:1000;pointer-events:none;">
      <div style="display:flex;gap:20px;align-items:center;justify-content:center;pointer-events:auto;">
        <button class="dpad-btn" ontouchstart="window.tL=true;window.tR=false;window.tU=false" ontouchend="window.tL=false" onmousedown="window.tL=true" onmouseup="window.tL=false" style="width:70px;height:70px;border-radius:50%;font-size:26px;background:rgba(255,255,255,0.25);border:3px solid rgba(255,255,255,0.5);color:white;">&#9664;</button>
        <button class="dpad-btn" ontouchstart="window.tU=true;window.tL=false;window.tR=false" ontouchend="window.tU=false" onmousedown="window.tU=true" onmouseup="window.tU=false" style="width:70px;height:70px;border-radius:50%;font-size:26px;background:rgba(255,255,255,0.25);border:3px solid rgba(255,255,255,0.5);color:white;">&#9650;</button>
        <button class="dpad-btn" ontouchstart="window.tR=true;window.tL=false;window.tU=false" ontouchend="window.tR=false" onmousedown="window.tR=true" onmouseup="window.tR=false" style="width:70px;height:70px;border-radius:50%;font-size:26px;background:rgba(255,255,255,0.25);border:3px solid rgba(255,255,255,0.5);color:white;">&#9654;</button>
      </div>
    </div>

</body>
