<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🐍 Snake Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow: hidden;
            padding: 10px;
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
            text-shadow: 0 0 20px #4ade80;
        }
        .score-board {
            font-size: 1.1rem;
            margin-bottom: 10px;
            color: #4ade80;
        }
        .game-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas {
            max-width: 100vw;
            border: 3px solid #4ade80;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(74, 222, 128, 0.3);
            max-width: 100%;
            max-height: 60vh;
            touch-action: none;
        }
        .instructions {
            margin-top: 10px;
            font-size: 0.9rem;
            color: #aaa;
            text-align: center;
        }
        .instructions span {
            color: #4ade80;
            font-weight: bold;
        }
        #gameOver {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            border: 3px solid #ef4444;
            z-index: 100;
            width: 90%;
            max-width: 300px;
        }
        #gameOver h2 {
            color: #ef4444;
            font-size: 1.8rem;
            margin-bottom: 15px;
        }
        #gameOver p {
            font-size: 1.1rem;
            margin-bottom: 15px;
        }
        #gameOver button {
            background: #4ade80;
            color: #1a1a2e;
            border: none;
            padding: 12px 25px;
            font-size: 1.1rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }
        #gameOver button:hover {
            background: #22c55e;
        }
        .back-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(255,255,255,0.1);
            color: white;
            border: 2px solid rgba(255,255,255,0.3);
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.9rem;
            z-index: 50;
        }
        .back-btn:hover {
            background: rgba(255,255,255,0.2);
        }
        /* Mobile D-Pad Controls */
        .dpad-container {
            display: none;
            margin-top: 15px;
            position: relative;
            width: 180px;
            height: 180px;
        }
        .dpad {
            position: absolute;
            width: 60px;
            height: 60px;
            background: rgba(74, 222, 128, 0.3);
            border: 3px solid #4ade80;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            cursor: pointer;
            user-select: none;
            transition: background 0.1s;
        }
        .dpad:active {
            background: rgba(74, 222, 128, 0.7);
        }
        .dpad-up { top: 0; left: 50%; transform: translateX(-50%); }
        .dpad-down { bottom: 0; left: 50%; transform: translateX(-50%); }
        .dpad-left { left: 0; top: 50%; transform: translateY(-50%); }
        .dpad-right { right: 0; top: 50%; transform: translateY(-50%); }
        .dpad-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
        }
        .action-btns {
            display: none;
            margin-top: 15px;
            gap: 15px;
        }
        .action-btn {
            width: 70px;
            height: 50px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            color: white;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .action-btn:active {
            background: rgba(255, 255, 255, 0.3);
        }
        .pause-btn {
            background: rgba(234, 179, 8, 0.3);
            border-color: #eab308;
        }
        /* Show mobile controls on touch devices */
        @media (pointer: coarse) {
            .dpad-container {
                display: block;
            }
            .action-btns {
                display: flex;
            }
            .instructions {
                display: none;
            }
            canvas {
            max-width: 100vw;
                max-height: 45vh;
            }
        }
        /* Desktop hover states */
        @media (pointer: fine) {
            .dpad {
                opacity: 0.5;
            }
            .dpad:hover {
                opacity: 1;
                background: rgba(74, 222, 128, 0.5);
            }
        }
        /* Small screens */
        @media (max-width: 400px) {
            h1 { font-size: 1.5rem; }
            .score-board { font-size: 1rem; }
            .dpad-container { width: 150px; height: 150px; }
            .dpad { width: 50px; height: 50px; font-size: 1.5rem; }
        }
    
        /* Mobile Touch Controls */
        .touch-controls {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            padding: 10px;
            z-index: 1000;
        }
        @media (pointer: coarse) {
            .touch-controls { display: flex !important; }
            body { padding-bottom: 120px !important; }
        }
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 5px;
            margin: 0 auto;
        }
        .dpad-btn {
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.4);
            border-radius: 10px;
            color: white;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .dpad-btn:active {
            background: rgba(255,255,255,0.4);
        }
        .dpad-center { background: rgba(0,0,0,0.2); }
        @media (max-width: 500px) {
            .dpad { grid-template-columns: repeat(3, 50px); grid-template-rows: repeat(3, 50px); }
            .dpad-btn { font-size: 20px; }
        }
    
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← Back</a>
    <h1>🐍 Snake Game</h1>
    <div class="score-board">Score: <span id="score">0</span> | Best: <span id="highScore">0</span></div>
    
    <div class="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="gameOver">
            <h2>💀 Game Over!</h2>
            <p>Your Score: <span id="finalScore">0</span></p>
            <button onclick="restartGame()">Play Again 🔄</button>
        </div>
    </div>
    
    <!-- Mobile D-Pad Controls -->
    <div class="dpad-container">
        <div class="dpad dpad-up" ontouchstart="setDirection(0,-1)" onmousedown="setDirection(0,-1)">⬆️</div>
        <div class="dpad dpad-down" ontouchstart="setDirection(0,1)" onmousedown="setDirection(0,1)">⬇️</div>
        <div class="dpad dpad-left" ontouchstart="setDirection(-1,0)" onmousedown="setDirection(-1,0)">⬅️</div>
        <div class="dpad dpad-right" ontouchstart="setDirection(1,0)" onmousedown="setDirection(1,0)">➡️</div>
        <div class="dpad-center"></div>
    </div>
    
    <!-- Mobile Action Buttons -->
    <div class="action-btns">
        <button class="action-btn pause-btn" onclick="togglePause()">⏸️</button>
        <button class="action-btn" onclick="restartGame()">🔄</button>
    </div>
    
    <div class="instructions">
        Use <span>ARROW KEYS</span> or <span>WASD</span> to move | <span>SPACE</span> pause | <span>R</span> restart
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Responsive canvas size
        function resizeCanvas() {
            const maxWidth = Math.min(400, window.innerWidth - 30);
            const maxHeight = Math.min(400, window.innerHeight * 0.5);
            const size = Math.min(maxWidth, maxHeight);
            canvas.width = size;
            canvas.height = size;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        const gridSize = 20;
        let tileCount = canvas.width / gridSize;
        
        let snake = [];
        let food = {};
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameLoop;
        let gameSpeed = 120;
        let isPaused = false;
        let foodCount = 0;
        
        // Colors
        const snakeColor = '#4ade80';
        const snakeHeadColor = '#22c55e';
        const foodColor = '#ef4444';
        const gridColor = 'rgba(255,255,255,0.05)';
        
        function init() {
            tileCount = canvas.width / gridSize;
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            foodCount = 0;
            gameSpeed = 120;
            document.getElementById('score').textContent = score;
            document.getElementById('highScore').textContent = highScore;
            placeFood();
            document.getElementById('gameOver').style.display = 'none';
        }
        
        function placeFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
        }
        
        function draw() {
            const gs = gridSize;
            const tc = tileCount;
            
            // Clear canvas
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw grid
            ctx.strokeStyle = gridColor;
            for (let i = 0; i < tc; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gs, 0);
                ctx.lineTo(i * gs, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gs);
                ctx.lineTo(canvas.width, i * gs);
                ctx.stroke();
            }
            
            // Draw food with pulsing effect
            const pulse = Math.sin(Date.now() / 200) * 3;
            ctx.fillStyle = foodColor;
            ctx.shadowColor = foodColor;
            ctx.shadowBlur = 10 + pulse;
            ctx.beginPath();
            ctx.arc(food.x * gs + gs/2, food.y * gs + gs/2, gs/2 - 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // Draw snake
            snake.forEach((segment, index) => {
                const brightness = 1 - (index / snake.length) * 0.4;
                ctx.fillStyle = index === 0 ? snakeHeadColor : snakeColor;
                ctx.globalAlpha = brightness;
                
                const x = segment.x * gs;
                const y = segment.y * gs;
                const padding = 2;
                const radius = 5;
                
                ctx.beginPath();
                ctx.roundRect(x + padding, y + padding, gs - padding * 2, gs - padding * 2, radius);
                ctx.fill();
                
                // Draw eyes on head
                if (index === 0) {
                    ctx.fillStyle = 'white';
                    ctx.globalAlpha = 1;
                    const eyeSize = Math.max(3, gs / 8);
                    const eyeOffset = Math.max(4, gs / 4);
                    
                    let eye1x, eye1y, eye2x, eye2y;
                    if (direction.x === 1) {
                        eye1x = x + gs - eyeOffset; eye1y = y + eyeOffset;
                        eye2x = x + gs - eyeOffset; eye2y = y + gs - eyeOffset;
                    } else if (direction.x === -1) {
                        eye1x = x + eyeOffset; eye1y = y + eyeOffset;
                        eye2x = x + eyeOffset; eye2y = y + gs - eyeOffset;
                    } else if (direction.y === -1) {
                        eye1x = x + eyeOffset; eye1y = y + eyeOffset;
                        eye2x = x + gs - eyeOffset; eye2y = y + eyeOffset;
                    } else {
                        eye1x = x + eyeOffset; eye1y = y + gs - eyeOffset;
                        eye2x = x + gs - eyeOffset; eye2y = y + gs - eyeOffset;
                    }
                    
                    ctx.beginPath();
                    ctx.arc(eye1x, eye1y, eyeSize, 0, Math.PI * 2);
                    ctx.arc(eye2x, eye2y, eyeSize, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                ctx.globalAlpha = 1;
            });
            
            // Draw pause indicator
            if (isPaused) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = 'white';
                ctx.font = `bold ${Math.max(20, canvas.width / 15)}px Arial`;
                ctx.textAlign = 'center';
                ctx.fillText('⏸️ PAUSED', canvas.width/2, canvas.height/2);
                ctx.font = `${Math.max(12, canvas.width / 25)}px Arial`;
                ctx.fillText('Tap ⏸️ to continue', canvas.width/2, canvas.height/2 + 30);
            }
        }
        
        function update() {
            direction = nextDirection;
            
            const head = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };
            
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }
            
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }
            
            snake.unshift(head);
            
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                foodCount++;
                document.getElementById('score').textContent = score;
                placeFood();
                
                if (foodCount % 5 === 0 && gameSpeed > 60) {
                    gameSpeed -= 5;
                    clearInterval(gameLoop);
                    gameLoop = setInterval(gameStep, gameSpeed);
                }
            } else {
                snake.pop();
            }
        }
        
        function gameStep() {
            if (!isPaused) {
                update();
                draw();
            }
        }
        
        function gameOver() {
            clearInterval(gameLoop);
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
            }
            
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'block';
        }
        
        function restartGame() {
            clearInterval(gameLoop);
            init();
            draw();
            gameLoop = setInterval(gameStep, gameSpeed);
        }
        
        function togglePause() {
            if (document.getElementById('gameOver').style.display === 'block') {
                restartGame();
                return;
            }
            isPaused = !isPaused;
            draw();
        }
        
        // Mobile D-Pad direction function
        function setDirection(x, y) {
            if (isPaused) {
                isPaused = false;
            }
            if (direction.y !== -y && y !== 0) nextDirection = { x: 0, y: y };
            else if (direction.x !== -x && x !== 0) nextDirection = { x: x, y: 0 };
        }
        
        // Keyboard Controls
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                togglePause();
                return;
            }
            
            if (e.code === 'KeyR') {
                restartGame();
                return;
            }
            
            if (isPaused && e.code !== 'Space') return;
            
            switch(e.code) {
                case 'ArrowUp':
                case 'KeyW':
                    if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                    break;
                case 'ArrowDown':
                case 'KeyS':
                    if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                    break;
                case 'ArrowLeft':
                case 'KeyA':
                    if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                    break;
                case 'ArrowRight':
                case 'KeyD':
                    if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                    break;
            }
        });
        
        // Swipe Controls for canvas
        let touchStartX = 0;
        let touchStartY = 0;
        
        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: true });
        
        canvas.addEventListener('touchend', (e) => {
            if (isPaused) {
                isPaused = false;
                draw();
                return;
            }
            
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;
            const minSwipe = 30;
            
            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > minSwipe && direction.x !== -1) nextDirection = { x: 1, y: 0 };
                else if (dx < -minSwipe && direction.x !== 1) nextDirection = { x: -1, y: 0 };
            } else {
                if (dy > minSwipe && direction.y !== -1) nextDirection = { x: 0, y: 1 };
                else if (dy < -minSwipe && direction.y !== 1) nextDirection = { x: 0, y: -1 };
            }
        }, { passive: true });
        
        // Start game
        init();
        draw();
        gameLoop = setInterval(gameStep, gameSpeed);
    </script>
</body>
</html>
