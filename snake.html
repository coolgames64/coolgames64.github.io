<html lang="en">
<head>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { /* epic-game-styles */
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;

            overflow: hidden;

        .game-title {
            font-size: 28px;

            color: #00ff88;

            margin-bottom: 10px;

        .score-board {

            margin-bottom: 15px;

        }

            font-size: 12px;

        .game-container {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0,255,136,0.3), 0 20px 60px rgba(0,0,0,0.5);

        #gameCanvas {
            display: block;
            background: linear-gradient(180deg, #1a1a2e 0%, #0d0d1a 100%);
            border: 3px solid #00ff88;
            border-radius: 16px;
        }
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            z-index: 10;
        }
        .overlay.hidden { display: none; }
        .overlay-title {
            font-size: 36px;
            font-weight: 800;
            color: #00ff88;
            text-shadow: 0 0 30px rgba(0,255,136,0.8);
            margin-bottom: 10px;
        }
        .overlay-subtitle {
            color: rgba(255,255,255,0.7);
            font-size: 16px;
            margin-bottom: 30px;
        }
        .btn {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            color: #0f0f1a;
            border: none;
            padding: 15px 50px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 10px 30px rgba(0,255,136,0.4);
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(0,255,136,0.6);
        }
        .level-indicator {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            padding: 8px 20px;
            border-radius: 20px;
            color: #00ff88;
            font-weight: 600;
            font-size: 14px;
        }
        .power-ups-display {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            gap: 10px;
        }
        .power-up-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background: rgba(0,0,0,0.6);
            border: 2px solid rgba(255,255,255,0.2);
        }
        .power-up-icon.active {
            border-color: #00ff88;
            box-shadow: 0 0 15px rgba(0,255,136,0.5);
        }
        .touch-controls {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            z-index: 100;
        }
        @media (pointer: coarse) {
            .touch-controls { display: flex; justify-content: center; }
            body { /* epic-game-styles */ padding-bottom: 120px; }
        }
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(2, 60px);
            gap: 8px;
        }
        .dpad-btn {
            background: rgba(0,255,136,0.2);
            border: 2px solid rgba(0,255,136,0.5);
            border-radius: 12px;
            color: #00ff88;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .dpad-btn:active { background: rgba(0,255,136,0.5); }
        .instructions {
            margin-top: 20px;
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            text-align: center;
        }
        @media (max-width: 500px) {
            .game-title { font-size: 22px; }
            .score-value { font-size: 20px; }
            .overlay-title { font-size: 28px; }
            #gameCanvas { border-width: 2px; }
        }

    </style>

<body>
    <div class="game-title">🐍 EPIC SNAKE</div>
    <div class="score-board">
        <div class="score-item">
            <div class="score-label">Score</div>
            <div class="score-value" id="score">0</div>
        </div>
        <div class="score-item">
            <div class="score-label">High Score</div>
            <div class="score-value high" id="highScore">0</div>
        </div>
        <div class="score-item">
            <div class="score-label">Level</div>
            <div class="score-value" id="level">1</div>
        </div>
    </div>
    
    <div class="game-container">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="level-indicator" id="levelIndicator">🍎 Level 1 - Collect 5 to level up!</div>
        <div class="power-ups-display">
            <div class="power-up-icon" id="shieldIcon" title="Shield">🛡️</div>
            <div class="power-up-icon" id="magnetIcon" title="Magnet">🧲</div>
            <div class="power-up-icon" id="slowIcon" title="Slow Motion">⏰</div>
        </div>
        <div class="overlay" id="startOverlay">
            <div class="overlay-title">🐍 EPIC SNAKE</div>
            <div class="overlay-subtitle">Eat, Grow, Survive!</div>
            <button class="btn" onclick="startGame()">▶ START GAME</button>
            <div class="instructions">
                Arrow keys or WASD to move<br>
                On mobile: use on-screen controls
            </div>
        </div>
        <div class="overlay hidden" id="gameOverOverlay">
            <div class="overlay-title">💀 GAME OVER</div>
            <div class="overlay-subtitle" id="gameOverText">You reached Level 1!</div>
            <button class="btn" onclick="startGame()">🔄 PLAY AGAIN</button>
        </div>
    </div>

    <div class="touch-controls">
        <div class="dpad">
            <div></div>
            <button class="dpad-btn" id="btnUp">▲</button>
            <div></div>
            <button class="dpad-btn" id="btnLeft">◀</button>
            <button class="dpad-btn" id="btnDown">▼</button>
            <button class="dpad-btn" id="btnRight">▶</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // Responsive canvas
    function resizeCanvas() {
        const maxW = Math.min(window.innerWidth - 20, 400);
        const maxH = Math.min(window.innerHeight - 250, 400);
        const size = Math.min(maxW, maxH);
        canvas.style.width = size + 'px';
        canvas.style.height = size + 'px';
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // Game state
    let snake, food, specialFood, particles, powerUps, gameLoop;
    let score, highScore, level, speed, gridSize;
    let direction, nextDirection;
    let shieldActive, magnetActive, slowActive;
    let foodEaten, levelTarget;
    let screenShake, screenShakeTime;

    highScore = parseInt(localStorage.getItem('epicSnakeHigh') || '0');
    document.getElementById('highScore').textContent = highScore;

    // Particle system
    class Particle {
        constructor(x, y, color, size, vx, vy, life) {
            this.x = x; this.y = y;
            this.color = color;
            this.size = size;
            this.vx = vx; this.vy = vy;
            this.life = life;
            this.maxLife = life;
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.vy += 0.1; // gravity
            this.life--;
        }
        draw() {
            const alpha = this.life / this.maxLife;
            ctx.globalAlpha = alpha;
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size * alpha, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
        }
    }

    function spawnParticles(x, y, color, count) {
        for (let i = 0; i < count; i++) {
            particles.push(new Particle(
                x, y, color,
                Math.random() * 4 + 2,
                (Math.random() - 0.5) * 8,
                (Math.random() - 0.5) * 8 - 3,
                30 + Math.random() * 20
            ));
        }
    }

    function init() {
        gridSize = 20;
        snake = [{ x: 10, y: 10 }];
        direction = { x: 1, y: 0 };
        nextDirection = { x: 1, y: 0 };
        score = 0;
        level = 1;
        speed = 150;
        foodEaten = 0;
        levelTarget = 5;
        particles = [];
        powerUps = { shield: 0, magnet: 0, slow: 0 };
        shieldActive = magnetActive = slowActive = false;
        screenShake = 0;
        spawnFood();
        updateUI();
    }

    function spawnFood() {
        let valid = false;
        while (!valid) {
            food = {
                x: Math.floor(Math.random() * (canvas.width / gridSize)),
                y: Math.floor(Math.random() * (canvas.height / gridSize)),
                type: Math.random() < 0.85 ? 'normal' : 'special'
            };
            valid = !snake.some(s => s.x === food.x && s.y === food.y);
        }
        
        // Occasionally spawn power-up
        if (Math.random() < 0.1 && !specialFood) {
            specialFood = {
                x: Math.floor(Math.random() * (canvas.width / gridSize)),
                y: Math.floor(Math.random() * (canvas.height / gridSize)),
                type: ['shield', 'magnet', 'slow'][Math.floor(Math.random() * 3)],
                timer: 300
            };
        }
    }

    function update() {
        direction = nextDirection;
        
        // Move snake
        const head = { 
            x: snake[0].x + direction.x, 
            y: snake[0].y + direction.y 
        };
        
        // Wall collision
        const gridCells = canvas.width / gridSize;
        if (head.x < 0 || head.x >= gridCells || head.y < 0 || head.y >= gridCells) {
            if (shieldActive) {
                // Bounce off walls
                head.x = Math.max(0, Math.min(gridCells - 1, head.x));
                head.y = Math.max(0, Math.min(gridCells - 1, head.y));
                direction.x *= -1;
                direction.y *= -1;
                spawnParticles(head.x * gridSize + gridSize/2, head.y * gridSize + gridSize/2, '#00ff88', 5);
            } else {
                gameOver();
                return;
            }
        }
        
        // Self collision
        if (snake.some(s => s.x === head.x && s.y === head.y)) {
            if (!shieldActive) {
                gameOver();
                return;
            }
        }
        
        snake.unshift(head);
        
        // Food collision
        if (head.x === food.x && head.y === food.y) {
            score += food.type === 'special' ? 50 : 10;
            foodEaten++;
            spawnParticles(food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2, food.type === 'special' ? '#ffd700' : '#ff4444', 15);
            
            if (food.type === 'special') {
                screenShake = 10;
            }
            
            if (foodEaten >= levelTarget) {
                levelUp();
            }
            
            spawnFood();
        } else {
            snake.pop();
        }
        
        // Special food collision
        if (specialFood && head.x === specialFood.x && head.y === specialFood.y) {
            activatePowerUp(specialFood.type);
            spawnParticles(specialFood.x * gridSize + gridSize/2, specialFood.y * gridSize + gridSize/2, '#00ffff', 20);
            specialFood = null;
        }
        
        // Update special food timer
        if (specialFood) {
            specialFood.timer--;
            if (specialFood.timer <= 0) specialFood = null;
        }
        
        // Update power-up timers
        if (shieldActive) { powerUps.shield--; if (powerUps.shield <= 0) shieldActive = false; }
        if (magnetActive) { powerUps.magnet--; if (powerUps.magnet <= 0) magnetActive = false; }
        if (slowActive) { powerUps.slow--; if (powerUps.slow <= 0) slowActive = false; }
        
        // Update particles
        particles = particles.filter(p => { p.update(); return p.life > 0; });
        
        // Screen shake decay
        if (screenShake > 0) screenShake *= 0.9;
        
        updateUI();
    }

    function activatePowerUp(type) {
        if (type === 'shield') {
            powerUps.shield = 300;
            shieldActive = true;
        } else if (type === 'magnet') {
            powerUps.magnet = 300;
            magnetActive = true;
        } else if (type === 'slow') {
            powerUps.slow = 300;
            slowActive = true;
        }
    }

    function levelUp() {
        level++;
        foodEaten = 0;
        levelTarget = 5 + level * 2;
        speed = Math.max(50, 150 - level * 10);
        clearInterval(gameLoop);
        gameLoop = setInterval(update, speed);
        screenShake = 15;
        spawnParticles(canvas.width/2, canvas.height/2, '#00ff88', 30);
    }

    function draw() {
        // Apply screen shake
        ctx.save();
        if (screenShake > 0.5) {
            ctx.translate(
                (Math.random() - 0.5) * screenShake,
                (Math.random() - 0.5) * screenShake
            );
        }
        
        // Background
        ctx.fillStyle = '#0d0d1a';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Grid lines (subtle)
        ctx.strokeStyle = 'rgba(0,255,136,0.05)';
        ctx.lineWidth = 1;
        for (let i = 0; i <= canvas.width; i += gridSize) {
            ctx.beginPath();
            ctx.moveTo(i, 0);
            ctx.lineTo(i, canvas.height);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(0, i);
            ctx.lineTo(canvas.width, i);
            ctx.stroke();
        }
        
        // Draw food
        const fx = food.x * gridSize;
        const fy = food.y * gridSize;
        
        if (food.type === 'special') {
            // Glowing food
            const pulse = Math.sin(Date.now() / 200) * 3;
            ctx.shadowColor = '#ffd700';
            ctx.shadowBlur = 15 + pulse;
            ctx.fillStyle = '#ffd700';
            ctx.beginPath();
            ctx.arc(fx + gridSize/2, fy + gridSize/2, gridSize/2 - 2 + pulse, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        } else {
            // Normal food with shine
            ctx.fillStyle = '#ff4444';
            ctx.shadowColor = '#ff4444';
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(fx + gridSize/2, fy + gridSize/2, gridSize/2 - 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // Shine
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.beginPath();
            ctx.arc(fx + gridSize/2 - 3, fy + gridSize/2 - 3, 3, 0, Math.PI * 2);
            ctx.fill();
        }
        
        // Draw special food
        if (specialFood) {
            const sx = specialFood.x * gridSize;
            const sy = specialFood.y * gridSize;
            const pulse = Math.sin(Date.now() / 150) * 4;
            
            ctx.shadowColor = '#00ffff';
            ctx.shadowBlur = 20 + pulse;
            
            const colors = { shield: '#00ff88', magnet: '#ff00ff', slow: '#00ccff' };
            ctx.fillStyle = colors[specialFood.type];
            ctx.font = '16px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(specialFood.type === 'shield' ? '🛡️' : specialFood.type === 'magnet' ? '🧲' : '⏰', sx + gridSize/2, sy + gridSize/2);
            ctx.shadowBlur = 0;
        }
        
        // Draw snake
        snake.forEach((segment, i) => {
            const sx = segment.x * gridSize;
            const sy = segment.y * gridSize;
            
            if (i === 0) {
                // Head - bigger, with eyes
                ctx.shadowColor = '#00ff88';
                ctx.shadowBlur = 15;
                
                // Head shape
                ctx.fillStyle = '#00ff88';
                ctx.beginPath();
                ctx.roundRect(sx + 1, sy + 1, gridSize - 2, gridSize - 2, 5);
                ctx.fill();
                ctx.shadowBlur = 0;
                
                // Eyes
                ctx.fillStyle = '#0f0f1a';
                const eyeOffset = 5;
                ctx.beginPath();
                ctx.arc(sx + 6, sy + 7, 2.5, 0, Math.PI * 2);
                ctx.arc(sx + gridSize - 6, sy + 7, 2.5, 0, Math.PI * 2);
                ctx.fill();
                
                // Tongue (when moving)
                if (direction.x !== 0 || direction.y !== 0) {
                    ctx.strokeStyle = '#ff6b6b';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    const tx = direction.x > 0 ? sx + gridSize : sx;
                    const ty = sy + gridSize/2;
                    ctx.moveTo(tx, ty);
                    ctx.lineTo(tx + direction.x * 6, ty);
                    ctx.stroke();
                }
            } else {
                // Body - gradient from head color to darker
                const alpha = 1 - (i / snake.length) * 0.5;
                ctx.fillStyle = `rgba(0, ${Math.floor(200 * alpha)}, ${Math.floor(100 * alpha)}, 1)`;
                ctx.shadowColor = '#00ff88';
                ctx.shadowBlur = 5;
                ctx.beginPath();
                ctx.roundRect(sx + 2, sy + 2, gridSize - 4, gridSize - 4, 4);
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        });
        
        // Shield effect
        if (shieldActive) {
            ctx.strokeStyle = 'rgba(0,255,136,0.5)';
            ctx.lineWidth = 3;
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.arc(snake[0].x * gridSize + gridSize/2, snake[0].y * gridSize + gridSize/2, gridSize, 0, Math.PI * 2);
            ctx.stroke();
            ctx.setLineDash([]);
        }
        
        // Magnet effect
        if (magnetActive) {
            ctx.strokeStyle = 'rgba(255,0,255,0.3)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(snake[0].x * gridSize + gridSize/2, snake[0].y * gridSize + gridSize/2, gridSize * 4, 0, Math.PI * 2);
            ctx.stroke();
        }
        
        // Draw particles
        particles.forEach(p => p.draw());
        
        ctx.restore();
    }

    function updateUI() {
        document.getElementById('score').textContent = score;
        document.getElementById('highScore').textContent = highScore;
        document.getElementById('level').textContent = level;
        document.getElementById('levelIndicator').textContent = `🍎 Level ${level} - ${foodEaten}/${levelTarget}`;
        
        document.getElementById('shieldIcon').className = 'power-up-icon' + (shieldActive ? ' active' : '');
        document.getElementById('magnetIcon').className = 'power-up-icon' + (magnetActive ? ' active' : '');
        document.getElementById('slowIcon').className = 'power-up-icon' + (slowActive ? ' active' : '');
    }

    function gameOver() {
        clearInterval(gameLoop);
        if (score > highScore) {
            highScore = score;
            localStorage.setItem('epicSnakeHigh', highScore);
        }
        document.getElementById('gameOverText').textContent = `You reached Level ${level} with ${score} points!`;
        document.getElementById('gameOverOverlay').classList.remove('hidden');
    }

    function startGame() {
        document.getElementById('startOverlay').classList.add('hidden');
        document.getElementById('gameOverOverlay').classList.add('hidden');
        init();
        gameLoop = setInterval(() => {
            update();
            draw();
        }, speed);
        draw();
    }

    // Controls
    document.addEventListener('keydown', e => {
        if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'w', 'a', 's', 'd', 'W', 'A', 'S', 'D'].includes(e.key)) {
            e.preventDefault();
        }
        if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') nextDirection = { x: 0, y: -1 };
        if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') nextDirection = { x: 0, y: 1 };
        if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') nextDirection = { x: -1, y: 0 };
        if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') nextDirection = { x: 1, y: 0 };
        if (e.key === ' ') startGame();
    });

    // Touch controls
    let touchDir = null;
    ['btnUp', 'btnDown', 'btnLeft', 'btnRight'].forEach(id => {
        const btn = document.getElementById(id);
        const dirMap = { btnUp: {x:0,y:-1}, btnDown: {x:0,y:1}, btnLeft: {x:-1,y:0}, btnRight: {x:1,y:0} };
        btn.addEventListener('touchstart', e => { e.preventDefault(); nextDirection = dirMap[id]; });
        btn.addEventListener('mousedown', () => { nextDirection = dirMap[id]; });
    });

    // Swipe support
    let touchStartX, touchStartY;
    canvas.addEventListener('touchstart', e => {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
    });
    canvas.addEventListener('touchend', e => {
        if (!touchStartX || !touchStartY) return;
        const dx = e.changedTouches[0].clientX - touchStartX;
        const dy = e.changedTouches[0].clientY - touchStartY;
        if (Math.abs(dx) > Math.abs(dy)) {
            nextDirection = dx > 0 ? {x:1,y:0} : {x:-1,y:0};
        } else {
            nextDirection = dy > 0 ? {x:0,y:1} : {x:0,y:-1};
        }
        touchStartX = touchStartY = null;
    });

    // Polyfill for roundRect if needed
    if (!ctx.roundRect) {
        ctx.roundRect = function(x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
        };
    }

    init();
    draw();
    
        window.tL=false; window.tR=false; window.tU=false; window.tD=false;
        setInterval(() => {
            if(window.tL) keys.left=true; else keys.left=false;
            if(window.tR) keys.right=true; else keys.right=false;
            if(window.tU) keys.up=true; else keys.up=false;
            if(window.tD) keys.down=true; else keys.down=false;
        }, 50);

    
    // EPIC PARTICLES
    let eParticles = [];
    class EParticle {
        constructor(x, y, color, size, vx, vy, life) {
            this.x=x; this.y=y; this.color=color; this.size=size;
            this.vx=vx; this.vy=vy; this.life=life; this.maxLife=life;
        }
        update() {
            this.x+=this.vx; this.y+=this.vy; this.vy+=0.1; this.life--;
        }
        draw() {
            let a = this.life/this.maxLife;
            ctx.globalAlpha=a;
            ctx.fillStyle=this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size*a, 0, Math.PI*2);
            ctx.fill();
            ctx.globalAlpha=1;
        }
    }
    function eSpawn(x, y, color, count) {
        for(let i=0; i<count; i++) {
            eParticles.push(new EParticle(x, y, color, 3+Math.random()*4, (Math.random()-0.5)*8, (Math.random()-0.5)*8-3, 30+Math.random()*20));
        }
    }

    </script>
</body>
