<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔨 Whack a Mole</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(180deg, #8B4513 0%, #654321 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }
        h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .score-board { font-size: 1.3rem; margin-bottom: 15px; }
        .score-board span { background: rgba(255,255,255,0.2); padding: 5px 15px; border-radius: 15px; }
        canvas { max-width: 100%; 
            max-width: 100vw; border: 3px solid #fff; border-radius: 10px; }
        .instructions { margin-top: 15px; color: #ddd; font-size: 1rem; }
        .instructions span { background: #e74c3c; padding: 3px 10px; border-radius: 5px; }
        .back-btn {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255,255,255,0.2); color: white;
            border: 2px solid rgba(255,255,255,0.3); padding: 10px 20px;
            border-radius: 8px; cursor: pointer; text-decoration: none;
        }
        .back-btn:hover { background: rgba(255,255,255,0.3); }
    
        /* Mobile Touch Controls */
        .touch-controls {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            padding: 10px;
            z-index: 1000;
        }
        @media (pointer: coarse) {
            .touch-controls { display: flex !important; }
            body { padding-bottom: 120px !important; }
        }
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 5px;
            margin: 0 auto;
        }
        .dpad-btn {
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.4);
            border-radius: 10px;
            color: white;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .dpad-btn:active {
            background: rgba(255,255,255,0.4);
        }
        .dpad-center { background: rgba(0,0,0,0.2); }
        @media (max-width: 500px) {
            .dpad { grid-template-columns: repeat(3, 50px); grid-template-rows: repeat(3, 50px); }
            .dpad-btn { font-size: 20px; }
        }
    
    
        .tap-area {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 999;
            display: none;
        }
        @media (pointer: coarse) {
            .tap-area { display: block; }
        }
        .tap-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 80px; height: 80px;
            background: rgba(255,255,255,0.3);
            border: 3px solid rgba(255,255,255,0.6);
            border-radius: 50%;
            color: white;
            font-size: 14px;
            z-index: 1001;
            display: none;
            cursor: pointer;
        }
        @media (pointer: coarse) {
            .tap-btn { display: flex; align-items: center; justify-content: center; }
        }

    
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }
        .game-header {
            font-size: 20px;
            font-weight: 700;
            color: #00ff88;
            text-shadow: 0 0 15px rgba(0,255,136,0.5);
            margin-bottom: 10px;
        }
        .score-display {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
        }
        .score-box {
            background: rgba(0,0,0,0.5);
            border: 2px solid rgba(0,255,136,0.3);
            border-radius: 10px;
            padding: 6px 14px;
            text-align: center;
        }
        .score-label { font-size: 10px; color: rgba(255,255,255,0.6); text-transform: uppercase; }
        .score-val { font-size: 18px; font-weight: 700; color: #00ff88; }
        .game-wrapper { position: relative; }
        #gameCanvas {
            border-radius: 12px;
            border: 3px solid #00ff88;
            box-shadow: 0 0 30px rgba(0,255,136,0.3);
        }
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
        }
        .overlay.hidden { display: none; }
        .overlay h2 {
            font-size: 28px;
            color: #00ff88;
            text-shadow: 0 0 20px rgba(0,255,136,0.6);
            margin-bottom: 8px;
        }
        .overlay p { color: rgba(255,255,255,0.7); margin-bottom: 15px; }
        .btn-epic {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            color: #0f0f1a;
            border: none;
            padding: 12px 35px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(0,255,136,0.4);
        }
        .btn-epic:hover { transform: scale(1.05); }
        .touch-controls {
            display: none;
            position: fixed;
            bottom: 10px;
            left: 0;
            right: 0;
            z-index: 100;
            justify-content: center;
            gap: 8px;
        }
        @media (pointer: coarse) {
            .touch-controls { display: flex; }
            body { padding-bottom: 100px; }
        }
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 50px);
            grid-template-rows: repeat(2, 50px);
            gap: 4px;
        }
        .dpad-btn {
            background: rgba(0,255,136,0.2);
            border: 2px solid rgba(0,255,136,0.5);
            border-radius: 10px;
            color: #00ff88;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .dpad-btn:active { background: rgba(0,255,136,0.5); }

    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← Back to Games</a>
    <h1>🔨 WHACK A MOLE</h1>
    <div class="score-board">
        <span>Score: <strong id="score">0</strong></span>
        <span>Time: <strong id="time">30</strong>s</span>
    </div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="instructions">Click the <span>🎯 MOLES</span> when they pop up!</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let moles = [];
        let score = 0;
        let timeLeft = 30;
        let gameLoop;
        let gameRunning = false;
        let spawnTimer = 0;
        
        function init() {
            moles = [];
            score = 0;
            timeLeft = 30;
            gameRunning = true;
            spawnTimer = 0;
            
            document.getElementById('score').textContent = '0';
            document.getElementById('time').textContent = '30';
            
            gameLoop = setInterval(() => {
                update();
                draw();
            }, 1000 / 60);
            
            // Timer
            let timer = setInterval(() => {
                if (!gameRunning) {
                    clearInterval(timer);
                    return;
                }
                timeLeft--;
                document.getElementById('time').textContent = timeLeft;
                
                if (timeLeft <= 0) {
                    endGame();
                    clearInterval(timer);
                }
            }, 1000);
        }
        
        function spawnMole() {
            const holes = [
                {x: 70, y: 100}, {x: 200, y: 100}, {x: 330, y: 100},
                {x: 70, y: 220}, {x: 200, y: 220}, {x: 330, y: 220},
                {x: 70, y: 340}, {x: 200, y: 340}, {x: 330, y: 340}
            ];
            
            const hole = holes[Math.floor(Math.random() * holes.length)];
            moles.push({
                x: hole.x,
                y: hole.y,
                up: true,
                upTime: 60 + Math.random() * 60,
                type: Math.random() > 0.9 ? 'bonus' : 'normal'
            });
        }
        
        function drawHole(x, y) {
            // Hole shadow
            ctx.fillStyle = '#3d2914';
            ctx.beginPath();
            ctx.ellipse(x, y + 30, 40, 20, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Hole
            ctx.fillStyle = '#1a0f00';
            ctx.beginPath();
            ctx.ellipse(x, y + 25, 35, 18, 0, 0, Math.PI * 2);
            ctx.fill();
        }
        
        function drawMole(m) {
            if (!m.up) return;
            
            const offsetY = Math.sin((60 - m.upTime) / 60 * Math.PI) * 50;
            const y = m.y - offsetY;
            
            // Mole body
            ctx.fillStyle = m.type === 'bonus' ? '#f1c40f' : '#8B4513';
            ctx.beginPath();
            ctx.arc(m.x, y, 25, 0, Math.PI * 2);
            ctx.fill();
            
            // Face
            ctx.fillStyle = '#654321';
            ctx.beginPath();
            ctx.arc(m.x - 8, y - 5, 4, 0, Math.PI * 2);
            ctx.arc(m.x + 8, y - 5, 4, 0, Math.PI * 2);
            ctx.fill();
            
            // Nose
            ctx.fillStyle = '#e74c3c';
            ctx.beginPath();
            ctx.arc(m.x, y + 5, 6, 0, Math.PI * 2);
            ctx.fill();
            
            // Teeth
            ctx.fillStyle = '#fff';
            ctx.fillRect(m.x - 6, y + 12, 4, 6);
            ctx.fillRect(m.x + 2, y + 12, 4, 6);
            
            if (m.type === 'bonus') {
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 16px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('⭐', m.x, y - 30);
            }
        }
        
        function draw() {
            // Dirt background
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Dirt pattern
            ctx.fillStyle = '#7a3c11';
            for (let i = 0; i < 20; i++) {
                for (let j = 0; j < 20; j++) {
                    if ((i + j) % 2 === 0) {
                        ctx.fillRect(i * 22, j * 22, 20, 20);
                    }
                }
            }
            
            // Draw holes first
            const holes = [
                {x: 70, y: 100}, {x: 200, y: 100}, {x: 330, y: 100},
                {x: 70, y: 220}, {x: 200, y: 220}, {x: 330, y: 220},
                {x: 70, y: 340}, {x: 200, y: 340}, {x: 330, y: 340}
            ];
            
            holes.forEach(h => drawHole(h.x, h.y));
            
            // Draw moles
            moles.forEach(drawMole);
        }
        
        function update() {
            if (!gameRunning) return;
            
            spawnTimer++;
            if (spawnTimer > 30) {
                spawnMole();
                spawnTimer = 0;
            }
            
            moles.forEach(m => {
                if (m.up) {
                    m.upTime--;
                    if (m.upTime <= 0) {
                        m.up = false;
                    }
                }
            });
            
            moles = moles.filter(m => m.up || m.upTime > -30);
        }
        
        function endGame() {
            gameRunning = false;
            clearInterval(gameLoop);
            setTimeout(() => {
                alert(`Time's Up!\nScore: ${score}\n\nClick OK to play again!`);
                init();
            }, 100);
        }
        
        canvas.addEventListener('click', (e) => {
            if (!gameRunning) return;
            
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;
            
            moles.forEach(m => {
                if (!m.up) return;
                
                const offsetY = Math.sin((60 - m.upTime) / 60 * Math.PI) * 50;
                const y = m.y - offsetY;
                
                const dist = Math.sqrt((mx - m.x) ** 2 + (my - y) ** 2);
                if (dist < 30) {
                    m.up = false;
                    const points = m.type === 'bonus' ? 50 : 10;
                    score += points;
                    document.getElementById('score').textContent = score;
                }
            });
        });
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const mx = touch.clientX - rect.left;
            const my = touch.clientY - rect.top;
            
            moles.forEach(m => {
                if (!m.up) return;
                
                const offsetY = Math.sin((60 - m.upTime) / 60 * Math.PI) * 50;
                const y = m.y - offsetY;
                
                const dist = Math.sqrt((mx - m.x) ** 2 + (my - y) ** 2);
                if (dist < 30) {
                    m.up = false;
                    const points = m.type === 'bonus' ? 50 : 10;
                    score += points;
                    document.getElementById('score').textContent = score;
                }
            });
        });
        
        init();
        draw();
    
        // Tap anywhere to click
        document.addEventListener('touchstart', (e) => {
            if(e.target.tagName !== 'BUTTON' && e.target.tagName !== 'INPUT') {
                const touch = e.touches[0];
                const clickEvent = new MouseEvent('click', {
                    bubbles: true,
                    clientX: touch.clientX,
                    clientY: touch.clientY
                });
                e.target.dispatchEvent(clickEvent);
            }
        }, true);
        
        // Space/action button for mobile
        window.tapSpace = false;

    
    // EPIC PARTICLES
    let eParticles = [];
    class EParticle {
        constructor(x, y, color, size, vx, vy, life) {
            this.x=x; this.y=y; this.color=color; this.size=size;
            this.vx=vx; this.vy=vy; this.life=life; this.maxLife=life;
        }
        update() {
            this.x+=this.vx; this.y+=this.vy; this.vy+=0.1; this.life--;
        }
        draw() {
            let a = this.life/this.maxLife;
            ctx.globalAlpha=a;
            ctx.fillStyle=this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size*a, 0, Math.PI*2);
            ctx.fill();
            ctx.globalAlpha=1;
        }
    }
    function eSpawn(x, y, color, count) {
        for(let i=0; i<count; i++) {
            eParticles.push(new EParticle(x, y, color, 3+Math.random()*4, (Math.random()-0.5)*8, (Math.random()-0.5)*8-3, 30+Math.random()*20));
        }
    }

    
    window.tL=false; window.tR=false; window.tU=false; window.tD=false;
    ['btnL','btnR','btnU','btnD'].forEach(id => {
        let btn = document.getElementById(id);
        if(!btn) return;
        let key = {btnL:'tL',btnR:'tR',btnU:'tU',btnD:'tD'}[id];
        btn.addEventListener('touchstart', e => { e.preventDefault(); window[key]=true; });
        btn.addEventListener('touchend', e => { e.preventDefault(); window[key]=false; });
        btn.addEventListener('mousedown', () => window[key]=true);
        btn.addEventListener('mouseup', () => window[key]=false);
    });
    setInterval(() => {
        if(window.tL) keys.left=true; else keys.left=false;
        if(window.tR) keys.right=true; else keys.right=false;
        if(window.tU) keys.up=true; else keys.up=false;
        if(window.tD) keys.down=true; else keys.down=false;
    }, 50);

    </script>

    <button class="tap-btn" ontouchstart="window.tapSpace=true" ontouchend="window.tapSpace=false">TAP</button>

</body>
</html>
