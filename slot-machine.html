<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎰 Slot Machine</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }
        .back-btn {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255,255,255,0.1); color: white;
            border: 2px solid rgba(255,255,255,0.3); padding: 10px 20px;
            border-radius: 8px; cursor: pointer; text-decoration: none;
        }
        .back-btn:hover { background: rgba(255,255,255,0.2); }
        h1 { font-size: 2.5rem; margin-bottom: 10px; color: #f1c40f; text-shadow: 0 0 20px rgba(241,196,15,0.5); }
        .score-board { font-size: 1.3rem; margin-bottom: 15px; }
        .score-board span { background: rgba(241,196,15,0.2); padding: 5px 15px; border-radius: 15px; margin: 0 10px; }
        canvas { max-width: 100%; 
            max-width: 100vw; border: 3px solid #f1c40f; border-radius: 15px; background: #000; cursor: pointer; }
        .instructions { margin-top: 15px; color: #888; font-size: 1rem; }
        .instructions span { background: #f1c40f; padding: 3px 10px; border-radius: 5px; color: #000; }
        .message { font-size: 1.5rem; margin: 15px 0; min-height: 40px; text-align: center; }
    
        /* Mobile Touch Controls */
        .touch-controls {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            padding: 10px;
            z-index: 1000;
        }
        @media (pointer: coarse) {
            .touch-controls { display: flex !important; }
            body { padding-bottom: 120px !important; }
        }
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 5px;
            margin: 0 auto;
        }
        .dpad-btn {
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.4);
            border-radius: 10px;
            color: white;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .dpad-btn:active {
            background: rgba(255,255,255,0.4);
        }
        .dpad-center { background: rgba(0,0,0,0.2); }
        @media (max-width: 500px) {
            .dpad { grid-template-columns: repeat(3, 50px); grid-template-rows: repeat(3, 50px); }
            .dpad-btn { font-size: 20px; }
        }
    
    
        .tap-area {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 999;
            display: none;
        }
        @media (pointer: coarse) {
            .tap-area { display: block; }
        }
        .tap-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 80px; height: 80px;
            background: rgba(255,255,255,0.3);
            border: 3px solid rgba(255,255,255,0.6);
            border-radius: 50%;
            color: white;
            font-size: 14px;
            z-index: 1001;
            display: none;
            cursor: pointer;
        }
        @media (pointer: coarse) {
            .tap-btn { display: flex; align-items: center; justify-content: center; }
        }

    
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }
        .game-header {
            font-size: 20px;
            font-weight: 700;
            color: #00ff88;
            text-shadow: 0 0 15px rgba(0,255,136,0.5);
            margin-bottom: 10px;
        }
        .score-display {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
        }
        .score-box {
            background: rgba(0,0,0,0.5);
            border: 2px solid rgba(0,255,136,0.3);
            border-radius: 10px;
            padding: 6px 14px;
            text-align: center;
        }
        .score-label { font-size: 10px; color: rgba(255,255,255,0.6); text-transform: uppercase; }
        .score-val { font-size: 18px; font-weight: 700; color: #00ff88; }
        .game-wrapper { position: relative; }
        #gameCanvas {
            border-radius: 12px;
            border: 3px solid #00ff88;
            box-shadow: 0 0 30px rgba(0,255,136,0.3);
        }
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
        }
        .overlay.hidden { display: none; }
        .overlay h2 {
            font-size: 28px;
            color: #00ff88;
            text-shadow: 0 0 20px rgba(0,255,136,0.6);
            margin-bottom: 8px;
        }
        .overlay p { color: rgba(255,255,255,0.7); margin-bottom: 15px; }
        .btn-epic {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            color: #0f0f1a;
            border: none;
            padding: 12px 35px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(0,255,136,0.4);
        }
        .btn-epic:hover { transform: scale(1.05); }
        .touch-controls {
            display: none;
            position: fixed;
            bottom: 10px;
            left: 0;
            right: 0;
            z-index: 100;
            justify-content: center;
            gap: 8px;
        }
        @media (pointer: coarse) {
            .touch-controls { display: flex; }
            body { padding-bottom: 100px; }
        }
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 50px);
            grid-template-rows: repeat(2, 50px);
            gap: 4px;
        }
        .dpad-btn {
            background: rgba(0,255,136,0.2);
            border: 2px solid rgba(0,255,136,0.5);
            border-radius: 10px;
            color: #00ff88;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .dpad-btn:active { background: rgba(0,255,136,0.5); }

    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← Back to Games</a>
    <h1>🎰 SLOT MACHINE</h1>
    <div class="score-board">
        <span>Coins: <strong id="coins">100</strong></span>
        <span>Bet: <strong id="bet">10</strong></span>
    </div>
    <canvas id="gameCanvas" width="350" height="250"></canvas>
    <div class="message" id="message">🎲 Place your bet and SPIN! 🎲</div>
    <div class="instructions">
        <span>↑</span><span>↓</span> Change bet | <span>CLICK</span> or <span>SPACE</span> to SPIN
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Symbol indices: 0=cherry, 1=lemon, 2=orange, 3=grape, 4=star, 5=diamond, 6=seven, 7=bell
        const symbols = ['🍒', '🍋', '🍊', '🍇', '⭐', '💎', '7️⃣', '🔔'];
        
        let coins = 100;
        let bet = 10;
        let reels = [0, 0, 0]; // Final stopped positions
        let displayReels = [0, 0, 0]; // Visual display positions
        let spinning = [false, false, false];
        let spinStartTime = [0, 0, 0];
        let message = "🎲 Place your bet and SPIN! 🎲";
        
        const REEL_HEIGHT = 80;
        const SYMBOL_SIZE = 70;
        
        function drawSymbol(x, y, symbolIndex, size) {
            ctx.font = size + 'px Arial';
            ctx.fillStyle = '#fff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(symbols[symbolIndex], x, y);
        }
        
        function draw() {
            // Background
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Machine frame
            ctx.fillStyle = '#2c3e50';
            ctx.fillRect(25, 25, canvas.width - 50, canvas.height - 50);
            
            // Reel backgrounds
            const reelWidth = 90;
            const reelHeight = 200;
            const startX = (canvas.width - 3 * reelWidth - 20) / 2;
            const centerY = 130;
            
            for (let i = 0; i < 3; i++) {
                // Reel shadow
                ctx.fillStyle = '#000';
                ctx.fillRect(startX + i * (reelWidth + 10) - 3, 40, reelWidth + 6, reelHeight + 6);
                
                // Reel background
                ctx.fillStyle = '#1a1a1a';
                ctx.fillRect(startX + i * (reelWidth + 10), 37, reelWidth, reelHeight);
                
                // Draw visible symbols (3 positions: top, middle, bottom)
                for (let pos = -1; pos <= 1; pos++) {
                    const symbolIndex = displayReels[i];
                    const yOffset = pos * SYMBOL_SIZE;
                    
                    // Draw symbol
                    const alpha = pos === 0 ? 1 : 0.4;
                    ctx.globalAlpha = alpha;
                    drawSymbol(
                        startX + i * (reelWidth + 10) + reelWidth / 2,
                        centerY + yOffset,
                        symbolIndex,
                        60
                    );
                }
                ctx.globalAlpha = 1;
                
                // WIN LINE for middle reel
                if (i === 1) {
                    ctx.strokeStyle = '#f1c40f';
                    ctx.lineWidth = 4;
                    ctx.strokeRect(startX + i * (reelWidth + 10) - 2, centerY - SYMBOL_SIZE/2 - 2, reelWidth + 4, SYMBOL_SIZE + 4);
                }
            }
            
            // Divider lines between reels
            ctx.fillStyle = '#f1c40f';
            for (let i = 0; i < 2; i++) {
                ctx.fillRect(startX + (i + 1) * (reelWidth + 10) - 5, 37, 5, reelHeight);
            }
            
            // Bottom panel
            ctx.fillStyle = '#7f8c8d';
            ctx.fillRect(canvas.width/2 - 50, 215, 100, 30);
            
            // Decorative lights
            const time = Date.now() / 100;
            for (let i = 0; i < 10; i++) {
                const x = 40 + i * 30;
                const hue = (time + i * 36) % 360;
                ctx.fillStyle = `hsl(${hue}, 80%, 60%)`;
                ctx.beginPath();
                ctx.arc(x, 15, 6, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // "JACKPOT" text
            ctx.fillStyle = '#f1c40f';
            ctx.font = 'bold 18px Arial';
            ctx.fillText('💰 JACKPOT 💰', canvas.width / 2, canvas.height - 15);
        }
        
        function getRandomSymbol() {
            return Math.floor(Math.random() * symbols.length);
        }
        
        function easeOut(t) {
            return 1 - Math.pow(1 - t, 3);
        }
        
        function spin() {
            if (spinning.some(s => s)) return;
            if (coins < bet) {
                message = "❌ Not enough coins! ❌";
                document.getElementById('message').textContent = message;
                return;
            }
            
            coins -= bet;
            document.getElementById('coins').textContent = coins;
            
            // Set final positions (random)
            reels[0] = getRandomSymbol();
            reels[1] = getRandomSymbol();
            reels[2] = getRandomSymbol();
            
            // Start spinning animation
            spinning = [true, true, true];
            spinStartTime = [Date.now(), Date.now() + 600, Date.now() + 1200];
            message = "🎰 SPINNING! 🎰";
            document.getElementById('message').textContent = message;
            
            // Determine stop times (in ms)
            const stopTimes = [1500, 2500, 3500];
            
            // Animate each reel
            function animateReel(index) {
                const startTime = Date.now();
                const duration = stopTimes[index];
                
                function animate() {
                    const elapsed = Date.now() - startTime;
                    
                    if (elapsed < duration) {
                        // Still spinning - rapid cycling through symbols
                        displayReels[index] = Math.floor(Math.random() * symbols.length);
                        requestAnimationFrame(animate);
                    } else {
                        // Stopped - show final symbol
                        displayReels[index] = reels[index];
                        spinning[index] = false;
                        
                        // Check win when all stopped
                        if (!spinning.some(s => s)) {
                            checkWin();
                        }
                    }
                }
                animate();
            }
            
            animateReel(0);
            animateReel(1);
            animateReel(2);
        }
        
        function checkWin() {
            const a = reels[0], b = reels[1], c = reels[2];
            let win = 0;
            
            if (a === b && b === c) {
                if (a === 6) { // Triple 7
                    win = bet * 100;
                    message = "🎊🎊🎊 MEGA JACKPOT! x100! $" + win + " 🎊🎊🎊";
                } else if (a === 5) { // Triple diamond
                    win = bet * 50;
                    message = "💎💎💎 DIAMOND! x50! $" + win + " 💎💎💎";
                } else {
                    win = bet * 20;
                    message = "🎉🎉🎉 THREE OF A KIND! x20! $" + win + " 🎉🎉🎉";
                }
            } else if (a === b || b === c || a === c) {
                win = bet * 5;
                message = "🎊 TWO MATCH! x5! $" + win + " 🎊";
            } else if (a === 4 || b === 4 || c === 4) {
                win = bet * 2;
                message = "⭐ Star Bonus! x2! $" + win + " ⭐";
            } else {
                message = "❌ No win - Try again! ❌";
            }
            
            if (win > 0) {
                coins += win;
                document.getElementById('coins').textContent = coins;
            }
            
            document.getElementById('message').textContent = message;
        }
        
        function changeBet(amount) {
            bet = Math.max(5, Math.min(50, bet + amount));
            document.getElementById('bet').textContent = bet;
        }
        
        function gameLoop() {
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        document.addEventListener('keydown', e => {
            if (e.code === 'Space') {
                e.preventDefault();
                spin();
            } else if (e.code === 'ArrowUp') {
                e.preventDefault();
                changeBet(5);
            } else if (e.code === 'ArrowDown') {
                e.preventDefault();
                changeBet(-5);
            }
        });
        
        canvas.addEventListener('click', spin);
        
        document.getElementById('message').textContent = message;
        gameLoop();
    
        // Tap anywhere to click
        document.addEventListener('touchstart', (e) => {
            if(e.target.tagName !== 'BUTTON' && e.target.tagName !== 'INPUT') {
                const touch = e.touches[0];
                const clickEvent = new MouseEvent('click', {
                    bubbles: true,
                    clientX: touch.clientX,
                    clientY: touch.clientY
                });
                e.target.dispatchEvent(clickEvent);
            }
        }, true);
        
        // Space/action button for mobile
        window.tapSpace = false;

    
    // EPIC PARTICLES
    let eParticles = [];
    class EParticle {
        constructor(x, y, color, size, vx, vy, life) {
            this.x=x; this.y=y; this.color=color; this.size=size;
            this.vx=vx; this.vy=vy; this.life=life; this.maxLife=life;
        }
        update() {
            this.x+=this.vx; this.y+=this.vy; this.vy+=0.1; this.life--;
        }
        draw() {
            let a = this.life/this.maxLife;
            ctx.globalAlpha=a;
            ctx.fillStyle=this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size*a, 0, Math.PI*2);
            ctx.fill();
            ctx.globalAlpha=1;
        }
    }
    function eSpawn(x, y, color, count) {
        for(let i=0; i<count; i++) {
            eParticles.push(new EParticle(x, y, color, 3+Math.random()*4, (Math.random()-0.5)*8, (Math.random()-0.5)*8-3, 30+Math.random()*20));
        }
    }

    
    window.tL=false; window.tR=false; window.tU=false; window.tD=false;
    ['btnL','btnR','btnU','btnD'].forEach(id => {
        let btn = document.getElementById(id);
        if(!btn) return;
        let key = {btnL:'tL',btnR:'tR',btnU:'tU',btnD:'tD'}[id];
        btn.addEventListener('touchstart', e => { e.preventDefault(); window[key]=true; });
        btn.addEventListener('touchend', e => { e.preventDefault(); window[key]=false; });
        btn.addEventListener('mousedown', () => window[key]=true);
        btn.addEventListener('mouseup', () => window[key]=false);
    });
    setInterval(() => {
        if(window.tL) keys.left=true; else keys.left=false;
        if(window.tR) keys.right=true; else keys.right=false;
        if(window.tU) keys.up=true; else keys.up=false;
        if(window.tD) keys.down=true; else keys.down=false;
    }, 50);

    </script>

    <button class="tap-btn" ontouchstart="window.tapSpace=true" ontouchend="window.tapSpace=false">TAP</button>

</body>
</html>
