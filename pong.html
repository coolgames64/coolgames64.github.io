<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🏓 Pong Champions - Cool Games 64</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a15 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            color: white;
        }
        .score-board {
            display: flex;
            gap: 60px;
            margin-bottom: 20px;
        }
        .score-item {
            text-align: center;
        }
        .player-label {
            font-size: 14px;
            color: rgba(255,255,255,0.6);
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        .score-value {
            font-size: 48px;
            font-weight: 800;
            text-shadow: 0 0 30px rgba(255,255,255,0.5);
        }
        .player1 .score-value { color: #00ff88; text-shadow: 0 0 30px rgba(0,255,136,0.5); }
        .player2 .score-value { color: #ff4444; text-shadow: 0 0 30px rgba(255,68,68,0.5); }
        .game-container {
            position: relative;
        }
        #gameCanvas {
            border-radius: 12px;
            border: 3px solid rgba(255,255,255,0.3);
            box-shadow: 0 0 50px rgba(255,255,255,0.1);
        }
        .overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            border-radius: 20px;
            padding: 30px 50px;
            text-align: center;
            border: 2px solid rgba(255,255,255,0.3);
        }
        .overlay.hidden { display: none; }
        .overlay h1 {
            font-size: 32px;
            margin-bottom: 15px;
        }
        .overlay h1.win { color: #ffd700; text-shadow: 0 0 30px rgba(255,215,0,0.8); }
        .overlay h1.lose { color: #ff4444; text-shadow: 0 0 30px rgba(255,68,68,0.8); }
        .overlay p { color: rgba(255,255,255,0.7); margin-bottom: 20px; }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 40px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(102,126,234,0.4);
        }
        .btn:hover { transform: scale(1.05); }
        .mode-select {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .mode-btn {
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.3);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
        }
        .mode-btn.active {
            background: rgba(102,126,234,0.5);
            border-color: #667eea;
        }
        .touch-controls {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            z-index: 100;
            justify-content: space-around;
            padding: 0 20px;
        }
        @media (pointer: coarse) {
            .touch-controls { display: flex; }
            body { padding-bottom: 120px; }
        }
        .paddle-btn {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            font-size: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .paddle-up {
            background: rgba(0,255,136,0.3);
            border: 3px solid rgba(0,255,136,0.6);
            color: #00ff88;
        }
        .paddle-down {
            background: rgba(255,68,68,0.3);
            border: 3px solid rgba(255,68,68,0.6);
            color: #ff4444;
        }
        .paddle-btn:active { transform: scale(0.95); }
    
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }
        .game-header {
            font-size: 20px;
            font-weight: 700;
            color: #00ff88;
            text-shadow: 0 0 15px rgba(0,255,136,0.5);
            margin-bottom: 10px;
        }
        .score-display {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
        }
        .score-box {
            background: rgba(0,0,0,0.5);
            border: 2px solid rgba(0,255,136,0.3);
            border-radius: 10px;
            padding: 6px 14px;
            text-align: center;
        }
        .score-label { font-size: 10px; color: rgba(255,255,255,0.6); text-transform: uppercase; }
        .score-val { font-size: 18px; font-weight: 700; color: #00ff88; }
        .game-wrapper { position: relative; }
        #gameCanvas {
            border-radius: 12px;
            border: 3px solid #00ff88;
            box-shadow: 0 0 30px rgba(0,255,136,0.3);
        }
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
        }
        .overlay.hidden { display: none; }
        .overlay h2 {
            font-size: 28px;
            color: #00ff88;
            text-shadow: 0 0 20px rgba(0,255,136,0.6);
            margin-bottom: 8px;
        }
        .overlay p { color: rgba(255,255,255,0.7); margin-bottom: 15px; }
        .btn-epic {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            color: #0f0f1a;
            border: none;
            padding: 12px 35px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(0,255,136,0.4);
        }
        .btn-epic:hover { transform: scale(1.05); }
        .touch-controls {
            display: none;
            position: fixed;
            bottom: 10px;
            left: 0;
            right: 0;
            z-index: 100;
            justify-content: center;
            gap: 8px;
        }
        @media (pointer: coarse) {
            .touch-controls { display: flex; }
            body { padding-bottom: 100px; }
        }
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 50px);
            grid-template-rows: repeat(2, 50px);
            gap: 4px;
        }
        .dpad-btn {
            background: rgba(0,255,136,0.2);
            border: 2px solid rgba(0,255,136,0.5);
            border-radius: 10px;
            color: #00ff88;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .dpad-btn:active { background: rgba(0,255,136,0.5); }

    </style>
</head>
<body>
    <div class="score-board">
        <div class="score-item player1">
            <div class="player-label">Player 1 (You)</div>
            <div class="score-value" id="score1">0</div>
        </div>
        <div class="score-item player2">
            <div class="player-label">CPU</div>
            <div class="score-value" id="score2">0</div>
        </div>
    </div>
    
    <div class="game-container">
        <canvas id="gameCanvas" width="400" height="450"></canvas>
        <div class="overlay" id="startScreen">
            <h1>🏓 PONG CHAMPIONS</h1>
            <div class="mode-select">
                <button class="mode-btn active" id="singleMode" onclick="setMode('single')">Single Player</button>
                <button class="mode-btn" id="twoMode" onclick="setMode('two')">2 Players</button>
            </div>
            <p>First to 11 wins!</p>
            <button class="btn" onclick="startGame()">START GAME</button>
        </div>
        <div class="overlay hidden" id="winScreen">
            <h1 id="winnerText" class="win">YOU WIN!</h1>
            <p id="finalScore">11 - 5</p>
            <button class="btn" onclick="startGame()">PLAY AGAIN</button>
        </div>
    </div>
    
    <div class="touch-controls" id="touchControls" style="display: none;">
        <button class="paddle-btn paddle-up" id="paddleUp">▲</button>
        <button class="paddle-btn paddle-down" id="paddleDown">▼</button>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let paddle1, paddle2, ball, score1, score2, gameLoop;
let gameState, mode, particles, screenShake;
let paddle1VY = 0;

const PADDLE_SPEED = 7;
const BALL_SPEED_INITIAL = 5;
const WIN_SCORE = 11;

class Particle {
    constructor(x, y, color) {
        this.x = x; this.y = y; this.color = color;
        this.vx = (Math.random() - 0.5) * 8;
        this.vy = (Math.random() - 0.5) * 8;
        this.life = 25;
        this.size = 4 + Math.random() * 4;
    }
    update() { this.x += this.vx; this.y += this.vy; this.life--; }
    draw() {
        ctx.globalAlpha = this.life / 25;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
    }
}

function spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
        particles.push(new Particle(x, y, color));
    }
}

function init() {
    paddle1 = { x: 30, y: 200, w: 15, h: 80, vy: 0 };
    paddle2 = { x: canvas.width - 45, y: 200, w: 15, h: 80, vy: 0 };
    ball = { x: canvas.width/2, y: canvas.height/2, vx: BALL_SPEED_INITIAL, vy: (Math.random() - 0.5) * 4, r: 10 };
    score1 = 0;
    score2 = 0;
    particles = [];
    screenShake = 0;
    paddle1VY = 0;
}

function setMode(m) {
    mode = m;
    document.getElementById('singleMode').classList.toggle('active', m === 'single');
    document.getElementById('twoMode').classList.toggle('active', m === 'two');
    document.getElementById('touchControls').style.display = m === 'two' ? 'flex' : 'none';
}

function resetBall(dir) {
    ball.x = canvas.width / 2;
    ball.y = canvas.height / 2;
    ball.vx = BALL_SPEED_INITIAL * dir;
    ball.vy = (Math.random() - 0.5) * 4;
}

function update() {
    if (gameState !== 'playing') return;
    
    // Player 1 paddle
    if (mode === 'two') {
        if (keys.w || keys.W || window.tUp) paddle1.vy = -PADDLE_SPEED;
        else if (keys.s || keys.S || window.tDown) paddle1.vy = PADDLE_SPEED;
        else paddle1.vy *= 0.8;
    } else {
        // Single player - mouse/touch control
        paddle1.vy = paddle1VY;
    }
    
    paddle1.y += paddle1.vy;
    paddle1.y = Math.max(0, Math.min(canvas.height - paddle1.h, paddle1.y));
    
    // Player 2 / CPU
    if (mode === 'single') {
        // CPU AI - intelligent tracking
        let cpuSpeed = 4 + (score1 + score2) * 0.2; // Gets faster as game progresses
        if (ball.vx > 0) { // Ball coming towards CPU
            if (ball.y < paddle2.y + paddle2.h/2 - 10) paddle2.y -= cpuSpeed;
            else if (ball.y > paddle2.y + paddle2.h/2 + 10) paddle2.y += cpuSpeed;
        }
    } else {
        if (keys.ArrowUp) paddle2.vy = -PADDLE_SPEED;
        else if (keys.ArrowDown) paddle2.vy = PADDLE_SPEED;
        else paddle2.vy *= 0.8;
        paddle2.y += paddle2.vy;
    }
    paddle2.y = Math.max(0, Math.min(canvas.height - paddle2.h, paddle2.y));
    
    // Ball movement
    ball.x += ball.vx;
    ball.y += ball.vy;
    
    // Top/bottom wall collision
    if (ball.y - ball.r <= 0 || ball.y + ball.r >= canvas.height) {
        ball.vy *= -1;
        spawnParticles(ball.x, ball.y, '#ffffff', 8);
    }
    
    // Paddle 1 collision
    if (ball.x - ball.r <= paddle1.x + paddle1.w &&
        ball.y >= paddle1.y && ball.y <= paddle1.y + paddle1.h &&
        ball.vx < 0) {
        ball.vx = Math.abs(ball.vx) * 1.05;
        ball.vy += (ball.y - (paddle1.y + paddle1.h/2)) * 0.1;
        ball.y = paddle1.y + paddle1.h/2;
        spawnParticles(ball.x, ball.y, '#00ff88', 12);
        screenShake = 4;
    }
    
    // Paddle 2 collision
    if (ball.x + ball.r >= paddle2.x &&
        ball.y >= paddle2.y && ball.y <= paddle2.y + paddle2.h &&
        ball.vx > 0) {
        ball.vx = -Math.abs(ball.vx) * 1.05;
        ball.vy += (ball.y - (paddle2.y + paddle2.h/2)) * 0.1;
        ball.y = paddle2.y + paddle2.h/2;
        spawnParticles(ball.x, ball.y, '#ff4444', 12);
        screenShake = 4;
    }
    
    // Speed cap
    ball.vx = Math.max(-12, Math.min(12, ball.vx));
    ball.vy = Math.max(-8, Math.min(8, ball.vy));
    
    // Score
    if (ball.x < 0) {
        score2++;
        spawnParticles(0, ball.y, '#ff4444', 20);
        screenShake = 8;
        if (score2 >= WIN_SCORE) {
            gameState = 'over';
            document.getElementById('winnerText').textContent = 'CPU WINS!';
            document.getElementById('winnerText').className = 'lose';
            document.getElementById('finalScore').textContent = score1 + ' - ' + score2;
            document.getElementById('winScreen').classList.remove('hidden');
            clearInterval(gameLoop);
            return;
        }
        resetBall(1);
    }
    if (ball.x > canvas.width) {
        score1++;
        spawnParticles(canvas.width, ball.y, '#00ff88', 20);
        screenShake = 8;
        if (score1 >= WIN_SCORE) {
            gameState = 'over';
            document.getElementById('winnerText').textContent = 'YOU WIN!';
            document.getElementById('winnerText').className = 'win';
            document.getElementById('finalScore').textContent = score1 + ' - ' + score2;
            document.getElementById('winScreen').classList.remove('hidden');
            clearInterval(gameLoop);
            return;
        }
        resetBall(-1);
    }
    
    // Particles
    particles = particles.filter(p => { p.update(); return p.life > 0; });
    if (screenShake > 0) screenShake *= 0.9;
    
    // Update UI
    document.getElementById('score1').textContent = score1;
    document.getElementById('score2').textContent = score2;
}

function draw() {
    ctx.save();
    if (screenShake > 0.5) {
        ctx.translate((Math.random() - 0.5) * screenShake, (Math.random() - 0.5) * screenShake);
    }
    
    // Background
    let grad = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 0, canvas.width/2, canvas.height/2, canvas.width);
    grad.addColorStop(0, '#1a1a2e');
    grad.addColorStop(1, '#0a0a15');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Center line
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 4;
    ctx.setLineDash([15, 15]);
    ctx.beginPath();
    ctx.moveTo(canvas.width/2, 0);
    ctx.lineTo(canvas.width/2, canvas.height);
    ctx.stroke();
    ctx.setLineDash([]);
    
    // Center circle
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(canvas.width/2, canvas.height/2, 50, 0, Math.PI * 2);
    ctx.stroke();
    
    // Paddle 1
    ctx.fillStyle = '#00ff88';
    ctx.shadowColor = '#00ff88';
    ctx.shadowBlur = 20;
    ctx.beginPath();
    ctx.roundRect(paddle1.x, paddle1.y, paddle1.w, paddle1.h, 5);
    ctx.fill();
    ctx.shadowBlur = 0;
    
    // Paddle 2
    ctx.fillStyle = '#ff4444';
    ctx.shadowColor = '#ff4444';
    ctx.shadowBlur = 20;
    ctx.beginPath();
    ctx.roundRect(paddle2.x, paddle2.y, paddle2.w, paddle2.h, 5);
    ctx.fill();
    ctx.shadowBlur = 0;
    
    // Ball
    ctx.fillStyle = '#ffffff';
    ctx.shadowColor = '#ffffff';
    ctx.shadowBlur = 25;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    
    // Ball trail
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#00ff88';
    ctx.beginPath();
    ctx.arc(ball.x - ball.vx * 2, ball.y - ball.vy * 2, ball.r * 0.6, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.15;
    ctx.beginPath();
    ctx.arc(ball.x - ball.vx * 4, ball.y - ball.vy * 4, ball.r * 0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    
    // Particles
    particles.forEach(p => p.draw());
    
    ctx.restore();
}

function startGame() {
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('winScreen').classList.add('hidden');
    
    init();
    gameState = 'playing';
    mode = mode || 'single';
    
    if (gameLoop) clearInterval(gameLoop);
    gameLoop = setInterval(() => { update(); draw(); }, 1000/60);
}

// Touch controls for 2 player mode
window.tUp = window.tDown = false;
['paddleUp', 'paddleDown'].forEach(id => {
    const btn = document.getElementById(id);
    const key = id === 'paddleUp' ? 'tUp' : 'tDown';
    btn.addEventListener('touchstart', e => { e.preventDefault(); window[key] = true; });
    btn.addEventListener('touchend', e => { e.preventDefault(); window[key] = false; });
    btn.addEventListener('mousedown', () => window[key] = true);
    btn.addEventListener('mouseup', () => window[key] = false);
});

// Single player mouse control
canvas.addEventListener('mousemove', e => {
    if (mode === 'single' && gameState === 'playing') {
        let rect = canvas.getBoundingClientRect();
        let y = (e.clientY - rect.top) * (canvas.height / rect.height);
        paddle1VY = (y - (paddle1.y + paddle1.h/2)) * 0.15;
    }
});

canvas.addEventListener('touchmove', e => {
    if (mode === 'single' && gameState === 'playing') {
        e.preventDefault();
        let rect = canvas.getBoundingClientRect();
        let y = (e.touches[0].clientY - rect.top) * (canvas.height / rect.height);
        paddle1VY = (y - (paddle1.y + paddle1.h/2)) * 0.15;
    }
}, { passive: false });

// Keyboard
document.addEventListener('keydown', e => {
    if (e.key === 'w' || e.key === 'W') keys.W = true;
    if (e.key === 's' || e.key === 'S') keys.S = true;
    if (e.key === 'ArrowUp') keys.ArrowUp = true;
    if (e.key === 'ArrowDown') keys.ArrowDown = true;
    if (e.key === ' ') startGame();
});
document.addEventListener('keyup', e => {
    if (e.key === 'w' || e.key === 'W') keys.W = false;
    if (e.key === 's' || e.key === 'S') keys.S = false;
    if (e.key === 'ArrowUp') keys.ArrowUp = false;
    if (e.key === 'ArrowDown') keys.ArrowDown = false;
});

if (!ctx.roundRect) {
    ctx.roundRect = function(x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
    };
}

mode = 'single';
init();
draw();

    // EPIC PARTICLES
    let eParticles = [];
    class EParticle {
        constructor(x, y, color, size, vx, vy, life) {
            this.x=x; this.y=y; this.color=color; this.size=size;
            this.vx=vx; this.vy=vy; this.life=life; this.maxLife=life;
        }
        update() {
            this.x+=this.vx; this.y+=this.vy; this.vy+=0.1; this.life--;
        }
        draw() {
            let a = this.life/this.maxLife;
            ctx.globalAlpha=a;
            ctx.fillStyle=this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size*a, 0, Math.PI*2);
            ctx.fill();
            ctx.globalAlpha=1;
        }
    }
    function eSpawn(x, y, color, count) {
        for(let i=0; i<count; i++) {
            eParticles.push(new EParticle(x, y, color, 3+Math.random()*4, (Math.random()-0.5)*8, (Math.random()-0.5)*8-3, 30+Math.random()*20));
        }
    }

    
    window.tL=false; window.tR=false; window.tU=false; window.tD=false;
    ['btnL','btnR','btnU','btnD'].forEach(id => {
        let btn = document.getElementById(id);
        if(!btn) return;
        let key = {btnL:'tL',btnR:'tR',btnU:'tU',btnD:'tD'}[id];
        btn.addEventListener('touchstart', e => { e.preventDefault(); window[key]=true; });
        btn.addEventListener('touchend', e => { e.preventDefault(); window[key]=false; });
        btn.addEventListener('mousedown', () => window[key]=true);
        btn.addEventListener('mouseup', () => window[key]=false);
    });
    setInterval(() => {
        if(window.tL) keys.left=true; else keys.left=false;
        if(window.tR) keys.right=true; else keys.right=false;
        if(window.tU) keys.up=true; else keys.up=false;
        if(window.tD) keys.down=true; else keys.down=false;
    }, 50);

    </script>
</body>
</html>
