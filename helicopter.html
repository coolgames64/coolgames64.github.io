<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🚁 Helicopter Hero - Cool Games 64</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(180deg, #1a1a2e 0%, #0d0d1a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }
        .hud {
            position: fixed;
            top: 0; left: 0; right: 0;
            display: flex;
            justify-content: space-between;
            padding: 10px 15px;
            background: rgba(0,0,0,0.5);
            z-index: 100;
        }
        .hud-item {
            background: rgba(0,0,0,0.4);
            border: 2px solid rgba(0,255,136,0.4);
            padding: 6px 12px;
            border-radius: 10px;
            color: white;
            font-size: 14px;
        }
        .hud-item span { color: #00ff88; font-weight: 700; }
        #gameCanvas {
            border-radius: 12px;
            border: 3px solid #00ff88;
            box-shadow: 0 0 40px rgba(0,255,136,0.3);
        }
        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        .overlay.hidden { display: none; }
        .overlay h1 {
            font-size: 36px;
            color: #00ff88;
            text-shadow: 0 0 30px rgba(0,255,136,0.8);
            margin-bottom: 10px;
        }
        .overlay p { color: rgba(255,255,255,0.7); margin-bottom: 25px; }
        .btn {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            color: #0f0f1a;
            border: none;
            padding: 15px 50px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,255,136,0.4);
        }
        .btn:hover { transform: scale(1.05); }
        .touch-controls {
            display: none;
            position: fixed;
            bottom: 15px;
            left: 0;
            right: 0;
            z-index: 100;
            justify-content: center;
        }
        @media (pointer: coarse) {
            .touch-controls { display: flex; }
            body { padding-bottom: 110px; }
        }
        .ctrl-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(0,255,136,0.2);
            border: 3px solid rgba(0,255,136,0.5);
            color: #00ff88;
            font-size: 28px;
            margin: 0 15px;
        }
        .ctrl-btn:active { background: rgba(0,255,136,0.5); }
        .fuel-bar {
            position: fixed;
            top: 50px;
            left: 15px;
            width: 150px;
            height: 12px;
            background: rgba(0,0,0,0.5);
            border-radius: 6px;
            overflow: hidden;
        }
        .fuel-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff4444, #ffaa00, #00ff88);
            transition: width 0.1s;
        }
    </style>
</head>
<body>
    <div class="hud">
        <div class="hud-item">Score: <span id="score">0</span></div>
        <div class="hud-item">Fuel: <span id="fuel">100</span>%</div>
        <div class="hud-item">Best: <span id="best">0</span></div>
    </div>
    <div class="fuel-bar"><div class="fuel-fill" id="fuelBar" style="width: 100%"></div></div>
    
    <canvas id="gameCanvas" width="400" height="550"></canvas>
    
    <div class="overlay" id="startScreen">
        <h1>🚁 HELICOPTER HERO</h1>
        <p>Fly through the cave! Collect fuel!</p>
        <button class="btn" onclick="startGame()">START</button>
    </div>
    <div class="overlay hidden" id="gameOverScreen">
        <h1>💥 CRASH!</h1>
        <p id="finalScore">Score: 0</p>
        <button class="btn" onclick="startGame()">TRY AGAIN</button>
    </div>
    
    <div class="touch-controls">
        <button class="ctrl-btn" id="upBtn">▲</button>
        <button class="ctrl-btn" id="downBtn">▼</button>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resize() {
    const w = Math.min(window.innerWidth - 10, 400);
    const h = Math.min(window.innerHeight - 200, 550);
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
}
resize();
window.addEventListener('resize', resize);

let copter, obstacles, coins, particles;
let score, best, fuel, gameLoop, gameState;
let bgOffset = 0;
let keys = {};

class Particle {
    constructor(x, y, color, size, vx, vy, life) {
        this.x=x; this.y=y; this.color=color; this.size=size;
        this.vx=vx; this.vy=vy; this.life=life; this.maxLife=life;
    }
    update() { this.x+=this.vx; this.y+=this.vy; this.life--; }
    draw() {
        ctx.globalAlpha=this.life/this.maxLife;
        ctx.fillStyle=this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size*(this.life/this.maxLife), 0, Math.PI*2);
        ctx.fill();
        ctx.globalAlpha=1;
    }
}
let eParticles = [];

function eSpawn(x, y, color, count) {
    for(let i=0; i<count; i++) {
        eParticles.push(new Particle(x, y, color, 3+Math.random()*4, (Math.random()-0.5)*8, (Math.random()-0.5)*8-2, 30+Math.random()*20));
    }
}

function init() {
    copter = { x: 80, y: 275, vy: 0, rotorAngle: 0 };
    obstacles = [];
    coins = [];
    eParticles = [];
    score = 0;
    fuel = 100;
    gameState = 'playing';
    
    // Generate initial obstacles
    for (let i = 0; i < 8; i++) {
        spawnObstacle(200 + i * 150);
    }
    
    // Initial coins
    for (let i = 0; i < 5; i++) {
        coins.push({
            x: 150 + Math.random() * 200,
            y: 100 + Math.random() * 350,
            collected: false,
            pulse: Math.random() * Math.PI * 2
        });
    }
}

function spawnObstacle(x) {
    let gap = 180 - Math.min(score / 20, 50); // Gap gets smaller
    let gapY = 50 + Math.random() * (canvas.height - 100 - gap);
    obstacles.push({
        x: x,
        gapY: gapY,
        gapHeight: gap,
        passed: false
    });
}

function update() {
    if (gameState !== 'playing') return;
    
    // Copter physics
    if (keys.up || window.tU) {
        copter.vy -= 0.5;
        // Rotor fast
        copter.rotorAngle += 0.5;
        // Exhaust
        if (Math.random() < 0.3) {
            eSpawn(copter.x - 20, copter.y + 10, '#aaaaaa', 1);
        }
    } else if (keys.down || window.tD) {
        copter.vy += 0.3;
        copter.rotorAngle += 0.2;
    } else {
        copter.vy += 0.2; // Gravity
        copter.rotorAngle += 0.1;
    }
    
    copter.vy = Math.max(-8, Math.min(6, copter.vy));
    copter.y += copter.vy;
    
    // Fuel consumption
    fuel -= 0.05;
    if (fuel <= 0) {
        fuel = 0;
        copter.vy += 0.3; // Fall when out of fuel
    }
    document.getElementById('fuelBar').style.width = fuel + '%';
    document.getElementById('fuel').textContent = Math.floor(fuel);
    
    // Boundaries
    if (copter.y < 0 || copter.y > canvas.height - 30) {
        gameOver();
        return;
    }
    
    // Move obstacles
    obstacles.forEach(o => {
        o.x -= 3;
        
        // Collision
        if (copter.x + 25 > o.x && copter.x - 25 < o.x + 30) {
            if (copter.y - 15 < o.gapY || copter.y + 15 > o.gapY + o.gapHeight) {
                gameOver();
                return;
            }
        }
        
        // Passed
        if (!o.passed && o.x + 30 < copter.x) {
            o.passed = true;
            score++;
            if (score > best) {
                best = score;
                localStorage.setItem('copterBest', best);
            }
        }
    });
    
    // Remove old obstacles, spawn new
    if (obstacles.length > 0 && obstacles[0].x < -50) {
        obstacles.shift();
        spawnObstacle(obstacles[obstacles.length - 1].x + 150);
    }
    
    // Coins
    coins.forEach(c => {
        c.pulse += 0.1;
        if (!c.collected) {
            let dx = c.x - copter.x;
            let dy = c.y - copter.y;
            if (dx*dx + dy*dy < 900) {
                c.collected = true;
                fuel = Math.min(100, fuel + 15);
                score += 5;
                eSpawn(c.x, c.y, '#ffd700', 15);
            }
        }
    });
    
    // Respawn coins
    if (coins.every(c => c.collected)) {
        for (let i = 0; i < 3; i++) {
            coins.push({
                x: copter.x + 200 + Math.random() * 100,
                y: 50 + Math.random() * (canvas.height - 100),
                collected: false,
                pulse: Math.random() * Math.PI * 2
            });
        }
    }
    coins = coins.filter(c => c.x > -50);
    
    // Particles
    eParticles = eParticles.filter(p => { p.update(); return p.life > 0; });
    
    // Score
    document.getElementById('score').textContent = score;
    document.getElementById('best').textContent = best;
}

function draw() {
    // Sky gradient
    let sky = ctx.createLinearGradient(0, 0, 0, canvas.height);
    sky.addColorStop(0, '#1a1a2e');
    sky.addColorStop(1, '#0d0d1a');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Stars
    for (let i = 0; i < 30; i++) {
        ctx.fillStyle = 'rgba(255,255,255,' + (0.3 + Math.random() * 0.7) + ')';
        ctx.beginPath();
        ctx.arc(Math.random() * canvas.width, Math.random() * canvas.height * 0.7, 1 + Math.random(), 0, Math.PI * 2);
        ctx.fill();
    }
    
    // Obstacles (cave walls)
    obstacles.forEach(o => {
        // Top wall
        let topGrad = ctx.createLinearGradient(0, 0, 0, o.gapY);
        topGrad.addColorStop(0, '#3d2914');
        topGrad.addColorStop(1, '#5c4033');
        ctx.fillStyle = topGrad;
        ctx.fillRect(o.x, 0, 30, o.gapY);
        
        // Rocks on top
        ctx.fillStyle = '#4a3728';
        for (let i = 0; i < 3; i++) {
            ctx.beginPath();
            ctx.arc(o.x + 15, o.gapY - 5 - i * 8, 8, 0, Math.PI * 2);
            ctx.fill();
        }
        
        // Bottom wall
        let botGrad = ctx.createLinearGradient(0, o.gapY + o.gapHeight, 0, canvas.height);
        botGrad.addColorStop(0, '#5c4033');
        botGrad.addColorStop(1, '#3d2914');
        ctx.fillStyle = botGrad;
        ctx.fillRect(o.x, o.gapY + o.gapHeight, 30, canvas.height);
        
        // Rocks on bottom
        ctx.fillStyle = '#4a3728';
        for (let i = 0; i < 3; i++) {
            ctx.beginPath();
            ctx.arc(o.x + 15, o.gapY + o.gapHeight + 5 + i * 8, 8, 0, Math.PI * 2);
            ctx.fill();
        }
    });
    
    // Coins
    coins.forEach(c => {
        if (!c.collected) {
            let scale = 1 + Math.sin(c.pulse) * 0.15;
            ctx.fillStyle = '#ffd700';
            ctx.shadowColor = '#ffd700';
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.arc(c.x, c.y, 12 * scale, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            
            ctx.font = '14px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('⛽', c.x, c.y);
        }
    });
    
    // Helicopter
    ctx.save();
    ctx.translate(copter.x, copter.y);
    
    // Body
    ctx.fillStyle = '#ff4444';
    ctx.shadowColor = '#ff4444';
    ctx.shadowBlur = 15;
    ctx.beginPath();
    ctx.ellipse(0, 0, 25, 15, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    
    // Cockpit
    ctx.fillStyle = '#00ccff';
    ctx.beginPath();
    ctx.ellipse(10, 0, 12, 10, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Tail
    ctx.fillStyle = '#cc3333';
    ctx.beginPath();
    ctx.moveTo(-20, 0);
    ctx.lineTo(-40, -5);
    ctx.lineTo(-40, 5);
    ctx.closePath();
    ctx.fill();
    
    // Rotor
    ctx.strokeStyle = '#aaaaaa';
    ctx.lineWidth = 3;
    ctx.save();
    ctx.translate(0, -15);
    ctx.rotate(copter.rotorAngle);
    ctx.beginPath();
    ctx.moveTo(-25, 0);
    ctx.lineTo(25, 0);
    ctx.stroke();
    ctx.restore();
    
    // Rotor hub
    ctx.fillStyle = '#666';
    ctx.beginPath();
    ctx.arc(0, -15, 4, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.restore();
    
    // Particles
    eParticles.forEach(p => p.draw());
}

function gameOver() {
    gameState = 'over';
    eSpawn(copter.x, copter.y, '#ff4444', 30);
    document.getElementById('finalScore').textContent = 'Score: ' + score;
    clearInterval(gameLoop);
    setTimeout(() => {
        document.getElementById('gameOverScreen').classList.remove('hidden');
    }, 500);
}

function startGame() {
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('gameOverScreen').classList.add('hidden');
    init();
    if (gameLoop) clearInterval(gameLoop);
    gameLoop = setInterval(() => { update(); draw(); }, 1000/60);
}

// Touch controls
window.tU = window.tD = false;
['upBtn', 'downBtn'].forEach(id => {
    const btn = document.getElementById(id);
    const key = id === 'upBtn' ? 'tU' : 'tD';
    btn.addEventListener('touchstart', e => { e.preventDefault(); window[key] = true; });
    btn.addEventListener('touchend', e => { e.preventDefault(); window[key] = false; });
    btn.addEventListener('mousedown', () => window[key] = true);
    btn.addEventListener('mouseup', () => window[key] = false);
});

// Keyboard
document.addEventListener('keydown', e => {
    if (e.key === 'ArrowUp' || e.key === 'w' || e.key === ' ') keys.up = true;
    if (e.key === 'ArrowDown' || e.key === 's') keys.down = true;
    if (e.key === 'Enter') startGame();
});
document.addEventListener('keyup', e => {
    if (e.key === 'ArrowUp' || e.key === 'w' || e.key === ' ') keys.up = false;
    if (e.key === 'ArrowDown' || e.key === 's') keys.down = false;
});

best = parseInt(localStorage.getItem('copterBest') || '0');
init();
draw();
</script>
</body>
</html>
