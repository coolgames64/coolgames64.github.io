<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🏀 Basketball Stars - Cool Games 64</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(180deg, #ff6b35 0%, #f7931e 50%, #ffcc02 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }
        .hud {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
        }
        .hud-box {
            background: rgba(0,0,0,0.5);
            border-radius: 15px;
            padding: 10px 20px;
            text-align: center;
            color: white;
        }
        .hud-box span { font-size: 24px; font-weight: 800; color: #ffcc02; }
        .hud-label { font-size: 12px; }
        #gameCanvas {
            border-radius: 15px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.4);
        }
        .power-bar {
            width: 200px;
            height: 20px;
            background: rgba(0,0,0,0.4);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
        }
        .power-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff88, #ffcc02, #ff4444);
            width: 0%;
            transition: width 0.05s;
        }
        .angle-display {
            color: white;
            font-size: 14px;
            margin-top: 5px;
        }
        .overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85);
            border-radius: 20px;
            padding: 30px 50px;
            text-align: center;
        }
        .overlay.hidden { display: none; }
        .overlay h1 { color: #ffcc02; font-size: 32px; margin-bottom: 10px; }
        .overlay p { color: white; margin-bottom: 20px; }
        .btn {
            background: linear-gradient(135deg, #ffcc02 0%, #ff6b35 100%);
            color: #0f0f1a;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(255,204,2,0.4);
        }
        .btn:hover { transform: scale(1.05); }
        @media (max-width: 420px) {
            #gameCanvas { width: 95vw !important; height: auto !important; }
        }
    </style>
</head>
<body>
    <div class="hud">
        <div class="hud-box">
            <div class="hud-label">SCORE</div>
            <span id="score">0</span>
        </div>
        <div class="hud-box">
            <div class="hud-label">SHOTS</div>
            <span id="shots">0</span>
        </div>
        <div class="hud-box">
            <div class="hud-label">STREAK</div>
            <span id="streak">0</span> 🔥
        </div>
    </div>
    
    <div style="position: relative;">
        <canvas id="gameCanvas" width="380" height="500"></canvas>
        <div class="overlay" id="startScreen">
            <h1>🏀 BASKETBALL STARS</h1>
            <p>Swipe up to shoot! Time it perfectly!</p>
            <button class="btn" onclick="startGame()">PLAY</button>
        </div>
        <div class="overlay hidden" id="scoreScreen">
            <h1>SWISH! 🎯</h1>
            <p id="shotResult">+2 Points!</p>
            <button class="btn" onclick="continueGame()">NEXT SHOT</button>
        </div>
    </div>
    
    <div class="power-bar"><div class="power-fill" id="powerFill"></div></div>
    <div class="angle-display">Angle: <span id="angle">45</span>°</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('function');

function resize() {
    const w = Math.min(window.innerWidth - 10, 380);
    const h = Math.min(window.innerHeight - 200, 500);
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
}
resize();
window.addEventListener('resize', resize);

let ball, hoop, arrow, particles;
let score, shots, streak, gameState;
let aimAngle, aimPower;
let charging = false;
let chargeTimer = 0;

class Particle {
    constructor(x, y, color, size, vx, vy, life) {
        this.x=x; this.y=y; this.color=color; this.size=size;
        this.vx=vx; this.vy=vy; this.life=life; this.maxLife=life;
    }
    update() {
        this.x+=this.vx;
        this.y+=this.vy;
        this.vy+=0.3;
        this.life--;
    }
    draw() {
        ctx.globalAlpha=this.life/this.maxLife;
        ctx.fillStyle=this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size*(this.life/this.maxLife), 0, Math.PI*2);
        ctx.fill();
        ctx.globalAlpha=1;
    }
}
let eParticles = [];
function eSpawn(x, y, color, count) {
    for(let i=0; i<count; i++) {
        eParticles.push(new Particle(x, y, color, 4+Math.random()*4, (Math.random()-0.5)*8, (Math.random()-0.5)*8-4, 30+Math.random()*20));
    }
}

function init() {
    ball = { x: 80, y: 400, vx: 0, vy: 0, r: 20, active: false };
    hoop = { x: 300, y: 120, r: 35 };
    arrow = { x: 80, y: 400, angle: -60, power: 50 };
    score = 0;
    shots = 0;
    streak = 0;
    aimAngle = 55;
    aimPower = 50;
    charging = false;
    chargeTimer = 0;
    gameState = 'aiming';
}

function shoot() {
    if (gameState !== 'aiming') return;
    
    ball.active = true;
    ball.vx = Math.cos(aimAngle * Math.PI / 180) * aimPower * 0.2;
    ball.vy = Math.sin(aimAngle * Math.PI / 180) * aimPower * 0.2;
    gameState = 'flying';
    shots++;
    
    eSpawn(ball.x, ball.y, '#ff6b35', 8);
}

function checkScore() {
    // Check if ball passes through hoop
    let dx = ball.x - hoop.x;
    let dy = ball.y - hoop.y;
    let dist = Math.sqrt(dx*dx + dy*dy);
    
    if (dist < hoop.r && ball.vy > 0 && ball.y < hoop.y + 20 && ball.y > hoop.y - 20) {
        // Score!
        streak++;
        let points = streak >= 3 ? 3 : 2;
        score += points;
        
        // Celebration!
        for (let i = 0; i < 30; i++) {
            eSpawn(hoop.x, hoop.y, ['#ffcc02', '#ff6b35', '#ff4444'][i%3], 3);
        }
        
        document.getElementById('shotResult').textContent = streak >= 3 ? 
            '🔥 FIRE! +' + points + ' Points!' : 'SWISH! +' + points + ' Points!';
        document.getElementById('scoreScreen').classList.remove('hidden');
        gameState = 'scored';
        
        return true;
    }
    return false;
}

function update() {
    if (gameState === 'aiming') {
        // Auto aim oscillation
        aimAngle = 50 + Math.sin(Date.now() / 500) * 25;
        document.getElementById('angle').textContent = Math.round(aimAngle);
    }
    
    if (gameState === 'flying') {
        ball.vy += 0.4; // Gravity
        ball.x += ball.vx;
        ball.y += ball.vy;
        
        // Check score
        if (!checkScore()) {
            // Rim bounce
            let dx = ball.x - hoop.x;
            let dy = ball.y - hoop.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            
            if (dist < hoop.r + ball.r && dist > hoop.r - 10) {
                // Bounce off rim
                let nx = dx / dist;
                let ny = dy / dist;
                ball.vx = nx * 4;
                ball.vy = ny * Math.abs(ball.vy) * 0.5;
                eSpawn(ball.x, ball.y, '#ff6b35', 5);
            }
        }
        
        // Out of bounds
        if (ball.y > canvas.height + 50 || ball.x > canvas.width + 50 || ball.x < -50) {
            if (gameState !== 'scored') {
                streak = 0;
                document.getElementById('shotResult').textContent = 'Miss! Try again!';
                document.getElementById('scoreScreen').classList.remove('hidden');
                gameState = 'missed';
            }
        }
    }
    
    // Particles
    eParticles = eParticles.filter(p => { p.update(); return p.life > 0; });
    
    // UI
    document.getElementById('score').textContent = score;
    document.getElementById('shots').textContent = shots;
    document.getElementById('streak').textContent = streak;
}

function draw() {
    // Sky gradient
    let sky = ctx.createLinearGradient(0, 0, 0, canvas.height);
    sky.addColorStop(0, '#ff6b35');
    sky.addColorStop(0.5, '#f7931e');
    sky.addColorStop(1, '#ffcc02');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Crowd (simple)
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    for (let i = 0; i < 20; i++) {
        ctx.beginPath();
        ctx.arc(50 + i * 18, canvas.height - 30, 15, 0, Math.PI * 2);
        ctx.fill();
    }
    
    // Court
    ctx.fillStyle = '#c9a86c';
    ctx.fillRect(0, canvas.height - 80, canvas.width, 80);
    
    // Court lines
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(0, canvas.height - 80);
    ctx.lineTo(canvas.width, canvas.height - 80);
    ctx.stroke();
    
    // Three point arc
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(hoop.x, canvas.height - 80, 150, Math.PI, 0);
    ctx.stroke();
    
    // Backboard
    ctx.fillStyle = '#fff';
    ctx.fillRect(hoop.x + 20, hoop.y - 40, 8, 80);
    
    // Hoop
    ctx.strokeStyle = '#ff4500';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(hoop.x, hoop.y, hoop.r, 0, Math.PI * 2);
    ctx.stroke();
    
    // Net
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    for (let i = 0; i < 8; i++) {
        let angle = (i / 8) * Math.PI;
        ctx.beginPath();
        ctx.moveTo(hoop.x + Math.cos(angle) * hoop.r, hoop.y + Math.sin(angle) * hoop.r);
        ctx.lineTo(hoop.x + Math.cos(angle) * 15, hoop.y + 40);
        ctx.stroke();
    }
    
    // Aim arrow (when aiming)
    if (gameState === 'aiming') {
        ctx.save();
        ctx.translate(ball.x, ball.y);
        ctx.rotate(aimAngle * Math.PI / 180);
        
        // Arrow
        ctx.fillStyle = '#00ff88';
        ctx.shadowColor = '#00ff88';
        ctx.shadowBlur = 15;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(60, 0);
        ctx.lineTo(50, -10);
        ctx.moveTo(60, 0);
        ctx.lineTo(50, 10);
        ctx.fill();
        
        // Power indicator
        let powerColor = aimPower > 70 ? '#ff4444' : aimPower > 40 ? '#ffcc02' : '#00ff88';
        ctx.fillStyle = powerColor;
        ctx.fillRect(0, -3, aimPower * 0.6, 6);
        
        ctx.shadowBlur = 0;
        ctx.restore();
    }
    
    // Ball
    ctx.fillStyle = '#ff6b35';
    ctx.shadowColor = '#ff6b35';
    ctx.shadowBlur = ball.active ? 10 : 0;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    
    // Ball lines
    ctx.strokeStyle = '#cc4400';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r - 3, 0, Math.PI * 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(ball.x - ball.r + 3, ball.y);
    ctx.lineTo(ball.x + ball.r - 3, ball.y);
    ctx.stroke();
    
    // Particles
    eParticles.forEach(p => p.draw());
    
    // Power bar
    if (gameState === 'aiming') {
        aimPower = 30 + Math.sin(Date.now() / 300) * 30 + 30;
        document.getElementById('powerFill').style.width = aimPower + '%';
    }
}

function continueGame() {
    document.getElementById('scoreScreen').classList.add('hidden');
    ball = { x: 80, y: 400, vx: 0, vy: 0, r: 20, active: false };
    gameState = 'aiming';
}

function startGame() {
    document.getElementById('startScreen').classList.add('hidden');
    init();
    setInterval(() => { update(); draw(); }, 1000/60);
}

// Touch/click to shoot
canvas.addEventListener('click', shoot);
canvas.addEventListener('touchstart', e => { e.preventDefault(); shoot(); });

// Auto-aim oscillates - tap to shoot at current angle
init();
draw();
</script>
</body>
</html>
