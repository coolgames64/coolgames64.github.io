<body>
    <div class="hud">
        <div class="hud-item">Score: <span id="score">0</span></div>
        <div class="hud-item">Lives: <span id="lives">3</span> ❤️</div>
        <div class="hud-item">Level: <span id="level">1</span></div>
    </div>
    <div style="position:relative;">
        <canvas id="gameCanvas" width="400" height="500"></canvas>
        <div class="overlay" id="startScreen">
            <h1>🏓 EPIC BREAKOUT</h1>
            <p>Smash all the bricks!</p>
            <button class="btn" onclick="startGame()">START</button>
        </div>
        <div class="overlay hidden" id="winScreen">
            <h1>🎉 YOU WIN!</h1>
            <p id="winScore">Score: 0</p>
            <button class="btn" onclick="startGame()">NEXT LEVEL</button>
        </div>
        <div class="overlay hidden" id="gameOverScreen">
            <h1>💀 GAME OVER</h1>
            <p id="finalScore">Score: 0</p>
            <button class="btn" onclick="startGame()">TRY AGAIN</button>
        </div>
    </div>
    <div class="touch-controls">
        <div class="paddle-btns">
            <button class="paddle-btn" id="leftBtn">◀</button>
            <button class="paddle-btn" id="rightBtn">▶</button>
        </div>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Responsive
function resize() {
    const w = Math.min(window.innerWidth - 10, 400);
    const h = Math.min(window.innerHeight - 200, 500);
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
}
resize();
window.addEventListener('resize', resize);

let paddle, ball, bricks, particles, powerUps;
let score, lives, level, gameLoop, gameState;
let shake, shakeTime;

class Particle {
    constructor(x, y, color) {
        this.x = x; this.y = y; this.color = color;
        this.vx = (Math.random() - 0.5) * 8;
        this.vy = (Math.random() - 0.5) * 8;
        this.life = 30 + Math.random() * 20;
        this.size = 3 + Math.random() * 4;
    }
    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += 0.15;
        this.life--;
    }
    draw() {
        ctx.globalAlpha = this.life / 50;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
    }
}

function spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
        particles.push(new Particle(x, y, color));
    }
}

function initLevel() {
    bricks = [];
    const colors = ['#ff4444', '#ff9500', '#ffc800', '#00ff88', '#00ccff', '#667eea', '#764ba2'];
    for (let row = 0; row < 6; row++) {
        for (let col = 0; col < 8; col++) {
            bricks.push({
                x: 20 + col * 45,
                y: 30 + row * 25,
                w: 40,
                h: 20,
                color: colors[row % colors.length],
                alive: true
            });
        }
    }
    powerUps = [];
    particles = [];
}

function init() {
    paddle = { x: 200, y: 470, w: 80, h: 15, speed: 8 };
    ball = { x: 200, y: 450, vx: 3, vy: -4, r: 8 };
    score = 0;
    lives = 3;
    level = 1;
    shake = 0;
    initLevel();
    gameState = 'playing';
}

function update() {
    if (gameState !== 'playing') return;
    
    // Paddle movement
    if (keys.left || window.tL) paddle.x -= paddle.speed;
    if (keys.right || window.tR) paddle.x += paddle.speed;
    paddle.x = Math.max(paddle.w/2, Math.min(canvas.width - paddle.w/2, paddle.x));
    
    // Ball
    ball.x += ball.vx;
    ball.y += ball.vy;
    
    // Wall collision
    if (ball.x <= ball.r || ball.x >= canvas.width - ball.r) {
        ball.vx *= -1;
        spawnParticles(ball.x, ball.y, '#00ff88', 5);
    }
    if (ball.y <= ball.r) {
        ball.vy *= -1;
        spawnParticles(ball.x, ball.y, '#00ff88', 5);
    }
    
    // Paddle collision
    if (ball.y + ball.r >= paddle.y - paddle.h/2 &&
        ball.y - ball.r <= paddle.y + paddle.h/2 &&
        ball.x >= paddle.x - paddle.w/2 &&
        ball.x <= paddle.x + paddle.w/2 &&
        ball.vy > 0) {
        ball.vy = -Math.abs(ball.vy);
        ball.vx += (ball.x - paddle.x) * 0.1;
        ball.vx = Math.max(-6, Math.min(6, ball.vx));
        spawnParticles(ball.x, ball.y, '#00ff88', 10);
    }
    
    // Brick collision
    bricks.forEach(b => {
        if (!b.alive) return;
        if (ball.x + ball.r > b.x && ball.x - ball.r < b.x + b.w &&
            ball.y + ball.r > b.y && ball.y - ball.r < b.y + b.h) {
            ball.vy *= -1;
            ball.vx += (Math.random() - 0.5) * 0.5;
            b.alive = false;
            score += 10;
            shake = 5;
            spawnParticles(b.x + b.w/2, b.y + b.h/2, b.color, 15);
        }
    });
    
    // Ball lost
    if (ball.y > canvas.height + ball.r) {
        lives--;
        if (lives <= 0) {
            gameState = 'gameover';
            document.getElementById('finalScore').textContent = 'Score: ' + score;
            document.getElementById('gameOverScreen').classList.remove('hidden');
            clearInterval(gameLoop);
        } else {
            ball.x = paddle.x;
            ball.y = 450;
            ball.vy = -4;
            ball.vx = (Math.random() - 0.5) * 4;
        }
    }
    
    // Win check
    if (bricks.every(b => !b.alive)) {
        gameState = 'win';
        document.getElementById('winScore').textContent = 'Score: ' + score;
        document.getElementById('winScreen').classList.remove('hidden');
        clearInterval(gameLoop);
    }
    
    // Power-ups
    powerUps.forEach((p, i) => {
        p.y += 2;
        if (p.y > canvas.height) {
            powerUps.splice(i, 1);
        }
        // Paddle collision
        if (p.y + 15 >= paddle.y - paddle.h/2 &&
            p.y - 15 <= paddle.y + paddle.h/2 &&
            p.x >= paddle.x - paddle.w/2 &&
            p.x <= paddle.x + paddle.w/2) {
            if (p.type === 'wide') paddle.w = Math.min(120, paddle.w + 20);
            if (p.type === 'life') lives++;
            if (p.type === 'multi') {
                // Add more balls
            }
            powerUps.splice(i, 1);
            spawnParticles(p.x, p.y, '#00ff88', 20);
        }
    });
    
    // Random power-up drop
    if (Math.random() < 0.002 && powerUps.length < 2) {
        powerUps.push({
            x: 50 + Math.random() * 300,
            y: 0,
            type: ['wide', 'life', 'multi'][Math.floor(Math.random() * 3)]
        });
    }
    
    // Update particles
    particles.forEach(p => p.update());
    particles = particles.filter(p => p.life > 0);
    
    // Screen shake decay
    if (shake > 0) shake *= 0.9;
    
    // Update UI
    document.getElementById('score').textContent = score;
    document.getElementById('lives').textContent = lives;
    document.getElementById('level').textContent = level;
}

function draw() {
    ctx.save();
    if (shake > 0.5) {
        ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
    }
    
    // Background
    ctx.fillStyle = '#0a0a15';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Grid lines
    ctx.strokeStyle = 'rgba(0,255,136,0.05)';
    for (let x = 0; x < canvas.width; x += 40) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
    }
    for (let y = 0; y < canvas.height; y += 40) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
    }
    
    // Bricks
    bricks.forEach(b => {
        if (!b.alive) return;
        ctx.fillStyle = b.color;
        ctx.shadowColor = b.color;
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.roundRect(b.x, b.y, b.w, b.h, 4);
        ctx.fill();
        ctx.shadowBlur = 0;
        
        // Shine
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.fillRect(b.x + 2, b.y + 2, b.w - 4, 4);
    });
    
    // Power-ups
    powerUps.forEach(p => {
        ctx.fillStyle = p.type === 'wide' ? '#00ff88' : p.type === 'life' ? '#ff4444' : '#ffc800';
        ctx.shadowColor = ctx.fillStyle;
        ctx.shadowBlur = 15;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 12, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.font = '14px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(p.type === 'wide' ? '↔️' : p.type === 'life' ? '❤️' : '3️⃣', p.x, p.y);
    });
    
    // Paddle
    ctx.fillStyle = '#00ff88';
    ctx.shadowColor = '#00ff88';
    ctx.shadowBlur = 20;
    ctx.beginPath();
    ctx.roundRect(paddle.x - paddle.w/2, paddle.y - paddle.h/2, paddle.w, paddle.h, 8);
    ctx.fill();
    ctx.shadowBlur = 0;
    
    // Ball
    ctx.fillStyle = '#ffffff';
    ctx.shadowColor = '#ffffff';
    ctx.shadowBlur = 15;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    
    // Ball trail
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#00ff88';
    ctx.beginPath();
    ctx.arc(ball.x - ball.vx * 2, ball.y - ball.vy * 2, ball.r * 0.7, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.15;
    ctx.beginPath();
    ctx.arc(ball.x - ball.vx * 4, ball.y - ball.vy * 4, ball.r * 0.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    
    // Particles
    particles.forEach(p => p.draw());
    
    ctx.restore();
}

function startGame() {
    if (gameState === 'win') {
        level++;
        ball.vx *= 1.1;
        ball.vy *= 1.1;
        initLevel();
        document.getElementById('winScreen').classList.add('hidden');
        gameState = 'playing';
    } else if (gameState === 'gameover') {
        document.getElementById('gameOverScreen').classList.add('hidden');
        init();
    } else {
        document.getElementById('startScreen').classList.add('hidden');
        init();
    }
    if (gameLoop) clearInterval(gameLoop);
    gameLoop = setInterval(() => { update(); draw(); }, 1000/60);
}

// Touch controls
window.tL = window.tR = false;
['leftBtn', 'rightBtn'].forEach(id => {
    const btn = document.getElementById(id);
    btn.addEventListener('touchstart', e => { e.preventDefault(); window[id === 'leftBtn' ? 'tL' : 'tR'] = true; });
    btn.addEventListener('touchend', e => { e.preventDefault(); window[id === 'leftBtn' ? 'tL' : 'tR'] = false; });
    btn.addEventListener('mousedown', () => window[id === 'leftBtn' ? 'tL' : 'tR'] = true);
    btn.addEventListener('mouseup', () => window[id === 'leftBtn' ? 'tL' : 'tR'] = false);
});

// Keyboard
document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = true;
    if (e.key === 'ArrowRight' || e.key === 'd') keys.right = true;
    if (e.key === ' ') startGame();
});
document.addEventListener('keyup', e => {
    if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = false;
    if (e.key === 'ArrowRight' || e.key === 'd') keys.right = false;
});

if (!ctx.roundRect) {
    ctx.roundRect = function(x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
    };
}

init();
draw();

        window.tL=false; window.tR=false; window.tU=false; window.tD=false;
        setInterval(() => {
            if(window.tL) keys.left=true; else keys.left=false;
            if(window.tR) keys.right=true; else keys.right=false;
            if(window.tU) keys.up=true; else keys.up=false;
            if(window.tD) keys.down=true; else keys.down=false;
        }, 50);

    
    // EPIC PARTICLES
    let eParticles = [];
    class EParticle {
        constructor(x, y, color, size, vx, vy, life) {
            this.x=x; this.y=y; this.color=color; this.size=size;
            this.vx=vx; this.vy=vy; this.life=life; this.maxLife=life;
        }
        update() {
            this.x+=this.vx; this.y+=this.vy; this.vy+=0.1; this.life--;
        }
        draw() {
            let a = this.life/this.maxLife;
            ctx.globalAlpha=a;
            ctx.fillStyle=this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size*a, 0, Math.PI*2);
            ctx.fill();
            ctx.globalAlpha=1;
        }
    }
    function eSpawn(x, y, color, count) {
        for(let i=0; i<count; i++) {
            eParticles.push(new EParticle(x, y, color, 3+Math.random()*4, (Math.random()-0.5)*8, (Math.random()-0.5)*8-3, 30+Math.random()*20));
        }
    }

    </script>
