<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🐦 Flappy Wings Epic - Cool Games 64</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(180deg, #87CEEB 0%, #98D8C8 50%, #7CB342 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }
        .hud {
            position: fixed;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 30px;
            z-index: 100;
        }
        .hud-item {
            background: rgba(255,255,255,0.9);
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 18px;
            color: #333;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .hud-item span { color: #ff6b6b; }
        #gameCanvas {
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        .overlay.hidden { display: none; }
        .overlay h1 {
            font-size: 48px;
            color: #FFD700;
            text-shadow: 0 4px 20px rgba(255,215,0,0.5);
            margin-bottom: 10px;
        }
        .overlay h2 {
            font-size: 28px;
            color: white;
            margin-bottom: 10px;
        }
        .overlay p { color: rgba(255,255,255,0.8); margin-bottom: 25px; font-size: 18px; }
        .btn {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            color: #333;
            border: none;
            padding: 15px 50px;
            font-size: 20px;
            font-weight: 700;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255,215,0,0.4);
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.1); }
        .medal {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 15px 0;
        }
        .medal.bronze { background: linear-gradient(135deg, #CD7F32, #8B4513); }
        .medal.silver { background: linear-gradient(135deg, #C0C0C0, #808080); }
        .medal.gold { background: linear-gradient(135deg, #FFD700, #FFA500); }
        .medal.platinum { background: linear-gradient(135deg, #E5E4E2, #8FD3FE); }
        .tap-hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.8);
            font-size: 16px;
            animation: bounce 1s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-10px); }
        }
    </style>
</head>
<body>
    <div class="hud" id="hud" style="display: none;">
        <div class="hud-item">Score: <span id="score">0</span></div>
        <div class="hud-item">Best: <span id="best">0</span></div>
    </div>
    <canvas id="gameCanvas" width="320" height="480"></canvas>
    
    <div class="overlay" id="startScreen">
        <h1>🐦 FLAPPY WINGS</h1>
        <p>Tap or press SPACE to fly!</p>
        <button class="btn" onclick="startGame()">START</button>
        <p style="margin-top: 20px; font-size: 14px;">Arrow Up or W also works!</p>
    </div>
    
    <div class="overlay hidden" id="gameOverScreen">
        <h2>Game Over!</h2>
        <div class="medal" id="medal">🏆</div>
        <h1 id="finalScore">0</h1>
        <p id="scoreLabel">points</p>
        <button class="btn" onclick="startGame()">TRY AGAIN</button>
    </div>
    
    <div class="tap-hint hidden" id="tapHint">👆 TAP TO FLY 👆</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let bird, pipes, particles, score, best, gameState, gameLoop;
let parallaxOffset = 0;
let pipeSpawnTimer = 0;
let shakeAmount = 0;

const GRAVITY = 0.4;
const FLAP_POWER = -7;
const PIPE_SPEED = 2.5;
const PIPE_GAP = 150;

class Particle {
    constructor(x, y, vx, vy, color, size) {
        this.x = x; this.y = y; this.vx = vx; this.vy = vy;
        this.color = color; this.size = size;
        this.life = 1;
    }
    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += 0.1;
        this.life -= 0.02;
    }
    draw() {
        ctx.globalAlpha = this.life;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
    }
}

class Pipe {
    constructor() {
        this.x = canvas.width + 50;
        this.gapY = 100 + Math.random() * (canvas.height - 250);
        this.width = 60;
        this.scored = false;
    }
    draw() {
        // Pipe body
        let grad = ctx.createLinearGradient(this.x, 0, this.x + this.width, 0);
        grad.addColorStop(0, '#2E7D32');
        grad.addColorStop(0.5, '#4CAF50');
        grad.addColorStop(1, '#2E7D32');
        
        ctx.fillStyle = grad;
        
        // Top pipe
        ctx.fillRect(this.x, 0, this.width, this.gapY - PIPE_GAP / 2);
        
        // Bottom pipe
        ctx.fillRect(this.x, this.gapY + PIPE_GAP / 2, this.width, canvas.height);
        
        // Pipe edges
        ctx.fillStyle = '#1B5E20';
        ctx.fillRect(this.x - 5, this.gapY - PIPE_GAP / 2 - 20, this.width + 10, 20);
        ctx.fillRect(this.x - 5, this.gapY + PIPE_GAP / 2, this.width + 10, 20);
        
        // Highlights
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.fillRect(this.x + 5, 0, 8, this.gapY - PIPE_GAP / 2 - 20);
        ctx.fillRect(this.x + 5, this.gapY + PIPE_GAP / 2 + 20, 8, canvas.height);
    }
}

function init() {
    bird = {
        x: 80,
        y: canvas.height / 2,
        vy: 0,
        rotation: 0,
        wingAngle: 0
    };
    pipes = [];
    particles = [];
    score = 0;
    pipeSpawnTimer = 0;
    shakeAmount = 0;
    updateHUD();
}

function spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
        particles.push(new Particle(
            x, y,
            (Math.random() - 0.5) * 6,
            (Math.random() - 0.5) * 6,
            color,
            3 + Math.random() * 4
        ));
    }
}

function flap() {
    if (gameState === 'playing') {
        bird.vy = FLAP_POWER;
        
        // Wing flap animation
        bird.wingAngle = -0.5;
        
        // Spawn feather particles
        spawnParticles(bird.x - 10, bird.y, '#FFF8E1', 3);
    }
}

function startGame() {
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('gameOverScreen').classList.add('hidden');
    document.getElementById('hud').style.display = 'flex';
    
    init();
    gameState = 'playing';
    
    if (gameLoop) clearInterval(gameLoop);
    gameLoop = setInterval(update, 1000 / 60);
}

function update() {
    if (gameState !== 'playing') return;
    
    // Parallax background
    parallaxOffset += PIPE_SPEED * 0.5;
    if (parallaxOffset > canvas.width) parallaxOffset = 0;
    
    // Bird physics
    bird.vy += GRAVITY;
    bird.y += bird.vy;
    
    // Rotation based on velocity
    bird.rotation = Math.min(Math.max(bird.vy * 0.05, -0.5), 1.5);
    
    // Wing animation
    bird.wingAngle *= 0.9;
    if (bird.wingAngle > -0.1) bird.wingAngle += 0.05;
    
    // Spawn pipes
    pipeSpawnTimer++;
    if (pipeSpawnTimer > 100) {
        pipes.push(new Pipe());
        pipeSpawnTimer = 0;
    }
    
    // Update pipes
    for (let i = pipes.length - 1; i >= 0; i--) {
        pipes[i].x -= PIPE_SPEED;
        
        // Score
        if (!pipes[i].scored && pipes[i].x + pipes[i].width < bird.x) {
            pipes[i].scored = true;
            score++;
            shakeAmount = 5;
            updateHUD();
            
            // Score celebration particles
            spawnParticles(bird.x, bird.y, '#FFD700', 10);
        }
        
        // Remove off-screen pipes
        if (pipes[i].x + pipes[i].width < 0) {
            pipes.splice(i, 1);
        }
        
        // Collision
        if (bird.x + 15 > pipes[i].x && bird.x - 15 < pipes[i].x + pipes[i].width) {
            if (bird.y - 15 < pipes[i].gapY - PIPE_GAP / 2 || 
                bird.y + 15 > pipes[i].gapY + PIPE_GAP / 2) {
                gameOver();
                return;
            }
        }
    }
    
    // Ground collision
    if (bird.y > canvas.height - 50 || bird.y < 0) {
        gameOver();
        return;
    }
    
    // Update particles
    particles = particles.filter(p => { p.update(); return p.life > 0; });
    
    // Screen shake decay
    if (shakeAmount > 0) shakeAmount *= 0.9;
}

function updateHUD() {
    document.getElementById('score').textContent = score;
    document.getElementById('best').textContent = best;
}

function gameOver() {
    gameState = 'over';
    
    if (score > best) {
        best = score;
        localStorage.setItem('flappyBest', best);
    }
    
    // Death particles
    spawnParticles(bird.x, bird.y, '#ff4444', 20);
    
    // Medal
    let medal = document.getElementById('medal');
    medal.className = 'medal';
    if (score >= 40) { medal.classList.add('platinum'); medal.textContent = '💎'; }
    else if (score >= 20) { medal.classList.add('gold'); medal.textContent = '🥇'; }
    else if (score >= 10) { medal.classList.add('silver'); medal.textContent = '🥈'; }
    else if (score >= 5) { medal.classList.add('bronze'); medal.textContent = '🥉'; }
    else { medal.textContent = '😢'; }
    
    document.getElementById('finalScore').textContent = score;
    document.getElementById('scoreLabel').textContent = score === 1 ? 'point' : 'points';
    
    clearInterval(gameLoop);
    
    setTimeout(() => {
        document.getElementById('gameOverScreen').classList.remove('hidden');
    }, 500);
}

function draw() {
    ctx.save();
    
    // Screen shake
    if (shakeAmount > 0.5) {
        ctx.translate(
            (Math.random() - 0.5) * shakeAmount,
            (Math.random() - 0.5) * shakeAmount
        );
    }
    
    // Sky gradient
    let skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    skyGrad.addColorStop(0, '#87CEEB');
    skyGrad.addColorStop(0.6, '#98D8C8');
    skyGrad.addColorStop(1, '#7CB342');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Clouds (parallax)
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    for (let i = 0; i < 5; i++) {
        let cx = ((i * 150 - parallaxOffset * 0.3) % (canvas.width + 100)) - 50;
        let cy = 50 + (i % 3) * 60;
        drawCloud(cx, cy);
    }
    
    // Ground
    ctx.fillStyle = '#8BC34A';
    ctx.fillRect(0, canvas.height - 50, canvas.width, 50);
    
    // Grass
    ctx.fillStyle = '#689F38';
    ctx.fillRect(0, canvas.height - 50, canvas.width, 10);
    
    // Pipes
    pipes.forEach(p => p.draw());
    
    // Bird
    drawBird();
    
    // Particles
    particles.forEach(p => p.draw());
    
    ctx.restore();
}

function drawCloud(x, y) {
    ctx.beginPath();
    ctx.arc(x, y, 25, 0, Math.PI * 2);
    ctx.arc(x + 30, y - 10, 30, 0, Math.PI * 2);
    ctx.arc(x + 60, y, 25, 0, Math.PI * 2);
    ctx.arc(x + 30, y + 5, 20, 0, Math.PI * 2);
    ctx.fill();
}

function drawBird() {
    ctx.save();
    ctx.translate(bird.x, bird.y);
    ctx.rotate(bird.rotation);
    
    // Body
    ctx.fillStyle = '#FFEB3B';
    ctx.shadowColor = '#FF9800';
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.ellipse(0, 0, 20, 15, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    
    // Wing
    ctx.fillStyle = '#FFC107';
    ctx.save();
    ctx.rotate(bird.wingAngle);
    ctx.beginPath();
    ctx.ellipse(-5, 5, 12, 8, -0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    
    // Eye
    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.arc(8, -3, 5, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(9, -4, 2, 0, Math.PI * 2);
    ctx.fill();
    
    // Beak
    ctx.fillStyle = '#FF5722';
    ctx.beginPath();
    ctx.moveTo(15, 0);
    ctx.lineTo(25, 3);
    ctx.lineTo(15, 6);
    ctx.closePath();
    ctx.fill();
    
    ctx.restore();
}

function gameLoop() {
    if (gameState === 'playing') {
        update();
    }
    draw();
}

// Controls
document.addEventListener('keydown', e => {
    if (e.key === 'ArrowUp' || e.key === 'w' || e.key === ' ') {
        e.preventDefault();
        if (gameState === 'start') {
            startGame();
        } else if (gameState === 'playing') {
            flap();
        } else if (gameState === 'over') {
            startGame();
        }
    }
    if (e.key === 'Enter' && gameState === 'over') startGame();
});

canvas.addEventListener('click', () => {
    if (gameState === 'start') {
        startGame();
    } else if (gameState === 'playing') {
        flap();
    }
});

canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    if (gameState === 'start') {
        startGame();
    } else if (gameState === 'playing') {
        flap();
    }
});

// Load best
best = parseInt(localStorage.getItem('flappyBest') || '0');
updateHUD();

gameLoop();
</script>
</body>
</html>
